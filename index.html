            if (hd < 25) {
              wolf.health--;
              spawnFloater(wolf.x, wolf.y - 20, '-1', '#ffdd55');
              let kbAngle = Math.atan2(wolf.y - troubledPerson.y, wolf.x - troubledPerson.x);
              wolf.x += Math.cos(kbAngle) * 40;
              wolf.y += Math.sin(kbAngle) * 40;
              wolf.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, wolf.x));
              wolf.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, wolf.y));
              wolf.state = 'wander';
              wolf.angle = kbAngle;
            }
          }
        }
      }
      if (troubledPerson.whip.active) {
        troubledPerson.whip.timer--;
        if (troubledPerson.whip.timer <= 0) troubledPerson.whip.active = false;
      }
      // Check if all quest wolves defeated
      let anyLeft = wolves.some(w => w.pack === TROUBLED_PACK_ID);
      if (!anyLeft) {
        troubledPersonFound = true;
        troubledPerson.following = true;
        troubledPerson.health = troubledPerson.maxHealth;
        notify('The miner is safe! Lead them to the mine.');
      }
    }
  }

  // Miner follows player to the mine
  if (troubledPerson.active && troubledPerson.following && !mineFound) {
    let fdx = player.x - troubledPerson.x;
    let fdy = player.y - troubledPerson.y;
    let fdist = Math.hypot(fdx, fdy);
    troubledPerson.movingFollow = false;
    if (fdist > 300) {
      // Teleport close if too far behind
      troubledPerson.x = player.x - (fdx / fdist) * 35;
      troubledPerson.y = player.y - (fdy / fdist) * 35;
    } else if (fdist > 40) {
      let spd = player.speed * 0.9;
      troubledPerson.x += (fdx / fdist) * spd;
      troubledPerson.y += (fdy / fdist) * spd;
      troubledPerson.movingFollow = true;
      // Update facing
      if (Math.abs(fdx) > Math.abs(fdy)) {
        troubledPerson.facing = fdx > 0 ? 'right' : 'left';
      } else {
        troubledPerson.facing = fdy > 0 ? 'down' : 'up';
      }
    }
    // Keep in bounds
    troubledPerson.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, troubledPerson.x));
    troubledPerson.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, troubledPerson.y));
  }
}

// --- DRAW ---
// Pre-cache border fade gradients (static, never change)
let _borderGrds = null;
function getBorderGradients() {
  if (_borderGrds) return _borderGrds;
  let top = ctx.createLinearGradient(0, BORDER - 30, 0, BORDER + 10);
  top.addColorStop(0, 'rgba(14,53,6,0.6)'); top.addColorStop(1, 'rgba(14,53,6,0)');
  let bot = ctx.createLinearGradient(0, WORLD_H - BORDER + 10, 0, WORLD_H - BORDER - 30);
  bot.addColorStop(0, 'rgba(14,53,6,0.6)'); bot.addColorStop(1, 'rgba(14,53,6,0)');
  let lft = ctx.createLinearGradient(BORDER - 30, 0, BORDER + 10, 0);
  lft.addColorStop(0, 'rgba(14,53,6,0.6)'); lft.addColorStop(1, 'rgba(14,53,6,0)');
  let rgt = ctx.createLinearGradient(WORLD_W - BORDER + 10, 0, WORLD_W - BORDER - 30, 0);
  rgt.addColorStop(0, 'rgba(14,53,6,0.6)'); rgt.addColorStop(1, 'rgba(14,53,6,0)');
  _borderGrds = { top, bot, lft, rgt };
  return _borderGrds;
}

function draw() {
  let _inBossFight = mineScene.active && (mineScene.phase === 'boss' || mineScene.phase === 'victory' || mineScene.phase === 'victory_fade');
  let _hideTrees = _inBossFight;
  // Viewport bounds for culling (skip drawing off-screen objects)
  let vpL = camX - 60, vpR = camX + canvas.width + 60;
  let vpT = camY - 60, vpB = camY + canvas.height + 60;

  // Jungle background (cave floor during boss fight)
  if (_inBossFight) {
    ctx.fillStyle = '#1a1610';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else {
    ctx.fillStyle = '#1a4d0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Grass variation (hidden during boss fight)
  if (!_inBossFight) {
  ctx.fillStyle = '#1e5a0e';
  for (let gx = -camX % 50; gx < canvas.width; gx += 50) {
    for (let gy = -camY % 50; gy < canvas.height; gy += 50) {
      if ((Math.floor((gx + camX)/50) + Math.floor((gy + camY)/50)) % 2 === 0) {
        ctx.fillRect(gx, gy, 50, 50);
      }
    }
  }
  } // end grass boss fight hide



  ctx.save();
  ctx.translate(-camX, -camY);

  // Dense border forest - extends far beyond map edges so it looks infinite
  if (!_inBossFight) {
  ctx.fillStyle = '#0e3506';
  let ext = 2000; // extension beyond map
  ctx.fillRect(-ext, -ext, WORLD_W + ext * 2, BORDER + ext); // top
  ctx.fillRect(-ext, WORLD_H - BORDER, WORLD_W + ext * 2, BORDER + ext); // bottom
  ctx.fillRect(-ext, -ext, BORDER + ext, WORLD_H + ext * 2); // left
  ctx.fillRect(WORLD_W - BORDER, -ext, BORDER + ext, WORLD_H + ext * 2); // right
  }

  // Border trees - dense packed canopies (hidden during boss fight)
  if (!_hideTrees)
  for (const bt of borderTrees) {
    if (bt.x < vpL || bt.x > vpR || bt.y < vpT || bt.y > vpB) continue;
    // Trunk
    ctx.fillStyle = '#3a2510';
    ctx.fillRect(bt.x - 2, bt.y, 4, 8);
    // Dense canopy
    ctx.fillStyle = bt.shade;
    ctx.beginPath();
    ctx.arc(bt.x, bt.y - 3, bt.size * 0.5, 0, Math.PI * 2);
    ctx.fill();
    // Darker overlay for depth
    ctx.fillStyle = 'rgba(0,20,0,0.15)';
    ctx.beginPath();
    ctx.arc(bt.x + 2, bt.y - 1, bt.size * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Fade edge between border and playable area (cached gradients)
  if (!_inBossFight) {
  let bg = getBorderGradients();
  ctx.fillStyle = bg.top;
  ctx.fillRect(0, BORDER - 30, WORLD_W, 40);
  ctx.fillStyle = bg.bot;
  ctx.fillRect(0, WORLD_H - BORDER - 30, WORLD_W, 40);
  ctx.fillStyle = bg.lft;
  ctx.fillRect(BORDER - 30, 0, 40, WORLD_H);
  ctx.fillStyle = bg.rgt;
  ctx.fillRect(WORLD_W - BORDER - 30, 0, 40, WORLD_H);
  }

  // Rivers (hidden during boss fight)
  if (!_inBossFight)
  for (const river of rivers) {
    if (river.length < 2) continue;

    // River bank (slightly wider, darker)
    ctx.strokeStyle = '#2a4a10';
    ctx.lineWidth = RIVER_WIDTH + 8;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(river[0].x, river[0].y);
    for (let i = 1; i < river.length; i++) {
      let prev = river[i - 1];
      let cur = river[i];
      let mx = (prev.x + cur.x) / 2;
      let my = (prev.y + cur.y) / 2;
      ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
    }
    ctx.stroke();

    // Main water
    ctx.strokeStyle = '#1a6aaa';
    ctx.lineWidth = RIVER_WIDTH;
    ctx.beginPath();
    ctx.moveTo(river[0].x, river[0].y);
    for (let i = 1; i < river.length; i++) {
      let prev = river[i - 1];
      let cur = river[i];
      let mx = (prev.x + cur.x) / 2;
      let my = (prev.y + cur.y) / 2;
      ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
    }
    ctx.stroke();

    // Lighter center (shallow water look)
    ctx.strokeStyle = 'rgba(60,160,220,0.4)';
    ctx.lineWidth = RIVER_WIDTH * 0.5;
    ctx.beginPath();
    ctx.moveTo(river[0].x, river[0].y);
    for (let i = 1; i < river.length; i++) {
      let prev = river[i - 1];
      let cur = river[i];
      let mx = (prev.x + cur.x) / 2;
      let my = (prev.y + cur.y) / 2;
      ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
    }
    ctx.stroke();

    // Animated water shimmer
    let wt = frameNow / 600;
    ctx.strokeStyle = 'rgba(150,220,255,0.15)';
    ctx.lineWidth = 2;
    for (let i = 1; i < river.length - 1; i += 2) {
      let p = river[i];
      let shimX = Math.sin(wt + i) * 4;
      ctx.beginPath();
      ctx.moveTo(p.x + shimX - 6, p.y);
      ctx.lineTo(p.x + shimX + 6, p.y);
      ctx.stroke();
    }
  }

  // Bridges (hidden during boss fight)
  if (!_inBossFight)
  for (const br of bridges) {
    ctx.save();
    ctx.translate(br.x, br.y);
    ctx.rotate(br.angle - Math.PI / 2);

    // Bridge shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(0, 2, br.w / 2 + 2, br.h / 2 + 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Side rails
    ctx.fillStyle = '#5a3a15';
    ctx.fillRect(-br.w / 2, -br.h / 2 - 2, br.w, 3);
    ctx.fillRect(-br.w / 2, br.h / 2 - 1, br.w, 3);

    // Planks
    let plankCount = 7;
    let plankGap = br.w / (plankCount + 1);
    for (let p = 1; p <= plankCount; p++) {
      let px = -br.w / 2 + p * plankGap;
      let dark = p % 2 === 0;
      ctx.fillStyle = dark ? '#8a6a3a' : '#9a7a4a';
      ctx.fillRect(px - 2.5, -br.h / 2, 5, br.h);
      // Plank grain
      ctx.strokeStyle = 'rgba(60,40,10,0.15)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(px, -br.h / 2 + 2);
      ctx.lineTo(px, br.h / 2 - 2);
      ctx.stroke();
    }

    // Rail posts
    ctx.fillStyle = '#4a2a10';
    ctx.fillRect(-br.w / 2 + 1, -br.h / 2 - 5, 4, 6);
    ctx.fillRect(br.w / 2 - 5, -br.h / 2 - 5, 4, 6);
    ctx.fillRect(-br.w / 2 + 1, br.h / 2 - 1, 4, 6);
    ctx.fillRect(br.w / 2 - 5, br.h / 2 - 1, 4, 6);

    // Top rope/rail
    ctx.strokeStyle = '#6a4a20';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-br.w / 2 + 3, -br.h / 2 - 4);
    ctx.quadraticCurveTo(0, -br.h / 2 - 1, br.w / 2 - 3, -br.h / 2 - 4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-br.w / 2 + 3, br.h / 2 + 4);
    ctx.quadraticCurveTo(0, br.h / 2 + 1, br.w / 2 - 3, br.h / 2 + 4);
    ctx.stroke();

    ctx.restore();
  }

  if (!inMainMenu && !_inBossFight) {
  // Village area
  ctx.fillStyle = 'rgba(80, 180, 60, 0.3)';
  ctx.fillRect(village.x, village.y, village.w, village.h);
  ctx.strokeStyle = '#5a5';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 4]);
  ctx.strokeRect(village.x, village.y, village.w, village.h);
  ctx.setLineDash([]);

  // Village label
  ctx.fillStyle = '#aaffaa';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('VILLAGE', village.x + village.w/2, village.y - 8);

  // Village buildings
  for (const b of village.buildings) {
    if (b.name === 'Campfire') {
      let cx = b.x + b.w / 2;
      let cy = b.y + b.h / 2;
      let t = frameNow / 100;

      // Glow on ground
      ctx.fillStyle = 'rgba(255,150,30,0.15)';
      ctx.beginPath();
      ctx.arc(cx, cy + 4, 22 + Math.sin(t * 0.7) * 3, 0, Math.PI * 2);
      ctx.fill();

      // Ring of stones
      for (let i = 0; i < 8; i++) {
        let angle = (i / 8) * Math.PI * 2;
        let sx = cx + Math.cos(angle) * 12;
        let sy = cy + 3 + Math.sin(angle) * 7;
        ctx.fillStyle = i % 2 === 0 ? '#666' : '#555';
        ctx.beginPath();
        ctx.ellipse(sx, sy, 4, 3, angle, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }

      // Logs
      ctx.strokeStyle = '#5a3a1a';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx - 8, cy + 5);
      ctx.lineTo(cx + 6, cy - 1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + 8, cy + 5);
      ctx.lineTo(cx - 5, cy - 1);
      ctx.stroke();
      ctx.strokeStyle = '#4a2a10';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx - 2, cy + 6);
      ctx.lineTo(cx + 1, cy - 3);
      ctx.stroke();

      // Embers at base
      ctx.fillStyle = 'rgba(255,80,0,0.6)';
      ctx.beginPath();
      ctx.ellipse(cx, cy + 2, 6, 3, 0, 0, Math.PI * 2);
      ctx.fill();

      // Flames - multiple flickering layers
      // Outer flame
      ctx.fillStyle = `rgba(255,${80 + Math.sin(t * 1.3) * 30},0,0.7)`;
      ctx.beginPath();
      ctx.moveTo(cx - 7, cy + 2);
      ctx.quadraticCurveTo(cx - 8, cy - 10 + Math.sin(t * 1.1) * 3, cx - 2, cy - 18 + Math.sin(t * 0.9) * 4);
      ctx.quadraticCurveTo(cx, cy - 12, cx + 2, cy - 20 + Math.sin(t * 1.4) * 3);
      ctx.quadraticCurveTo(cx + 8, cy - 8 + Math.sin(t * 1.2) * 3, cx + 7, cy + 2);
      ctx.closePath();
      ctx.fill();

      // Mid flame
      ctx.fillStyle = `rgba(255,${160 + Math.sin(t * 1.5) * 30},0,0.8)`;
      ctx.beginPath();
      ctx.moveTo(cx - 5, cy + 1);
      ctx.quadraticCurveTo(cx - 5, cy - 7 + Math.sin(t * 1.6) * 2, cx - 1, cy - 14 + Math.sin(t * 1.2) * 3);
      ctx.quadraticCurveTo(cx + 1, cy - 8, cx + 1, cy - 15 + Math.sin(t * 0.8) * 3);
      ctx.quadraticCurveTo(cx + 5, cy - 6 + Math.sin(t * 1.3) * 2, cx + 5, cy + 1);
      ctx.closePath();
      ctx.fill();

      // Inner flame (bright yellow)
      ctx.fillStyle = `rgba(255,255,${100 + Math.sin(t * 2) * 50},0.9)`;
      ctx.beginPath();
      ctx.moveTo(cx - 3, cy + 1);
      ctx.quadraticCurveTo(cx - 2, cy - 5 + Math.sin(t * 1.8) * 2, cx, cy - 10 + Math.sin(t * 1.1) * 2);
      ctx.quadraticCurveTo(cx + 2, cy - 4 + Math.sin(t * 1.5) * 2, cx + 3, cy + 1);
      ctx.closePath();
      ctx.fill();

      // Sparks flying up
      for (let sp = 0; sp < 3; sp++) {
        let sparkT = (t * 0.8 + sp * 40) % 60;
        if (sparkT < 30) {
          let sparkX = cx + Math.sin(sp * 7 + t * 0.3) * 6;
          let sparkY = cy - 15 - sparkT * 0.8;
          let sparkAlpha = 1 - sparkT / 30;
          ctx.fillStyle = `rgba(255,${200 + sp * 20},50,${sparkAlpha})`;
          ctx.beginPath();
          ctx.arc(sparkX, sparkY, 1.2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.fillStyle = '#ddd';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(b.name, cx, cy + b.h / 2 + 14);
    } else if (b.name === 'Hut') {
      let hx = b.x + b.w / 2;
      let hy = b.y + b.h / 2;
      let cw = 48;
      let ch = 36;
      let wallTop = hy - 6;
      let wallBot = hy + ch / 2;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(hx, wallBot + 4, cw / 2 + 4, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Stacked logs (horizontal)
      let logCount = 5;
      let logH = (wallBot - wallTop) / logCount;
      for (let i = 0; i < logCount; i++) {
        let ly = wallTop + i * logH;
        let dark = i % 2 === 0;
        ctx.fillStyle = dark ? '#7a5530' : '#8B6540';
        ctx.beginPath();
        ctx.roundRect(hx - cw / 2, ly, cw, logH + 0.5, 2);
        ctx.fill();
        // Log ends poking out on sides
        ctx.fillStyle = dark ? '#6a4520' : '#7a5530';
        ctx.beginPath();
        ctx.arc(hx - cw / 2 - 2, ly + logH / 2, logH / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(hx + cw / 2 + 2, ly + logH / 2, logH / 2, 0, Math.PI * 2);
        ctx.fill();
        // Wood grain
        ctx.strokeStyle = 'rgba(50,30,10,0.2)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(hx - cw / 2 + 4, ly + logH / 2);
        ctx.lineTo(hx + cw / 2 - 4, ly + logH / 2);
        ctx.stroke();
      }

      // Door
      ctx.fillStyle = '#3a1e08';
      ctx.fillRect(hx - 5, wallTop + logH * 2, 10, logH * 3);
      ctx.strokeStyle = '#5a3a18';
      ctx.lineWidth = 0.8;
      ctx.strokeRect(hx - 5, wallTop + logH * 2, 10, logH * 3);
      ctx.fillStyle = '#aa8844';
      ctx.beginPath();
      ctx.arc(hx + 3, hy + 4, 1, 0, Math.PI * 2);
      ctx.fill();

      // Window
      ctx.fillStyle = '#88bbdd';
      ctx.fillRect(hx + 10, wallTop + logH, 8, 7);
      ctx.strokeStyle = '#5a3a18';
      ctx.lineWidth = 1;
      ctx.strokeRect(hx + 10, wallTop + logH, 8, 7);
      ctx.beginPath();
      ctx.moveTo(hx + 14, wallTop + logH);
      ctx.lineTo(hx + 14, wallTop + logH + 7);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(hx + 10, wallTop + logH + 3.5);
      ctx.lineTo(hx + 18, wallTop + logH + 3.5);
      ctx.stroke();

      // Roof - A-frame
      let roofPeak = wallTop - 14;
      let roofOver = 6;
      ctx.fillStyle = '#5a2a15';
      ctx.beginPath();
      ctx.moveTo(hx, roofPeak);
      ctx.lineTo(hx - cw / 2 - roofOver, wallTop + 2);
      ctx.lineTo(hx + cw / 2 + roofOver, wallTop + 2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#3a1a0a';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Chimney
      ctx.fillStyle = '#666';
      ctx.fillRect(hx + 10, roofPeak - 4, 6, 12);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(hx + 10, roofPeak - 4, 6, 4);
      ctx.strokeRect(hx + 10, roofPeak, 6, 4);
      // Smoke
      let st = frameNow / 800;
      ctx.fillStyle = 'rgba(140,140,140,0.25)';
      ctx.beginPath();
      ctx.arc(hx + 13, roofPeak - 8 + Math.sin(st) * 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(140,140,140,0.12)';
      ctx.beginPath();
      ctx.arc(hx + 14, roofPeak - 14 + Math.sin(st * 0.7) * 2, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#ddd';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Cabin', hx, wallBot + 14);
    } else if (b.name === 'Medical Tent') {
      let mx = b.x + b.w / 2;
      let my = b.y + b.h / 2;
      let tw = 54;
      let th = 36;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath();
      ctx.ellipse(mx, my + th / 2 + 3, tw / 2 + 4, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Support poles (visible at sides)
      ctx.strokeStyle = '#8a8a8a';
      ctx.lineWidth = 2;
      // Left pole
      ctx.beginPath();
      ctx.moveTo(mx - tw / 2 + 2, my + th / 2);
      ctx.lineTo(mx - tw / 2 + 2, my - 8);
      ctx.stroke();
      // Right pole
      ctx.beginPath();
      ctx.moveTo(mx + tw / 2 - 2, my + th / 2);
      ctx.lineTo(mx + tw / 2 - 2, my - 8);
      ctx.stroke();
      // Center pole (taller, creates peak)
      ctx.beginPath();
      ctx.moveTo(mx, my + th / 2);
      ctx.lineTo(mx, my - 18);
      ctx.stroke();

      // Back wall of tent
      ctx.fillStyle = '#e8e0d0';
      ctx.beginPath();
      ctx.moveTo(mx - tw / 2, my + th / 2);
      ctx.lineTo(mx - tw / 2, my - 6);
      ctx.lineTo(mx, my - 16);
      ctx.lineTo(mx + tw / 2, my - 6);
      ctx.lineTo(mx + tw / 2, my + th / 2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#b0a890';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Tent canvas - front face (slightly different shade)
      ctx.fillStyle = '#f0e8d8';
      ctx.beginPath();
      ctx.moveTo(mx - tw / 2, my + th / 2);
      ctx.lineTo(mx - tw / 2, my - 6);
      ctx.lineTo(mx, my - 16);
      ctx.lineTo(mx, my + th / 2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#b0a890';
      ctx.lineWidth = 0.5;
      ctx.stroke();

      // Canvas wrinkle lines
      ctx.strokeStyle = 'rgba(150,140,120,0.3)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(mx - tw / 4, my - 10);
      ctx.lineTo(mx - tw / 4 - 2, my + th / 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mx + tw / 4, my - 10);
      ctx.lineTo(mx + tw / 4 + 2, my + th / 2);
      ctx.stroke();

      // Tent opening (front flap open)
      ctx.fillStyle = '#2a2018';
      ctx.beginPath();
      ctx.moveTo(mx - 8, my + th / 2);
      ctx.lineTo(mx - 6, my);
      ctx.lineTo(mx + 6, my);
      ctx.lineTo(mx + 8, my + th / 2);
      ctx.closePath();
      ctx.fill();

      // Open flap (folded to the side)
      ctx.fillStyle = '#e0d8c8';
      ctx.beginPath();
      ctx.moveTo(mx + 8, my + th / 2);
      ctx.lineTo(mx + 6, my);
      ctx.lineTo(mx + 14, my + 4);
      ctx.lineTo(mx + 14, my + th / 2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#b0a890';
      ctx.lineWidth = 0.5;
      ctx.stroke();

      // Guy ropes (holding tent down)
      ctx.strokeStyle = '#8a7a60';
      ctx.lineWidth = 0.8;
      ctx.setLineDash([3, 3]);
      // Left rope
      ctx.beginPath();
      ctx.moveTo(mx - tw / 2, my - 6);
      ctx.lineTo(mx - tw / 2 - 10, my + th / 2 + 2);
      ctx.stroke();
      // Right rope
      ctx.beginPath();
      ctx.moveTo(mx + tw / 2, my - 6);
      ctx.lineTo(mx + tw / 2 + 10, my + th / 2 + 2);
      ctx.stroke();
      ctx.setLineDash([]);

      // Rope pegs
      ctx.fillStyle = '#6a5a40';
      ctx.fillRect(mx - tw / 2 - 11, my + th / 2, 3, 4);
      ctx.fillRect(mx + tw / 2 + 9, my + th / 2, 3, 4);

      // Red cross on the tent
      ctx.fillStyle = '#cc2222';
      // Horizontal bar
      ctx.fillRect(mx - 8, my - 11, 16, 5);
      // Vertical bar
      ctx.fillRect(mx - 3, my - 16, 5, 16);

      // Small red cross flag on top
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(mx, my - 16);
      ctx.lineTo(mx, my - 24);
      ctx.stroke();
      // Flag
      ctx.fillStyle = '#fff';
      ctx.fillRect(mx, my - 24, 8, 6);
      ctx.fillStyle = '#cc2222';
      ctx.fillRect(mx + 2, my - 23, 4, 1.5);
      ctx.fillRect(mx + 3, my - 24, 1.5, 4);

      ctx.fillStyle = '#ddd';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Medical', mx, my + th / 2 + 14);
    } else if (b.name === 'Watchtower') {
      let wx = b.x + b.w / 2;
      let wy = b.y + b.h / 2;
      let baseW = 26;
      let topW = 18;
      let towerH = 55;
      let platY = wy - towerH + 15;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(wx, wy + 5, 16, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Four legs (tapered)
      ctx.strokeStyle = '#5a3a15';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      // Back legs
      ctx.beginPath();
      ctx.moveTo(wx - baseW / 2, wy + 3);
      ctx.lineTo(wx - topW / 2 + 1, platY + 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(wx + baseW / 2, wy + 3);
      ctx.lineTo(wx + topW / 2 - 1, platY + 2);
      ctx.stroke();
      // Front legs
      ctx.strokeStyle = '#4a2a0a';
      ctx.beginPath();
      ctx.moveTo(wx - baseW / 2 + 4, wy + 3);
      ctx.lineTo(wx - topW / 2 + 3, platY + 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(wx + baseW / 2 - 4, wy + 3);
      ctx.lineTo(wx + topW / 2 - 3, platY + 2);
      ctx.stroke();

      // Cross braces
      ctx.strokeStyle = '#5a3a15';
      ctx.lineWidth = 1.5;
      // X brace lower
      let midY1 = wy - towerH * 0.25 + 10;
      let midW1 = baseW / 2 - (baseW - topW) / 2 * 0.25;
      ctx.beginPath();
      ctx.moveTo(wx - midW1, midY1 + 8);
      ctx.lineTo(wx + midW1 - 2, midY1 - 8);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(wx + midW1, midY1 + 8);
      ctx.lineTo(wx - midW1 + 2, midY1 - 8);
      ctx.stroke();
      // X brace upper
      let midY2 = wy - towerH * 0.55 + 10;
      let midW2 = topW / 2 + 2;
      ctx.beginPath();
      ctx.moveTo(wx - midW2, midY2 + 6);
      ctx.lineTo(wx + midW2 - 2, midY2 - 6);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(wx + midW2, midY2 + 6);
      ctx.lineTo(wx - midW2 + 2, midY2 - 6);
      ctx.stroke();

      // Ladder rungs
      ctx.strokeStyle = '#6a4a25';
      ctx.lineWidth = 1;
      for (let r = 0; r < 7; r++) {
        let ry = wy - r * (towerH - 15) / 7;
        let rw = baseW / 2 - (baseW - topW) / 2 * (r / 7) - 6;
        ctx.beginPath();
        ctx.moveTo(wx - 2, ry);
        ctx.lineTo(wx + 2, ry);
        ctx.stroke();
      }
      // Ladder side rails
      ctx.strokeStyle = '#5a3a15';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(wx - 2, wy + 3);
      ctx.lineTo(wx - 1, platY + 5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(wx + 2, wy + 3);
      ctx.lineTo(wx + 1, platY + 5);
      ctx.stroke();

      // Platform
      ctx.fillStyle = '#7a5a30';
      ctx.fillRect(wx - topW / 2 - 4, platY, topW + 8, 4);
      // Platform planks
      ctx.strokeStyle = '#5a3a15';
      ctx.lineWidth = 0.5;
      for (let p = 0; p < 5; p++) {
        let px = wx - topW / 2 - 3 + p * (topW + 6) / 4;
        ctx.beginPath();
        ctx.moveTo(px, platY);
        ctx.lineTo(px, platY + 4);
        ctx.stroke();
      }

      // Railing
      ctx.strokeStyle = '#5a3a15';
      ctx.lineWidth = 1.5;
      let railH = 10;
      // Railing posts
      ctx.beginPath();
      ctx.moveTo(wx - topW / 2 - 3, platY);
      ctx.lineTo(wx - topW / 2 - 3, platY - railH);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(wx + topW / 2 + 3, platY);
      ctx.lineTo(wx + topW / 2 + 3, platY - railH);
      ctx.stroke();
      // Top rail
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(wx - topW / 2 - 3, platY - railH);
      ctx.lineTo(wx + topW / 2 + 3, platY - railH);
      ctx.stroke();
      // Mid rail
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(wx - topW / 2 - 3, platY - railH / 2);
      ctx.lineTo(wx + topW / 2 + 3, platY - railH / 2);
      ctx.stroke();

      // Roof - small pointed wooden roof
      ctx.fillStyle = '#5a2a15';
      ctx.beginPath();
      ctx.moveTo(wx, platY - railH - 12);
      ctx.lineTo(wx - topW / 2 - 5, platY - railH + 1);
      ctx.lineTo(wx + topW / 2 + 5, platY - railH + 1);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#3a1a0a';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Flag on top
      ctx.strokeStyle = '#4a2a10';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(wx, platY - railH - 12);
      ctx.lineTo(wx, platY - railH - 22);
      ctx.stroke();
      // Flag cloth
      let ft = frameNow / 300;
      ctx.fillStyle = '#cc3333';
      ctx.beginPath();
      ctx.moveTo(wx, platY - railH - 22);
      ctx.lineTo(wx + 8 + Math.sin(ft) * 1.5, platY - railH - 19);
      ctx.lineTo(wx + 7 + Math.sin(ft + 1) * 1.5, platY - railH - 16);
      ctx.lineTo(wx, platY - railH - 16);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#ddd';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(b.name, wx, wy + 14);
    } else {
      ctx.fillStyle = b.color;
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.fillStyle = b.roofColor;
      ctx.fillRect(b.x - 3, b.y - 6, b.w + 6, 8);
      ctx.fillStyle = '#fff';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(b.name, b.x + b.w/2, b.y + b.h + 12);
    }
  }

  // Village people
  for (let vi = 0; vi < villagePeople.length; vi++) {
    let vp = villagePeople[vi];
    drawBean(vp.x, vp.y, 14, vp.color, 'down', false, true, false, vp.explorer);
    // Quest indicator "!" above NPC
    if (vp.hasQuest) {
      let quest = activeQuests.find(q => q.giver === vi);
      let bob = Math.sin(frameNow / 300) * 2;
      let hasEnoughSupplies = false;
      if (quest && quest.accepted && !quest.done && !quest.turned_in) {
        let itemType = quest.type === 'gather_food' ? 'food' : quest.type === 'gather_medkit' ? 'medkit' : null;
        if (itemType) {
          let have = inventory.slots.filter(s => s === itemType).length;
          hasEnoughSupplies = have >= (quest.need - quest.progress);
        }
      }
      if (quest && (quest.done || hasEnoughSupplies) && !quest.turned_in) {
        // Ready to turn in - green "?"
        ctx.fillStyle = '#44ff44';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('?', vp.x, vp.y - 20 + bob);
      } else if (quest && !quest.accepted && !quest.turned_in) {
        // Has unaccepted quest - yellow "!"
        ctx.fillStyle = '#ffdd00';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('!', vp.x, vp.y - 20 + bob);
      }
    }
  }

  } // end !inMainMenu village block

  // Ground clutter - logs and bushes (hidden during boss fight)
  if (!_inBossFight)
  for (const c of clutter) {
    if (c.x < vpL || c.x > vpR || c.y < vpT || c.y > vpB) continue;
    if (c.type === 'log') {
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.angle);
      let len = c.size * 1.5;
      // Log body
      ctx.fillStyle = '#5a3a18';
      ctx.beginPath();
      ctx.roundRect(-len / 2, -3, len, 6, 3);
      ctx.fill();
      // Bark texture
      ctx.strokeStyle = '#4a2a0a';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(-len / 2 + 3, -1);
      ctx.lineTo(len / 2 - 3, -1);
      ctx.stroke();
      // End grain circles
      ctx.fillStyle = '#7a5a30';
      ctx.beginPath();
      ctx.ellipse(-len / 2, 0, 3, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6a4a20';
      ctx.beginPath();
      ctx.ellipse(len / 2, 0, 3, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Ring on end grain
      ctx.strokeStyle = '#4a2a10';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.arc(-len / 2, 0, 1.5, 0, Math.PI * 2);
      ctx.stroke();
      // Small branch sticking out
      ctx.strokeStyle = '#5a3a18';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(len * 0.15, -3);
      ctx.lineTo(len * 0.2, -8);
      ctx.stroke();
      ctx.restore();
    } else {
      // Bush
      let s = c.size;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.beginPath();
      ctx.ellipse(c.x, c.y + s * 0.2, s * 0.5, s * 0.15, 0, 0, Math.PI * 2);
      ctx.fill();
      // Bush layers
      ctx.fillStyle = c.shade;
      ctx.beginPath();
      ctx.arc(c.x - s * 0.15, c.y - s * 0.05, s * 0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(c.x + s * 0.15, c.y, s * 0.3, 0, Math.PI * 2);
      ctx.fill();
      // Top layer (brighter)
      let r = parseInt(c.shade.slice(4));
      ctx.fillStyle = `rgb(${Math.min(80, r + 15)}, ${parseInt(c.shade.split(',')[1]) + 20}, ${parseInt(c.shade.split(',')[2]) + 10})`;
      ctx.beginPath();
      ctx.arc(c.x, c.y - s * 0.12, s * 0.3, 0, Math.PI * 2);
      ctx.fill();
      // Small flowers/berries on some bushes
      if (c.size > 14) {
        let berryColor = c.x % 3 < 1 ? '#cc3333' : c.x % 3 < 2 ? '#dddd44' : '#dd88cc';
        ctx.fillStyle = berryColor;
        for (let b = 0; b < 3; b++) {
          let bx = c.x + Math.sin(b * 2.5 + c.x) * s * 0.2;
          let by = c.y - s * 0.1 + Math.cos(b * 3 + c.y) * s * 0.15;
          ctx.beginPath();
          ctx.arc(bx, by, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }

  // Trees (behind player) - hidden during boss fight
  if (!_hideTrees)
  for (const tree of trees) {
    let s = tree.size;
    let tx = tree.x, ty = tree.y;
    if (tx < vpL - s || tx > vpR + s || ty < vpT - s || ty > vpB + s) continue;

    if (tree.type === 0) {
      // PALM TREE
      let trunkH = s * 1.3;
      let wind = Math.sin(frameNow / 1800 + tree.sway) * 2.5;
      let curve = s * 0.18 + wind;

      // Shadow on ground
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath();
      ctx.ellipse(tx + curve * 0.3, ty + 6, s * 0.4, s * 0.1, 0.2, 0, Math.PI * 2);
      ctx.fill();

      // Trunk - textured with gradient
      ctx.lineWidth = s * 0.14;
      ctx.lineCap = 'round';
      // Trunk shadow side
      ctx.strokeStyle = '#5a4020';
      ctx.beginPath();
      ctx.moveTo(tx + 1, ty + 5);
      ctx.quadraticCurveTo(tx + curve + 1, ty - trunkH * 0.5, tx + curve * 0.5 + 1, ty - trunkH);
      ctx.stroke();
      // Main trunk
      ctx.strokeStyle = '#7a6040';
      ctx.beginPath();
      ctx.moveTo(tx, ty + 5);
      ctx.quadraticCurveTo(tx + curve, ty - trunkH * 0.5, tx + curve * 0.5, ty - trunkH);
      ctx.stroke();
      // Trunk rings
      ctx.strokeStyle = '#5a4020';
      ctx.lineWidth = 1;
      for (let seg = 0; seg < 8; seg++) {
        let t = seg / 8;
        let sx = tx + curve * Math.sin(t * Math.PI) * 0.85;
        let sy = ty + 5 - trunkH * t;
        ctx.beginPath();
        ctx.moveTo(sx - s * 0.07, sy);
        ctx.lineTo(sx + s * 0.07, sy);
        ctx.stroke();
      }
      // Highlight on trunk
      ctx.strokeStyle = 'rgba(180,150,100,0.15)';
      ctx.lineWidth = s * 0.04;
      ctx.beginPath();
      ctx.moveTo(tx - 1, ty + 3);
      ctx.quadraticCurveTo(tx + curve - 1, ty - trunkH * 0.5, tx + curve * 0.5 - 1, ty - trunkH);
      ctx.stroke();

      let topX = tx + curve * 0.5;
      let topY = ty - trunkH;

      // Coconut cluster
      ctx.fillStyle = '#6a4a18';
      ctx.beginPath(); ctx.arc(topX - 3, topY + 4, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(topX + 3, topY + 5, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(topX, topY + 6, 2.5, 0, Math.PI * 2); ctx.fill();
      // Coconut highlights
      ctx.fillStyle = 'rgba(255,255,200,0.15)';
      ctx.beginPath(); ctx.arc(topX - 4, topY + 3, 1.5, 0, Math.PI * 2); ctx.fill();

      // Palm fronds - more detailed
      let frondCount = 7;
      for (let f = 0; f < frondCount; f++) {
        let angle = (f / frondCount) * Math.PI * 2 + tree.x * 0.01;
        let frondLen = s * 0.8;
        let droop = 0.25; // how much fronds droop
        let fx = topX + Math.cos(angle) * frondLen;
        let fy = topY + Math.sin(angle) * frondLen * 0.5 + frondLen * droop;
        let midX = topX + Math.cos(angle) * frondLen * 0.45;
        let midY = topY + Math.sin(angle) * frondLen * 0.15 - frondLen * 0.18;

        // Frond spine
        ctx.strokeStyle = '#2a5a0a';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(topX, topY);
        ctx.quadraticCurveTo(midX, midY, fx, fy);
        ctx.stroke();

        // Individual leaflets along spine
        for (let lf = 0.15; lf < 1; lf += 0.1) {
          let lx = topX + (midX - topX) * lf * 2 * Math.min(lf, 0.5) + (fx - topX) * Math.max(0, lf - 0.5) * 2 * 0.5;
          let ly = topY + (midY - topY) * lf * 2 * Math.min(lf, 0.5) + (fy - topY) * Math.max(0, lf - 0.5) * 2 * 0.5;
          let leafLen = s * 0.14 * (1 - lf * 0.5);
          // Two leaves at each point (left and right)
          ctx.fillStyle = lf < 0.5 ? tree.shade : `rgb(${parseInt(tree.shade.slice(4)) + 10}, ${parseInt(tree.shade.split(',')[1]) + 10}, ${parseInt(tree.shade.split(',')[2]) + 5})`;
          ctx.beginPath();
          ctx.ellipse(lx, ly, leafLen, s * 0.03, angle + 0.5 + lf * 0.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(lx, ly, leafLen, s * 0.03, angle - 0.5 - lf * 0.2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

    } else if (tree.type === 1) {
      // BIG JUNGLE TREE
      let trunkH = s * 0.95;
      let wind = Math.sin(frameNow / 2000 + tree.sway) * 1.5;

      // Ground shadow - larger, softer, offset by wind
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath();
      ctx.ellipse(tx + wind * 0.5, ty + 7, s * 0.55, s * 0.14, 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.beginPath();
      ctx.ellipse(tx + wind, ty + 7, s * 0.7, s * 0.18, 0.1, 0, Math.PI * 2);
      ctx.fill();

      // Buttress roots - spreading, 3D look
      for (let r = 0; r < 5; r++) {
        let ra = (r / 5) * Math.PI * 1.2 - 0.4 + tx * 0.01;
        let rootLen = s * (0.2 + Math.sin(r * 2.1 + tx) * 0.08);
        // Root shadow
        ctx.fillStyle = '#3a2508';
        ctx.beginPath();
        ctx.moveTo(tx + Math.cos(ra) * s * 0.07, ty + 3);
        ctx.quadraticCurveTo(tx + Math.cos(ra) * rootLen * 0.6, ty + 3, tx + Math.cos(ra) * rootLen, ty + 9);
        ctx.lineTo(tx + Math.cos(ra) * rootLen * 0.6, ty + 9);
        ctx.quadraticCurveTo(tx + Math.cos(ra) * rootLen * 0.3, ty + 5, tx + Math.cos(ra) * s * 0.03, ty + 3);
        ctx.closePath();
        ctx.fill();
        // Root main
        ctx.fillStyle = '#4a3010';
        ctx.beginPath();
        ctx.moveTo(tx + Math.cos(ra) * s * 0.06, ty + 2);
        ctx.quadraticCurveTo(tx + Math.cos(ra) * rootLen * 0.6, ty + 1, tx + Math.cos(ra) * rootLen, ty + 8);
        ctx.lineTo(tx + Math.cos(ra) * rootLen * 0.65, ty + 8);
        ctx.quadraticCurveTo(tx + Math.cos(ra) * rootLen * 0.3, ty + 3, tx + Math.cos(ra) * s * 0.03, ty + 2);
        ctx.closePath();
        ctx.fill();
      }

      // Trunk - thick, gnarled, with moss
      let trunkW = s * 0.12;
      // Shadow side
      ctx.fillStyle = '#3a2508';
      ctx.beginPath();
      ctx.moveTo(tx - trunkW + 2, ty + 5);
      ctx.bezierCurveTo(tx - trunkW + 1, ty - trunkH * 0.4, tx - trunkW * 0.7 + 2, ty - trunkH * 0.7, tx - trunkW * 0.6 + wind * 0.3, ty - trunkH);
      ctx.lineTo(tx + trunkW * 0.8 + wind * 0.3, ty - trunkH);
      ctx.bezierCurveTo(tx + trunkW + 1, ty - trunkH * 0.7, tx + trunkW + 2, ty - trunkH * 0.4, tx + trunkW + 2, ty + 5);
      ctx.closePath();
      ctx.fill();
      // Main trunk
      ctx.fillStyle = '#5a3a15';
      ctx.beginPath();
      ctx.moveTo(tx - trunkW, ty + 5);
      ctx.bezierCurveTo(tx - trunkW, ty - trunkH * 0.4, tx - trunkW * 0.7, ty - trunkH * 0.7, tx - trunkW * 0.6 + wind * 0.3, ty - trunkH);
      ctx.lineTo(tx + trunkW * 0.7 + wind * 0.3, ty - trunkH);
      ctx.bezierCurveTo(tx + trunkW, ty - trunkH * 0.7, tx + trunkW, ty - trunkH * 0.4, tx + trunkW, ty + 5);
      ctx.closePath();
      ctx.fill();

      // Bark texture - knots and lines
      ctx.strokeStyle = '#4a2a0a';
      ctx.lineWidth = 0.6;
      for (let b = 0; b < 5; b++) {
        let bx = tx - trunkW * 0.6 + b * trunkW * 0.35;
        let wobble = Math.sin(b * 2.3 + tx) * 1.5;
        ctx.beginPath();
        ctx.bezierCurveTo(bx + wobble, ty + 3, bx - wobble, ty - trunkH * 0.5, bx + wobble * 0.5 + wind * 0.15, ty - trunkH + 4);
        ctx.moveTo(bx, ty + 3);
        ctx.bezierCurveTo(bx + wobble, ty - trunkH * 0.3, bx - wobble, ty - trunkH * 0.6, bx + wind * 0.15, ty - trunkH + 4);
        ctx.stroke();
      }
      // Knots
      ctx.fillStyle = '#3a2208';
      ctx.beginPath(); ctx.ellipse(tx - 1, ty - trunkH * 0.35, 3, 2.5, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#2a1808';
      ctx.beginPath(); ctx.ellipse(tx - 1, ty - trunkH * 0.35, 1.5, 1.2, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#3a2208';
      ctx.beginPath(); ctx.ellipse(tx + 2, ty - trunkH * 0.6, 2, 1.8, -0.2, 0, Math.PI * 2); ctx.fill();

      // Moss patches on trunk
      ctx.fillStyle = 'rgba(50,100,30,0.3)';
      ctx.beginPath(); ctx.ellipse(tx - trunkW * 0.4, ty - trunkH * 0.2, 4, 6, 0.2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(40,90,25,0.25)';
      ctx.beginPath(); ctx.ellipse(tx + trunkW * 0.3, ty - trunkH * 0.5, 3, 5, -0.1, 0, Math.PI * 2); ctx.fill();

      // Bark highlight (light side)
      ctx.strokeStyle = 'rgba(140,110,70,0.15)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(tx - trunkW * 0.5, ty + 3);
      ctx.bezierCurveTo(tx - trunkW * 0.5, ty - trunkH * 0.4, tx - trunkW * 0.3, ty - trunkH * 0.7, tx - trunkW * 0.3 + wind * 0.15, ty - trunkH + 5);
      ctx.stroke();

      // Branches
      ctx.strokeStyle = '#5a3a15';
      ctx.lineWidth = 3.5;
      ctx.lineCap = 'round';
      let bTopX = tx + wind * 0.3;
      let bTopY = ty - trunkH;
      // Branch 1 - right
      ctx.beginPath();
      ctx.moveTo(bTopX + s * 0.04, bTopY + trunkH * 0.15);
      ctx.quadraticCurveTo(bTopX + s * 0.2 + wind, bTopY + trunkH * 0.05, bTopX + s * 0.3 + wind * 1.5, bTopY + trunkH * 0.1);
      ctx.stroke();
      // Branch 2 - left
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(bTopX - s * 0.03, bTopY + trunkH * 0.1);
      ctx.quadraticCurveTo(bTopX - s * 0.18 + wind, bTopY - trunkH * 0.05, bTopX - s * 0.28 + wind * 1.5, bTopY + trunkH * 0.02);
      ctx.stroke();
      // Branch 3 - up-right
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(bTopX, bTopY);
      ctx.quadraticCurveTo(bTopX + s * 0.1 + wind, bTopY - s * 0.15, bTopX + s * 0.15 + wind * 1.5, bTopY - s * 0.12);
      ctx.stroke();

      // Vines - hanging from branches, swaying
      ctx.strokeStyle = '#3a7a20';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(bTopX + s * 0.25 + wind, bTopY + trunkH * 0.08);
      ctx.quadraticCurveTo(bTopX + s * 0.3 + wind * 0.5, ty - trunkH * 0.3, bTopX + s * 0.2 + wind * 0.3, ty + 2);
      ctx.stroke();
      ctx.strokeStyle = '#2a6a15';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(bTopX - s * 0.2 + wind, bTopY + trunkH * 0.01);
      ctx.quadraticCurveTo(bTopX - s * 0.28 + wind * 0.4, ty - trunkH * 0.3, bTopX - s * 0.24 + wind * 0.2, ty - 5);
      ctx.stroke();
      // Vine with leaves
      ctx.strokeStyle = '#357a18';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(bTopX + s * 0.05 + wind, bTopY - s * 0.1);
      ctx.bezierCurveTo(bTopX + s * 0.1 + wind * 0.6, ty - trunkH * 0.5, bTopX + s * 0.05 + wind * 0.3, ty - trunkH * 0.2, bTopX + s * 0.08 + wind * 0.2, ty - 2);
      ctx.stroke();

      // CANOPY - swaying with wind, many layers for depth
      let canopyY = bTopY;
      let cx = bTopX + wind * 0.8;

      // Canopy shadow on ground (cast shadow)
      ctx.fillStyle = 'rgba(0,15,0,0.1)';
      ctx.beginPath();
      ctx.ellipse(tx + wind * 3, ty + 5, s * 0.5, s * 0.12, 0, 0, Math.PI * 2);
      ctx.fill();

      // Bottom canopy layer (darkest - underside)
      ctx.fillStyle = `rgb(${parseInt(tree.shade.slice(4)) - 15}, ${parseInt(tree.shade.split(',')[1]) - 10}, ${parseInt(tree.shade.split(',')[2]) - 8})`;
      ctx.beginPath(); ctx.arc(cx - s * 0.15, canopyY + 8, s * 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.18, canopyY + 7, s * 0.28, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx, canopyY + 10, s * 0.25, 0, Math.PI * 2); ctx.fill();

      // Back layer
      ctx.fillStyle = tree.shade;
      ctx.beginPath(); ctx.arc(cx - s * 0.25, canopyY + 3, s * 0.32, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.28, canopyY + 1, s * 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx - s * 0.08, canopyY + 6, s * 0.34, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.05, canopyY + 4, s * 0.3, 0, Math.PI * 2); ctx.fill();

      // Middle layer
      let midShade = `rgb(${parseInt(tree.shade.slice(4)) + 12}, ${parseInt(tree.shade.split(',')[1]) + 14}, ${parseInt(tree.shade.split(',')[2]) + 8})`;
      ctx.fillStyle = midShade;
      ctx.beginPath(); ctx.arc(cx + s * 0.08, canopyY - 2, s * 0.38, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx - s * 0.15, canopyY - 3, s * 0.32, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.2, canopyY - 1, s * 0.26, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx - s * 0.3, canopyY + 2, s * 0.22, 0, Math.PI * 2); ctx.fill();

      // Top layer (sunlit)
      let topShade = `rgb(${parseInt(tree.shade.slice(4)) + 28}, ${parseInt(tree.shade.split(',')[1]) + 30}, ${parseInt(tree.shade.split(',')[2]) + 15})`;
      ctx.fillStyle = topShade;
      ctx.beginPath(); ctx.arc(cx - s * 0.05, canopyY - 7, s * 0.28, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.12, canopyY - 5, s * 0.22, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx - s * 0.18, canopyY - 5, s * 0.18, 0, Math.PI * 2); ctx.fill();

      // Leaf cluster detail bumps
      ctx.fillStyle = 'rgba(0,25,0,0.12)';
      for (let d = 0; d < 10; d++) {
        let dx2 = Math.sin(d * 1.4 + tx) * s * 0.3;
        let dy2 = Math.cos(d * 1.9 + ty) * s * 0.22;
        ctx.beginPath();
        ctx.arc(cx + dx2, canopyY + dy2, s * 0.08 + Math.sin(d * 3) * s * 0.03, 0, Math.PI * 2);
        ctx.fill();
      }

      // Sun dapple / highlight spots
      ctx.fillStyle = 'rgba(130,200,70,0.12)';
      ctx.beginPath(); ctx.arc(cx - s * 0.08, canopyY - 10, s * 0.1, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + s * 0.12, canopyY - 7, s * 0.07, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(180,230,100,0.08)';
      ctx.beginPath(); ctx.arc(cx - s * 0.02, canopyY - 8, s * 0.14, 0, Math.PI * 2); ctx.fill();

      // Edge leaf silhouettes for organic shape
      ctx.fillStyle = tree.shade;
      for (let e = 0; e < 8; e++) {
        let ea = (e / 8) * Math.PI * 2 + tree.sway;
        let er = s * 0.42 + Math.sin(e * 2.7 + tx) * s * 0.06;
        ctx.beginPath();
        ctx.arc(cx + Math.cos(ea) * er, canopyY + Math.sin(ea) * er * 0.6, s * 0.1, 0, Math.PI * 2);
        ctx.fill();
      }

    }
  }

  if (!inMainMenu && !_inBossFight) {
  // Crash sites
  for (const site of crashSites) {
    if (site.rescued) continue;
    if (site.x < vpL - 60 || site.x > vpR + 60 || site.y < vpT - 60 || site.y > vpB + 60) continue;

    if (site.type === 'campsite') {

      ctx.fillStyle = '#6a5430';
      ctx.beginPath();
      ctx.ellipse(site.x + 3, site.y + 12, 42, 14, 0.1, 0, Math.PI * 2);

      ctx.fillStyle = '#3a2a10';
      ctx.beginPath();
      ctx.ellipse(site.x, site.y + 5, 45, 18, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#2a1a08';
      ctx.beginPath();
      ctx.ellipse(site.x + 5, site.y + 3, 30, 10, 0.3, 0, Math.PI * 2);

      // Scattered debris pieces
      ctx.fillStyle = '#555';
      for (let d = 0; d < 5; d++) {

    // Campsite or crash wreckage

    } else if (site.type === 'plane') {
      ctx.save();
      ctx.translate(site.x, site.y);

      // Fuselage - long cylinder shape
      ctx.fillStyle = '#c0c0c0';

      ctx.roundRect(-35, -8, 70, 16, 8);
      ctx.fill();
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(-35, -8, 70, 16, 8);

      ctx.fillStyle = '#2255aa';
      ctx.fillRect(-30, -2, 55, 4);

      // Cockpit windows
      ctx.fillStyle = '#88ccff';
      ctx.beginPath();
      ctx.ellipse(30, -3, 6, 4, 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#668faa';
      ctx.beginPath();
      ctx.ellipse(30, -3, 6, 4, 0.2, 0, Math.PI * 2);
      ctx.stroke();

      // Passenger windows
      ctx.fillStyle = '#88ccff';
      for (let w = -20; w < 20; w += 8) {
        ctx.beginPath();
        ctx.arc(w, -5, 2, 0, Math.PI * 2);

      }

      // Wings - one bent up, one broken

      // Left wing (bent/broken)
      ctx.beginPath();
      ctx.moveTo(-10, 0);
      ctx.lineTo(-40, -15);
      ctx.lineTo(-45, -12);
      ctx.lineTo(-15, 3);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#777';
      ctx.stroke();
      // Broken part dangling
      ctx.fillStyle = '#909090';
      ctx.beginPath();
      ctx.moveTo(-40, -15);
      ctx.lineTo(-50, -8);
      ctx.lineTo(-45, -5);
      ctx.lineTo(-38, -12);
      ctx.closePath();
      ctx.fill();

      // Right wing (crumpled on ground)

      ctx.moveTo(-5, 3);
      ctx.lineTo(10, 22);
      ctx.lineTo(35, 18);
      ctx.lineTo(5, 6);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#777';

      // Tail fin
      ctx.fillStyle = '#b0b0b0';
      ctx.beginPath();
      ctx.moveTo(-30, -8);
      ctx.lineTo(-38, -25);
      ctx.lineTo(-28, -24);
      ctx.lineTo(-25, -8);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#cc2222';
      ctx.beginPath();
      ctx.moveTo(-35, -22);
      ctx.lineTo(-38, -25);
      ctx.lineTo(-30, -24);
      ctx.closePath();
      ctx.fill();

      // Engine (fallen off, on ground)
      ctx.fillStyle = '#666';
      ctx.beginPath();
      ctx.ellipse(20, 15, 8, 5, 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#444';
      ctx.beginPath();
      ctx.ellipse(23, 16, 4, 4, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    } else {
      // HELICOPTER
      ctx.save();
      ctx.translate(site.x, site.y);
      ctx.rotate(-0.1); // slight tilt

      // Body - rounded box
      ctx.fillStyle = '#556b2f';
      ctx.beginPath();
      ctx.roundRect(-20, -12, 40, 26, 6);
      ctx.fill();
      ctx.strokeStyle = '#3a4a1f';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(-20, -12, 40, 26, 6);
      ctx.stroke();

      // Cockpit glass
      ctx.fillStyle = '#88ccff';
      ctx.beginPath();
      ctx.roundRect(10, -9, 12, 14, [0, 5, 5, 0]);
      ctx.fill();
      ctx.strokeStyle = '#5599aa';
      ctx.beginPath();
      ctx.roundRect(10, -9, 12, 14, [0, 5, 5, 0]);
      ctx.stroke();
      // Glass crack
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(14, -7);
      ctx.lineTo(18, -1);
      ctx.lineTo(15, 3);
      ctx.stroke();

      // Cross marking (rescue helicopter)
      ctx.fillStyle = '#cc2222';
      ctx.fillRect(-5, -5, 10, 3);
      ctx.fillRect(-2, -8, 3, 10);

      // Tail boom
      ctx.fillStyle = '#4a5f25';
      ctx.beginPath();
      ctx.moveTo(-20, -4);
      ctx.lineTo(-50, -8);
      ctx.lineTo(-50, -2);
      ctx.lineTo(-20, 4);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#3a4a1f';
      ctx.stroke();

      // Tail rotor
      ctx.fillStyle = '#777';
      ctx.save();
      ctx.translate(-50, -5);
      ctx.rotate(frameNow / 400);
      ctx.fillRect(-2, -10, 4, 20);
      ctx.restore();

      // Skids (landing gear) - bent
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      // Left skid
      ctx.beginPath();
      ctx.moveTo(-12, 14);
      ctx.lineTo(-15, 20);
      ctx.lineTo(15, 22);
      ctx.stroke();
      // Right skid strut
      ctx.beginPath();
      ctx.moveTo(-10, 14);
      ctx.lineTo(-12, 18);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(10, 14);
      ctx.lineTo(8, 20);
      ctx.stroke();

      // Main rotor - broken, on the ground
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(0, -12);
      ctx.lineTo(30, -25);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, -12);
      ctx.lineTo(-25, -20);
      ctx.stroke();
      // Broken blade piece on ground
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(25, 10);
      ctx.lineTo(40, 5);
      ctx.stroke();

    // Lost explorers indicator
    ctx.fillStyle = '#ffcc44';
    ctx.font = 'bold 13px Arial';

    ctx.fillText(`LOST EXPLORERS`, site.x, site.y - 35);
    ctx.fillStyle = '#ffe088';
    ctx.font = '11px Arial';
    ctx.fillText(`${site.survivors} explorer${site.survivors > 1 ? 's' : ''}`, site.x, site.y - 23);

    // Pulsing ring
    let pulse = Math.sin(frameNow / 300) * 8 + 45;
    ctx.strokeStyle = 'rgba(255, 50, 50, 0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(site.x, site.y, pulse, 0, Math.PI * 2);
    ctx.stroke();
    // Inner pulse
    let pulse2 = Math.sin(frameNow / 200) * 4 + 30;
    ctx.strokeStyle = 'rgba(255, 150, 50, 0.2)';
    ctx.beginPath();
    ctx.arc(site.x, site.y, pulse2, 0, Math.PI * 2);
    ctx.stroke();

    // Nearby hint: bouncing "!" when player is close
    const pDist = Math.hypot(player.x - site.x, player.y - site.y);
    if (pDist < 120) {
      const bob = Math.sin(frameNow / 120) * 3;
      const hintAlpha = Math.min(1, (120 - pDist) / 60);
      ctx.save();
      ctx.fillStyle = `rgba(0,0,0,${hintAlpha * 0.6})`;

      ctx.textAlign = 'center';
      ctx.fillStyle = `rgba(255,245,120,${hintAlpha})`;
      ctx.strokeStyle = `rgba(0,0,0,${hintAlpha})`;
      ctx.lineWidth = 3;
      ctx.strokeText('!', site.x, site.y - 50 + bob);
      ctx.fillText('!', site.x, site.y - 50 + bob);
      ctx.restore();
    }
  }

  // Followers
  for (let i = 0; i < followers.length; i++) {
    const f = followers[i];
    const target = i === 0 ? player : followers[i - 1];
    const fDir = Math.abs(target.x - f.x) > Math.abs(target.y - f.y)
      ? (target.x > f.x ? 'right' : 'left')
      : (target.y > f.y ? 'down' : 'up');
    drawBean(f.x, f.y, 16, f.color, fDir, false, f.moving, false, f.explorer);
  }
  // Mine entrance (hidden during boss fight)
  if (!(mineScene.active && (mineScene.phase === 'boss' || mineScene.phase === 'victory' || mineScene.phase === 'victory_fade'))) {
    ctx.save();
    ctx.translate(mine.x, mine.y);

    ctx.beginPath();
    ctx.ellipse(0, 12, 55, 20, 0, 0, Math.PI * 2);

    ctx.fillStyle = '#3e3015';
    ctx.beginPath();
    ctx.ellipse(5, 14, 40, 14, 0.2, 0, Math.PI * 2);

    ctx.fillStyle = '#6a6055';
    ctx.beginPath(); ctx.ellipse(-35, 16, 6, 4, 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#5a5548';
    ctx.beginPath(); ctx.ellipse(30, 18, 5, 3, -0.2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#7a7568';
    ctx.beginPath(); ctx.ellipse(-22, 22, 4, 3, 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#6a6458';
    ctx.beginPath(); ctx.ellipse(38, 10, 3, 2, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#6a6050';
    ctx.beginPath();
    ctx.moveTo(32, 14);
    ctx.quadraticCurveTo(40, -2, 52, 6);
    ctx.quadraticCurveTo(56, 14, 48, 18);
    ctx.lineTo(32, 18);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#7a7060';
    ctx.beginPath(); ctx.ellipse(40, 8, 5, 4, 0.2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#5a5545';
    ctx.beginPath(); ctx.ellipse(46, 12, 4, 3, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#8a8070';
    ctx.beginPath(); ctx.ellipse(38, 14, 3, 2, 0, 0, Math.PI * 2); ctx.fill();

    ctx.beginPath();
    ctx.moveTo(-50, 14);
    ctx.lineTo(-48, -5);

    ctx.lineTo(50, 14);

    ctx.beginPath(); ctx.moveTo(-10, -42); ctx.lineTo(-8, -32); ctx.lineTo(-12, -22); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10, -38); ctx.lineTo(14, -25); ctx.lineTo(10, -15); ctx.stroke();

    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-40, -15); ctx.quadraticCurveTo(-20, -18, 0, -16); ctx.quadraticCurveTo(20, -14, 40, -17); ctx.stroke();

    ctx.lineWidth = 1.5;

    ctx.strokeStyle = '#c8a630';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(15, -40); ctx.lineTo(18, -33); ctx.lineTo(14, -28); ctx.stroke();
    ctx.strokeStyle = '#a8862a';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(30, -20); ctx.lineTo(34, -14); ctx.stroke();

    // Gold nugget spots on rock
    ctx.fillStyle = '#c8a830';
    ctx.beginPath(); ctx.arc(-17, -30, 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#dabb40';

    ctx.fillStyle = '#b89828';
    ctx.beginPath(); ctx.arc(32, -16, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#d4ad35';

    ctx.beginPath();
    ctx.moveTo(-20, 14);
    ctx.lineTo(-20, -8);
    ctx.quadraticCurveTo(-18, -18, 0, -22);
    ctx.quadraticCurveTo(18, -18, 20, -8);

    ctx.beginPath();

    // Wooden support frame - vertical beams

      ctx.beginPath();
      ctx.moveTo(cx - r * 0.2, cy - r * 0.5);
      ctx.quadraticCurveTo(cx, cy - r * 0.7, cx + r * 0.2, cy - r * 0.5);
      ctx.stroke();
    } else {
      // Default: colored circle with letter
      let it = ITEM_TYPES[type];
      ctx.fillStyle = it.color;
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${r * 0.8}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText(it.icon, cx, cy + r * 0.3);
    }
  }

  // World items
  if (inMainMenu) { /* skip items */ } else
  for (const item of worldItems) {
    if (item.collected) continue;
    if (item.x < vpL || item.x > vpR || item.y < vpT || item.y > vpB) continue;
    let it = ITEM_TYPES[item.type];
    let bob = Math.sin(frameNow / 400 + item.x) * 3;
    // Glow
    ctx.fillStyle = `${it.color}33`;
    ctx.beginPath();
    ctx.arc(item.x, item.y + bob, 14, 0, Math.PI * 2);
    ctx.fill();
    // Draw item
    drawItemIcon(item.x, item.y + bob, item.type, 12);
  }

  // Mine boss arena - draw cave floor BEFORE characters so they appear on top
  if (mineScene.active && (mineScene.phase === 'boss' || mineScene.phase === 'victory')) {
    let arenaR = 250;
    let arenaSX = mine.x - camX;
    let arenaSY = mine.y - camY;
    // Cave floor texture inside arena
    ctx.fillStyle = '#2a2218';
    ctx.beginPath();
    ctx.arc(arenaSX, arenaSY, arenaR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#322a1e';
    ctx.beginPath();
    ctx.arc(arenaSX - 15, arenaSY + 8, arenaR * 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2e261c';
    ctx.beginPath();
    ctx.arc(arenaSX + 20, arenaSY - 10, arenaR * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Wolves
  for (const wolf of wolves) {
    if (wolf.x < vpL - 40 || wolf.x > vpR + 40 || wolf.y < vpT - 40 || wolf.y > vpB + 40) continue;
    // Inside the boss fight, suppress all non-boss wolves (rings + sprite)
    if (_inBossFight && wolf.pack !== BOSS_PACK_ID && !wolf.bossMinion) continue;
    // Detection range circle (skipped for boss/minions — they own the whole arena)
    if (!inMainMenu && wolf.pack !== BOSS_PACK_ID) {
      if (wolf.state === 'chase') {
        ctx.strokeStyle = 'rgba(255, 50, 50, 0.25)';
        ctx.fillStyle = 'rgba(255, 50, 50, 0.05)';
      } else {
        ctx.strokeStyle = 'rgba(255, 200, 50, 0.15)';
        ctx.fillStyle = 'rgba(255, 200, 50, 0.03)';
      }
      ctx.lineWidth = 1.5;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.arc(wolf.x, wolf.y, WOLF_DETECT, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fill();
      ctx.setLineDash([]);
    }

    let s = wolf.pack === BOSS_PACK_ID ? 48 : wolf.isAlpha ? 28 : 22;
    ctx.save();
    ctx.translate(wolf.x, wolf.y);
    let flip = wolf.facing === 'left' ? -1 : 1;
    ctx.scale(flip, 1);

    let isChasing = wolf.state === 'chase';
    let isAttacking = wolf.attackTimer > 0;
    let t = inMainMenu ? 0 : frameNow;

    // Fur colors
    let furDark, furMain, furLight, furBelly;
    let isBoss = wolf.pack === BOSS_PACK_ID;
    if (isBoss) {
      // Amber Wolf — warm honey/resin tones
      furDark = '#7a3a10'; furMain = '#c07018'; furLight = '#f0a838'; furBelly = '#ecc070';
    } else if (wolf.isAlpha) {
      furDark = '#2a2a2a'; furMain = '#3a3a3a'; furLight = '#5a5a5a'; furBelly = '#706860';
    } else {
      furDark = '#4a4a4a'; furMain = '#6a6a6a'; furLight = '#8a8a8a'; furBelly = '#a09890';
    }
    if (isAttacking && !isBoss) { furDark = '#5a2a2a'; furMain = '#7a3a3a'; }
    if (isAttacking && isBoss) { furDark = '#8a4a18'; furMain = '#d88030'; }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.ellipse(0, s * 0.38, s * 0.5, s * 0.08, 0, 0, Math.PI * 2);
    ctx.fill();

    // Leg animation
    let legSpeed = isChasing ? 80 : 200;
    let legAmp = isChasing ? 6 : 3;
    let ls = Math.sin(t / legSpeed + wolf.x) * legAmp;

    // --- BACK LEGS (behind body) ---
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round';
    // Back-left leg: upper + lower
    ctx.strokeStyle = furDark;
    ctx.beginPath();
    ctx.moveTo(-s * 0.2, s * 0.08);
    ctx.lineTo(-s * 0.25 + ls * 0.5, s * 0.22);
    ctx.lineTo(-s * 0.22 + ls, s * 0.35);
    ctx.stroke();
    // Paw
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.ellipse(-s * 0.22 + ls, s * 0.36, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Back-right leg
    ctx.beginPath();
    ctx.moveTo(-s * 0.12, s * 0.08);
    ctx.lineTo(-s * 0.15 - ls * 0.5, s * 0.22);
    ctx.lineTo(-s * 0.13 - ls, s * 0.35);
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(-s * 0.13 - ls, s * 0.36, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // --- FRONT LEGS ---
    if (isBoss && wolf.amberCasting) {
      // Paws raised toward the sky while channeling the Amber eruption
      let wobble = Math.sin(frameNow / 90) * 2;
      // Left front leg raised
      ctx.strokeStyle = furMain;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(s * 0.18, s * 0.08);
      ctx.lineTo(s * 0.12, -s * 0.18);
      ctx.lineTo(s * 0.04 + wobble * 0.5, -s * 0.42);
      ctx.stroke();
      // Left paw
      ctx.fillStyle = furMain;
      ctx.beginPath();
      ctx.ellipse(s * 0.04 + wobble * 0.5, -s * 0.42, 3, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Right front leg raised
      ctx.beginPath();
      ctx.moveTo(s * 0.25, s * 0.08);
      ctx.lineTo(s * 0.22, -s * 0.18);
      ctx.lineTo(s * 0.3 - wobble * 0.5, -s * 0.42);
      ctx.stroke();
      // Right paw
      ctx.beginPath();
      ctx.ellipse(s * 0.3 - wobble * 0.5, -s * 0.42, 3, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Reset line width
      ctx.lineWidth = 3.5;
    } else {
      // Front-left leg
      ctx.strokeStyle = furMain;
      ctx.beginPath();
      ctx.moveTo(s * 0.18, s * 0.08);
      ctx.lineTo(s * 0.2 - ls * 0.5, s * 0.22);
      ctx.lineTo(s * 0.18 - ls, s * 0.35);
      ctx.stroke();
      ctx.fillStyle = furMain;
      ctx.beginPath();
      ctx.ellipse(s * 0.18 - ls, s * 0.36, 3, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Front-right leg
      ctx.beginPath();
      ctx.moveTo(s * 0.25, s * 0.08);
      ctx.lineTo(s * 0.28 + ls * 0.5, s * 0.22);
      ctx.lineTo(s * 0.26 + ls, s * 0.35);
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(s * 0.26 + ls, s * 0.36, 3, 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // --- BODY ---
    // Main body shape
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.4, s * 0.16, 0, 0, Math.PI * 2);
    ctx.fill();
    // Back hump / shoulder
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.ellipse(s * 0.1, -s * 0.06, s * 0.18, s * 0.1, -0.2, 0, Math.PI * 2);
    ctx.fill();
    // Belly (lighter)
    ctx.fillStyle = furBelly;
    ctx.beginPath();
    ctx.ellipse(s * 0.02, s * 0.06, s * 0.25, s * 0.07, 0, 0, Math.PI);
    ctx.fill();
    // Fur texture lines on body
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = 0.5;
    for (let f = -3; f <= 3; f++) {
      ctx.beginPath();
      ctx.moveTo(f * s * 0.08, -s * 0.08);
      ctx.lineTo(f * s * 0.08 - 1, s * 0.05);
      ctx.stroke();
    }
    // Amber glow veins overlay for boss
    if (isBoss) {
      // Golden highlights
      ctx.fillStyle = 'rgba(255,220,120,0.2)';
      ctx.beginPath();
      ctx.ellipse(-s * 0.1, -s * 0.08, s * 0.12, s * 0.04, 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(s * 0.15, -s * 0.02, s * 0.09, s * 0.03, -0.2, 0, Math.PI * 2);
      ctx.fill();
      // Glowing amber veins
      ctx.strokeStyle = 'rgba(255,200,90,0.7)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(-s * 0.28, -s * 0.04);
      ctx.lineTo(-s * 0.14, -s * 0.1);
      ctx.lineTo(-s * 0.04, -s * 0.02);
      ctx.lineTo(s * 0.08, -s * 0.09);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-s * 0.2, s * 0.04);
      ctx.lineTo(-s * 0.08, s * 0.1);
      ctx.lineTo(s * 0.06, s * 0.05);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(s * 0.18, -s * 0.05);
      ctx.lineTo(s * 0.26, s * 0.04);
      ctx.stroke();
      // Sparkle dots along the veins
      ctx.fillStyle = 'rgba(255,235,160,0.9)';
      for (let p = 0; p < 6; p++) {
        let px = (p - 2.5) * s * 0.12;
        let py = ((p * 37) % 10 - 5) * 0.01 * s;
        ctx.beginPath();
        ctx.arc(px, py, 1.1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // --- TAIL --- bushy with fur detail
    ctx.lineWidth = 1;
    let tailWag = Math.sin(t / (isChasing ? 120 : 300) + wolf.y) * (isChasing ? 5 : 3);
    let tailTipX = -s * 0.55;
    let tailTipY = -s * 0.18 + tailWag;
    let tailMidX = -s * 0.42;
    let tailMidY = -s * 0.22 + tailWag * 0.6;
    // Bushy tail shape
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.moveTo(-s * 0.3, 0);
    ctx.quadraticCurveTo(tailMidX - 3, tailMidY + 5, tailTipX, tailTipY + 3);
    ctx.quadraticCurveTo(tailTipX - 3, tailTipY - 3, tailTipX + 2, tailTipY - 4);
    ctx.quadraticCurveTo(tailMidX + 2, tailMidY - 3, -s * 0.3, -s * 0.06);
    ctx.closePath();
    ctx.fill();
    // Tail tip lighter
    ctx.fillStyle = furLight;
    ctx.beginPath();
    ctx.ellipse(tailTipX, tailTipY, 4, 3, tailWag * 0.05, 0, Math.PI * 2);
    ctx.fill();

    // --- NECK ---
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.moveTo(s * 0.22, -s * 0.1);
    ctx.lineTo(s * 0.32, -s * 0.18);
    ctx.lineTo(s * 0.35, -s * 0.05);
    ctx.lineTo(s * 0.25, s * 0.02);
    ctx.closePath();
    ctx.fill();
    // Neck ruff / mane
    ctx.fillStyle = furLight;
    ctx.beginPath();
    ctx.ellipse(s * 0.24, -s * 0.04, s * 0.08, s * 0.1, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // --- HEAD ---
    let headDip = isChasing ? s * 0.03 : 0; // head lower when chasing
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.ellipse(s * 0.38, -s * 0.14 + headDip, s * 0.14, s * 0.12, -0.15, 0, Math.PI * 2);
    ctx.fill();
    // Forehead darker stripe
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.ellipse(s * 0.36, -s * 0.2 + headDip, s * 0.08, s * 0.05, -0.2, 0, Math.PI * 2);
    ctx.fill();

    // --- SNOUT ---
    ctx.fillStyle = furLight;
    ctx.beginPath();
    ctx.ellipse(s * 0.5, -s * 0.08 + headDip, s * 0.09, s * 0.06, -0.1, 0, Math.PI * 2);
    ctx.fill();
    // Nose
    ctx.fillStyle = isBoss ? '#3a1a08' : '#1a1a1a';
    ctx.beginPath();
    ctx.ellipse(s * 0.57, -s * 0.08 + headDip, 2.5, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Nostril detail
    ctx.fillStyle = isBoss ? '#1a0a04' : '#000';
    ctx.beginPath();
    ctx.arc(s * 0.565, -s * 0.075 + headDip, 0.8, 0, Math.PI * 2);
    ctx.fill();

    // --- MOUTH ---
    if ((isChasing || isAttacking) && !isBoss) {
      // Open jaw
      ctx.fillStyle = '#3a1010';
      ctx.beginPath();
      ctx.moveTo(s * 0.46, -s * 0.04 + headDip);
      ctx.lineTo(s * 0.56, -s * 0.02 + headDip);
      ctx.lineTo(s * 0.54, s * 0.05 + headDip);
      ctx.lineTo(s * 0.44, s * 0.03 + headDip);
      ctx.closePath();
      ctx.fill();
      // Tongue
      ctx.fillStyle = '#cc5555';
      ctx.beginPath();
      ctx.ellipse(s * 0.5, s * 0.02 + headDip, 3, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Teeth
      ctx.fillStyle = '#eee';
      ctx.beginPath();
      ctx.moveTo(s * 0.47, -s * 0.035 + headDip);
      ctx.lineTo(s * 0.48, -s * 0.01 + headDip);
      ctx.lineTo(s * 0.49, -s * 0.035 + headDip);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s * 0.52, -s * 0.03 + headDip);
      ctx.lineTo(s * 0.53, -s * 0.005 + headDip);
      ctx.lineTo(s * 0.54, -s * 0.03 + headDip);
      ctx.fill();
    } else {
      // Closed mouth line
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(s * 0.48, -s * 0.05 + headDip);
      ctx.lineTo(s * 0.55, -s * 0.06 + headDip);
      ctx.stroke();
    }

    // --- EYES ---
    // Eye socket
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.ellipse(s * 0.4, -s * 0.17 + headDip, s * 0.045, s * 0.04, -0.1, 0, Math.PI * 2);
    ctx.fill();
    // Eye white
    ctx.fillStyle = isBoss ? '#fff2c0' : (isChasing ? '#ffdddd' : '#ffe');
    ctx.beginPath();
    ctx.ellipse(s * 0.4, -s * 0.17 + headDip, s * 0.035, s * 0.03, -0.1, 0, Math.PI * 2);
    ctx.fill();
    // Iris
    ctx.fillStyle = isBoss ? '#f5c040' : (isChasing ? '#cc2200' : '#bb8800');
    ctx.beginPath();
    ctx.arc(s * 0.41, -s * 0.17 + headDip, s * 0.02, 0, Math.PI * 2);
    ctx.fill();
    // Pupil
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(s * 0.415, -s * 0.17 + headDip, s * 0.01, s * 0.015, 0, 0, Math.PI * 2);
    ctx.fill();
    // Eye shine
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(s * 0.395, -s * 0.18 + headDip, 1, 0, Math.PI * 2);
    ctx.fill();

    // --- EARS --- pointed, with inner detail
    // Left ear (back)
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.moveTo(s * 0.28, -s * 0.2 + headDip);
    ctx.lineTo(s * 0.3, -s * 0.38 + headDip);
    ctx.lineTo(s * 0.36, -s * 0.22 + headDip);
    ctx.closePath();
    ctx.fill();
    // Inner ear
    ctx.fillStyle = isBoss ? '#d89048' : '#9a7a6a';
    ctx.beginPath();
    ctx.moveTo(s * 0.3, -s * 0.22 + headDip);
    ctx.lineTo(s * 0.31, -s * 0.33 + headDip);
    ctx.lineTo(s * 0.35, -s * 0.23 + headDip);
    ctx.closePath();
    ctx.fill();
    // Right ear (front)
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.moveTo(s * 0.36, -s * 0.2 + headDip);
    ctx.lineTo(s * 0.4, -s * 0.36 + headDip);
    ctx.lineTo(s * 0.44, -s * 0.2 + headDip);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = isBoss ? '#e8a858' : '#a08070';
    ctx.beginPath();
    ctx.moveTo(s * 0.38, -s * 0.22 + headDip);
    ctx.lineTo(s * 0.4, -s * 0.32 + headDip);
    ctx.lineTo(s * 0.43, -s * 0.22 + headDip);
    ctx.closePath();
    ctx.fill();

    // Whisker dots on snout
    ctx.fillStyle = '#555';
    for (let w = 0; w < 3; w++) {
      ctx.beginPath();
      ctx.arc(s * 0.52, -s * 0.1 + headDip + w * 2, 0.6, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

    // Wolf health bar (only show if damaged)
    if (!inMainMenu && wolf.health < wolf.maxHealth) {
      let hbW = 24, hbH = 4;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(wolf.x - hbW/2 - 1, wolf.y - 22, hbW + 2, hbH + 2);
      ctx.fillStyle = '#333';
      ctx.fillRect(wolf.x - hbW/2, wolf.y - 21, hbW, hbH);
      let pct = wolf.health / wolf.maxHealth;
      ctx.fillStyle = pct > 0.5 ? '#cc3333' : '#aa1111';
      ctx.fillRect(wolf.x - hbW/2, wolf.y - 21, hbW * pct, hbH);
    }
  }

  // --- AMBER GOLEMS ---
  if (!_inBossFight) {
    for (const g of golems) {
      if (g.x < vpL - 60 || g.x > vpR + 60 || g.y < vpT - 60 || g.y > vpB + 60) continue;
      const bob = Math.sin(g.walkBob) * 1.6;
      const windupK = g.windupTimer > 0 ? (1 - g.windupTimer / 38) : 0;
      const shake = g.hurtTimer > 0 ? (Math.random() - 0.5) * 2.5 : 0;
      ctx.save();
      ctx.translate(g.x + shake, g.y + bob + shake);
      const flip = g.facing === 'left' ? -1 : 1;
      ctx.scale(flip, 1);

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.beginPath();
      ctx.ellipse(0, 22, 18, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Resin drip on the ground (glow pool)
      if (g.state === 'chase' || g.windupTimer > 0) {
        ctx.fillStyle = 'rgba(240,168,56,0.25)';
        ctx.beginPath();
        ctx.ellipse(0, 22, 22, 6, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Palette — hurt tints it red
      const tint = g.hurtTimer > 0 ? 1 : 0;
      const mix = (a, b, t) => Math.round(a + (b - a) * t);
      const body = `rgb(${mix(208, 230, tint)},${mix(116, 70, tint)},${mix(24, 40, tint)})`;
      const bodyDark = `rgb(${mix(160, 180, tint)},${mix(80, 40, tint)},${mix(8, 16, tint)})`;
      const bodyLight = `rgb(${mix(240, 255, tint)},${mix(168, 110, tint)},${mix(56, 70, tint)})`;

      // --- LEGS ---
      ctx.fillStyle = bodyDark;
      ctx.beginPath(); ctx.roundRect(-10, 6, 8, 16, 2); ctx.fill();
      ctx.beginPath(); ctx.roundRect(2, 6, 8, 16, 2); ctx.fill();
      ctx.fillStyle = body;
      ctx.beginPath(); ctx.roundRect(-9, 6, 6, 12, 1.5); ctx.fill();
      ctx.beginPath(); ctx.roundRect(3, 6, 6, 12, 1.5); ctx.fill();

      // --- TORSO --- chunky trapezoid
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.moveTo(-14, 8);
      ctx.lineTo(-12, -12);
      ctx.lineTo(12, -12);
      ctx.lineTo(14, 8);
      ctx.closePath();
      ctx.fill();
      // Torso highlight
      ctx.fillStyle = bodyLight;
      ctx.beginPath();
      ctx.moveTo(-12, -10);
      ctx.lineTo(-6, -10);
      ctx.lineTo(-7, 4);
      ctx.lineTo(-13, 4);
      ctx.closePath();
      ctx.fill();
      // Torso shadow
      ctx.fillStyle = bodyDark;
      ctx.beginPath();
      ctx.moveTo(6, -10);
      ctx.lineTo(12, -11);
      ctx.lineTo(14, 7);
      ctx.lineTo(7, 5);
      ctx.closePath();
      ctx.fill();

      // Resin cracks across torso
      ctx.strokeStyle = 'rgba(60,30,0,0.55)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(-6, -8); ctx.lineTo(-3, -2); ctx.lineTo(-6, 5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(4, -6); ctx.lineTo(8, 0); ctx.stroke();

      // Glowing core crystal
      const corePulse = 0.7 + Math.sin(frameNow / 200) * 0.3;
      ctx.fillStyle = `rgba(255,220,120,${corePulse})`;
      ctx.beginPath();
      ctx.moveTo(0, -6);
      ctx.lineTo(4, -2);
      ctx.lineTo(0, 4);
      ctx.lineTo(-4, -2);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = `rgba(255,255,200,${corePulse * 0.9})`;
      ctx.beginPath();
      ctx.ellipse(-1, -2, 1.2, 1.6, 0, 0, Math.PI * 2);
      ctx.fill();

      // --- ARMS --- raise during windup
      const armY = -10 - windupK * 16;
      const armX = 12;
      const armBendY = 0 - windupK * 10;
      // Back arm (behind torso)
      ctx.fillStyle = bodyDark;
      ctx.beginPath();
      ctx.moveTo(-armX + 2, armY + 2);
      ctx.lineTo(-armX - 6, armY + 2);
      ctx.lineTo(-armX - 8, armBendY + 12);
      ctx.lineTo(-armX - 2, armBendY + 12);
      ctx.closePath();
      ctx.fill();
      // Front arm (big fist)
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.moveTo(armX - 2, armY);
      ctx.lineTo(armX + 8, armY);
      ctx.lineTo(armX + 10, armBendY + 14);
      ctx.lineTo(armX + 2, armBendY + 14);
      ctx.closePath();
      ctx.fill();
      // Fist
      ctx.fillStyle = bodyLight;
      ctx.beginPath();
      ctx.arc(armX + 6, armBendY + 14, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = bodyDark;
      ctx.lineWidth = 1;
      ctx.stroke();

      // --- HEAD --- blocky with glowing eyes
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.roundRect(-8, -24, 16, 14, 3);
      ctx.fill();
      ctx.fillStyle = bodyLight;
      ctx.beginPath();
      ctx.roundRect(-7, -23, 6, 5, 1.5);
      ctx.fill();
      ctx.fillStyle = bodyDark;
      ctx.beginPath();
      ctx.roundRect(2, -15, 6, 4, 1);
      ctx.fill();
      // Eyes — brighter during windup
      const eyeGlow = 0.6 + windupK * 0.4;
      ctx.fillStyle = `rgba(255,240,140,${eyeGlow})`;
      ctx.beginPath(); ctx.arc(-3, -17, 1.6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(4, -17, 1.6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = `rgba(255,255,220,${eyeGlow})`;
      ctx.beginPath(); ctx.arc(-3, -17, 0.7, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(4, -17, 0.7, 0, Math.PI * 2); ctx.fill();

      ctx.restore();

      // Shards (world-space, no flip)
      for (const sh of g.shards) {
        const a = Math.min(1, sh.life / 20);
        ctx.fillStyle = `rgba(240,168,56,${a})`;
        ctx.beginPath();
        ctx.arc(sh.x, sh.y, 1.8, 0, Math.PI * 2);

      // Windup telegraph ring
      if (g.windupTimer > 0) {
        const tP = 1 - g.windupTimer / 38;
        ctx.strokeStyle = `rgba(255,180,60,${0.25 + tP * 0.5})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 4]);

        ctx.fillRect(g.x - hbW/2, g.y - 35, hbW, hbH);

  }

  if (!inMainMenu) {
  // Escape-tunnel hole the miner dug (drawn under the miner)
  if (troubledPerson.active && troubledPerson.holeSize > 0) {

    ctx.translate(troubledPerson.digX, troubledPerson.digY);

    // Rim shadow

    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(0, 0, troubledPerson.holeSize, troubledPerson.holeSize * 0.7, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Rubble pile at the base
    ctx.fillStyle = '#4a3420';
    ctx.beginPath();
    ctx.ellipse(0, troubledPerson.holeSize * 0.8, troubledPerson.holeSize * 1.1, troubledPerson.holeSize * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // Troubled person NPC
  if (troubledPerson.active && !troubledPerson.gone) {
    let tpMoving = (troubledPerson.found && wolves.some(w => w.pack === TROUBLED_PACK_ID)) || troubledPerson.movingFollow;
    if (troubledPerson.hurtTimer > 0 && Math.floor(troubledPerson.hurtTimer / 4) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }
    // Fade out while the miner enters the hole

    drawBean(troubledPerson.x, troubledPerson.y, 24, '#8a6040', troubledPerson.facing, false, tpMoving, true);
    // Pickaxe swing while digging
    if (troubledPerson.retreating && troubledPerson.retreatPhase === 'digging') {
      let swing = Math.sin(troubledPerson.retreatTimer * 0.5);
      let dirToHole = { x: troubledPerson.digX - troubledPerson.x, y: troubledPerson.digY - troubledPerson.y };
      let len = Math.hypot(dirToHole.x, dirToHole.y) || 1;
      let baseX = troubledPerson.x + (dirToHole.x / len) * 8;
      let baseY = troubledPerson.y + (dirToHole.y / len) * 8 - 4;
      let tipX = baseX + (dirToHole.x / len) * (14 + swing * 4);
      let tipY = baseY + (dirToHole.y / len) * (14 + swing * 4) + swing * 3;
      // Handle
      ctx.strokeStyle = '#6a4a20';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      ctx.lineTo(tipX, tipY);
      ctx.stroke();
      // Head
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 3.5;
      let perp = { x: -(dirToHole.y / len), y: (dirToHole.x / len) };
      ctx.beginPath();
      ctx.moveTo(tipX - perp.x * 4, tipY - perp.y * 4);
      ctx.lineTo(tipX + perp.x * 4, tipY + perp.y * 4);
      ctx.stroke();

    ctx.globalAlpha = 1;
    // Health bar when in combat (not when following)
    if (troubledPerson.found && !troubledPerson.following) {

      let hbx = troubledPerson.x - hbw / 2, hby = troubledPerson.y - 26;
      ctx.fillStyle = '#222';
      ctx.fillRect(hbx, hby, hbw, hbh);
      ctx.fillStyle = '#44cc44';
      ctx.fillRect(hbx, hby, hbw * (troubledPerson.health / troubledPerson.maxHealth), hbh);

      ctx.lineWidth = 1;
      ctx.strokeRect(hbx, hby, hbw, hbh);
    }
    // "!" indicator when not yet found
    if (!troubledPerson.found) {
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'center';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;

    // Speech bubble
    if (troubledPerson.speechTimer > 0 && troubledPerson.speechText) {

      ctx.fillStyle = '#ffffff';
      ctx.strokeStyle = '#000';

      ctx.stroke();

      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.stroke();
      // Cover seam

      ctx.lineWidth = 3;

      ctx.moveTo(troubledPerson.x - 4, by + bh);
      ctx.lineTo(troubledPerson.x + 4, by + bh);

      // Main text

      ctx.fillText(txt, bx + sPad, by + 24);

    // Pickaxe attack
    if (troubledPerson.whip.active) {
      let progress = 1 - (troubledPerson.whip.timer / 20);
      let handX = troubledPerson.x, handY = troubledPerson.y;
      if (troubledPerson.facing === 'right') { handX += 10; handY += 2; }
      else if (troubledPerson.facing === 'left') { handX -= 10; handY += 2; }
      else if (troubledPerson.facing === 'up') { handX += 6; handY -= 8; }
      else if (troubledPerson.facing === 'down') { handX -= 6; handY += 8; }
      let swingAngle = -Math.PI * 0.3 + progress * Math.PI * 0.6;
      let dx = troubledPerson.whip.endX - troubledPerson.whip.x;
      let dy = troubledPerson.whip.endY - troubledPerson.whip.y;
      let baseAngle = Math.atan2(dy, dx);
      let handleLen = 28;
      let endX = handX + Math.cos(baseAngle + swingAngle - Math.PI * 0.3) * handleLen * Math.min(progress * 2, 1);
      let endY = handY + Math.sin(baseAngle + swingAngle - Math.PI * 0.3) * handleLen * Math.min(progress * 2, 1);
      // Handle
      ctx.strokeStyle = '#7a5a20';
      ctx.lineWidth = 3.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(handX, handY);
      ctx.lineTo(endX, endY);
      ctx.stroke();
      // Pickaxe head
      let headAngle = baseAngle + swingAngle - Math.PI * 0.3;
      let perpX = Math.cos(headAngle + Math.PI / 2) * 8;
      let perpY = Math.sin(headAngle + Math.PI / 2) * 8;
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.moveTo(endX - perpX, endY - perpY);
      ctx.lineTo(endX + Math.cos(headAngle) * 6, endY + Math.sin(headAngle) * 6);
      ctx.lineTo(endX + perpX, endY + perpY);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // Player
  let playerMoving = keys['ArrowLeft'] || keys['a'] || keys['A'] || keys['ArrowRight'] || keys['d'] || keys['D'] || keys['ArrowUp'] || keys['w'] || keys['W'] || keys['ArrowDown'] || keys['s'] || keys['S'] || touchJoystick.active;
  // Flash when hurt
  if (player.hurtTimer > 0 && Math.floor(player.hurtTimer / 4) % 2 === 0) {
    ctx.globalAlpha = 0.4;
