      ctx.fill();

      // Tan leather upper shaft
      ctx.fillStyle = '#b89a6a';
      ctx.beginPath();
      ctx.moveTo(cx - r * 0.32, cy - r * 0.05);
      ctx.lineTo(cx - r * 0.28, cy - r * 0.55);
      ctx.lineTo(cx + r * 0.1, cy - r * 0.55);
      ctx.lineTo(cx + r * 0.12, cy - r * 0.05);
      ctx.closePath();
      ctx.fill();

      // Boot outline
      ctx.strokeStyle = '#5a4a2a';
      ctx.lineWidth = r * 0.04;
      ctx.beginPath();
      ctx.moveTo(cx - r * 0.35, cy + r * 0.42);
      ctx.lineTo(cx - r * 0.28, cy - r * 0.55);
      ctx.lineTo(cx + r * 0.1, cy - r * 0.55);
      ctx.lineTo(cx + r * 0.12, cy - r * 0.05);
      ctx.lineTo(cx + r * 0.55, cy + r * 0.42);
      ctx.stroke();

      // Toe cap - reinforced rubber
      ctx.fillStyle = '#3a5a28';
      ctx.beginPath();
      ctx.moveTo(cx + r * 0.12, cy - r * 0.05);
      ctx.bezierCurveTo(cx + r * 0.35, cy - r * 0.1, cx + r * 0.58, cy + r * 0.15, cx + r * 0.55, cy + r * 0.42);
      ctx.lineTo(cx + r * 0.2, cy + r * 0.42);

      ctx.fill();

      // Tongue
      ctx.fillStyle = '#c8a878';
      ctx.beginPath();
      ctx.moveTo(cx - r * 0.1, cy - r * 0.05);
      ctx.lineTo(cx - r * 0.06, cy - r * 0.5);

      ctx.fill();

      // Lace eyelets
      ctx.fillStyle = '#888';
      for (let e = 0; e < 5; e++) {
        let ey = cy - r * 0.45 + e * r * 0.1;
        ctx.beginPath(); ctx.arc(cx - r * 0.14, ey, r * 0.02, 0, Math.PI * 2); ctx.fill();

      // Laces - tan
      ctx.strokeStyle = '#8a7a5a';
      ctx.lineWidth = r * 0.025;

      for (let l = 0; l < 4; l++) {
        let ly = cy - r * 0.45 + l * r * 0.1;

      // Top collar
      ctx.fillStyle = '#c0a070';
      ctx.beginPath();
      ctx.ellipse(cx - r * 0.09, cy - r * 0.55, r * 0.2, r * 0.05, 0, 0, Math.PI * 2);

      // Stitching where colors meet
      ctx.strokeStyle = '#7a6a4a';
      ctx.lineWidth = r * 0.02;
      ctx.setLineDash([r * 0.03, r * 0.03]);
      ctx.beginPath();
      ctx.moveTo(cx - r * 0.32, cy - r * 0.05);
      ctx.lineTo(cx + r * 0.12, cy - r * 0.05);
      ctx.stroke();
      ctx.setLineDash([]);

      // Heel tab
      ctx.fillStyle = '#a08050';
      ctx.fillRect(cx - r * 0.35, cy - r * 0.15, r * 0.08, r * 0.2);

      // Speed lines - green glow
      ctx.strokeStyle = 'rgba(68,204,68,0.35)';
      ctx.lineWidth = r * 0.05;
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(cx - r * 0.55, cy - r * 0.1); ctx.lineTo(cx - r * 0.8, cy - r * 0.1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx - r * 0.5, cy + r * 0.1); ctx.lineTo(cx - r * 0.75, cy + r * 0.1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx - r * 0.5, cy + r * 0.3); ctx.lineTo(cx - r * 0.7, cy + r * 0.3); ctx.stroke();

    } else if (type === 'shield') {
      // Wooden shield with metal trim

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(cx, cy + r * 0.6, r * 0.4, r * 0.08, 0, 0, Math.PI * 2);
      ctx.fill();

      // Shield shape - pointed bottom, rounded top
      ctx.fillStyle = '#6a4a25';
      ctx.beginPath();
      ctx.moveTo(cx, cy - r * 0.7);
      ctx.bezierCurveTo(cx - r * 0.6, cy - r * 0.7, cx - r * 0.7, cy - r * 0.3, cx - r * 0.6, cy + r * 0.1);
      ctx.bezierCurveTo(cx - r * 0.45, cy + r * 0.45, cx - r * 0.15, cy + r * 0.65, cx, cy + r * 0.75);
      ctx.bezierCurveTo(cx + r * 0.15, cy + r * 0.65, cx + r * 0.45, cy + r * 0.45, cx + r * 0.6, cy + r * 0.1);
      ctx.bezierCurveTo(cx + r * 0.7, cy - r * 0.3, cx + r * 0.6, cy - r * 0.7, cx, cy - r * 0.7);
      ctx.closePath();
      ctx.fill();

      // Wood plank lines
      ctx.strokeStyle = '#5a3a18';
      ctx.lineWidth = r * 0.02;
      ctx.beginPath(); ctx.moveTo(cx - r * 0.2, cy - r * 0.65); ctx.lineTo(cx - r * 0.25, cy + r * 0.55); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx + r * 0.2, cy - r * 0.65); ctx.lineTo(cx + r * 0.15, cy + r * 0.55); ctx.stroke();

      // Wood grain
      ctx.strokeStyle = 'rgba(80,50,20,0.15)';
      ctx.lineWidth = r * 0.015;
      for (let g = -2; g <= 2; g++) {
        ctx.beginPath();
        ctx.moveTo(cx + g * r * 0.12, cy - r * 0.5);
        ctx.bezierCurveTo(cx + g * r * 0.12 + r * 0.02, cy - r * 0.2, cx + g * r * 0.12 - r * 0.02, cy + r * 0.1, cx + g * r * 0.12, cy + r * 0.4);
        ctx.stroke();
      }

      // Metal rim
      ctx.strokeStyle = '#888';
      ctx.lineWidth = r * 0.06;
      ctx.beginPath();
      ctx.moveTo(cx, cy - r * 0.7);
      ctx.bezierCurveTo(cx - r * 0.6, cy - r * 0.7, cx - r * 0.7, cy - r * 0.3, cx - r * 0.6, cy + r * 0.1);
      ctx.bezierCurveTo(cx - r * 0.45, cy + r * 0.45, cx - r * 0.15, cy + r * 0.65, cx, cy + r * 0.75);
      ctx.bezierCurveTo(cx + r * 0.15, cy + r * 0.65, cx + r * 0.45, cy + r * 0.45, cx + r * 0.6, cy + r * 0.1);
      ctx.bezierCurveTo(cx + r * 0.7, cy - r * 0.3, cx + r * 0.6, cy - r * 0.7, cx, cy - r * 0.7);
      ctx.closePath();
      ctx.stroke();

      // Metal boss (center circle)
      ctx.fillStyle = '#999';
      ctx.beginPath();
      ctx.arc(cx, cy - r * 0.05, r * 0.18, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#777';
      ctx.lineWidth = r * 0.03;
      ctx.stroke();
      // Boss inner ring
      ctx.strokeStyle = '#aaa';
      ctx.lineWidth = r * 0.02;
      ctx.beginPath();
      ctx.arc(cx, cy - r * 0.05, r * 0.1, 0, Math.PI * 2);
      ctx.stroke();
      // Boss dome highlight
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.beginPath();
      ctx.arc(cx - r * 0.04, cy - r * 0.1, r * 0.06, 0, Math.PI * 2);
      ctx.fill();
      // Boss rivet
      ctx.fillStyle = '#bbb';
      ctx.beginPath();
      ctx.arc(cx, cy - r * 0.05, r * 0.04, 0, Math.PI * 2);
      ctx.fill();

      // Corner rivets
      ctx.fillStyle = '#aaa';
      let rivets = [
        [cx, cy - r * 0.55],
        [cx - r * 0.45, cy - r * 0.2],
        [cx + r * 0.45, cy - r * 0.2],
        [cx - r * 0.3, cy + r * 0.3],
        [cx + r * 0.3, cy + r * 0.3],
        [cx, cy + r * 0.55]
      ];
      for (let rv of rivets) {
        ctx.beginPath();
        ctx.arc(rv[0], rv[1], r * 0.035, 0, Math.PI * 2);
        ctx.fill();
      }

      // Metal cross bars
      ctx.strokeStyle = '#888';
      ctx.lineWidth = r * 0.04;
      ctx.lineCap = 'round';
      // Horizontal
      ctx.beginPath();
      ctx.moveTo(cx - r * 0.45, cy - r * 0.05);
      ctx.lineTo(cx + r * 0.45, cy - r * 0.05);
      ctx.stroke();
      // Vertical
      ctx.beginPath();
      ctx.moveTo(cx, cy - r * 0.55);
      ctx.lineTo(cx, cy + r * 0.55);
      ctx.stroke();

      // Shine on wood
      ctx.fillStyle = 'rgba(255,220,150,0.08)';
      ctx.beginPath();
      ctx.ellipse(cx - r * 0.15, cy - r * 0.3, r * 0.15, r * 0.25, 0.15, 0, Math.PI * 2);
      ctx.fill();

    } else if (type === 'medkit') {
      // Medical kit box
      // Box body
      ctx.fillStyle = '#eee';
      ctx.beginPath();
      ctx.roundRect(cx - r * 0.65, cy - r * 0.5, r * 1.3, r * 1, r * 0.12);
      ctx.fill();
      // Box shadow/depth
      ctx.fillStyle = '#ccc';
      ctx.fillRect(cx - r * 0.65, cy + r * 0.3, r * 1.3, r * 0.2);
      // Box outline
      ctx.strokeStyle = '#999';
      ctx.lineWidth = r * 0.06;
      ctx.beginPath();
      ctx.roundRect(cx - r * 0.65, cy - r * 0.5, r * 1.3, r * 1, r * 0.12);
      ctx.stroke();
      // Latch
      ctx.fillStyle = '#aaa';
      ctx.fillRect(cx - r * 0.08, cy + r * 0.3, r * 0.16, r * 0.12);
      // Hinge line
      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = r * 0.04;
      ctx.beginPath();
      ctx.moveTo(cx - r * 0.5, cy - r * 0.15);
      ctx.lineTo(cx + r * 0.5, cy - r * 0.15);
      ctx.stroke();
      // Red cross
      ctx.fillStyle = '#cc2222';
      ctx.fillRect(cx - r * 0.3, cy - r * 0.1, r * 0.6, r * 0.22);
      ctx.fillRect(cx - r * 0.1, cy - r * 0.35, r * 0.22, r * 0.6);
      // Cross highlight
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(cx - r * 0.25, cy - r * 0.07, r * 0.5, r * 0.08);
      // Handle on top
      ctx.strokeStyle = '#888';
      ctx.lineWidth = r * 0.08;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx - r * 0.2, cy - r * 0.5);
      ctx.quadraticCurveTo(cx, cy - r * 0.7, cx + r * 0.2, cy - r * 0.5);
      ctx.stroke();
    } else {
      // Default: colored circle with letter
      let it = ITEM_TYPES[type];
      ctx.fillStyle = it.color;
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${r * 0.8}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText(it.icon, cx, cy + r * 0.3);

  }

  // World items
  if (inMainMenu) { /* skip items */ } else
  for (const item of worldItems) {
    if (item.collected) continue;
    let it = ITEM_TYPES[item.type];
    let bob = Math.sin(Date.now() / 400 + item.x) * 3;
    // Glow
    ctx.fillStyle = `${it.color}33`;
    ctx.beginPath();
    ctx.arc(item.x, item.y + bob, 14, 0, Math.PI * 2);
    ctx.fill();
    // Draw item
    drawItemIcon(item.x, item.y + bob, item.type, 12);
  }

  // Wolves
  for (const wolf of wolves) {
    // Detection range circle
    if (!inMainMenu) {
    let distToPlayer = Math.hypot(player.x - wolf.x, player.y - wolf.y);
    if (wolf.state === 'chase') {
      ctx.strokeStyle = 'rgba(255, 50, 50, 0.25)';
      ctx.fillStyle = 'rgba(255, 50, 50, 0.05)';
    } else {
      ctx.strokeStyle = 'rgba(255, 200, 50, 0.15)';
      ctx.fillStyle = 'rgba(255, 200, 50, 0.03)';
    }
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.arc(wolf.x, wolf.y, WOLF_DETECT, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fill();
    ctx.setLineDash([]);
    } // end !inMainMenu detection circle

    let s = wolf.isAlpha ? 28 : 22;
    ctx.save();
    ctx.translate(wolf.x, wolf.y);
    let flip = wolf.facing === 'left' ? -1 : 1;
    ctx.scale(flip, 1);

    let isChasing = wolf.state === 'chase';
    let isAttacking = wolf.attackTimer > 0;
    let t = inMainMenu ? 0 : Date.now();

    // Fur colors
    let furDark, furMain, furLight, furBelly;
    if (wolf.isAlpha) {
      furDark = '#2a2a2a'; furMain = '#3a3a3a'; furLight = '#5a5a5a'; furBelly = '#706860';
    } else {
      furDark = '#4a4a4a'; furMain = '#6a6a6a'; furLight = '#8a8a8a'; furBelly = '#a09890';
    }
    if (isAttacking) { furDark = '#5a2a2a'; furMain = '#7a3a3a'; }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.ellipse(0, s * 0.38, s * 0.5, s * 0.08, 0, 0, Math.PI * 2);
    ctx.fill();

    // Leg animation
    let legSpeed = isChasing ? 80 : 200;
    let legAmp = isChasing ? 6 : 3;
    let ls = Math.sin(t / legSpeed + wolf.x) * legAmp;

    // --- BACK LEGS (behind body) ---
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round';
    // Back-left leg: upper + lower
    ctx.strokeStyle = furDark;
    ctx.beginPath();
    ctx.moveTo(-s * 0.2, s * 0.08);
    ctx.lineTo(-s * 0.25 + ls * 0.5, s * 0.22);
    ctx.lineTo(-s * 0.22 + ls, s * 0.35);
    ctx.stroke();
    // Paw
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.ellipse(-s * 0.22 + ls, s * 0.36, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Back-right leg
    ctx.beginPath();
    ctx.moveTo(-s * 0.12, s * 0.08);
    ctx.lineTo(-s * 0.15 - ls * 0.5, s * 0.22);
    ctx.lineTo(-s * 0.13 - ls, s * 0.35);
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(-s * 0.13 - ls, s * 0.36, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // --- FRONT LEGS ---
    // Front-left leg
    ctx.strokeStyle = furMain;
    ctx.beginPath();
    ctx.moveTo(s * 0.18, s * 0.08);
    ctx.lineTo(s * 0.2 - ls * 0.5, s * 0.22);
    ctx.lineTo(s * 0.18 - ls, s * 0.35);
    ctx.stroke();
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.ellipse(s * 0.18 - ls, s * 0.36, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Front-right leg
    ctx.beginPath();
    ctx.moveTo(s * 0.25, s * 0.08);
    ctx.lineTo(s * 0.28 + ls * 0.5, s * 0.22);
    ctx.lineTo(s * 0.26 + ls, s * 0.35);
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(s * 0.26 + ls, s * 0.36, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // --- BODY ---
    // Main body shape
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.4, s * 0.16, 0, 0, Math.PI * 2);
    ctx.fill();
    // Back hump / shoulder
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.ellipse(s * 0.1, -s * 0.06, s * 0.18, s * 0.1, -0.2, 0, Math.PI * 2);
    ctx.fill();
    // Belly (lighter)
    ctx.fillStyle = furBelly;
    ctx.beginPath();
    ctx.ellipse(s * 0.02, s * 0.06, s * 0.25, s * 0.07, 0, 0, Math.PI);
    ctx.fill();
    // Fur texture lines on body
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = 0.5;
    for (let f = -3; f <= 3; f++) {
      ctx.beginPath();
      ctx.moveTo(f * s * 0.08, -s * 0.08);
      ctx.lineTo(f * s * 0.08 - 1, s * 0.05);
      ctx.stroke();
    }

    // --- TAIL --- bushy with fur detail
    ctx.lineWidth = 1;
    let tailWag = Math.sin(t / (isChasing ? 120 : 300) + wolf.y) * (isChasing ? 5 : 3);
    let tailTipX = -s * 0.55;
    let tailTipY = -s * 0.18 + tailWag;
    let tailMidX = -s * 0.42;
    let tailMidY = -s * 0.22 + tailWag * 0.6;
    // Bushy tail shape
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.moveTo(-s * 0.3, 0);
    ctx.quadraticCurveTo(tailMidX - 3, tailMidY + 5, tailTipX, tailTipY + 3);
    ctx.quadraticCurveTo(tailTipX - 3, tailTipY - 3, tailTipX + 2, tailTipY - 4);
    ctx.quadraticCurveTo(tailMidX + 2, tailMidY - 3, -s * 0.3, -s * 0.06);
    ctx.closePath();
    ctx.fill();
    // Tail tip lighter
    ctx.fillStyle = furLight;
    ctx.beginPath();
    ctx.ellipse(tailTipX, tailTipY, 4, 3, tailWag * 0.05, 0, Math.PI * 2);
    ctx.fill();

    // --- NECK ---
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.moveTo(s * 0.22, -s * 0.1);
    ctx.lineTo(s * 0.32, -s * 0.18);
    ctx.lineTo(s * 0.35, -s * 0.05);
    ctx.lineTo(s * 0.25, s * 0.02);
    ctx.closePath();
    ctx.fill();
    // Neck ruff / mane
    ctx.fillStyle = furLight;
    ctx.beginPath();
    ctx.ellipse(s * 0.24, -s * 0.04, s * 0.08, s * 0.1, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // --- HEAD ---
    let headDip = isChasing ? s * 0.03 : 0; // head lower when chasing
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.ellipse(s * 0.38, -s * 0.14 + headDip, s * 0.14, s * 0.12, -0.15, 0, Math.PI * 2);
    ctx.fill();
    // Forehead darker stripe
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.ellipse(s * 0.36, -s * 0.2 + headDip, s * 0.08, s * 0.05, -0.2, 0, Math.PI * 2);
    ctx.fill();

    // --- SNOUT ---
    ctx.fillStyle = furLight;
    ctx.beginPath();
    ctx.ellipse(s * 0.5, -s * 0.08 + headDip, s * 0.09, s * 0.06, -0.1, 0, Math.PI * 2);
    ctx.fill();
    // Nose
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.ellipse(s * 0.57, -s * 0.08 + headDip, 2.5, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Nostril detail
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(s * 0.565, -s * 0.075 + headDip, 0.8, 0, Math.PI * 2);
    ctx.fill();

    // --- MOUTH ---
    if (isChasing || isAttacking) {
      // Open jaw
      ctx.fillStyle = '#3a1010';
      ctx.beginPath();
      ctx.moveTo(s * 0.46, -s * 0.04 + headDip);
      ctx.lineTo(s * 0.56, -s * 0.02 + headDip);
      ctx.lineTo(s * 0.54, s * 0.05 + headDip);
      ctx.lineTo(s * 0.44, s * 0.03 + headDip);
      ctx.closePath();
      ctx.fill();
      // Tongue
      ctx.fillStyle = '#cc5555';
      ctx.beginPath();
      ctx.ellipse(s * 0.5, s * 0.02 + headDip, 3, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Teeth
      ctx.fillStyle = '#eee';
      ctx.beginPath();
      ctx.moveTo(s * 0.47, -s * 0.035 + headDip);
      ctx.lineTo(s * 0.48, -s * 0.01 + headDip);
      ctx.lineTo(s * 0.49, -s * 0.035 + headDip);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s * 0.52, -s * 0.03 + headDip);
      ctx.lineTo(s * 0.53, -s * 0.005 + headDip);
      ctx.lineTo(s * 0.54, -s * 0.03 + headDip);
      ctx.fill();
    } else {
      // Closed mouth line
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(s * 0.48, -s * 0.05 + headDip);
      ctx.lineTo(s * 0.55, -s * 0.06 + headDip);
      ctx.stroke();
    }

    // --- EYES ---
    // Eye socket
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.ellipse(s * 0.4, -s * 0.17 + headDip, s * 0.045, s * 0.04, -0.1, 0, Math.PI * 2);
    ctx.fill();
    // Eye white
    ctx.fillStyle = isChasing ? '#ffdddd' : '#ffe';
    ctx.beginPath();
    ctx.ellipse(s * 0.4, -s * 0.17 + headDip, s * 0.035, s * 0.03, -0.1, 0, Math.PI * 2);
    ctx.fill();
    // Iris
    ctx.fillStyle = isChasing ? '#cc2200' : '#bb8800';
    ctx.beginPath();
    ctx.arc(s * 0.41, -s * 0.17 + headDip, s * 0.02, 0, Math.PI * 2);
    ctx.fill();
    // Pupil
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(s * 0.415, -s * 0.17 + headDip, s * 0.01, s * 0.015, 0, 0, Math.PI * 2);
    ctx.fill();
    // Eye shine
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(s * 0.395, -s * 0.18 + headDip, 1, 0, Math.PI * 2);
    ctx.fill();

    // --- EARS --- pointed, with inner detail
    // Left ear (back)
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.moveTo(s * 0.28, -s * 0.2 + headDip);
    ctx.lineTo(s * 0.3, -s * 0.38 + headDip);
    ctx.lineTo(s * 0.36, -s * 0.22 + headDip);
    ctx.closePath();
    ctx.fill();
    // Inner ear
    ctx.fillStyle = '#9a7a6a';
    ctx.beginPath();
    ctx.moveTo(s * 0.3, -s * 0.22 + headDip);
    ctx.lineTo(s * 0.31, -s * 0.33 + headDip);
    ctx.lineTo(s * 0.35, -s * 0.23 + headDip);
    ctx.closePath();
    ctx.fill();
    // Right ear (front)
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.moveTo(s * 0.36, -s * 0.2 + headDip);
    ctx.lineTo(s * 0.4, -s * 0.36 + headDip);
    ctx.lineTo(s * 0.44, -s * 0.2 + headDip);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#a08070';
    ctx.beginPath();
    ctx.moveTo(s * 0.38, -s * 0.22 + headDip);
    ctx.lineTo(s * 0.4, -s * 0.32 + headDip);
    ctx.lineTo(s * 0.43, -s * 0.22 + headDip);
    ctx.closePath();
    ctx.fill();

    // Whisker dots on snout
    ctx.fillStyle = '#555';
    for (let w = 0; w < 3; w++) {
      ctx.beginPath();
      ctx.arc(s * 0.52, -s * 0.1 + headDip + w * 2, 0.6, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

    // Wolf health bar (only show if damaged)
    if (!inMainMenu && wolf.health < wolf.maxHealth) {
      let hbW = 24, hbH = 4;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(wolf.x - hbW/2 - 1, wolf.y - 22, hbW + 2, hbH + 2);
      ctx.fillStyle = '#333';
      ctx.fillRect(wolf.x - hbW/2, wolf.y - 21, hbW, hbH);
      let pct = wolf.health / wolf.maxHealth;
      ctx.fillStyle = pct > 0.5 ? '#cc3333' : '#aa1111';
      ctx.fillRect(wolf.x - hbW/2, wolf.y - 21, hbW * pct, hbH);
    }
  }

  if (!inMainMenu) {
  // Player
  let playerMoving = keys['ArrowLeft'] || keys['a'] || keys['A'] || keys['ArrowRight'] || keys['d'] || keys['D'] || keys['ArrowUp'] || keys['w'] || keys['W'] || keys['ArrowDown'] || keys['s'] || keys['S'];
  // Flash when hurt
  if (player.hurtTimer > 0 && Math.floor(player.hurtTimer / 4) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }
  drawBean(player.x, player.y, 24, player.color, player.facing, true, playerMoving);
  ctx.globalAlpha = 1;

  // Draw whip attack (starts from player's hand)
  if (whip.active) {
    let progress = 1 - (whip.timer / 20);
    // Hand position based on facing direction
    let handX = player.x, handY = player.y;
    if (player.facing === 'right') { handX += 10; handY += 2; }
    else if (player.facing === 'left') { handX -= 10; handY += 2; }
    else if (player.facing === 'up') { handX += 6; handY -= 8; }
    else if (player.facing === 'down') { handX -= 6; handY += 8; }

    let curEndX = handX + (whip.endX - whip.x) * Math.min(progress * 2, 1);
    let curEndY = handY + (whip.endY - whip.y) * Math.min(progress * 2, 1);

    // Whip line with wave
    ctx.strokeStyle = '#3a2008';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    let wave = Math.sin(progress * Math.PI * 3) * (1 - progress) * 10;
    let dx = curEndX - handX;
    let dy = curEndY - handY;
    let len = Math.hypot(dx, dy) || 1;
    let perpX = -dy / len * wave;
    let perpY = dx / len * wave;

    // Draw multi-segment whip for a curvy look
    let mid1X = handX + dx * 0.33 + perpX * 0.7;
    let mid1Y = handY + dy * 0.33 + perpY * 0.7;
    let mid2X = handX + dx * 0.66 - perpX * 0.5;
    let mid2Y = handY + dy * 0.66 - perpY * 0.5;

    ctx.beginPath();
    ctx.moveTo(handX, handY);
    ctx.bezierCurveTo(mid1X, mid1Y, mid2X, mid2Y, curEndX, curEndY);
    ctx.stroke();

    // Thinner end
    ctx.strokeStyle = '#2a1808';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(mid2X, mid2Y);
    ctx.lineTo(curEndX, curEndY);
    ctx.stroke();

    // Whip crack at tip
    if (progress > 0.3 && progress < 0.7) {
      ctx.fillStyle = 'rgba(255,220,150,0.6)';
      ctx.beginPath();
      ctx.arc(curEndX, curEndY, 5 * (1 - Math.abs(progress - 0.5) * 4), 0, Math.PI * 2);
      ctx.fill();
    }
  }
  } // end !inMainMenu player block

  ctx.restore();

  // Skip all HUD when rendering as menu background
  if (inMainMenu) return;

  // Minimap
  let mmW = 140, mmH = 140;
  let mmX = canvas.width - mmW - 10, mmY = canvas.height - mmH - 30;
  ctx.fillStyle = 'rgba(0,30,0,0.7)';
  ctx.fillRect(mmX, mmY, mmW, mmH);
  ctx.strokeStyle = '#4a4';
  ctx.strokeRect(mmX, mmY, mmW, mmH);

  // Rivers on minimap
  ctx.strokeStyle = '#1a6aaa';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (const river of rivers) {
    ctx.beginPath();
    ctx.moveTo(mmX + (river[0].x / WORLD_W) * mmW, mmY + (river[0].y / WORLD_H) * mmH);
    for (let i = 1; i < river.length; i++) {
      ctx.lineTo(mmX + (river[i].x / WORLD_W) * mmW, mmY + (river[i].y / WORLD_H) * mmH);
    }
    ctx.stroke();
  }

  // Bridges on minimap
  ctx.fillStyle = '#9a7a4a';
  for (const br of bridges) {
    ctx.fillRect(mmX + (br.x / WORLD_W) * mmW - 2, mmY + (br.y / WORLD_H) * mmH - 2, 5, 5);
  }

  // Village on minimap
  ctx.fillStyle = 'rgba(80,180,60,0.5)';
  ctx.fillRect(
    mmX + (village.x / WORLD_W) * mmW,
    mmY + (village.y / WORLD_H) * mmH,
    (village.w / WORLD_W) * mmW,
    (village.h / WORLD_H) * mmH
  );

  // Crash sites on minimap (only unrescued visible if scout assigned)
  for (const site of crashSites) {
    if (site.rescued) {
      ctx.fillStyle = '#555';
      ctx.fillRect(mmX + (site.x / WORLD_W) * mmW - 2, mmY + (site.y / WORLD_H) * mmH - 2, 4, 4);
    } else if (watchtowerJobs.scout.assigned > 0) {
      // Scout reveals with blinking SOS
      ctx.fillStyle = Math.sin(Date.now() / 300) > 0 ? '#ff4' : '#f44';
      ctx.fillRect(mmX + (site.x / WORLD_W) * mmW - 3, mmY + (site.y / WORLD_H) * mmH - 3, 6, 6);
    }
  }

  // Wolves on minimap (if lookout assigned)
  if (watchtowerJobs.lookout.assigned > 0) {
    for (const wolf of wolves) {
      ctx.fillStyle = wolf.state === 'chase' ? '#ff4444' : '#ffdd44';
      ctx.beginPath();
      ctx.arc(mmX + (wolf.x / WORLD_W) * mmW, mmY + (wolf.y / WORLD_H) * mmH, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Player on minimap
  ctx.fillStyle = '#ff0';
  ctx.fillRect(mmX + (player.x / WORLD_W) * mmW - 3, mmY + (player.y / WORLD_H) * mmH - 3, 6, 6);

  // Notification
  if (notifyTimer > 0) {
    ctx.fillStyle = `rgba(0,0,0,${Math.min(notifyTimer/30, 0.7)})`;
    ctx.fillRect(canvas.width/2 - 200, 40, 400, 36);
    ctx.fillStyle = `rgba(255,255,100,${Math.min(notifyTimer/30, 1)})`;
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(notification, canvas.width/2, 64);
  }

  // Health bar
  let hbX = 10, hbY = 10, hbW = 120, hbH = 16;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(hbX - 2, hbY - 2, hbW + 4, hbH + 4);
  ctx.fillStyle = '#333';
  ctx.fillRect(hbX, hbY, hbW, hbH);
  let healthPct = player.health / player.maxHealth;
  let hColor = healthPct > 0.5 ? '#44cc44' : healthPct > 0.25 ? '#ccaa22' : '#cc3333';
  ctx.fillStyle = hColor;
  ctx.fillRect(hbX, hbY, hbW * healthPct, hbH);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.strokeRect(hbX, hbY, hbW, hbH);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`HP ${player.health}/${player.maxHealth}`, hbX + hbW / 2, hbY + 12);

  // Hotbar
  let hbSlotW = 44;
  let hbSlotH = 44;
  let hbPad = 4;
  let hbTotalW = (hbSlotW + hbPad) * 5 - hbPad;
  let hbStartX = canvas.width / 2 - hbTotalW / 2;
  let hbStartY = canvas.height - 60;

  // Hotbar background
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath();
  ctx.roundRect(hbStartX - 6, hbStartY - 6, hbTotalW + 12, hbSlotH + 22, 6);
  ctx.fill();

  for (let i = 0; i < 5; i++) {
    let sx = hbStartX + i * (hbSlotW + hbPad);
    let sy = hbStartY;
    // Slot background
    ctx.fillStyle = i === inventory.selected ? 'rgba(255,220,50,0.3)' : 'rgba(50,50,50,0.7)';
    ctx.beginPath();
    ctx.roundRect(sx, sy, hbSlotW, hbSlotH, 4);
    ctx.fill();
    // Slot border
    ctx.strokeStyle = i === inventory.selected ? '#ffdd44' : '#666';
    ctx.lineWidth = i === inventory.selected ? 2.5 : 1;
    ctx.beginPath();
    ctx.roundRect(sx, sy, hbSlotW, hbSlotH, 4);
    ctx.stroke();
    // Key number
    ctx.fillStyle = '#aaa';
    ctx.font = '10px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(String(i + 1), sx + 3, sy + 11);
    // Item in slot
    let slotItem = inventory.slots[i];
    if (slotItem) {
      let it = ITEM_TYPES[slotItem];
      drawItemIcon(sx + hbSlotW / 2, sy + hbSlotH / 2, slotItem, 18);
    }
  }

  // Selected item name and controls
  let selItem = inventory.slots[inventory.selected];
  ctx.textAlign = 'center';
  if (selItem) {
    let it = ITEM_TYPES[selItem];
    ctx.fillStyle = '#fff';
    ctx.font = '11px Arial';
    ctx.fillText(`${it.name} - ${it.desc} [E to use]`, canvas.width / 2, hbStartY + hbSlotH + 14);
  } else {
    ctx.fillStyle = '#777';
    ctx.font = '11px Arial';
    ctx.fillText('Empty slot [1-5 to select]', canvas.width / 2, hbStartY + hbSlotH + 14);
  }

  // Shield indicator
  if (shieldActive) {
    ctx.fillStyle = 'rgba(68,136,204,0.3)';
    ctx.beginPath();
    ctx.arc(canvas.width / 2, canvas.height / 2, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#4488cc';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Speed boost indicator
  if (speedBoostTimer > 0) {
    ctx.fillStyle = '#44cc44';
    ctx.font = '12px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`Speed: ${Math.ceil(speedBoostTimer / 60)}s`, 140, 22);
  }

  // Quest tracker button + panel
  let visibleQuests = activeQuests.filter(q => !q.turned_in);
  {
    let qx = 6, qy = 34;
    let btnW = 90, btnH = 22;

    // Button background - classic embossed style
    let btnGrad = ctx.createLinearGradient(qx, qy, qx, qy + btnH);
    btnGrad.addColorStop(0, '#6a5a3a');
    btnGrad.addColorStop(0.5, '#4a3a20');
    btnGrad.addColorStop(0.51, '#3a2a14');
    btnGrad.addColorStop(1, '#4a3a20');
    ctx.fillStyle = btnGrad;
    ctx.beginPath();
    ctx.roundRect(qx, qy, btnW, btnH, 3);
    ctx.fill();
    // Border
    ctx.strokeStyle = '#8a7a50';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Inner highlight
    ctx.strokeStyle = 'rgba(255,255,200,0.12)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.roundRect(qx + 1, qy + 1, btnW - 2, btnH - 2, 2);
    ctx.stroke();

    // Arrow + "QUESTS" text
    ctx.fillStyle = '#f0e8d0';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'left';
    let arrow = questTrackerOpen ? '\u25BC' : '\u25B6';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 1; ctx.shadowBlur = 2;
    ctx.fillText(`${arrow} QUESTS`, qx + 7, qy + 15);
    ctx.shadowColor = 'transparent';

    // Count on the right side
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(visibleQuests.length, qx + btnW - 8, qy + 15);

    // Expanded quest list
    if (questTrackerOpen) {
      let panelX = qx;
      let panelY = qy + btnH + 3;
      let panelW = 185;
      let panelH = visibleQuests.length > 0 ? 10 + visibleQuests.length * 34 : 28;

      // Panel background - matching classic style
      let panelGrad = ctx.createLinearGradient(panelX, panelY, panelX, panelY + panelH);
      panelGrad.addColorStop(0, 'rgba(50,40,24,0.9)');
      panelGrad.addColorStop(1, 'rgba(35,28,16,0.9)');
      ctx.fillStyle = panelGrad;
      ctx.beginPath();
      ctx.roundRect(panelX, panelY, panelW, panelH, 3);
      ctx.fill();
      ctx.strokeStyle = '#8a7a50';
      ctx.lineWidth = 1;
      ctx.stroke();
      // Inner highlight
      ctx.strokeStyle = 'rgba(255,255,200,0.08)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.roundRect(panelX + 1, panelY + 1, panelW - 2, panelH - 2, 2);
      ctx.stroke();

      if (visibleQuests.length === 0) {
        ctx.fillStyle = '#888';
        ctx.font = '10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('No active quests', panelX + panelW / 2, panelY + 18);
      } else {
        for (let i = 0; i < visibleQuests.length; i++) {
          let q = visibleQuests[i];
          let rowY = panelY + 14 + i * 34;
          // Bullet/check
          ctx.fillStyle = q.done ? '#44ff44' : '#f0e8d0';
          ctx.font = '10px Arial';
          ctx.textAlign = 'left';
          ctx.fillText(q.done ? '\u2713' : '\u2022', panelX + 6, rowY);
          // Description
          ctx.fillText(q.desc, panelX + 18, rowY);
          // Progress on right
          ctx.fillStyle = q.done ? '#44ff44' : '#ffdd44';
          ctx.font = 'bold 10px Arial';
          ctx.textAlign = 'right';
          ctx.fillText(`${q.progress}/${q.need}`, panelX + panelW - 6, rowY);
          // Reward line
          ctx.fillStyle = '#aa9a60';
          ctx.font = '9px Arial';
          ctx.textAlign = 'left';
          ctx.fillText(`Reward: ${ITEM_TYPES[q.reward].name}`, panelX + 18, rowY + 13);
        }
      }
    }
  }

  // Carrying indicator
  if (followers.length > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(10, canvas.height - 40, 200, 28);
    ctx.fillStyle = '#ffdd44';
    ctx.font = '14px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`Following: ${followers.length} survivor${followers.length > 1 ? 's' : ''} → Village`, 18, canvas.height - 22);
  }

  // Win check
  if (village.population === totalSurvivors && totalSurvivors > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(canvas.width/2 - 180, canvas.height/2 - 40, 360, 80);
    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('ALL SURVIVORS RESCUED!', canvas.width/2, canvas.height/2);
    ctx.fillStyle = '#fff';
    ctx.font = '16px Arial';
    ctx.fillText(`Village Population: ${village.population}`, canvas.width/2, canvas.height/2 + 25);
  }

  // Draw arrows
  ctx.save();
  ctx.translate(-camX, -camY);
  for (const a of arrows) {
    let angle = Math.atan2(a.targetY - a.y, a.targetX - a.x);
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(angle);
    // Arrow shaft
    ctx.strokeStyle = '#6a4a20';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.lineTo(6, 0);
    ctx.stroke();
    // Arrow head
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.lineTo(4, -3);
    ctx.lineTo(4, 3);
    ctx.closePath();
    ctx.fill();
    // Fletching
    ctx.fillStyle = '#cc3333';
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.lineTo(-6, -3);
    ctx.lineTo(-5, 0);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.lineTo(-6, 3);
    ctx.lineTo(-5, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();

  // Quest menu
  if (questMenuOpen && questMenuTarget >= 0) {
    let quest = activeQuests.find(q => q.giver === questMenuTarget);
    if (quest) {
      let menuW = 260, menuH = 160;
      let menuX = canvas.width / 2 - menuW / 2;
      let menuY = canvas.height / 2 - menuH / 2;

      // Background
      ctx.fillStyle = 'rgba(0,0,0,0.85)';
      ctx.beginPath();
      ctx.roundRect(menuX, menuY, menuW, menuH, 8);
      ctx.fill();
      ctx.strokeStyle = '#8a6a3a';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Title
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 15px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Quest', menuX + menuW / 2, menuY + 22);

      // Close X
      ctx.fillStyle = '#cc4444';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('X', menuX + menuW - 15, menuY + 18);

      // Quest description
      ctx.fillStyle = '#fff';
      ctx.font = '13px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(quest.desc, menuX + menuW / 2, menuY + 48);

      // Progress bar
      let pbX = menuX + 20, pbY = menuY + 60, pbW = menuW - 40, pbH = 14;
      ctx.fillStyle = '#333';
      ctx.fillRect(pbX, pbY, pbW, pbH);
      let pct = Math.min(quest.progress / quest.need, 1);
      ctx.fillStyle = quest.done ? '#44cc44' : '#cc8833';
      ctx.fillRect(pbX, pbY, pbW * pct, pbH);
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.strokeRect(pbX, pbY, pbW, pbH);
      ctx.fillStyle = '#fff';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(`${quest.progress} / ${quest.need}`, pbX + pbW / 2, pbY + 11);

      // Reward info
      ctx.fillStyle = '#aaa';
      ctx.font = '11px Arial';
      ctx.fillText(`Reward: ${ITEM_TYPES[quest.reward].name}`, menuX + menuW / 2, menuY + 98);

      // Action button
      let btnX = menuX + menuW / 2 - 50;
      let btnY = menuY + menuH - 40;
      let btnLabel = '';
      let btnColor = '#444';
      if (quest.done && !quest.turned_in) {
        btnLabel = 'Turn In';
        btnColor = '#44aa44';
      } else if (quest.type === 'gather_food' || quest.type === 'gather_medkit') {
        let itemType = quest.type === 'gather_food' ? 'food' : 'medkit';
        let have = inventory.slots.filter(s => s === itemType).length;
        btnLabel = have > 0 ? `Hand In (have ${have})` : 'Need Items';
        btnColor = have > 0 ? '#aa8833' : '#444';
      } else {
        btnLabel = quest.done ? 'Turn In' : 'In Progress...';
        btnColor = quest.done ? '#44aa44' : '#555';
      }
      ctx.fillStyle = btnColor;
      ctx.beginPath();
      ctx.roundRect(btnX, btnY, 100, 28, 4);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(btnLabel, btnX + 50, btnY + 18);
    }
  }

  // Watchtower menu
  if (watchtowerMenuOpen) {
    let menuW = 220, menuH = 200;
    let menuX = canvas.width / 2 - menuW / 2;
    let menuY = canvas.height / 2 - menuH / 2;

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.beginPath();
    ctx.roundRect(menuX, menuY, menuW, menuH, 8);
    ctx.fill();
    ctx.strokeStyle = '#8a6a3a';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Title
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Watchtower Jobs', menuX + menuW / 2, menuY + 22);

    // Close X
    ctx.fillStyle = '#cc4444';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('X', menuX + menuW - 15, menuY + 18);

    // Available villagers
    let jobKeys = Object.keys(watchtowerJobs);
    let totalAssigned = jobKeys.reduce((s, k) => s + watchtowerJobs[k].assigned, 0);
    let available = village.population - totalAssigned;
    ctx.fillStyle = '#aaa';
    ctx.font = '11px Arial';
    ctx.fillText(`Available: ${available} / ${village.population} villagers`, menuX + menuW / 2, menuY + 38);

    // Job rows
    for (let i = 0; i < jobKeys.length; i++) {
      let job = watchtowerJobs[jobKeys[i]];
      let rowY = menuY + 50 + i * 45;

      // Job name and desc
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px Arial';
      ctx.textAlign = 'left';
      ctx.fillText(job.name, menuX + 10, rowY + 12);
      ctx.fillStyle = '#999';
      ctx.font = '10px Arial';
      ctx.fillText(job.desc, menuX + 10, rowY + 25);

      // Count
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(`${job.assigned}/${job.max}`, menuX + menuW - 65, rowY + 14);

      // Plus button
      ctx.fillStyle = job.assigned < job.max && available > 0 ? '#44aa44' : '#444';
      ctx.beginPath();
      ctx.roundRect(menuX + menuW - 55, rowY + 2, 20, 20, 3);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px Arial';
      ctx.fillText('+', menuX + menuW - 45, rowY + 17);

      // Minus button
      ctx.fillStyle = job.assigned > 0 ? '#aa4444' : '#444';
      ctx.beginPath();
      ctx.roundRect(menuX + menuW - 30, rowY + 2, 20, 20, 3);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillText('-', menuX + menuW - 20, rowY + 17);
    }
  }

  // Game Over screen
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Red vignette
    let vg = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, canvas.width/2);
    vg.addColorStop(0, 'rgba(80,0,0,0.3)');
    vg.addColorStop(1, 'rgba(30,0,0,0.6)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // GAME OVER text
    ctx.fillStyle = '#cc2222';
    ctx.font = 'bold 52px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 30);

    // Stats
    ctx.fillStyle = '#ddd';
    ctx.font = '18px Arial';
    let rescued = crashSites.filter(s => s.rescued).reduce((sum, s) => sum + s.survivors, 0);
    ctx.fillText(`Survivors Rescued: ${rescued} / ${totalSurvivors}`, canvas.width/2, canvas.height/2 + 10);
    ctx.fillText(`Village Population: ${village.population}`, canvas.width/2, canvas.height/2 + 35);

    // Restart prompt
    ctx.fillStyle = '#ffcc44';
    ctx.font = 'bold 20px Arial';
    let blink = Math.sin(Date.now() / 400) > 0;
    if (blink) ctx.fillText('Press R to Restart', canvas.width/2, canvas.height/2 + 80);
  }
}

// --- SAVE & LOAD ---
function saveGame() {
  let save = {
    player: { x: player.x, y: player.y, health: player.health, facing: player.facing },
    village: { population: village.population, buildings: village.buildings },
    crashSites: crashSites.map(s => ({ rescued: s.rescued })),
    wolves: wolves.map(w => ({ x: w.x, y: w.y, health: w.health, maxHealth: w.maxHealth, pack: w.pack, isAlpha: w.isAlpha, speed: w.speed })),
    inventory: { slots: inventory.slots, selected: inventory.selected },
    worldItems: worldItems.map(i => ({ collected: i.collected })),
    villagePeople: villagePeople.map(vp => ({ x: vp.x, y: vp.y, color: vp.color, wanderAngle: vp.wanderAngle, hasQuest: vp.hasQuest || false })),
    speedBoostTimer: speedBoostTimer,
    shieldActive: shieldActive,
    watchtowerJobs: { lookout: watchtowerJobs.lookout.assigned, scout: watchtowerJobs.scout.assigned, archer: watchtowerJobs.archer.assigned },
    activeQuests: activeQuests.map(q => ({ id: q.id, giver: q.giver, desc: q.desc, type: q.type, need: q.need, progress: q.progress, reward: q.reward, done: q.done, turned_in: q.turned_in })),
    wolfKillCount: wolfKillCount,
    questIdCounter: questIdCounter
  };
  localStorage.setItem('jungleRescueSave', JSON.stringify(save));
  notify('Game saved!');
}

function loadGame() {
  let data = localStorage.getItem('jungleRescueSave');
  if (!data) return false;
  try {
    let save = JSON.parse(data);
    player.x = save.player.x;
    player.y = save.player.y;
    player.health = save.player.health;
    player.facing = save.player.facing;
    village.population = save.village.population;
    village.buildings = save.village.buildings;
    for (let i = 0; i < crashSites.length && i < save.crashSites.length; i++) {
      crashSites[i].rescued = save.crashSites[i].rescued;
    }
    // Restore wolves
    wolves.length = 0;
    for (const w of save.wolves) {
      wolves.push({
        x: w.x, y: w.y, angle: Math.random() * Math.PI * 2,
        speed: w.speed || 1.2, state: 'wander', attackTimer: 0,
        facing: 'right', health: w.health, maxHealth: w.maxHealth,
        pack: w.pack !== undefined ? w.pack : -1,
        isAlpha: w.isAlpha || false
      });
    }
    inventory.slots = save.inventory.slots;
    inventory.selected = save.inventory.selected;
    for (let i = 0; i < worldItems.length && i < save.worldItems.length; i++) {
      worldItems[i].collected = save.worldItems[i].collected;
    }
    villagePeople.length = 0;
    for (const vp of save.villagePeople) {
      villagePeople.push({ x: vp.x, y: vp.y, color: vp.color, wanderAngle: vp.wanderAngle, hasQuest: vp.hasQuest || false });
    }
    speedBoostTimer = save.speedBoostTimer || 0;
    shieldActive = save.shieldActive || false;
    if (save.watchtowerJobs) {
      watchtowerJobs.lookout.assigned = save.watchtowerJobs.lookout || 0;
      watchtowerJobs.scout.assigned = save.watchtowerJobs.scout || 0;
      watchtowerJobs.archer.assigned = save.watchtowerJobs.archer || 0;
    }
    // Restore quests
    if (save.activeQuests) {
      activeQuests.length = 0;
      for (const q of save.activeQuests) {
        activeQuests.push({ id: q.id, giver: q.giver, desc: q.desc, type: q.type, need: q.need, progress: q.progress, reward: q.reward, done: q.done, turned_in: q.turned_in });
      }
      wolfKillCount = save.wolfKillCount || 0;
      questIdCounter = save.questIdCounter || 0;
    }
    followers.length = 0;
    player.carrying = 0;
    document.getElementById('rescued').textContent =
      crashSites.filter(s => s.rescued).reduce((sum, s) => sum + s.survivors, 0);
    document.getElementById('village').textContent = village.population;
    return true;
  } catch(e) { return false; }
}

document.getElementById('save-btn').addEventListener('click', () => {
  saveGame();
  paused = false;
  pauseOverlay.classList.remove('active');
  pauseBtn.innerHTML = '<span class="pause-icon"><span></span><span></span></span>';
  pauseBtn.title = 'Pause';
  inMainMenu = true;
  document.getElementById('pause-btn').style.display = 'none';
  document.getElementById('fs-btn').style.display = 'none';
  document.getElementById('save-btn').style.display = 'none';
});

// --- MAIN MENU ---
let inMainMenu = true;
let menuAnimTimer = 0;

function drawMainMenu() {
  menuAnimTimer++;
  let cx = canvas.width / 2;
  let cy = canvas.height / 2;

  // Background - dark jungle gradient
  let bg = ctx.createRadialGradient(cx, cy, 50, cx, cy, 450);
  bg.addColorStop(0, '#1a2e0a');
  bg.addColorStop(1, '#0a1204');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle leaf/vine pattern
  ctx.strokeStyle = 'rgba(40,80,20,0.15)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 12; i++) {
    let vx = (i * 73 + 20) % canvas.width;
    ctx.beginPath();
    ctx.moveTo(vx, 0);
    for (let y = 0; y < canvas.height; y += 20) {
      ctx.lineTo(vx + Math.sin(y * 0.03 + i) * 15, y);
    }
    ctx.stroke();
  }

  // Ground line
  let groundY = cy + 100;
  ctx.fillStyle = '#1a2e0a';
  ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
  ctx.strokeStyle = '#2d5a1e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(canvas.width, groundY);
  ctx.stroke();


  // Game title - top left
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.7)';
  ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2; ctx.shadowBlur = 6;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 36px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('Jungle Rescue', 30, 50);
  ctx.fillStyle = '#f0e8d0';
  ctx.font = 'bold 20px Arial';
  ctx.fillText('Village', 32, 76);
  ctx.restore();

  // Character - to the left of start button, standing on ground
  let charX = cx - 120;
  let charY = groundY - 40;
  let charSize = 112;

  // Action cycle: idle(0-240), look around(240-480), walk(480-800), whip(800-960), idle(960-1080)
  let actionCycle = menuAnimTimer % 1080;
  let charFacing = 'right';
  let charMoving = false;

  if (actionCycle < 240) {
    // Idle - gentle breathing bob
    charY += Math.sin(menuAnimTimer * 0.03) * 1.5;
  } else if (actionCycle < 480) {
    // Look around
    let lookPhase = actionCycle - 240;
    if (lookPhase < 80) charFacing = 'right';
    else if (lookPhase < 160) charFacing = 'left';
    else charFacing = 'right';
    charY += Math.sin(menuAnimTimer * 0.03) * 1.5;
  } else if (actionCycle < 800) {
    // Walk in place
    charMoving = true;
    walkTimer = menuAnimTimer;
    charY += Math.sin(menuAnimTimer * 0.03) * 1;
  } else if (actionCycle < 960) {
    // Whip crack
    let whipPhase = (actionCycle - 800) / 2;
    charY += Math.sin(menuAnimTimer * 0.03) * 1;
    // Draw the character first, then overlay whip animation
    drawBean(charX, charY, charSize, '#6b3a1a', 'right', true, false);

    // Whip crack animation
    ctx.save();
    ctx.translate(charX, charY);
    let s = charSize;
    ctx.strokeStyle = '#3a2008';
    ctx.lineWidth = s * 0.035;
    ctx.lineCap = 'round';
    if (whipPhase < 20) {
      // Wind up
      let t = whipPhase / 20;
      ctx.beginPath();
      ctx.moveTo(s * 0.28, -s * 0.05);
      ctx.quadraticCurveTo(s * 0.4, -s * 0.2 * t, s * 0.35 + t * s * 0.1, -s * 0.3 * t);
      ctx.stroke();
    } else if (whipPhase < 50) {
      // Crack forward
      let t = (whipPhase - 20) / 30;
      let extend = t * s * 1.8;
      ctx.beginPath();
      ctx.moveTo(s * 0.28, -s * 0.05);
      let wt = whipPhase * 0.5;
      ctx.quadraticCurveTo(s * 0.4 + extend * 0.3, -s * 0.15 + Math.sin(wt) * 4, s * 0.3 + extend, -s * 0.05 + Math.sin(wt * 1.3) * 3);
      ctx.stroke();
      // Crack spark at tip
      if (whipPhase > 25 && whipPhase < 35) {
        let sparkX = s * 0.3 + extend;
        let sparkY = -s * 0.05 + Math.sin(wt * 1.3) * 3;
        ctx.fillStyle = '#ffdd44';
        for (let sp = 0; sp < 4; sp++) {
          let sa = Math.random() * Math.PI * 2;
          let sr = 2 + Math.random() * 4;
          ctx.beginPath();
          ctx.arc(sparkX + Math.cos(sa) * sr, sparkY + Math.sin(sa) * sr, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    } else {
      // Retract
      let t = 1 - (whipPhase - 50) / 30;
      let extend = Math.max(0, t) * s * 1.2;
      ctx.beginPath();
      ctx.moveTo(s * 0.28, -s * 0.05);
      ctx.quadraticCurveTo(s * 0.3 + extend * 0.3, s * 0.05, s * 0.2 + extend * 0.5, s * 0.1);
      ctx.stroke();
    }
    ctx.restore();

    // Skip the normal draw below since we already drew the character
    // Store button bounds and continue
    actionCycle = -1; // flag to skip drawBean below
  } else {
    // Brief idle
    charY += Math.sin(menuAnimTimer * 0.03) * 1.5;
  }

  if (actionCycle >= 0) {
    drawBean(charX, charY, charSize, '#6b3a1a', charFacing, true, charMoving);
  }

  // Start button
  let btnW = 160, btnH = 40;
  let btnX = cx - 10;
  let btnY = groundY - btnH / 2 - 18;

  // Button background - classic embossed style
  let btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  btnGrad.addColorStop(0, '#6a5a3a');
  btnGrad.addColorStop(0.5, '#4a3a20');
  btnGrad.addColorStop(0.51, '#3a2a14');
  btnGrad.addColorStop(1, '#4a3a20');
  ctx.fillStyle = btnGrad;
  ctx.beginPath();
  ctx.roundRect(btnX, btnY, btnW, btnH, 4);
  ctx.fill();
  // Border
  ctx.strokeStyle = '#8a7a50';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Inner highlight
  ctx.strokeStyle = 'rgba(255,255,200,0.15)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.roundRect(btnX + 1, btnY + 1, btnW - 2, btnH - 2, 3);
  ctx.stroke();
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.roundRect(btnX + 2, btnY + btnH + 1, btnW - 4, 4, 2);
  ctx.fill();

  // Button text
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 1; ctx.shadowBlur = 2;
  ctx.fillStyle = '#f0e8d0';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('START', btnX + btnW / 2, btnY + btnH / 2 + 6);
  ctx.restore();

  // Continue button if save exists
  if (localStorage.getItem('jungleRescueSave')) {
    let cBtnY = btnY + btnH + 16;
    let cBtnGrad = ctx.createLinearGradient(btnX, cBtnY, btnX, cBtnY + btnH);
    cBtnGrad.addColorStop(0, '#4a5a3a');
    cBtnGrad.addColorStop(0.5, '#3a4a20');
    cBtnGrad.addColorStop(0.51, '#2a3a14');
    cBtnGrad.addColorStop(1, '#3a4a20');
    ctx.fillStyle = cBtnGrad;
    ctx.beginPath();
    ctx.roundRect(btnX, cBtnY, btnW, btnH, 4);
    ctx.fill();
    ctx.strokeStyle = '#7a8a50';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,200,0.1)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.roundRect(btnX + 1, cBtnY + 1, btnW - 2, btnH - 2, 3);
    ctx.stroke();
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.roundRect(btnX + 2, cBtnY + btnH + 1, btnW - 4, 4, 2);
    ctx.fill();

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 1; ctx.shadowBlur = 2;
    ctx.fillStyle = '#d0e8b0';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('CONTINUE', btnX + btnW / 2, cBtnY + btnH / 2 + 6);
    ctx.restore();
  }

  // Controls panel - right side
  let cpX = canvas.width - 230, cpY = 100;
  let cpW = 210, controls = [
    ['WASD / Arrows', 'Move'],
    ['F', 'Whip Attack'],
    ['E', 'Use Item'],
    ['1 - 5', 'Select Item'],
    ['P', 'Pause'],
    ['Esc', 'Exit Fullscreen'],
    ['Click', 'Interact'],
  ];
  let cpH = 32 + controls.length * 24;

  // Panel background
  let cpGrad = ctx.createLinearGradient(cpX, cpY, cpX, cpY + cpH);
  cpGrad.addColorStop(0, 'rgba(50,40,24,0.85)');
  cpGrad.addColorStop(1, 'rgba(35,28,16,0.85)');
  ctx.fillStyle = cpGrad;
  ctx.beginPath();
  ctx.roundRect(cpX, cpY, cpW, cpH, 4);
  ctx.fill();
  ctx.strokeStyle = '#8a7a50';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,200,0.08)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.roundRect(cpX + 1, cpY + 1, cpW - 2, cpH - 2, 3);
  ctx.stroke();

  // Title
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('CONTROLS', cpX + cpW / 2, cpY + 20);

  // Divider
  ctx.strokeStyle = 'rgba(138,122,80,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cpX + 10, cpY + 28);
  ctx.lineTo(cpX + cpW - 10, cpY + 28);
  ctx.stroke();

  // Control rows
  for (let i = 0; i < controls.length; i++) {
    let rowY = cpY + 46 + i * 24;
    // Key
    ctx.fillStyle = '#f0e8d0';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(controls[i][0], cpX + 12, rowY);
    // Action
    ctx.fillStyle = '#aa9a70';
    ctx.font = '11px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(controls[i][1], cpX + cpW - 12, rowY);
  }

  // Store button bounds for click detection
  drawMainMenu._btnX = btnX;
  drawMainMenu._btnY = btnY;
  drawMainMenu._btnW = btnW;
  drawMainMenu._btnH = btnH;
}

canvas.addEventListener('click', function mainMenuClick(e) {
  if (!inMainMenu) return;
  let rect = canvas.getBoundingClientRect();
  let scaleX = canvas.width / rect.width;
  let scaleY = canvas.height / rect.height;
  let mx = (e.clientX - rect.left) * scaleX;
  let my = (e.clientY - rect.top) * scaleY;

  let btnX = drawMainMenu._btnX;
  let btnY = drawMainMenu._btnY;
  let btnW = drawMainMenu._btnW;
  let btnH = drawMainMenu._btnH;
  if (!btnX) return;

  // Start button
  if (mx >= btnX && mx <= btnX + btnW && my >= btnY && my <= btnY + btnH) {
    inMainMenu = false;
    document.getElementById('pause-btn').style.display = '';
    document.getElementById('fs-btn').style.display = '';
    document.getElementById('save-btn').style.display = '';
    return;
  }

  // Continue button
  if (localStorage.getItem('jungleRescueSave')) {
    let cBtnY = btnY + btnH + 16;
    if (mx >= btnX && mx <= btnX + btnW && my >= cBtnY && my <= cBtnY + btnH) {
      loadGame();
      notify('Save loaded! Welcome back.');
      inMainMenu = false;
      document.getElementById('pause-btn').style.display = '';
      document.getElementById('fs-btn').style.display = '';
      document.getElementById('save-btn').style.display = '';
      return;
    }
  }
});

// --- PAUSE ---
let paused = false;
let gameOver = false;
const pauseBtn = document.getElementById('pause-btn');
const pauseOverlay = document.getElementById('pause-overlay');

pauseBtn.addEventListener('click', togglePause);
window.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.fullscreenElement) {
    document.exitFullscreen();
  } else if (e.key === 'p' || e.key === 'P') togglePause();
  // Hotbar selection (1-5)
  if (e.key >= '1' && e.key <= '5') inventory.selected = parseInt(e.key) - 1;
  // Use item (E key)
  if ((e.key === 'e' || e.key === 'E') && !gameOver && !paused) {
    let item = inventory.slots[inventory.selected];
    if (item) {
      let used = false;
      if (item === 'medkit') {
        if (player.health < player.maxHealth) {
          player.health = Math.min(player.maxHealth, player.health + 3);
          notify('Used Medkit! +3 HP');
          used = true;
        }
      } else if (item === 'food') {
        if (player.health < player.maxHealth) {
          player.health = Math.min(player.maxHealth, player.health + 1);
          notify('Ate Food! +1 HP');
          used = true;
        }
      } else if (item === 'speed') {
        speedBoostTimer = 600; // 10 seconds
        notify('Speed Boost activated!');
        used = true;
      } else if (item === 'shield') {
        shieldActive = true;
        notify('Shield activated! Blocks 1 hit');
        used = true;
      }
      if (used) inventory.slots[inventory.selected] = null;
    }
  }
  if ((e.key === 'r' || e.key === 'R') && gameOver) {
    // Restart
    player.health = player.maxHealth;
    player.x = WORLD_W / 2;
    player.y = WORLD_H / 2;
    player.hurtTimer = 0;
    player.invincible = 60;
    gameOver = false;
    // Reset crash sites
    for (const site of crashSites) { site.rescued = false; }
    followers.length = 0;
    player.carrying = 0;
    villagePeople.length = 0;
    village.population = 0;
    village.buildings.length = 0;
    document.getElementById('rescued').textContent = 0;
    document.getElementById('village').textContent = 0;
    // Reset quests
    activeQuests.length = 0;
    questIdCounter = 0;
    wolfKillCount = 0;
    questMenuOpen = false;
    questMenuTarget = -1;
    // Reset inventory
    inventory.slots = [null, null, null, null, null];
    inventory.selected = 0;
    speedBoostTimer = 0;
    shieldActive = false;
    for (const item of worldItems) item.collected = false;
    // Scatter wolves away from player and restore health
    for (const wolf of wolves) {
      wolf.x = BORDER + 50 + Math.random() * (WORLD_W - BORDER * 2 - 100);
      wolf.y = BORDER + 50 + Math.random() * (WORLD_H - BORDER * 2 - 100);
      wolf.state = 'wander';
      wolf.health = wolf.maxHealth;
    }
    // Respawn dead wolves (re-add if pack wolves were killed)
    while (wolves.length < 10) {
      let wx = BORDER + 50 + Math.random() * (WORLD_W - BORDER * 2 - 100);
      let wy = BORDER + 50 + Math.random() * (WORLD_H - BORDER * 2 - 100);
      wolves.push({ x: wx, y: wy, angle: Math.random() * Math.PI * 2, speed: 1.2, state: 'wander', attackTimer: 0, facing: 'right', health: 3, maxHealth: 3, pack: -1 });
    }
  }
});

function togglePause() {
  paused = !paused;
  pauseBtn.innerHTML = paused ? '<span class="play-icon"></span>' : '<span class="pause-icon"><span></span><span></span></span>';
  pauseBtn.title = paused ? 'Resume' : 'Pause';
  pauseOverlay.classList.toggle('active', paused);
}

// --- GAME LOOP ---
function gameLoop() {
  if (inMainMenu) {
    drawMainMenu();
  } else {
    if (!paused && !gameOver) {
      update();
    }
    draw();
  }
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
