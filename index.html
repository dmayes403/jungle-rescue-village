  drawBean(player.x, player.y, 24, player.color, player.facing, true, playerMoving);
  ctx.globalAlpha = 1;

  // Draw whip attack (starts from player's hand)
  if (whip.active) {
    let progress = 1 - (whip.timer / 20);
    // Hand position based on facing direction
    let handX = player.x, handY = player.y;
    if (player.facing === 'right') { handX += 10; handY += 2; }
    else if (player.facing === 'left') { handX -= 10; handY += 2; }
    else if (player.facing === 'up') { handX += 6; handY -= 8; }
    else if (player.facing === 'down') { handX -= 6; handY += 8; }

    let curEndX = handX + (whip.endX - whip.x) * Math.min(progress * 2, 1);
    let curEndY = handY + (whip.endY - whip.y) * Math.min(progress * 2, 1);

    // Whip line with wave
    ctx.strokeStyle = '#3a2008';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    let wave = Math.sin(progress * Math.PI * 3) * (1 - progress) * 10;
    let dx = curEndX - handX;
    let dy = curEndY - handY;
    let len = Math.hypot(dx, dy) || 1;
    let perpX = -dy / len * wave;
    let perpY = dx / len * wave;

    // Draw multi-segment whip for a curvy look
    let mid1X = handX + dx * 0.33 + perpX * 0.7;
    let mid1Y = handY + dy * 0.33 + perpY * 0.7;
    let mid2X = handX + dx * 0.66 - perpX * 0.5;
    let mid2Y = handY + dy * 0.66 - perpY * 0.5;

    ctx.beginPath();
    ctx.moveTo(handX, handY);
    ctx.bezierCurveTo(mid1X, mid1Y, mid2X, mid2Y, curEndX, curEndY);
    ctx.stroke();

    // Thinner end
    ctx.strokeStyle = '#2a1808';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(mid2X, mid2Y);
    ctx.lineTo(curEndX, curEndY);
    ctx.stroke();

    // Whip crack at tip
    if (progress > 0.3 && progress < 0.7) {
      ctx.fillStyle = 'rgba(255,220,150,0.6)';
      ctx.beginPath();
      ctx.arc(curEndX, curEndY, 5 * (1 - Math.abs(progress - 0.5) * 4), 0, Math.PI * 2);
      ctx.fill();
    }
  }
  } // end !inMainMenu player block

  // Floating damage / heal numbers (world space, above entities)
  if (dmgFloaters.length) {

      const m = c.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);

      ctx.fillText(f.text, f.x, f.y);
    }
  }

  ctx.restore();

  // Screen flash (full-screen tint on hits / phase transitions)
  if (screenFlash > 0) {

  // Skip all HUD when rendering as menu background
  if (inMainMenu) return;

  // Minimap (hidden during boss fight)
  let inBossFight = mineScene.active && (mineScene.phase === 'boss' || mineScene.phase === 'victory');
  if (!inBossFight) {
  let mmCtx, mmW, mmH, mmX, mmY;
  if (isMobile) {

  } else {

  mmCtx.lineJoin = 'round';
  for (const river of rivers) {

  } else if (mineFound) {

  mmCtx.fillRect(mmX + (player.x / WORLD_W) * mmW - 3, mmY + (player.y / WORLD_H) * mmH - 3, 6, 6);

  } // end minimap boss fight hide

  if (notifyTimer > 0) {

  // Health bar (hidden during boss fight - boss has its own UI)
  if (!inBossFight) {
  let hbX = 10, hbY = 10, hbW = 120, hbH = 16;

  // Quest tracker button + panel
  let visibleQuests = activeQuests.filter(q => q.accepted && !q.turned_in);
  {
    let qx = 6, qy = 34;

    let btnGrad = ctx.createLinearGradient(qx, qy, qx, qy + btnH);

    ctx.fill();
    // Border

    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.lineWidth = 0.5;
    ctx.beginPath();

    ctx.textAlign = 'left';
    let arrow = questTrackerOpen ? '\u25BC' : '\u25B6';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 1; ctx.shadowBlur = 2;
    ctx.fillText(`${arrow} QUESTS`, qx + 7, qy + 15);
    ctx.shadowColor = 'transparent';

    // Count on the right side
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(visibleQuests.length + 1, qx + btnW - 8, qy + 15);

    // Expanded quest list
    if (questTrackerOpen) {
      let panelX = qx;
      let panelY = qy + btnH + 3;
      let panelW = 195;

      // Calculate panel height: main quest section (1 quest) + side quests section
      let mainQuestH = 38; // header + one quest row
      let sideQuestH = visibleQuests.length > 0 ? 18 + visibleQuests.length * 34 : 28;
      let panelH = mainQuestH + 8 + sideQuestH + 8;

      // Panel background - matching classic style
      let panelGrad = ctx.createLinearGradient(panelX, panelY, panelX, panelY + panelH);
      panelGrad.addColorStop(0, 'rgba(50,40,24,0.92)');
      panelGrad.addColorStop(1, 'rgba(35,28,16,0.92)');
      ctx.fillStyle = panelGrad;
      ctx.beginPath();
      ctx.roundRect(panelX, panelY, panelW, panelH, 3);
      ctx.fill();
      ctx.strokeStyle = '#8a7a50';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,200,0.08)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.roundRect(panelX + 1, panelY + 1, panelW - 2, panelH - 2, 2);
      ctx.stroke();

      // --- MAIN QUEST ---
      let curY = panelY + 4;
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 10px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('MAIN QUEST', panelX + 6, curY + 10);
      curY += 16;
      // Main quest: Find all the lost explorers (shown until complete)
      let rescued = village.population;
      let mainDone = rescued >= totalSurvivors && totalSurvivors > 0;
      let completedSideQuests = activeQuests.filter(q => q.turned_in).length;
      let sideGoal = 3;
      let sideDone = completedSideQuests >= sideGoal;
      if (!mainDone) {
        // Show rescue quest while in progress
        ctx.fillStyle = '#f0e8d0';
        ctx.font = '10px Arial';
        ctx.fillText('\u2022', panelX + 6, curY + 10);
        ctx.fillText('Find all the lost explorers', panelX + 18, curY + 10);
        ctx.fillStyle = '#ffdd44';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'right';
        ctx.fillText(`${rescued}/${totalSurvivors}`, panelX + panelW - 6, curY + 10);
        curY += 18;
      } else if (!sideDone) {
        // After rescue quest done, show side quest goal
        ctx.fillStyle = '#f0e8d0';
        ctx.font = '10px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('\u2022', panelX + 6, curY + 10);
        ctx.fillText('Complete 3 side quests', panelX + 18, curY + 10);
        ctx.fillStyle = '#ffdd44';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'right';
        ctx.fillText(`${Math.min(completedSideQuests, sideGoal)}/${sideGoal}`, panelX + panelW - 6, curY + 10);
        curY += 18;
      } else if (!troubledPersonFound) {
        // After both rescue & side quests done, show Find the troubled person
        ctx.fillStyle = '#f0e8d0';
        ctx.font = '10px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('\u2022', panelX + 6, curY + 10);
        ctx.fillText('Find the troubled person', panelX + 18, curY + 10);
        curY += 18;
      } else {
        // After troubled person found, show Find the Mine
        ctx.fillStyle = mineFound ? '#44ff44' : '#f0e8d0';
        ctx.font = '10px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(mineFound ? '\u2713' : '\u2022', panelX + 6, curY + 10);
        ctx.fillText('Find the Mine', panelX + 18, curY + 10);
        curY += 18;
      }

      // Divider
      ctx.strokeStyle = 'rgba(138,122,80,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(panelX + 8, curY);
      ctx.lineTo(panelX + panelW - 8, curY);
      ctx.stroke();
      curY += 6;

      // --- SIDE QUESTS ---
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 10px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('SIDE QUESTS', panelX + 6, curY + 10);
      curY += 16;

      if (visibleQuests.length === 0) {
        ctx.fillStyle = '#888';
        ctx.font = '10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('No side quests', panelX + panelW / 2, curY + 6);
      } else {
        for (let i = 0; i < visibleQuests.length; i++) {
          let q = visibleQuests[i];
          let rowY = curY + i * 34;
          ctx.fillStyle = q.done ? '#44ff44' : '#f0e8d0';
          ctx.font = '10px Arial';
          ctx.textAlign = 'left';
          ctx.fillText(q.done ? '\u2713' : '\u2022', panelX + 6, rowY + 4);
          ctx.fillText(q.desc, panelX + 18, rowY + 4);
          ctx.fillStyle = q.done ? '#44ff44' : '#ffdd44';
          ctx.font = 'bold 10px Arial';
          ctx.textAlign = 'right';
          ctx.fillText(`${q.progress}/${q.need}`, panelX + panelW - 6, rowY + 4);
          ctx.fillStyle = '#aa9a60';
          ctx.font = '9px Arial';
          ctx.textAlign = 'left';
          ctx.fillText(`Reward: ${ITEM_TYPES[q.reward].name}`, panelX + 18, rowY + 17);
        }
      }
    }
  }

  // Carrying indicator
  if (followers.length > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(10, canvas.height - 40, 200, 28);
    ctx.fillStyle = '#ffdd44';
    ctx.font = '14px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`Following: ${followers.length} survivor${followers.length > 1 ? 's' : ''} → Village`, 18, canvas.height - 22);
  }

  // Second main quest completion: HELP yell scrolls across screen
  let _sideQuestsCompletedCount = activeQuests.filter(q => q.turned_in).length;
  if (_sideQuestsCompletedCount >= 3 && !helpYellTriggered) {
    helpYellTriggered = true;
    helpYellActive = true;
    helpYellX = -700;
  }
  if (helpYellActive) {
    ctx.save();
    let yellText = 'HEEEEEEEELP!!!';
    ctx.font = 'bold 64px Arial';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    let padX = 26, padY = 18;
    let textW = ctx.measureText(yellText).width;
    let bubW = textW + padX * 2;
    let bubH = 64 + padY * 2;
    let bubX = helpYellX;
    let bubY = canvas.height / 2 - bubH / 2;
    // Bubble body
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.roundRect(bubX, bubY, bubW, bubH, 22);
    ctx.fill();
    ctx.stroke();
    // Bubble tail (pointing down-left)
    ctx.beginPath();
    ctx.moveTo(bubX + 40, bubY + bubH - 1);
    ctx.lineTo(bubX + 22, bubY + bubH + 28);
    ctx.lineTo(bubX + 70, bubY + bubH - 1);
    ctx.closePath();
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.stroke();
    // Cover the seam where tail meets bubble
    ctx.beginPath();
    ctx.moveTo(bubX + 41, bubY + bubH);
    ctx.lineTo(bubX + 69, bubY + bubH);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 5;
    ctx.stroke();
    // Text
    ctx.fillStyle = '#d00000';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    let txX = bubX + padX;
    let txY = bubY + bubH / 2;
    ctx.strokeText(yellText, txX, txY);
    ctx.fillText(yellText, txX, txY);
    ctx.restore();
    if (!paused) helpYellX += 6;
    if (helpYellX > canvas.width + 50) helpYellActive = false;
  }

  // Mine entrance cutscene fade
  if (mineScene.active && mineScene.phase === 'fade') {
    let alpha = 1 - (mineScene.fadeTimer / 60);
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Mine boss arena overlay - dark cave walls around the fight area (drawn AFTER characters)
  if (mineScene.active && (mineScene.phase === 'boss' || mineScene.phase === 'victory')) {
    ctx.save();
    let arenaR = 250;
    let arenaSX = mine.x - camX;
    let arenaSY = mine.y - camY;

    // Fade in from black
    let fadeAlpha = mineScene.fadeIn > 0 ? mineScene.fadeIn / 40 : 0;

    // Tunnel opening is only visible while not sealed
    let tunnelOpen = !mineScene.sealed;
    let tunnelSX = arenaSX - TUNNEL_HALF_W;
    let tunnelSY = arenaSY + arenaR - 6;
    let tunnelW = TUNNEL_HALF_W * 2;
    let tunnelH = TUNNEL_LEN + 26;

    // Dark surrounding - everything outside the arena (and the tunnel if open)
    ctx.fillStyle = '#0a0804';
    ctx.beginPath();
    ctx.rect(0, 0, canvas.width, canvas.height);
    ctx.arc(arenaSX, arenaSY, arenaR + 20, 0, Math.PI * 2, true);
    if (tunnelOpen) {
      ctx.rect(tunnelSX + tunnelW, tunnelSY, -tunnelW, tunnelH); // counter-clockwise for cutout
    }
    ctx.fill();

    // Rocky cave wall ring
    ctx.strokeStyle = '#3a3028';
    ctx.lineWidth = 30;
    ctx.beginPath();
    ctx.arc(arenaSX, arenaSY, arenaR + 8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = '#4a4030';
    ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.arc(arenaSX, arenaSY, arenaR + 20, 0, Math.PI * 2);
    ctx.stroke();

    // Tunnel walls (two vertical rocky strips flanking the opening)
    if (tunnelOpen) {
      // Clear the dark tint from the wall ring where the tunnel crosses it
      ctx.save();
      ctx.beginPath();
      ctx.rect(tunnelSX - 2, tunnelSY - 4, tunnelW + 4, 40);
      ctx.clip();
      ctx.fillStyle = '#0a0804';
      ctx.fillRect(tunnelSX - 2, tunnelSY - 4, tunnelW + 4, 40);
      ctx.restore();
      // Left and right walls of the tunnel
      ctx.fillStyle = '#3a3028';
      ctx.fillRect(tunnelSX - 12, tunnelSY, 12, tunnelH);
      ctx.fillRect(tunnelSX + tunnelW, tunnelSY, 12, tunnelH);
      // Inner wall highlight
      ctx.fillStyle = '#4a4030';
      ctx.fillRect(tunnelSX - 4, tunnelSY, 4, tunnelH);
      ctx.fillRect(tunnelSX + tunnelW, tunnelSY, 4, tunnelH);
      // Cap the far end
      ctx.fillStyle = '#2a2218';
      ctx.fillRect(tunnelSX - 12, tunnelSY + tunnelH, tunnelW + 24, 10);
      // Floor gradient into darkness
      let floorGrad = ctx.createLinearGradient(0, tunnelSY, 0, tunnelSY + tunnelH);
      floorGrad.addColorStop(0, 'rgba(40,30,20,0)');
      floorGrad.addColorStop(1, 'rgba(10,6,2,0.85)');
      ctx.fillStyle = floorGrad;
      ctx.fillRect(tunnelSX, tunnelSY, tunnelW, tunnelH);
    }

    // Sealed boulder (also drawn while falling)
    if (mineScene.sealed || mineScene.boulderFallTimer > 0) {
      let bx = arenaSX;
      let restY = arenaSY + arenaR + 4;
      let by;
      if (mineScene.boulderFallTimer > 0) {
        let t = 1 - (mineScene.boulderFallTimer / mineScene.boulderFallMax);
        t = t * t; // ease-in (gravity)
        by = restY - 220 + 220 * t;
      } else {
        by = restY;
      }
      // Shadow on the tunnel floor
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.beginPath();
      ctx.ellipse(bx, restY + BOULDER_RADIUS * 0.4, BOULDER_RADIUS * 1.05, BOULDER_RADIUS * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();
      // Main stone body
      ctx.fillStyle = '#5c5a54';
      ctx.beginPath();
      ctx.arc(bx, by, BOULDER_RADIUS, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6e6c64';
      ctx.beginPath();
      ctx.arc(bx - 6, by - 6, BOULDER_RADIUS * 0.85, 0, Math.PI * 2);
      ctx.fill();
      // Cracks
      ctx.strokeStyle = 'rgba(0,0,0,0.55)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(bx - 20, by - 10);
      ctx.lineTo(bx - 6, by - 2);
      ctx.lineTo(bx + 12, by - 14);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bx - 14, by + 12);
      ctx.lineTo(bx + 2, by + 6);
      ctx.lineTo(bx + 18, by + 14);
      ctx.stroke();
      // Speckles
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      for (let p = 0; p < 8; p++) {
        let ang = p * 0.78;
        let rr = 10 + (p % 3) * 6;
        ctx.beginPath();
        ctx.arc(bx + Math.cos(ang) * rr, by + Math.sin(ang) * rr, 1.2, 0, Math.PI * 2);
        ctx.fill();
      }
      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.beginPath();
      ctx.ellipse(bx - 12, by - 14, 10, 5, -0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Gold veins on cave walls
    let t = frameNow;
    for (let i = 0; i < 16; i++) {
      let ang = (i / 16) * Math.PI * 2 + 0.3;
      let gx = arenaSX + Math.cos(ang) * (arenaR + 5);
      let gy = arenaSY + Math.sin(ang) * (arenaR + 5);
      let sparkle = Math.sin(t / 400 + i * 1.2) * 0.4 + 0.4;
      ctx.fillStyle = `rgba(200,170,50,${sparkle * 0.6})`;
      ctx.beginPath();
      ctx.arc(gx, gy, 3 + sparkle * 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // Amber aurora radiating from the Amber Wolf
    if (bossWolf && bossWolf.health > 0) {
      let bsx = bossWolf.x - camX, bsy = bossWolf.y - camY;
      let pulse = 0.5 + Math.sin(frameNow / 260) * 0.15;
      let auroraR = 140 + Math.sin(frameNow / 320) * 12;
      let grad = ctx.createRadialGradient(bsx, bsy, 8, bsx, bsy, auroraR);
      grad.addColorStop(0, `rgba(255,210,100,${0.55 * pulse})`);
      grad.addColorStop(0.4, `rgba(240,170,60,${0.32 * pulse})`);
      grad.addColorStop(0.75, `rgba(200,130,40,${0.15 * pulse})`);
      grad.addColorStop(1, 'rgba(120,80,20,0)');
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(bsx, bsy, auroraR, 0, Math.PI * 2);
      ctx.fill();
      // Inner flaring wisps
      for (let i = 0; i < 5; i++) {
        let a = frameNow / 600 + i * (Math.PI * 2 / 5);
        let wr = auroraR * (0.6 + Math.sin(frameNow / 200 + i) * 0.15);
        let wx = bsx + Math.cos(a) * wr;
        let wy = bsy + Math.sin(a) * wr;
        let wg = ctx.createRadialGradient(wx, wy, 0, wx, wy, 38);
        wg.addColorStop(0, `rgba(255,225,140,${0.4 * pulse})`);
        wg.addColorStop(1, 'rgba(255,200,80,0)');
        ctx.fillStyle = wg;
        ctx.beginPath();
        ctx.arc(wx, wy, 38, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    // Amber telegraph circles (red, pulsing) — drawn under everything
    if (bossWolf && bossWolf.amberTelegraphs) {
      for (const tg of bossWolf.amberTelegraphs) {
        let sx = tg.x - camX, sy = tg.y - camY;
        let prog = 1 - (tg.timer / tg.maxTimer);
        let pulse = 0.5 + Math.sin(frameNow / 120) * 0.4;
        // Filled warning
        ctx.fillStyle = `rgba(255,40,40,${0.18 + prog * 0.25 + pulse * 0.05})`;
        ctx.beginPath();
        ctx.ellipse(sx, sy + 4, tg.radius, tg.radius * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        // Dashed rim
        ctx.strokeStyle = `rgba(255,60,40,${0.6 + prog * 0.3})`;
        ctx.lineWidth = 2 + prog * 2;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.ellipse(sx, sy + 4, tg.radius, tg.radius * 0.4, 0, 0, Math.PI * 2);
        ctx.stroke();
        // Contracting inner indicator shows time-to-impact
        ctx.strokeStyle = `rgba(255,120,60,${0.8})`;
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.ellipse(sx, sy + 4, tg.radius * (1 - prog), tg.radius * (1 - prog) * 0.4, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
    // Amber clumps — rising crystal chunks that deal damage
    if (bossWolf && bossWolf.amberClumps) {
      for (const c of bossWolf.amberClumps) {
        let sx = c.x - camX, sy = c.y - camY;
        // Rise animation over the first 15 frames
        let rise = Math.min(1, (c.maxLife - c.life) / 15);
        rise = rise * rise * (3 - 2 * rise); // smoothstep
        let h = c.radius * 1.2 * rise;
        let fade = Math.min(1, c.life / 30);
        // Ground shadow ring
        ctx.fillStyle = `rgba(0,0,0,${0.4 * fade})`;
        ctx.beginPath();
        ctx.ellipse(sx, sy + 6, c.radius * 0.9, c.radius * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
        // Crystal body (layered translucent amber)
        ctx.save();
        ctx.globalAlpha = fade;
        let g = ctx.createLinearGradient(sx, sy - h, sx, sy + 4);
        g.addColorStop(0, '#ffd870');
        g.addColorStop(0.5, '#e89028');
        g.addColorStop(1, '#8a4810');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.moveTo(sx - c.radius * 0.8, sy + 4);
        ctx.quadraticCurveTo(sx - c.radius * 0.5, sy - h * 0.8, sx - c.radius * 0.1, sy - h);
        ctx.lineTo(sx + c.radius * 0.15, sy - h * 0.95);
        ctx.quadraticCurveTo(sx + c.radius * 0.55, sy - h * 0.7, sx + c.radius * 0.8, sy + 4);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#4a2808';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Inner facets
        ctx.strokeStyle = 'rgba(255,240,160,0.7)';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(sx - c.radius * 0.2, sy - h * 0.2);
        ctx.lineTo(sx + c.radius * 0.05, sy - h * 0.9);
        ctx.moveTo(sx - c.radius * 0.5, sy);
        ctx.lineTo(sx - c.radius * 0.1, sy - h * 0.4);
        ctx.moveTo(sx + c.radius * 0.3, sy - h * 0.1);
        ctx.lineTo(sx + c.radius * 0.55, sy - h * 0.55);
        ctx.stroke();
        // Glow halo
        ctx.globalCompositeOperation = 'lighter';
        let gg = ctx.createRadialGradient(sx, sy - h * 0.5, 2, sx, sy - h * 0.5, c.radius * 1.1);
        gg.addColorStop(0, 'rgba(255,200,80,0.35)');
        gg.addColorStop(1, 'rgba(255,160,40,0)');
        ctx.fillStyle = gg;
        ctx.beginPath();
        ctx.arc(sx, sy - h * 0.5, c.radius * 1.1, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }
    // Boss dash effects
    if (bossWolf && bossWolf.health > 0) {
      // Dash trail - amber afterimages
      for (let tr of bossWolf.dashTrail) {
        let alpha = tr.life / 10 * 0.5;
        ctx.fillStyle = `rgba(255,190,80,${alpha})`;
        ctx.beginPath();
        ctx.arc(tr.x - camX, tr.y - camY, 12, 0, Math.PI * 2);
        ctx.fill();
      }
      // Windup telegraph - wolf shakes and shows warning
      if (bossWolf.dashWindup > 0 && !bossWolf.dashing) {
        let bsx = bossWolf.x - camX, bsy = bossWolf.y - camY;
        let intensity = 1 - (bossWolf.dashWindup / 40);
        // Pulsing amber ring around wolf
        let pulseR = 15 + intensity * 10;
        ctx.strokeStyle = `rgba(255,200,70,${0.35 + intensity * 0.5})`;
        ctx.lineWidth = 2 + intensity * 2;
        ctx.beginPath();
        ctx.arc(bsx, bsy, pulseR, 0, Math.PI * 2);
        ctx.stroke();
        // Direction indicator line
        let lineLen = 30 + intensity * 40;
        ctx.strokeStyle = `rgba(255,220,100,${0.25 + intensity * 0.45})`;
        ctx.lineWidth = 3;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(bsx, bsy);
        ctx.lineTo(bsx + bossWolf.dashDx * lineLen, bsy + bossWolf.dashDy * lineLen);
        ctx.stroke();
        ctx.setLineDash([]);
        // "!" warning
        if (bossWolf.dashWindup < 20) {
          ctx.fillStyle = '#ffcc33';
          ctx.font = 'bold 16px Arial';
          ctx.textAlign = 'center';
          ctx.fillText('!', bsx, bsy - 28);
        }
      }
      // Active dash - motion blur effect
      if (bossWolf.dashing) {
        let bsx = bossWolf.x - camX, bsy = bossWolf.y - camY;
        ctx.strokeStyle = 'rgba(255,210,110,0.65)';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(bsx - bossWolf.dashDx * 20, bsy - bossWolf.dashDy * 20);
        ctx.lineTo(bsx, bsy);
        ctx.stroke();
      }
      // Stunned effect - stars circling above head
      if (bossWolf.stunned) {
        let bsx = bossWolf.x - camX, bsy = bossWolf.y - camY;
        let st = frameNow / 200;
        for (let i = 0; i < 3; i++) {
          let ang = st + (i / 3) * Math.PI * 2;
          let sx = bsx + Math.cos(ang) * 14;
          let sy = bsy - 28 + Math.sin(ang) * 5;
          ctx.fillStyle = '#ffdd44';
          ctx.font = '10px Arial';
          ctx.textAlign = 'center';
          ctx.fillText('\u2605', sx, sy);
        }
      }
      // Scratch claw marks
      for (let sm of bossWolf.scratchMarks) {
        let sx = sm.x - camX, sy = sm.y - camY;
        let alpha = Math.min(sm.life / 15, 1);
        let len = 14;
        let dx = Math.cos(sm.angle) * len;
        let dy = Math.sin(sm.angle) * len;
        ctx.strokeStyle = `rgba(255,200,80,${alpha * 0.9})`;
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(sx - dx, sy - dy);
        ctx.lineTo(sx + dx, sy + dy);
        ctx.stroke();
        // Glow
        ctx.strokeStyle = `rgba(255,230,140,${alpha * 0.45})`;
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(sx - dx, sy - dy);
        ctx.lineTo(sx + dx, sy + dy);
        ctx.stroke();
      }
    }

    // Crumble rubble mound where the boss fell
    if (mineScene.crumbleTimer > 0) {
      let cxs = mineScene.crumbleX - camX;
      let cys = mineScene.crumbleY - camY;
      let crumblePct = mineScene.crumbleTimer / 70;
      let rr = mineScene.crumbleS * 0.5 * crumblePct;
      if (rr > 2) {
        ctx.fillStyle = `rgba(58,58,66,${0.6 * crumblePct})`;
        ctx.beginPath();
        ctx.ellipse(cxs, cys, rr * 1.2, rr * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = `rgba(107,107,116,${0.7 * crumblePct})`;
        ctx.beginPath();
        ctx.ellipse(cxs, cys - rr * 0.15, rr, rr * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Stone-dust particles (spawn puffs + crumble debris)
    for (const pp of mineScene.particles) {
      let alpha = Math.min(pp.life / 25, 1);
      ctx.fillStyle = `rgba(${pp.shade},${pp.shade},${pp.shade + 8},${alpha})`;
      ctx.beginPath();
      ctx.arc(pp.x - camX, pp.y - camY, pp.size, 0, Math.PI * 2);
      ctx.fill();
    }

    // "BOSS" label
    if (bossWolf && bossWolf.health > 0) {
      // Boss health bar at top of screen
      let bhbW = 200, bhbH = 14;
      let bhbX = canvas.width / 2 - bhbW / 2, bhbY = 30;
      let flashP = bossBarFlash / 45;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(bhbX - 4, bhbY - 20, bhbW + 8, bhbH + 26);
      // Enrage flash overlay
      if (flashP > 0) {
        ctx.fillStyle = `rgba(255,200,70,${flashP * 0.7})`;
        ctx.fillRect(bhbX - 4, bhbY - 20, bhbW + 8, bhbH + 26);
      }
      ctx.fillStyle = flashP > 0 ? '#fff5b0' : '#f5c040';
      ctx.font = 'bold 12px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('AMBER WOLF', canvas.width / 2, bhbY - 6);
      ctx.fillStyle = '#332a10';
      ctx.fillRect(bhbX, bhbY, bhbW, bhbH);
      let bossPct = bossWolf.health / bossWolf.maxHealth;
      ctx.fillStyle = bossPct > 0.5 ? '#f5b020' : bossPct > 0.25 ? '#f08030' : '#ffcc40';
      ctx.fillRect(bhbX, bhbY, bhbW * bossPct, bhbH);
      ctx.strokeStyle = flashP > 0 ? '#ffdd55' : '#888';
      ctx.lineWidth = flashP > 0 ? 2 : 1;
      ctx.strokeRect(bhbX, bhbY, bhbW, bhbH);
    }

    // Fade from black overlay
    if (fadeAlpha > 0) {
      ctx.fillStyle = `rgba(0,0,0,${fadeAlpha})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    ctx.restore();
  }

  // Victory fade out
  if (mineScene.active && mineScene.phase === 'victory_fade') {
    let alpha = 1 - (mineScene.fadeTimer / 60);
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Win check - fire once when every goal is complete
  if (!gameWon) {
    let _rescuedAll = village.population >= totalSurvivors && totalSurvivors > 0;
    let _sideQuestsDone = activeQuests.filter(q => q.turned_in).length >= 3;
    if (_rescuedAll && _sideQuestsDone && troubledPersonFound && mineFound) {
      gameWon = true;
      gameWonFade = 0;
      winStats = {
        explorers: village.population,
        total: totalSurvivors,
        wolves: wolfKillCount,
        buildings: village.buildings.length,
        sideQuests: activeQuests.filter(q => q.turned_in).length
      };
    }
  }

  // Draw arrows
  ctx.save();
  ctx.translate(-camX, -camY);
  for (const a of arrows) {
    let angle = Math.atan2(a.targetY - a.y, a.targetX - a.x);
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(angle);
    // Arrow shaft
    ctx.strokeStyle = '#6a4a20';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.lineTo(6, 0);
    ctx.stroke();
    // Arrow head
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.lineTo(4, -3);
    ctx.lineTo(4, 3);
    ctx.closePath();
    ctx.fill();
    // Fletching
    ctx.fillStyle = '#cc3333';
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.lineTo(-6, -3);
    ctx.lineTo(-5, 0);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.lineTo(-6, 3);
    ctx.lineTo(-5, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();

  // Quest menu
  if (questMenuOpen && questMenuTarget >= 0) {
    let quest = activeQuests.find(q => q.giver === questMenuTarget);
    if (quest) {
      let menuW = 260, menuH = 160;
      let menuX = canvas.width / 2 - menuW / 2;
      let menuY = canvas.height / 2 - menuH / 2;

      // Background
      ctx.fillStyle = 'rgba(0,0,0,0.85)';
      ctx.beginPath();
      ctx.roundRect(menuX, menuY, menuW, menuH, 8);
      ctx.fill();
      ctx.strokeStyle = '#8a6a3a';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Title
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 15px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Quest', menuX + menuW / 2, menuY + 22);

      // Close X
      ctx.fillStyle = '#cc4444';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('X', menuX + menuW - 15, menuY + 18);

      // Quest description
      ctx.fillStyle = '#fff';
      ctx.font = '13px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(quest.desc, menuX + menuW / 2, menuY + 48);

      // Progress bar
      let pbX = menuX + 20, pbY = menuY + 60, pbW = menuW - 40, pbH = 14;
      ctx.fillStyle = '#333';
      ctx.fillRect(pbX, pbY, pbW, pbH);
      let pct = Math.min(quest.progress / quest.need, 1);
      ctx.fillStyle = quest.done ? '#44cc44' : '#cc8833';
      ctx.fillRect(pbX, pbY, pbW * pct, pbH);
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.strokeRect(pbX, pbY, pbW, pbH);
      ctx.fillStyle = '#fff';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(`${quest.progress} / ${quest.need}`, pbX + pbW / 2, pbY + 11);

      // Reward info
      ctx.fillStyle = '#aaa';
      ctx.font = '11px Arial';
      ctx.fillText(`Reward: ${ITEM_TYPES[quest.reward].name}`, menuX + menuW / 2, menuY + 98);

      // Action button
      let btnX = menuX + menuW / 2 - 50;
      let btnY = menuY + menuH - 40;
      let btnLabel = '';
      let btnColor = '#444';
      if (!quest.accepted) {
        btnLabel = 'Accept';
        btnColor = '#3388cc';
      } else if (quest.done && !quest.turned_in) {
        btnLabel = 'Turn In';
        btnColor = '#44aa44';
      } else if (quest.type === 'gather_food' || quest.type === 'gather_medkit') {
        let itemType = quest.type === 'gather_food' ? 'food' : 'medkit';
        let have = inventory.slots.filter(s => s === itemType).length;
        btnLabel = have > 0 ? `Hand In (have ${have})` : 'Need Items';
        btnColor = have > 0 ? '#aa8833' : '#444';
      } else {
        btnLabel = quest.done ? 'Turn In' : 'In Progress...';
        btnColor = quest.done ? '#44aa44' : '#555';
      }
      ctx.fillStyle = btnColor;
      ctx.beginPath();
      ctx.roundRect(btnX, btnY, 100, 28, 4);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(btnLabel, btnX + 50, btnY + 18);
    }
  }

  // Watchtower menu
  if (watchtowerMenuOpen) {
    let menuW = 220, menuH = 200;
    let menuX = canvas.width / 2 - menuW / 2;
    let menuY = canvas.height / 2 - menuH / 2;

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.beginPath();
    ctx.roundRect(menuX, menuY, menuW, menuH, 8);
    ctx.fill();
    ctx.strokeStyle = '#8a6a3a';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Title
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Watchtower Jobs', menuX + menuW / 2, menuY + 22);

    // Close X
    ctx.fillStyle = '#cc4444';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('X', menuX + menuW - 15, menuY + 18);

    // Available villagers
    let jobKeys = Object.keys(watchtowerJobs);
    let totalAssigned = jobKeys.reduce((s, k) => s + watchtowerJobs[k].assigned, 0);
    let available = village.population - totalAssigned;
    ctx.fillStyle = '#aaa';
    ctx.font = '11px Arial';
    ctx.fillText(`Available: ${available} / ${village.population} villagers`, menuX + menuW / 2, menuY + 38);

    // Job rows
    for (let i = 0; i < jobKeys.length; i++) {
      let job = watchtowerJobs[jobKeys[i]];
      let rowY = menuY + 50 + i * 45;

      // Job name and desc
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px Arial';
      ctx.textAlign = 'left';
      ctx.fillText(job.name, menuX + 10, rowY + 12);
      ctx.fillStyle = '#999';
      ctx.font = '10px Arial';
      ctx.fillText(job.desc, menuX + 10, rowY + 25);

      // Count
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(`${job.assigned}/${job.max}`, menuX + menuW - 65, rowY + 14);

      // Plus button
      ctx.fillStyle = job.assigned < job.max && available > 0 ? '#44aa44' : '#444';
      ctx.beginPath();
      ctx.roundRect(menuX + menuW - 55, rowY + 2, 20, 20, 3);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px Arial';
      ctx.fillText('+', menuX + menuW - 45, rowY + 17);

      // Minus button
      ctx.fillStyle = job.assigned > 0 ? '#aa4444' : '#444';
      ctx.beginPath();
      ctx.roundRect(menuX + menuW - 30, rowY + 2, 20, 20, 3);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillText('-', menuX + menuW - 20, rowY + 17);
    }
  }

  // Game Over screen
  if (gameOver) {
    // Hide mobile controls so player can tap the Try Again button
    if (isMobile) {
      let mc = document.getElementById('mobile-controls');
      if (mc.style.display !== 'none') mc.style.display = 'none';
    }
    if (gameOverFade < 60) gameOverFade++;
    let fade = gameOverFade / 60;

    // Dim overlay + red vignette, fading in
    ctx.fillStyle = `rgba(0,0,0,${0.75 * fade})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    let vg = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, canvas.width/2);
    vg.addColorStop(0, `rgba(80,0,0,${0.35 * fade})`);
    vg.addColorStop(1, `rgba(30,0,0,${0.65 * fade})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Card panel
    let pw = 440, ph = 280;
    let px = canvas.width / 2 - pw / 2;
    let py = canvas.height / 2 - ph / 2;
    ctx.globalAlpha = fade;
    ctx.fillStyle = 'rgba(20,10,10,0.92)';
    ctx.beginPath();
    ctx.roundRect(px, py, pw, ph, 14);
    ctx.fill();
    ctx.strokeStyle = '#8a2222';
    ctx.lineWidth = 3;
    ctx.stroke();

    // GAME OVER title
    ctx.fillStyle = '#ff3a2a';
    ctx.font = 'bold 44px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width/2, py + 58);

    // Cause of death
    ctx.fillStyle = '#ffb0a0';
    ctx.font = 'italic 16px Arial';
    ctx.fillText(deathCause || 'You fell in battle.', canvas.width/2, py + 88);

    // Stats
    let rescuedCount = crashSites.filter(s => s.rescued).reduce((sum, s) => sum + s.survivors, 0);
    ctx.fillStyle = '#e0d8c0';
    ctx.font = '16px Arial';
    ctx.textAlign = 'left';
    let sx = px + 70, sy = py + 130;
    ctx.fillText(`Lost Explorers Found:`, sx, sy);
    ctx.fillText(`Village Population:`, sx, sy + 24);
    ctx.fillText(`Wolves Defeated:`, sx, sy + 48);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ffcc44';
    ctx.fillText(`${rescuedCount} / ${totalSurvivors}`, px + pw - 70, sy);
    ctx.fillText(`${village.population}`, px + pw - 70, sy + 24);
    ctx.fillText(`${wolfKillCount}`, px + pw - 70, sy + 48);

    // Try Again button
    let bw = 180, bh = 44;
    let bx = canvas.width/2 - bw/2;
    let by = py + ph - 64;
    let hover = Math.sin(frameNow / 400) * 0.15 + 0.85;
    ctx.fillStyle = `rgba(180,40,30,${hover})`;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 10);
    ctx.fill();
    ctx.strokeStyle = '#ff9080';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Try Again', canvas.width/2, by + 29);
    ctx.globalAlpha = 1;
  }

  // Win screen
  if (gameWon) {
    if (gameWonFade < 60) gameWonFade++;
    let fade = gameWonFade / 60;

    // Warm gold overlay
    ctx.fillStyle = `rgba(0,0,0,${0.65 * fade})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    let vg = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, canvas.width/2);
    vg.addColorStop(0, `rgba(255,200,70,${0.22 * fade})`);
    vg.addColorStop(1, `rgba(120,70,10,${0.5 * fade})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Sparkle rays (rotating)
    let rays = 12;
    ctx.save();
    ctx.globalAlpha = 0.25 * fade;
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(frameNow / 4000);
    for (let i = 0; i < rays; i++) {
      ctx.rotate((Math.PI * 2) / rays);
      let g = ctx.createLinearGradient(0, 0, canvas.width * 0.6, 0);
      g.addColorStop(0, 'rgba(255,220,120,0.8)');
      g.addColorStop(1, 'rgba(255,220,120,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(0, -8);
      ctx.lineTo(canvas.width * 0.6, -2);
      ctx.lineTo(canvas.width * 0.6, 2);
      ctx.lineTo(0, 8);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // Card panel
    let pw = 480, ph = 320;
    let px = canvas.width / 2 - pw / 2;
    let py = canvas.height / 2 - ph / 2;
    ctx.globalAlpha = fade;
    ctx.fillStyle = 'rgba(30,20,8,0.92)';
    ctx.beginPath();
    ctx.roundRect(px, py, pw, ph, 16);
    ctx.fill();
    ctx.strokeStyle = '#f5c040';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Title
    ctx.fillStyle = '#ffdd55';
    ctx.font = 'bold 44px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('VILLAGE SAVED!', canvas.width/2, py + 62);
    ctx.fillStyle = '#e8c070';
    ctx.font = 'italic 15px Arial';
    ctx.fillText('The jungle is safe, the explorers are home.', canvas.width/2, py + 90);

    // Stats recap
    let sx = px + 90, sy = py + 130;
    ctx.fillStyle = '#f0e0c0';
    ctx.font = '16px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`Explorers Rescued:`, sx, sy);
    ctx.fillText(`Village Population:`, sx, sy + 26);
    ctx.fillText(`Buildings Raised:`, sx, sy + 52);
    ctx.fillText(`Side Quests Complete:`, sx, sy + 78);
    ctx.fillText(`Wolves Defeated:`, sx, sy + 104);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ffdd55';
    ctx.fillText(`${winStats.explorers} / ${winStats.total}`, px + pw - 90, sy);
    ctx.fillText(`${winStats.explorers}`, px + pw - 90, sy + 26);
    ctx.fillText(`${winStats.buildings}`, px + pw - 90, sy + 52);
    ctx.fillText(`${winStats.sideQuests}`, px + pw - 90, sy + 78);
    ctx.fillText(`${winStats.wolves}`, px + pw - 90, sy + 104);

    // Play Again button
    let bw = 200, bh = 46;
    let bx = canvas.width/2 - bw/2;
    let by = py + ph - 64;
    let hover = Math.sin(frameNow / 400) * 0.15 + 0.85;
    ctx.fillStyle = `rgba(200,140,40,${hover})`;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 12);
    ctx.fill();
    ctx.strokeStyle = '#ffdd55';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#fff8d0';
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Play Again', canvas.width/2, by + 30);
    ctx.globalAlpha = 1;
  }
}

// --- SAVE & LOAD ---
function saveGame() {
  let save = {
    player: { x: player.x, y: player.y, health: player.health, facing: player.facing },
    village: { population: village.population, buildings: village.buildings },
    crashSites: crashSites.map(s => ({ rescued: s.rescued })),
    wolves: wolves.map(w => ({ x: w.x, y: w.y, health: w.health, maxHealth: w.maxHealth, pack: w.pack, isAlpha: w.isAlpha, speed: w.speed })),
    inventory: { slots: inventory.slots, selected: inventory.selected },
    worldItems: worldItems.map(i => ({ collected: i.collected })),
    villagePeople: villagePeople.map(vp => ({ x: vp.x, y: vp.y, color: vp.color, wanderAngle: vp.wanderAngle, hasQuest: vp.hasQuest || false, explorer: vp.explorer })),
    speedBoostTimer: speedBoostTimer,
    shieldActive: shieldActive,
    watchtowerJobs: { lookout: watchtowerJobs.lookout.assigned, scout: watchtowerJobs.scout.assigned, archer: watchtowerJobs.archer.assigned },
    activeQuests: activeQuests.map(q => ({ id: q.id, giver: q.giver, desc: q.desc, type: q.type, need: q.need, progress: q.progress, reward: q.reward, done: q.done, turned_in: q.turned_in, accepted: q.accepted })),
    wolfKillCount: wolfKillCount,
    questIdCounter: questIdCounter,
    helpYellTriggered: helpYellTriggered,
    troubledPersonFound: troubledPersonFound,
    troubledPerson: { active: troubledPerson.active, found: troubledPerson.found, following: troubledPerson.following, wolvesSpawned: troubledPerson.wolvesSpawned, x: troubledPerson.x, y: troubledPerson.y },
    mineFound: mineFound,
    mine: { x: mine.x, y: mine.y }
  };
  localStorage.setItem('jungleRescueSave', JSON.stringify(save));
  notify('Game saved!');
}

function loadGame() {
  let data = localStorage.getItem('jungleRescueSave');
  if (!data) return false;
  try {
    let save = JSON.parse(data);
    player.x = save.player.x;
    player.y = save.player.y;
    player.health = save.player.health;
    player.facing = save.player.facing;
    village.population = save.village.population;
    village.buildings = save.village.buildings;
    for (let i = 0; i < crashSites.length && i < save.crashSites.length; i++) {
      crashSites[i].rescued = save.crashSites[i].rescued;
    }
    // Restore wolves
    wolves.length = 0;
    for (const w of save.wolves) {
      wolves.push({
        x: w.x, y: w.y, angle: Math.random() * Math.PI * 2,
        speed: w.speed || 1.2, state: 'wander', attackTimer: 0,
        facing: 'right', health: w.health, maxHealth: w.maxHealth,
        pack: w.pack !== undefined ? w.pack : -1,
        isAlpha: w.isAlpha || false
      });
    }
    inventory.slots = save.inventory.slots;
    inventory.selected = save.inventory.selected;
    for (let i = 0; i < worldItems.length && i < save.worldItems.length; i++) {
      worldItems[i].collected = save.worldItems[i].collected;
    }
    villagePeople.length = 0;
    for (const vp of save.villagePeople) {
      villagePeople.push({ x: vp.x, y: vp.y, color: vp.color, wanderAngle: vp.wanderAngle, hasQuest: vp.hasQuest || false, explorer: vp.explorer || makeExplorerStyle() });
    }
    speedBoostTimer = save.speedBoostTimer || 0;
    shieldActive = save.shieldActive || false;
    if (save.watchtowerJobs) {
      watchtowerJobs.lookout.assigned = save.watchtowerJobs.lookout || 0;
      watchtowerJobs.scout.assigned = save.watchtowerJobs.scout || 0;
      watchtowerJobs.archer.assigned = save.watchtowerJobs.archer || 0;
    }
    // Restore quests
    if (save.activeQuests) {
      activeQuests.length = 0;
      for (const q of save.activeQuests) {
        activeQuests.push({ id: q.id, giver: q.giver, desc: q.desc, type: q.type, need: q.need, progress: q.progress, reward: q.reward, done: q.done, turned_in: q.turned_in, accepted: q.accepted || false });
      }
      wolfKillCount = save.wolfKillCount || 0;
      questIdCounter = save.questIdCounter || 0;
    }
    helpYellTriggered = save.helpYellTriggered || false;
    helpYellActive = false;
    troubledPersonFound = save.troubledPersonFound || false;
    mineFound = save.mineFound || false;
    if (save.mine) {
      mine.x = save.mine.x;
      mine.y = save.mine.y;
    }
    if (save.troubledPerson) {
      troubledPerson.active = save.troubledPerson.active || false;
      troubledPerson.found = save.troubledPerson.found || false;
      troubledPerson.following = save.troubledPerson.following || false;
      troubledPerson.wolvesSpawned = save.troubledPerson.wolvesSpawned || false;
      troubledPerson.x = save.troubledPerson.x || 320;
      troubledPerson.y = save.troubledPerson.y || 320;
    } else {
      troubledPerson.active = false;
      troubledPerson.found = false;
      troubledPerson.following = false;
      troubledPerson.wolvesSpawned = false;
    }
    troubledPerson.whip.active = false;
    troubledPerson.attackTimer = 0;
    troubledPerson.health = troubledPerson.maxHealth;
    troubledPerson.hurtTimer = 0;
    troubledPerson.invincible = 0;
    troubledPerson.speechText = '';
    troubledPerson.speechTimer = 0;
    troubledPerson.speechPhase = 0;
    troubledPerson.speechWaiting = false;
    followers.length = 0;
    player.carrying = 0;
    document.getElementById('rescued').textContent =
      crashSites.filter(s => s.rescued).reduce((sum, s) => sum + s.survivors, 0);
    document.getElementById('village').textContent = village.population;
    return true;
  } catch(e) { return false; }
}

// --- MAIN MENU ---
let inMainMenu = true;
let menuAnimTimer = 0;

function drawMainMenu() {
  menuAnimTimer++;
  let cx = canvas.width / 2;
  let cy = canvas.height / 2;

  // Background - dark jungle gradient
  let bg = ctx.createRadialGradient(cx, cy, 50, cx, cy, 450);
  bg.addColorStop(0, '#1a2e0a');
  bg.addColorStop(1, '#0a1204');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle leaf/vine pattern
  ctx.strokeStyle = 'rgba(40,80,20,0.15)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 12; i++) {
    let vx = (i * 73 + 20) % canvas.width;
    ctx.beginPath();
    ctx.moveTo(vx, 0);
    for (let y = 0; y < canvas.height; y += 20) {
      ctx.lineTo(vx + Math.sin(y * 0.03 + i) * 15, y);
    }
    ctx.stroke();
  }

  // Ground line
  let groundY = cy + 100;
  ctx.fillStyle = '#1a2e0a';
  ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
  ctx.strokeStyle = '#2d5a1e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(canvas.width, groundY);
  ctx.stroke();


  // Game title - top left
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.7)';
  ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2; ctx.shadowBlur = 6;
  ctx.fillStyle = '#ffdd44';
  ctx.font = isMobile ? 'bold 36px Arial' : 'bold 52px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('Jungle Rescue', 30, isMobile ? 50 : 60);
  ctx.fillStyle = '#f0e8d0';
  ctx.font = isMobile ? 'bold 20px Arial' : 'bold 28px Arial';
  ctx.fillText('Village', 32, isMobile ? 76 : 92);
  ctx.restore();

  // Character - to the left of start button, standing on ground
  let charX = cx - (isMobile ? 120 : 150);
  let charY = groundY - 40;
  let charSize = 112;

  // Tips system
  const menuTips = [
    'Watch out for wolf packs!',
    'Find lost explorers and bring\nthem back to the village.',
    'Use the whip to fend\noff wolves.',
    'Village NPCs may have\nquests for you.',
    'Pick up items near\ncrash sites.',
    'Medkits heal 3 HP,\nfood heals 1 HP.',
    'Wolves are scared of\nthe village.',
    'Build up your village\nby rescuing more people.',
  ];
  // Actions(1560) total. Tips show every other cycle.
  // Cycle without tip = 1560, cycle with tip = 1560 + 600 = 2160
  let pairLength = 1560 + 2160;
  let pairPos = menuAnimTimer % pairLength;
  let showingTip = false;
  let loopTimer;
  let tipCycleNum;
  if (pairPos < 1560) {
    loopTimer = pairPos;
    tipCycleNum = Math.floor(menuAnimTimer / pairLength) * 2;
  } else {
    let secondPos = pairPos - 1560;
    if (secondPos < 1560) {
      loopTimer = secondPos;
    } else {
      loopTimer = 1560;
      showingTip = true;
    }
    tipCycleNum = Math.floor(menuAnimTimer / pairLength) * 2 + 1;
  }
  let tipIndex = Math.floor(tipCycleNum / 2) % menuTips.length;
  if (isMobile) showingTip = false;

  // Random action system
  if (!drawMainMenu._action) {
    drawMainMenu._action = 'idle';
    drawMainMenu._actionTimer = 0;
    drawMainMenu._actionDur = 240;
    drawMainMenu._actionPool = ['idle', 'look', 'stand', 'walk', 'whip'];
    drawMainMenu._lastAction = '';
  }
  let ma = drawMainMenu;
  ma._actionTimer++;
  if (ma._actionTimer >= ma._actionDur && !showingTip) {
    // Pick a new random action (avoid repeating the same one)
    let pool = ma._actionPool.filter(a => a !== ma._action);
    ma._lastAction = ma._action;
    ma._action = pool[Math.floor(Math.random() * pool.length)];
    ma._actionTimer = 0;
    let durations = { idle: 240, look: 240, stand: 300, walk: 320, whip: 160 };
    ma._actionDur = durations[ma._action];
  }

  let charFacing = 'right';
  let charMoving = false;
  let isWhipAction = false;

  if (showingTip) {
    charY += Math.sin(menuAnimTimer * 0.03) * 1.5;
  } else if (ma._action === 'idle') {
    charY += Math.sin(menuAnimTimer * 0.03) * 1.5;
  } else if (ma._action === 'look') {
    let lookPhase = ma._actionTimer;
    if (lookPhase < 80) charFacing = 'right';
    else if (lookPhase < 160) charFacing = 'left';
    else charFacing = 'right';
    charY += Math.sin(menuAnimTimer * 0.03) * 1.5;
  } else if (ma._action === 'stand') {
    charY += Math.sin(menuAnimTimer * 0.03) * 1.5;
  } else if (ma._action === 'walk') {
    charMoving = true;
    walkTimer = menuAnimTimer;
    charY += Math.sin(menuAnimTimer * 0.03) * 1;
  } else if (ma._action === 'whip') {
    isWhipAction = true;
    let whipPhase = ma._actionTimer / 2;
    charY += Math.sin(menuAnimTimer * 0.03) * 1;
    drawBean(charX, charY, charSize, '#6b3a1a', 'right', true, false);

    ctx.save();
    ctx.translate(charX, charY);
    let s = charSize;
    let handX = s * 0.28;
    let handY = s * 0.15;
    ctx.strokeStyle = '#3a2008';
    ctx.lineWidth = s * 0.035;
    ctx.lineCap = 'round';
    if (whipPhase < 20) {
      let t = whipPhase / 20;
      ctx.beginPath();
      ctx.moveTo(handX, handY);
      ctx.quadraticCurveTo(handX + s * 0.1, handY - s * 0.2 * t, handX + s * 0.05 + t * s * 0.1, handY - s * 0.35 * t);
      ctx.stroke();
    } else if (whipPhase < 50) {
      let t = (whipPhase - 20) / 30;
      let extend = t * s * 1.8;
      ctx.beginPath();
      ctx.moveTo(handX, handY);
      let wt = whipPhase * 0.5;
      ctx.quadraticCurveTo(handX + extend * 0.3, handY - s * 0.2 + Math.sin(wt) * 4, handX + extend * 0.7, handY - s * 0.1 + Math.sin(wt * 1.3) * 3);
      ctx.stroke();
      if (whipPhase > 25 && whipPhase < 35) {
        let sparkX = handX + extend * 0.7;
        let sparkY = handY - s * 0.1 + Math.sin(wt * 1.3) * 3;
        ctx.fillStyle = '#ffdd44';
        for (let sp = 0; sp < 4; sp++) {
          let sa = Math.random() * Math.PI * 2;
          let sr = 2 + Math.random() * 4;
          ctx.beginPath();
          ctx.arc(sparkX + Math.cos(sa) * sr, sparkY + Math.sin(sa) * sr, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    } else {
      let t = 1 - (whipPhase - 50) / 30;
      let extend = Math.max(0, t) * s * 1.2;
      ctx.beginPath();
      ctx.moveTo(handX, handY);
      ctx.quadraticCurveTo(handX + extend * 0.3, handY + s * 0.05, handX + extend * 0.5, handY + s * 0.1);
      ctx.stroke();
    }
    ctx.restore();
  }

  let inWhipPhase = isWhipAction;
  if (!inWhipPhase) {
    drawBean(charX, charY, charSize, '#6b3a1a', charFacing, true, charMoving);
  }

  // Speech bubble for tips
  if (showingTip) {
    let tip = menuTips[tipIndex];
    let tipLines = tip.split('\n');
    let bubbleW = 180;
    let lineH = 16;
    let bubbleH = 16 + tipLines.length * lineH;
    let bubbleX = charX - bubbleW - 30;
    let bubbleY = charY - charSize * 0.3 - bubbleH / 2;

    // Bubble background
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath();
    ctx.roundRect(bubbleX, bubbleY, bubbleW, bubbleH, 8);
    ctx.fill();
    ctx.strokeStyle = '#8a7a50';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Bubble tail (pointing right toward character)
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath();
    ctx.moveTo(bubbleX + bubbleW, bubbleY + bubbleH / 2 - 6);
    ctx.lineTo(bubbleX + bubbleW + 12, bubbleY + bubbleH / 2 + 2);
    ctx.lineTo(bubbleX + bubbleW, bubbleY + bubbleH / 2 + 8);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#8a7a50';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(bubbleX + bubbleW, bubbleY + bubbleH / 2 - 6);
    ctx.lineTo(bubbleX + bubbleW + 12, bubbleY + bubbleH / 2 + 2);
    ctx.lineTo(bubbleX + bubbleW, bubbleY + bubbleH / 2 + 8);
    ctx.stroke();
    // Cover the tail's left border
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fillRect(bubbleX + bubbleW - 1, bubbleY + bubbleH / 2 - 5, 2, 12);

    // Tip text
    ctx.fillStyle = '#2a2014';
    ctx.font = '12px Arial';
    ctx.textAlign = 'left';
    for (let i = 0; i < tipLines.length; i++) {
      ctx.fillText(tipLines[i], bubbleX + 10, bubbleY + 14 + i * lineH);
    }
  }

  // Start button
  let btnW = 160, btnH = 40;
  let btnX = cx - 10;
  let btnY = groundY - btnH / 2 - 18;

  // Button background - classic embossed style
  let btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  btnGrad.addColorStop(0, '#6a5a3a');
  btnGrad.addColorStop(0.5, '#4a3a20');
  btnGrad.addColorStop(0.51, '#3a2a14');
  btnGrad.addColorStop(1, '#4a3a20');
  ctx.fillStyle = btnGrad;
  ctx.beginPath();
  ctx.roundRect(btnX, btnY, btnW, btnH, 4);
  ctx.fill();
  // Border
  ctx.strokeStyle = '#8a7a50';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Inner highlight
  ctx.strokeStyle = 'rgba(255,255,200,0.15)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.roundRect(btnX + 1, btnY + 1, btnW - 2, btnH - 2, 3);
  ctx.stroke();
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.roundRect(btnX + 2, btnY + btnH + 1, btnW - 4, 4, 2);
  ctx.fill();

  // Button text
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 1; ctx.shadowBlur = 2;
  ctx.fillStyle = '#f0e8d0';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('START', btnX + btnW / 2, btnY + btnH / 2 + 6);
  ctx.restore();

  // Continue button if save exists
  if (localStorage.getItem('jungleRescueSave')) {
    let cBtnY = btnY + btnH + 16;
    let cBtnGrad = ctx.createLinearGradient(btnX, cBtnY, btnX, cBtnY + btnH);
    cBtnGrad.addColorStop(0, '#4a5a3a');
    cBtnGrad.addColorStop(0.5, '#3a4a20');
    cBtnGrad.addColorStop(0.51, '#2a3a14');
    cBtnGrad.addColorStop(1, '#3a4a20');
    ctx.fillStyle = cBtnGrad;
    ctx.beginPath();
    ctx.roundRect(btnX, cBtnY, btnW, btnH, 4);
    ctx.fill();
    ctx.strokeStyle = '#7a8a50';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,200,0.1)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.roundRect(btnX + 1, cBtnY + 1, btnW - 2, btnH - 2, 3);
    ctx.stroke();
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.roundRect(btnX + 2, cBtnY + btnH + 1, btnW - 4, 4, 2);
    ctx.fill();

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 1; ctx.shadowBlur = 2;
    ctx.fillStyle = '#d0e8b0';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('CONTINUE', btnX + btnW / 2, cBtnY + btnH / 2 + 6);
    ctx.restore();
  }

  // Controls panel - under title (hide on mobile)
  {
  let cpW_temp = 210;
  let cpH_est = 32 + (isMobile ? 5 : 7) * 24;
  let cpX = btnX + btnW / 2 - cpW_temp / 2, cpY = btnY - cpH_est - 15;
  let cpW = 210, controls = isMobile ? [
    ['Joystick', 'Move'],
    ['WHIP', 'Whip Attack'],
    ['ITEM', 'Cycle Items'],
    ['USE', 'Use Item'],
    ['Tap', 'Interact'],
  ] : [
    ['WASD / Arrows', 'Move'],
    ['F', 'Whip Attack'],
    ['E', 'Use Item'],
    ['1 - 5', 'Select Item'],
    ['P', 'Pause'],
    ['Esc', 'Exit Fullscreen'],
    ['Click', 'Interact'],
  ];
  let cpH = 32 + controls.length * 24;

  // Panel background
  let cpGrad = ctx.createLinearGradient(cpX, cpY, cpX, cpY + cpH);
  cpGrad.addColorStop(0, 'rgba(50,40,24,0.85)');
  cpGrad.addColorStop(1, 'rgba(35,28,16,0.85)');
  ctx.fillStyle = cpGrad;
  ctx.beginPath();
  ctx.roundRect(cpX, cpY, cpW, cpH, 4);
  ctx.fill();
  ctx.strokeStyle = '#8a7a50';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,200,0.08)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.roundRect(cpX + 1, cpY + 1, cpW - 2, cpH - 2, 3);
  ctx.stroke();

  // Title
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('CONTROLS', cpX + cpW / 2, cpY + 20);

  // Divider
  ctx.strokeStyle = 'rgba(138,122,80,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cpX + 10, cpY + 28);
  ctx.lineTo(cpX + cpW - 10, cpY + 28);
  ctx.stroke();

  // Control rows
  for (let i = 0; i < controls.length; i++) {
    let rowY = cpY + 46 + i * 24;
    // Key
    ctx.fillStyle = '#f0e8d0';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(controls[i][0], cpX + 12, rowY);
    // Action
    ctx.fillStyle = '#aa9a70';
    ctx.font = '11px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(controls[i][1], cpX + cpW - 12, rowY);
  }
  } // end controls panel

  // Store button bounds for click detection
  drawMainMenu._btnX = btnX;
  drawMainMenu._btnY = btnY;
  drawMainMenu._btnW = btnW;
  drawMainMenu._btnH = btnH;
}

canvas.addEventListener('click', function mainMenuClick(e) {
  if (!inMainMenu) return;
  let rect = canvas.getBoundingClientRect();
  let scaleX = canvas.width / rect.width;
  let scaleY = canvas.height / rect.height;
  let mx = (e.clientX - rect.left) * scaleX;
  let my = (e.clientY - rect.top) * scaleY;

  let btnX = drawMainMenu._btnX;
  let btnY = drawMainMenu._btnY;
  let btnW = drawMainMenu._btnW;
  let btnH = drawMainMenu._btnH;
  if (!btnX) return;

  // Start button - begin a fresh new game
  if (mx >= btnX && mx <= btnX + btnW && my >= btnY && my <= btnY + btnH) {
    resetNewGame();
    inMainMenu = false;
    document.getElementById('pause-btn').style.display = '';
    document.getElementById('mute-btn').style.display = '';
    document.getElementById('fs-btn').style.display = '';
    document.getElementById('save-btn').style.display = '';
    if (isMobile) document.getElementById('mobile-controls').style.display = 'flex';
    runTutorialIfNew();
    return;
  }

  // Continue button
  if (localStorage.getItem('jungleRescueSave')) {
    let cBtnY = btnY + btnH + 16;
    if (mx >= btnX && mx <= btnX + btnW && my >= cBtnY && my <= cBtnY + btnH) {
      loadGame();
      notify('Save loaded! Welcome back.');
      inMainMenu = false;
      document.getElementById('pause-btn').style.display = '';
      document.getElementById('mute-btn').style.display = '';
      document.getElementById('fs-btn').style.display = '';
      document.getElementById('save-btn').style.display = '';
      if (isMobile) document.getElementById('mobile-controls').style.display = 'flex';
      return;
    }
  }
});

// --- PAUSE ---
let paused = false;
let gameOver = false;
let gameOverFade = 0;
let deathCause = '';
let gameWon = false;
let gameWonFade = 0;
let winStats = null;
function killPlayer(cause) {
  if (gameOver) return;
  player.health = 0;
  gameOver = true;
  gameOverFade = 0;
  deathCause = cause || 'You fell in battle.';
  followers.length = 0;
  player.carrying = 0;
}
const pauseBtn = document.getElementById('pause-btn');
const pauseOverlay = document.getElementById('pause-overlay');

pauseBtn.addEventListener('click', togglePause);
window.addEventListener('keydown', e => {
  // Advance NPC speech bubble on space
  if (e.key === ' ' && troubledPerson.speechWaiting && troubledPerson.speechTimer > 0) {
    troubledPerson.speechWaiting = false;
    if (troubledPerson.speechPhase === 1) {
      troubledPerson.speechText = "I'll hold them off with my pickaxe!";
      troubledPerson.speechTimer = 9999;
      troubledPerson.speechWaiting = true;
      troubledPerson.speechPhase = 2;
    } else if (troubledPerson.speechPhase === 10) {
      // "Follow me!" dismissed — start walking into the mine
      troubledPerson.speechText = '';
      troubledPerson.speechTimer = 0;
      troubledPerson.speechPhase = 0;
      mineScene.phase = 'enter';
    } else if (troubledPerson.speechPhase === 11) {
      // Victory speech dismissed — fade out and complete
      troubledPerson.speechText = '';
      troubledPerson.speechTimer = 0;
      troubledPerson.speechPhase = 0;
      mineScene.phase = 'victory_fade';
      mineScene.fadeTimer = 60;
    } else {
      troubledPerson.speechText = '';
      troubledPerson.speechTimer = 0;
      troubledPerson.speechPhase = 0;
    }
    return;
  }
  if (e.key === 'Escape' && document.fullscreenElement) {
    document.exitFullscreen();
  } else if (e.key === 'p' || e.key === 'P') togglePause();
  // Hotbar selection (1-5)
  if (e.key >= '1' && e.key <= '5') inventory.selected = parseInt(e.key) - 1;
  // Use item (E key)
  if ((e.key === 'e' || e.key === 'E') && !gameOver && !paused) {
    let item = inventory.slots[inventory.selected];
    if (item) {
      let used = false;
      if (item === 'medkit') {
        if (player.health < player.maxHealth) {
          player.health = Math.min(player.maxHealth, player.health + 3);
          spawnFloater(player.x, player.y - 24, '+3', '#66ff66');
          notify('Used Medkit! +3 HP');
          used = true;
        }
      } else if (item === 'food') {
        if (player.health < player.maxHealth) {
          player.health = Math.min(player.maxHealth, player.health + 1);
          spawnFloater(player.x, player.y - 24, '+1', '#66ff66');
          notify('Ate Food! +1 HP');
          used = true;
        }
      } else if (item === 'speed') {
        speedBoostTimer = 600; // 10 seconds
        notify('Speed Boost activated!');
        used = true;
      } else if (item === 'shield') {
        shieldActive = true;
        notify('Shield activated! Blocks 1 hit');
        used = true;
      }
      if (used) inventory.slots[inventory.selected] = null;
    }
  }
  if ((e.key === 'r' || e.key === 'R') && gameOver) {
    resetNewGame();
  }
});

function resetNewGame() {
  if (isMobile) document.getElementById('mobile-controls').style.display = 'flex';
  player.health = player.maxHealth;
  player.x = WORLD_W / 2;
  player.y = WORLD_H / 2;
  player.hurtTimer = 0;
  player.invincible = 60;
  gameOver = false;
  gameOverFade = 0;
  deathCause = '';
  gameWon = false;
  gameWonFade = 0;
  winStats = null;
  // Reset crash sites
  for (const site of crashSites) { site.rescued = false; }
  followers.length = 0;
  player.carrying = 0;
  villagePeople.length = 0;
  village.population = 0;
  village.buildings.length = 0;
  document.getElementById('rescued').textContent = 0;
  document.getElementById('village').textContent = 0;
  // Reset quests
  activeQuests.length = 0;
  questIdCounter = 0;
  wolfKillCount = 0;
  helpYellTriggered = false;
  helpYellActive = false;
  troubledPersonFound = false;
  mineFound = false;
  mineScene.active = false;
  mineScene.phase = '';
  mineScene.fadeTimer = 0;
  mineScene.fadeIn = 0;
  bossWolf = null;
  troubledPerson.active = false;
  troubledPerson.found = false;
  troubledPerson.following = false;
  troubledPerson.movingFollow = false;
  troubledPerson.wolvesSpawned = false;
  troubledPerson.x = 320;
  troubledPerson.y = 320;
  troubledPerson.facing = 'down';
  troubledPerson.whip.active = false;
  troubledPerson.attackTimer = 0;
  troubledPerson.health = troubledPerson.maxHealth;
  troubledPerson.hurtTimer = 0;
  troubledPerson.invincible = 0;
  troubledPerson.speechText = '';
  troubledPerson.speechTimer = 0;
  troubledPerson.speechPhase = 0;
  troubledPerson.speechWaiting = false;
  questMenuOpen = false;
  questMenuTarget = -1;
  // Reset inventory
  inventory.slots = [null, null, null, null, null];
  inventory.selected = 0;
  speedBoostTimer = 0;
  shieldActive = false;
  for (const item of worldItems) item.collected = false;
  // Scatter wolves away from player and restore health
  for (const wolf of wolves) {
    wolf.x = BORDER + 50 + Math.random() * (WORLD_W - BORDER * 2 - 100);
    wolf.y = BORDER + 50 + Math.random() * (WORLD_H - BORDER * 2 - 100);
    wolf.state = 'wander';
    wolf.health = wolf.maxHealth;
  }
  // Respawn dead wolves (re-add if pack wolves were killed)
  while (wolves.length < 10) {
    let wx = BORDER + 50 + Math.random() * (WORLD_W - BORDER * 2 - 100);
    let wy = BORDER + 50 + Math.random() * (WORLD_H - BORDER * 2 - 100);
    wolves.push({ x: wx, y: wy, angle: Math.random() * Math.PI * 2, speed: 1.2, state: 'wander', attackTimer: 0, facing: 'right', health: 3, maxHealth: 3, pack: -1 });
  }
  // Reset golems — heal + redistribute around mine
  for (const g of golems) {
    g.health = g.maxHealth;
    g.state = 'idle';
    g.attackTimer = 0;
    g.windupTimer = 0;
    g.hurtTimer = 0;
    g.shards.length = 0;
    const ang = Math.random() * Math.PI * 2;
    const rad = 180 + Math.random() * 140;
    g.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, mine.x + Math.cos(ang) * rad));
    g.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, mine.y + Math.sin(ang) * rad));
  }
  // Respawn any dead golems (keep 2)
  while (golems.length < 2) {
    const ang = Math.random() * Math.PI * 2;
    const rad = 180 + Math.random() * 140;
    golems.push({
      x: Math.max(BORDER, Math.min(WORLD_W - BORDER, mine.x + Math.cos(ang) * rad)),
      y: Math.max(BORDER, Math.min(WORLD_H - BORDER, mine.y + Math.sin(ang) * rad)),
      angle: Math.random() * Math.PI * 2, speed: 0.55, state: 'idle',
      attackTimer: 0, windupTimer: 0, facing: 'right',
      health: 7, maxHealth: 7, hurtTimer: 0,
      walkBob: Math.random() * Math.PI * 2, shards: []
    });
  }
}

function playMarimba(freq, when, dur, vol) {
  if (!musicCtx) return;
  const osc = musicCtx.createOscillator();
  const osc2 = musicCtx.createOscillator();
  const gain = musicCtx.createGain();
  osc.type = 'triangle';
  osc2.type = 'sine';
  osc.frequency.value = freq;
  osc2.frequency.value = freq * 2.01;
  const peak = vol != null ? vol : 0.22;
  gain.gain.setValueAtTime(0, when);
  gain.gain.linearRampToValueAtTime(peak, when + 0.004);
  // Short, snappy decay for a marimba/steel-drum pop
  gain.gain.exponentialRampToValueAtTime(0.001, when + Math.min(dur, 0.38));
  osc.connect(gain);
  osc2.connect(gain);
  gain.connect(musicMasterGain);
  osc.start(when);
  osc2.start(when);
  osc.stop(when + dur + 0.1);
  osc2.stop(when + dur + 0.1);
}

// Atmospheric chord pad — triad via three detuned sawtooth oscillators
function playPad(rootFreq, when, dur, minor) {
  if (!musicCtx) return;
  const ratios = minor
    ? [1, 1.1892, 1.4983]  // root, minor third, perfect fifth
    : [1, 1.2599, 1.4983]; // root, major third, perfect fifth
  const gain = musicCtx.createGain();
  const filt = musicCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = 1100;
  filt.Q.value = 0.7;
  gain.gain.setValueAtTime(0, when);
  gain.gain.linearRampToValueAtTime(0.06, when + 0.12);
  gain.gain.linearRampToValueAtTime(0.06, when + dur - 0.12);
  gain.gain.linearRampToValueAtTime(0, when + dur);
  const oscs = [];
  for (let i = 0; i < 3; i++) {
    const osc = musicCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = rootFreq * ratios[i];
    osc.detune.value = (i - 1) * 6;
    osc.connect(filt);
    oscs.push(osc);
  }
  filt.connect(gain).connect(musicMasterGain);
  for (const osc of oscs) {
    osc.start(when);
    osc.stop(when + dur + 0.05);
  }
}

// Boss-intro stinger: timpani roll swelling into a cymbal crash
function playBossStinger() {
  if (!musicCtx) return;
  const now = musicCtx.currentTime;
  // Timpani roll — 24 rapid tom hits with accelerating/growing volume
  const rollDur = 1.4;
  const hits = 28;
  for (let i = 0; i < hits; i++) {
    const t = now + (i / hits) * rollDur;
    const osc = musicCtx.createOscillator();
    const g = musicCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(90, t);
    osc.frequency.exponentialRampToValueAtTime(55, t + 0.14);
    const peak = 0.18 + (i / hits) * 0.22;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(peak, t + 0.003);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    osc.connect(g).connect(musicMasterGain);
    osc.start(t);
    osc.stop(t + 0.22);
  }
  // Cymbal crash — filtered white noise burst
  const crashAt = now + rollDur;
  const bufSize = Math.floor(musicCtx.sampleRate * 1.4);
  const buf = musicCtx.createBuffer(1, bufSize, musicCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  const src = musicCtx.createBufferSource();
  src.buffer = buf;
  const filt = musicCtx.createBiquadFilter();
  filt.type = 'highpass';
  filt.frequency.value = 5000;
  const cg = musicCtx.createGain();
  cg.gain.setValueAtTime(0, crashAt);
  cg.gain.linearRampToValueAtTime(0.45, crashAt + 0.01);
  cg.gain.exponentialRampToValueAtTime(0.001, crashAt + 1.3);
  src.connect(filt).connect(cg).connect(musicMasterGain);
  src.start(crashAt);
  // Low boom under the crash
  const boom = musicCtx.createOscillator();
  const bg = musicCtx.createGain();
  boom.type = 'sine';
  boom.frequency.setValueAtTime(80, crashAt);
  boom.frequency.exponentialRampToValueAtTime(35, crashAt + 0.4);
  bg.gain.setValueAtTime(0, crashAt);
  bg.gain.linearRampToValueAtTime(0.35, crashAt + 0.01);
  bg.gain.exponentialRampToValueAtTime(0.001, crashAt + 0.6);
  boom.connect(bg).connect(musicMasterGain);
  boom.start(crashAt);
  boom.stop(crashAt + 0.7);
}
