  let lft = ctx.createLinearGradient(BORDER - 30, 0, BORDER + 10, 0);
  lft.addColorStop(0, 'rgba(14,53,6,0.6)'); lft.addColorStop(1, 'rgba(14,53,6,0)');
  let rgt = ctx.createLinearGradient(WORLD_W - BORDER + 10, 0, WORLD_W - BORDER - 30, 0);
  rgt.addColorStop(0, 'rgba(14,53,6,0.6)'); rgt.addColorStop(1, 'rgba(14,53,6,0)');
  _borderGrds = { top, bot, lft, rgt };
  return _borderGrds;
}

function draw() {
  let _inBossFight = mineScene.active && (mineScene.phase === 'boss' || mineScene.phase === 'victory' || mineScene.phase === 'victory_fade');
  let _hideTrees = _inBossFight;
  // Viewport bounds for culling (skip drawing off-screen objects)
  let vpL = camX - 60, vpR = camX + canvas.width + 60;
  let vpT = camY - 60, vpB = camY + canvas.height + 60;

  // Jungle background (cave floor during boss fight)
  if (_inBossFight) {
    ctx.fillStyle = '#1a1610';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  } else {
    ctx.fillStyle = '#1a4d0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // Grass variation (hidden during boss fight)
  if (!_inBossFight) {
  ctx.fillStyle = '#1e5a0e';
  for (let gx = -camX % 50; gx < canvas.width; gx += 50) {
    for (let gy = -camY % 50; gy < canvas.height; gy += 50) {
      if ((Math.floor((gx + camX)/50) + Math.floor((gy + camY)/50)) % 2 === 0) {
        ctx.fillRect(gx, gy, 50, 50);
      }
    }
  }
  } // end grass boss fight hide



  ctx.save();
  ctx.translate(-camX, -camY);

  // Dense border forest - extends far beyond map edges so it looks infinite
  if (!_inBossFight) {
  ctx.fillStyle = '#0e3506';
  let ext = 2000; // extension beyond map
  ctx.fillRect(-ext, -ext, WORLD_W + ext * 2, BORDER + ext); // top
  ctx.fillRect(-ext, WORLD_H - BORDER, WORLD_W + ext * 2, BORDER + ext); // bottom
  ctx.fillRect(-ext, -ext, BORDER + ext, WORLD_H + ext * 2); // left
  ctx.fillRect(WORLD_W - BORDER, -ext, BORDER + ext, WORLD_H + ext * 2); // right
  }

  // Border trees - dense packed canopies (hidden during boss fight)
  if (!_hideTrees)
  for (const bt of borderTrees) {
    if (bt.x < vpL || bt.x > vpR || bt.y < vpT || bt.y > vpB) continue;
    // Trunk
    ctx.fillStyle = '#3a2510';
    ctx.fillRect(bt.x - 2, bt.y, 4, 8);
    // Dense canopy
    ctx.fillStyle = bt.shade;
    ctx.beginPath();
    ctx.arc(bt.x, bt.y - 3, bt.size * 0.5, 0, Math.PI * 2);
    ctx.fill();
    // Darker overlay for depth
    ctx.fillStyle = 'rgba(0,20,0,0.15)';
    ctx.beginPath();
    ctx.arc(bt.x + 2, bt.y - 1, bt.size * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Fade edge between border and playable area (cached gradients)
  if (!_inBossFight) {
  let bg = getBorderGradients();
  ctx.fillStyle = bg.top;
  ctx.fillRect(0, BORDER - 30, WORLD_W, 40);
  ctx.fillStyle = bg.bot;
  ctx.fillRect(0, WORLD_H - BORDER - 30, WORLD_W, 40);
  ctx.fillStyle = bg.lft;
  ctx.fillRect(BORDER - 30, 0, 40, WORLD_H);
  ctx.fillStyle = bg.rgt;
  ctx.fillRect(WORLD_W - BORDER - 30, 0, 40, WORLD_H);
  }

  // Rivers (hidden during boss fight)
  if (!_inBossFight)
  for (const river of rivers) {
    if (river.length < 2) continue;

    // River bank (slightly wider, darker)
    ctx.strokeStyle = '#2a4a10';
    ctx.lineWidth = RIVER_WIDTH + 8;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(river[0].x, river[0].y);
    for (let i = 1; i < river.length; i++) {
      let prev = river[i - 1];
      let cur = river[i];
      let mx = (prev.x + cur.x) / 2;
      let my = (prev.y + cur.y) / 2;
      ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
    }
    ctx.stroke();

    // Main water
    ctx.strokeStyle = '#1a6aaa';
    ctx.lineWidth = RIVER_WIDTH;
    ctx.beginPath();
    ctx.moveTo(river[0].x, river[0].y);
    for (let i = 1; i < river.length; i++) {
      let prev = river[i - 1];
      let cur = river[i];
      let mx = (prev.x + cur.x) / 2;
      let my = (prev.y + cur.y) / 2;
      ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
    }
    ctx.stroke();

    // Lighter center (shallow water look)
    ctx.strokeStyle = 'rgba(60,160,220,0.4)';
    ctx.lineWidth = RIVER_WIDTH * 0.5;
    ctx.beginPath();
    ctx.moveTo(river[0].x, river[0].y);
    for (let i = 1; i < river.length; i++) {
      let prev = river[i - 1];
      let cur = river[i];
      let mx = (prev.x + cur.x) / 2;
      let my = (prev.y + cur.y) / 2;
      ctx.quadraticCurveTo(prev.x, prev.y, mx, my);
    }
    ctx.stroke();

    // Animated water shimmer
    let wt = frameNow / 600;
    ctx.strokeStyle = 'rgba(150,220,255,0.15)';
    ctx.lineWidth = 2;
    for (let i = 1; i < river.length - 1; i += 2) {
      let p = river[i];
      let shimX = Math.sin(wt + i) * 4;
      ctx.beginPath();
      ctx.moveTo(p.x + shimX - 6, p.y);
      ctx.lineTo(p.x + shimX + 6, p.y);
      ctx.stroke();
    }
  }

  // Bridges (hidden during boss fight)
  if (!_inBossFight)
  for (const br of bridges) {
    ctx.save();
    ctx.translate(br.x, br.y);
    ctx.rotate(br.angle - Math.PI / 2);

    // Bridge shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(0, 2, br.w / 2 + 2, br.h / 2 + 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Side rails
    ctx.fillStyle = '#5a3a15';
    ctx.fillRect(-br.w / 2, -br.h / 2 - 2, br.w, 3);
    ctx.fillRect(-br.w / 2, br.h / 2 - 1, br.w, 3);

    // Planks
    let plankCount = 7;
    let plankGap = br.w / (plankCount + 1);
    for (let p = 1; p <= plankCount; p++) {
      let px = -br.w / 2 + p * plankGap;
      let dark = p % 2 === 0;
      ctx.fillStyle = dark ? '#8a6a3a' : '#9a7a4a';
      ctx.fillRect(px - 2.5, -br.h / 2, 5, br.h);
      // Plank grain
      ctx.strokeStyle = 'rgba(60,40,10,0.15)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(px, -br.h / 2 + 2);
      ctx.lineTo(px, br.h / 2 - 2);
      ctx.stroke();
    }

    // Rail posts
    ctx.fillStyle = '#4a2a10';
    ctx.fillRect(-br.w / 2 + 1, -br.h / 2 - 5, 4, 6);
    ctx.fillRect(br.w / 2 - 5, -br.h / 2 - 5, 4, 6);
    ctx.fillRect(-br.w / 2 + 1, br.h / 2 - 1, 4, 6);
    ctx.fillRect(br.w / 2 - 5, br.h / 2 - 1, 4, 6);

    // Top rope/rail
    ctx.strokeStyle = '#6a4a20';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-br.w / 2 + 3, -br.h / 2 - 4);
    ctx.quadraticCurveTo(0, -br.h / 2 - 1, br.w / 2 - 3, -br.h / 2 - 4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-br.w / 2 + 3, br.h / 2 + 4);
    ctx.quadraticCurveTo(0, br.h / 2 + 1, br.w / 2 - 3, br.h / 2 + 4);
    ctx.stroke();

    ctx.restore();
  }

  if (!inMainMenu && !_inBossFight) {
  // Village area
  ctx.fillStyle = 'rgba(80, 180, 60, 0.3)';
  ctx.fillRect(village.x, village.y, village.w, village.h);
  ctx.strokeStyle = '#5a5';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 4]);
  ctx.strokeRect(village.x, village.y, village.w, village.h);
  ctx.setLineDash([]);

  // Village label
  ctx.fillStyle = '#aaffaa';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('VILLAGE', village.x + village.w/2, village.y - 8);

  // Village buildings
  for (const b of village.buildings) {
    if (b.name === 'Campfire') {
      let cx = b.x + b.w / 2;
      let cy = b.y + b.h / 2;
      let t = frameNow / 100;

      // Glow on ground
      ctx.fillStyle = 'rgba(255,150,30,0.15)';
      ctx.beginPath();
      ctx.arc(cx, cy + 4, 22 + Math.sin(t * 0.7) * 3, 0, Math.PI * 2);
      ctx.fill();

      // Ring of stones
      for (let i = 0; i < 8; i++) {
        let angle = (i / 8) * Math.PI * 2;
        let sx = cx + Math.cos(angle) * 12;
        let sy = cy + 3 + Math.sin(angle) * 7;
        ctx.fillStyle = i % 2 === 0 ? '#666' : '#555';
        ctx.beginPath();
        ctx.ellipse(sx, sy, 4, 3, angle, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }

      // Logs
      ctx.strokeStyle = '#5a3a1a';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx - 8, cy + 5);
      ctx.lineTo(cx + 6, cy - 1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + 8, cy + 5);
      ctx.lineTo(cx - 5, cy - 1);
      ctx.stroke();
      ctx.strokeStyle = '#4a2a10';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx - 2, cy + 6);
      ctx.lineTo(cx + 1, cy - 3);
      ctx.stroke();

      // Embers at base
      ctx.fillStyle = 'rgba(255,80,0,0.6)';
      ctx.beginPath();
      ctx.ellipse(cx, cy + 2, 6, 3, 0, 0, Math.PI * 2);
      ctx.fill();

      // Flames - multiple flickering layers
      // Outer flame
      ctx.fillStyle = `rgba(255,${80 + Math.sin(t * 1.3) * 30},0,0.7)`;
      ctx.beginPath();
      ctx.moveTo(cx - 7, cy + 2);
      ctx.quadraticCurveTo(cx - 8, cy - 10 + Math.sin(t * 1.1) * 3, cx - 2, cy - 18 + Math.sin(t * 0.9) * 4);
      ctx.quadraticCurveTo(cx, cy - 12, cx + 2, cy - 20 + Math.sin(t * 1.4) * 3);
      ctx.quadraticCurveTo(cx + 8, cy - 8 + Math.sin(t * 1.2) * 3, cx + 7, cy + 2);
      ctx.closePath();
      ctx.fill();

      // Mid flame
      ctx.fillStyle = `rgba(255,${160 + Math.sin(t * 1.5) * 30},0,0.8)`;
      ctx.beginPath();
      ctx.moveTo(cx - 5, cy + 1);
      ctx.quadraticCurveTo(cx - 5, cy - 7 + Math.sin(t * 1.6) * 2, cx - 1, cy - 14 + Math.sin(t * 1.2) * 3);
      ctx.quadraticCurveTo(cx + 1, cy - 8, cx + 1, cy - 15 + Math.sin(t * 0.8) * 3);
      ctx.quadraticCurveTo(cx + 5, cy - 6 + Math.sin(t * 1.3) * 2, cx + 5, cy + 1);
      ctx.closePath();
      ctx.fill();

      // Inner flame (bright yellow)
      ctx.fillStyle = `rgba(255,255,${100 + Math.sin(t * 2) * 50},0.9)`;
      ctx.beginPath();
      ctx.moveTo(cx - 3, cy + 1);
      ctx.quadraticCurveTo(cx - 2, cy - 5 + Math.sin(t * 1.8) * 2, cx, cy - 10 + Math.sin(t * 1.1) * 2);
      ctx.quadraticCurveTo(cx + 2, cy - 4 + Math.sin(t * 1.5) * 2, cx + 3, cy + 1);
      ctx.closePath();
      ctx.fill();

      // Sparks flying up
      for (let sp = 0; sp < 3; sp++) {
        let sparkT = (t * 0.8 + sp * 40) % 60;
        if (sparkT < 30) {
          let sparkX = cx + Math.sin(sp * 7 + t * 0.3) * 6;
          let sparkY = cy - 15 - sparkT * 0.8;
          let sparkAlpha = 1 - sparkT / 30;
          ctx.fillStyle = `rgba(255,${200 + sp * 20},50,${sparkAlpha})`;
          ctx.beginPath();
          ctx.arc(sparkX, sparkY, 1.2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.fillStyle = '#ddd';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(b.name, cx, cy + b.h / 2 + 14);
    } else if (b.name === 'Hut') {
      let hx = b.x + b.w / 2;
      let hy = b.y + b.h / 2;
      let cw = 48;
      let ch = 36;
      let wallTop = hy - 6;
      let wallBot = hy + ch / 2;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(hx, wallBot + 4, cw / 2 + 4, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Stacked logs (horizontal)
      let logCount = 5;
      let logH = (wallBot - wallTop) / logCount;
      for (let i = 0; i < logCount; i++) {
        let ly = wallTop + i * logH;
        let dark = i % 2 === 0;
        ctx.fillStyle = dark ? '#7a5530' : '#8B6540';
        ctx.beginPath();
        ctx.roundRect(hx - cw / 2, ly, cw, logH + 0.5, 2);
        ctx.fill();
        // Log ends poking out on sides
        ctx.fillStyle = dark ? '#6a4520' : '#7a5530';
        ctx.beginPath();
        ctx.arc(hx - cw / 2 - 2, ly + logH / 2, logH / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(hx + cw / 2 + 2, ly + logH / 2, logH / 2, 0, Math.PI * 2);
        ctx.fill();
        // Wood grain
        ctx.strokeStyle = 'rgba(50,30,10,0.2)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(hx - cw / 2 + 4, ly + logH / 2);
        ctx.lineTo(hx + cw / 2 - 4, ly + logH / 2);
        ctx.stroke();
      }

      // Door
      ctx.fillStyle = '#3a1e08';
      ctx.fillRect(hx - 5, wallTop + logH * 2, 10, logH * 3);
      ctx.strokeStyle = '#5a3a18';
      ctx.lineWidth = 0.8;
      ctx.strokeRect(hx - 5, wallTop + logH * 2, 10, logH * 3);
      ctx.fillStyle = '#aa8844';
      ctx.beginPath();
      ctx.arc(hx + 3, hy + 4, 1, 0, Math.PI * 2);
      ctx.fill();

      // Window
      ctx.fillStyle = '#88bbdd';
      ctx.fillRect(hx + 10, wallTop + logH, 8, 7);
      ctx.strokeStyle = '#5a3a18';
      ctx.lineWidth = 1;
      ctx.strokeRect(hx + 10, wallTop + logH, 8, 7);
      ctx.beginPath();
      ctx.moveTo(hx + 14, wallTop + logH);
      ctx.lineTo(hx + 14, wallTop + logH + 7);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(hx + 10, wallTop + logH + 3.5);
      ctx.lineTo(hx + 18, wallTop + logH + 3.5);
      ctx.stroke();

      // Roof - A-frame
      let roofPeak = wallTop - 14;
      let roofOver = 6;
      ctx.fillStyle = '#5a2a15';
      ctx.beginPath();
      ctx.moveTo(hx, roofPeak);
      ctx.lineTo(hx - cw / 2 - roofOver, wallTop + 2);
      ctx.lineTo(hx + cw / 2 + roofOver, wallTop + 2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#3a1a0a';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Chimney
      ctx.fillStyle = '#666';
      ctx.fillRect(hx + 10, roofPeak - 4, 6, 12);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(hx + 10, roofPeak - 4, 6, 4);
      ctx.strokeRect(hx + 10, roofPeak, 6, 4);
      // Smoke
      let st = frameNow / 800;
      ctx.fillStyle = 'rgba(140,140,140,0.25)';
      ctx.beginPath();
      ctx.arc(hx + 13, roofPeak - 8 + Math.sin(st) * 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(140,140,140,0.12)';
      ctx.beginPath();
      ctx.arc(hx + 14, roofPeak - 14 + Math.sin(st * 0.7) * 2, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#ddd';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Cabin', hx, wallBot + 14);
    } else if (b.name === 'Medical Tent') {
      let mx = b.x + b.w / 2;
      let my = b.y + b.h / 2;
      let tw = 54;
      let th = 36;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath();
      ctx.ellipse(mx, my + th / 2 + 3, tw / 2 + 4, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Support poles (visible at sides)
      ctx.strokeStyle = '#8a8a8a';
      ctx.lineWidth = 2;
      // Left pole
      ctx.beginPath();
      ctx.moveTo(mx - tw / 2 + 2, my + th / 2);
      ctx.lineTo(mx - tw / 2 + 2, my - 8);
      ctx.stroke();
      // Right pole
      ctx.beginPath();
      ctx.moveTo(mx + tw / 2 - 2, my + th / 2);
      ctx.lineTo(mx + tw / 2 - 2, my - 8);
      ctx.stroke();
      // Center pole (taller, creates peak)
      ctx.beginPath();
      ctx.moveTo(mx, my + th / 2);
      ctx.lineTo(mx, my - 18);
      ctx.stroke();

      // Back wall of tent
      ctx.fillStyle = '#e8e0d0';
      ctx.beginPath();
      ctx.moveTo(mx - tw / 2, my + th / 2);
      ctx.lineTo(mx - tw / 2, my - 6);
      ctx.lineTo(mx, my - 16);
      ctx.lineTo(mx + tw / 2, my - 6);
      ctx.lineTo(mx + tw / 2, my + th / 2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#b0a890';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Tent canvas - front face (slightly different shade)
      ctx.fillStyle = '#f0e8d8';
      ctx.beginPath();
      ctx.moveTo(mx - tw / 2, my + th / 2);
      ctx.lineTo(mx - tw / 2, my - 6);
      ctx.lineTo(mx, my - 16);
      ctx.lineTo(mx, my + th / 2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#b0a890';
      ctx.lineWidth = 0.5;
      ctx.stroke();

      // Canvas wrinkle lines
      ctx.strokeStyle = 'rgba(150,140,120,0.3)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(mx - tw / 4, my - 10);
      ctx.lineTo(mx - tw / 4 - 2, my + th / 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mx + tw / 4, my - 10);
      ctx.lineTo(mx + tw / 4 + 2, my + th / 2);
      ctx.stroke();

      // Tent opening (front flap open)
      ctx.fillStyle = '#2a2018';
      ctx.beginPath();
      ctx.moveTo(mx - 8, my + th / 2);
      ctx.lineTo(mx - 6, my);
      ctx.lineTo(mx + 6, my);
      ctx.lineTo(mx + 8, my + th / 2);
      ctx.closePath();
      ctx.fill();

      // Open flap (folded to the side)
      ctx.fillStyle = '#e0d8c8';
      ctx.beginPath();
      ctx.moveTo(mx + 8, my + th / 2);
      ctx.lineTo(mx + 6, my);
      ctx.lineTo(mx + 14, my + 4);
      ctx.lineTo(mx + 14, my + th / 2);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#b0a890';
      ctx.lineWidth = 0.5;
      ctx.stroke();

      // Guy ropes (holding tent down)
      ctx.strokeStyle = '#8a7a60';
      ctx.lineWidth = 0.8;
      ctx.setLineDash([3, 3]);
      // Left rope
      ctx.beginPath();
      ctx.moveTo(mx - tw / 2, my - 6);
      ctx.lineTo(mx - tw / 2 - 10, my + th / 2 + 2);
      ctx.stroke();
      // Right rope
      ctx.beginPath();
      ctx.moveTo(mx + tw / 2, my - 6);
      ctx.lineTo(mx + tw / 2 + 10, my + th / 2 + 2);
      ctx.stroke();
      ctx.setLineDash([]);

      // Rope pegs
      ctx.fillStyle = '#6a5a40';
      ctx.fillRect(mx - tw / 2 - 11, my + th / 2, 3, 4);
      ctx.fillRect(mx + tw / 2 + 9, my + th / 2, 3, 4);

      // Red cross on the tent
      ctx.fillStyle = '#cc2222';
      // Horizontal bar
      ctx.fillRect(mx - 8, my - 11, 16, 5);
      // Vertical bar
      ctx.fillRect(mx - 3, my - 16, 5, 16);

      // Small red cross flag on top
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(mx, my - 16);
      ctx.lineTo(mx, my - 24);
      ctx.stroke();
      // Flag
      ctx.fillStyle = '#fff';
      ctx.fillRect(mx, my - 24, 8, 6);
      ctx.fillStyle = '#cc2222';
      ctx.fillRect(mx + 2, my - 23, 4, 1.5);
      ctx.fillRect(mx + 3, my - 24, 1.5, 4);

      ctx.fillStyle = '#ddd';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Medical', mx, my + th / 2 + 14);
    } else if (b.name === 'Watchtower') {
      let wx = b.x + b.w / 2;
      let wy = b.y + b.h / 2;
      let baseW = 26;
      let topW = 18;
      let towerH = 55;
      let platY = wy - towerH + 15;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(wx, wy + 5, 16, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Four legs (tapered)
      ctx.strokeStyle = '#5a3a15';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      // Back legs
      ctx.beginPath();
      ctx.moveTo(wx - baseW / 2, wy + 3);
      ctx.lineTo(wx - topW / 2 + 1, platY + 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(wx + baseW / 2, wy + 3);
      ctx.lineTo(wx + topW / 2 - 1, platY + 2);
      ctx.stroke();
      // Front legs
      ctx.strokeStyle = '#4a2a0a';
      ctx.beginPath();
      ctx.moveTo(wx - baseW / 2 + 4, wy + 3);
      ctx.lineTo(wx - topW / 2 + 3, platY + 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(wx + baseW / 2 - 4, wy + 3);
      ctx.lineTo(wx + topW / 2 - 3, platY + 2);
      ctx.stroke();

      // Cross braces
      ctx.strokeStyle = '#5a3a15';
      ctx.lineWidth = 1.5;
      // X brace lower
      let midY1 = wy - towerH * 0.25 + 10;
      let midW1 = baseW / 2 - (baseW - topW) / 2 * 0.25;
      ctx.beginPath();
      ctx.moveTo(wx - midW1, midY1 + 8);
      ctx.lineTo(wx + midW1 - 2, midY1 - 8);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(wx + midW1, midY1 + 8);
      ctx.lineTo(wx - midW1 + 2, midY1 - 8);
      ctx.stroke();
      // X brace upper
      let midY2 = wy - towerH * 0.55 + 10;
      let midW2 = topW / 2 + 2;
      ctx.beginPath();
      ctx.moveTo(wx - midW2, midY2 + 6);
      ctx.lineTo(wx + midW2 - 2, midY2 - 6);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(wx + midW2, midY2 + 6);
      ctx.lineTo(wx - midW2 + 2, midY2 - 6);
      ctx.stroke();

      // Ladder rungs
      ctx.strokeStyle = '#6a4a25';
      ctx.lineWidth = 1;
      for (let r = 0; r < 7; r++) {
        let ry = wy - r * (towerH - 15) / 7;
        let rw = baseW / 2 - (baseW - topW) / 2 * (r / 7) - 6;
        ctx.beginPath();
        ctx.moveTo(wx - 2, ry);
        ctx.lineTo(wx + 2, ry);
        ctx.stroke();
      }
      // Ladder side rails
      ctx.strokeStyle = '#5a3a15';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(wx - 2, wy + 3);
      ctx.lineTo(wx - 1, platY + 5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(wx + 2, wy + 3);
      ctx.lineTo(wx + 1, platY + 5);
      ctx.stroke();

      // Platform
      ctx.fillStyle = '#7a5a30';
      ctx.fillRect(wx - topW / 2 - 4, platY, topW + 8, 4);
      // Platform planks
      ctx.strokeStyle = '#5a3a15';
      ctx.lineWidth = 0.5;
      for (let p = 0; p < 5; p++) {
        let px = wx - topW / 2 - 3 + p * (topW + 6) / 4;
        ctx.beginPath();
        ctx.moveTo(px, platY);
        ctx.lineTo(px, platY + 4);
        ctx.stroke();
      }

      // Railing
      ctx.strokeStyle = '#5a3a15';
      ctx.lineWidth = 1.5;
      let railH = 10;
      // Railing posts
      ctx.beginPath();
      ctx.moveTo(wx - topW / 2 - 3, platY);
      ctx.lineTo(wx - topW / 2 - 3, platY - railH);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(wx + topW / 2 + 3, platY);
      ctx.lineTo(wx + topW / 2 + 3, platY - railH);
      ctx.stroke();
      // Top rail
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(wx - topW / 2 - 3, platY - railH);
      ctx.lineTo(wx + topW / 2 + 3, platY - railH);
      ctx.stroke();
      // Mid rail
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(wx - topW / 2 - 3, platY - railH / 2);
      ctx.lineTo(wx + topW / 2 + 3, platY - railH / 2);
      ctx.stroke();

      // Roof - small pointed wooden roof
      ctx.fillStyle = '#5a2a15';
      ctx.beginPath();
      ctx.moveTo(wx, platY - railH - 12);
      ctx.lineTo(wx - topW / 2 - 5, platY - railH + 1);
      ctx.lineTo(wx + topW / 2 + 5, platY - railH + 1);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#3a1a0a';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Flag on top
      ctx.strokeStyle = '#4a2a10';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(wx, platY - railH - 12);
      ctx.lineTo(wx, platY - railH - 22);
      ctx.stroke();
      // Flag cloth
      let ft = frameNow / 300;
      ctx.fillStyle = '#cc3333';
      ctx.beginPath();
      ctx.moveTo(wx, platY - railH - 22);
      ctx.lineTo(wx + 8 + Math.sin(ft) * 1.5, platY - railH - 19);
      ctx.lineTo(wx + 7 + Math.sin(ft + 1) * 1.5, platY - railH - 16);
      ctx.lineTo(wx, platY - railH - 16);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#ddd';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(b.name, wx, wy + 14);
    } else {
      ctx.fillStyle = b.color;
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.fillStyle = b.roofColor;
      ctx.fillRect(b.x - 3, b.y - 6, b.w + 6, 8);
      ctx.fillStyle = '#fff';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(b.name, b.x + b.w/2, b.y + b.h + 12);
    }
  }

  // Village people
  for (let vi = 0; vi < villagePeople.length; vi++) {
    let vp = villagePeople[vi];
    drawBean(vp.x, vp.y, 14, vp.color, 'down', false, true);
    // Quest indicator "!" above NPC
    if (vp.hasQuest) {
      let quest = activeQuests.find(q => q.giver === vi);
      let bob = Math.sin(frameNow / 300) * 2;
      let hasEnoughSupplies = false;
      if (quest && quest.accepted && !quest.done && !quest.turned_in) {
        let itemType = quest.type === 'gather_food' ? 'food' : quest.type === 'gather_medkit' ? 'medkit' : null;
        if (itemType) {
          let have = inventory.slots.filter(s => s === itemType).length;
          hasEnoughSupplies = have >= (quest.need - quest.progress);
        }
      }
      if (quest && (quest.done || hasEnoughSupplies) && !quest.turned_in) {
        // Ready to turn in - green "?"
        ctx.fillStyle = '#44ff44';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('?', vp.x, vp.y - 20 + bob);
      } else if (quest && !quest.accepted && !quest.turned_in) {
        // Has unaccepted quest - yellow "!"
        ctx.fillStyle = '#ffdd00';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('!', vp.x, vp.y - 20 + bob);
      }
    }
  }

  } // end !inMainMenu village block

  // Ground clutter - logs and bushes (hidden during boss fight)
  if (!_inBossFight)
  for (const c of clutter) {
    if (c.x < vpL || c.x > vpR || c.y < vpT || c.y > vpB) continue;
    if (c.type === 'log') {
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.angle);
      let len = c.size * 1.5;
      // Log body
      ctx.fillStyle = '#5a3a18';
      ctx.beginPath();
      ctx.roundRect(-len / 2, -3, len, 6, 3);
      ctx.fill();
      // Bark texture
      ctx.strokeStyle = '#4a2a0a';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(-len / 2 + 3, -1);
      ctx.lineTo(len / 2 - 3, -1);
      ctx.stroke();
      // End grain circles
      ctx.fillStyle = '#7a5a30';
      ctx.beginPath();
      ctx.ellipse(-len / 2, 0, 3, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6a4a20';
      ctx.beginPath();
      ctx.ellipse(len / 2, 0, 3, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Ring on end grain
      ctx.strokeStyle = '#4a2a10';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.arc(-len / 2, 0, 1.5, 0, Math.PI * 2);
      ctx.stroke();
      // Small branch sticking out
      ctx.strokeStyle = '#5a3a18';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(len * 0.15, -3);
      ctx.lineTo(len * 0.2, -8);
      ctx.stroke();
      ctx.restore();
    } else {
      // Bush
      let s = c.size;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.beginPath();
      ctx.ellipse(c.x, c.y + s * 0.2, s * 0.5, s * 0.15, 0, 0, Math.PI * 2);
      ctx.fill();
      // Bush layers
      ctx.fillStyle = c.shade;
      ctx.beginPath();
      ctx.arc(c.x - s * 0.15, c.y - s * 0.05, s * 0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(c.x + s * 0.15, c.y, s * 0.3, 0, Math.PI * 2);
      ctx.fill();
      // Top layer (brighter)
      let r = parseInt(c.shade.slice(4));
      ctx.fillStyle = `rgb(${Math.min(80, r + 15)}, ${parseInt(c.shade.split(',')[1]) + 20}, ${parseInt(c.shade.split(',')[2]) + 10})`;
      ctx.beginPath();
      ctx.arc(c.x, c.y - s * 0.12, s * 0.3, 0, Math.PI * 2);
      ctx.fill();
      // Small flowers/berries on some bushes
      if (c.size > 14) {
        let berryColor = c.x % 3 < 1 ? '#cc3333' : c.x % 3 < 2 ? '#dddd44' : '#dd88cc';
        ctx.fillStyle = berryColor;
        for (let b = 0; b < 3; b++) {
          let bx = c.x + Math.sin(b * 2.5 + c.x) * s * 0.2;
          let by = c.y - s * 0.1 + Math.cos(b * 3 + c.y) * s * 0.15;
          ctx.beginPath();
          ctx.arc(bx, by, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }

  // Trees (behind player) - hidden during boss fight
  if (!_hideTrees)
  for (const tree of trees) {
    let s = tree.size;
    let tx = tree.x, ty = tree.y;
    if (tx < vpL - s || tx > vpR + s || ty < vpT - s || ty > vpB + s) continue;

    if (tree.type === 0) {
      // PALM TREE
      let trunkH = s * 1.3;
      let wind = Math.sin(frameNow / 1800 + tree.sway) * 2.5;
      let curve = s * 0.18 + wind;

      // Shadow on ground
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.beginPath();
      ctx.ellipse(tx + curve * 0.3, ty + 6, s * 0.4, s * 0.1, 0.2, 0, Math.PI * 2);
      ctx.fill();

      // Trunk - textured with gradient
      ctx.lineWidth = s * 0.14;
      ctx.lineCap = 'round';
      // Trunk shadow side
      ctx.strokeStyle = '#5a4020';
      ctx.beginPath();
      ctx.moveTo(tx + 1, ty + 5);
      ctx.quadraticCurveTo(tx + curve + 1, ty - trunkH * 0.5, tx + curve * 0.5 + 1, ty - trunkH);
      ctx.stroke();
      // Main trunk
      ctx.strokeStyle = '#7a6040';
      ctx.beginPath();
      ctx.moveTo(tx, ty + 5);
      ctx.quadraticCurveTo(tx + curve, ty - trunkH * 0.5, tx + curve * 0.5, ty - trunkH);
      ctx.stroke();
      // Trunk rings
      ctx.strokeStyle = '#5a4020';
      ctx.lineWidth = 1;
      for (let seg = 0; seg < 8; seg++) {
        let t = seg / 8;
        let sx = tx + curve * Math.sin(t * Math.PI) * 0.85;
        let sy = ty + 5 - trunkH * t;
        ctx.beginPath();
        ctx.moveTo(sx - s * 0.07, sy);
        ctx.lineTo(sx + s * 0.07, sy);
        ctx.stroke();
      }
      // Highlight on trunk
      ctx.strokeStyle = 'rgba(180,150,100,0.15)';
      ctx.lineWidth = s * 0.04;
      ctx.beginPath();
      ctx.moveTo(tx - 1, ty + 3);
      ctx.quadraticCurveTo(tx + curve - 1, ty - trunkH * 0.5, tx + curve * 0.5 - 1, ty - trunkH);
      ctx.stroke();

      let topX = tx + curve * 0.5;
      let topY = ty - trunkH;

      // Coconut cluster
      ctx.fillStyle = '#6a4a18';
      ctx.beginPath(); ctx.arc(topX - 3, topY + 4, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(topX + 3, topY + 5, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(topX, topY + 6, 2.5, 0, Math.PI * 2); ctx.fill();
      // Coconut highlights
      ctx.fillStyle = 'rgba(255,255,200,0.15)';
      ctx.beginPath(); ctx.arc(topX - 4, topY + 3, 1.5, 0, Math.PI * 2); ctx.fill();

      // Palm fronds - more detailed
      let frondCount = 7;
      for (let f = 0; f < frondCount; f++) {
        let angle = (f / frondCount) * Math.PI * 2 + tree.x * 0.01;
        let frondLen = s * 0.8;
        let droop = 0.25; // how much fronds droop
        let fx = topX + Math.cos(angle) * frondLen;
        let fy = topY + Math.sin(angle) * frondLen * 0.5 + frondLen * droop;
        let midX = topX + Math.cos(angle) * frondLen * 0.45;
        let midY = topY + Math.sin(angle) * frondLen * 0.15 - frondLen * 0.18;

        // Frond spine
        ctx.strokeStyle = '#2a5a0a';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(topX, topY);
        ctx.quadraticCurveTo(midX, midY, fx, fy);
        ctx.stroke();

        // Individual leaflets along spine
        for (let lf = 0.15; lf < 1; lf += 0.1) {
          let lx = topX + (midX - topX) * lf * 2 * Math.min(lf, 0.5) + (fx - topX) * Math.max(0, lf - 0.5) * 2 * 0.5;
          let ly = topY + (midY - topY) * lf * 2 * Math.min(lf, 0.5) + (fy - topY) * Math.max(0, lf - 0.5) * 2 * 0.5;
          let leafLen = s * 0.14 * (1 - lf * 0.5);
          // Two leaves at each point (left and right)
          ctx.fillStyle = lf < 0.5 ? tree.shade : `rgb(${parseInt(tree.shade.slice(4)) + 10}, ${parseInt(tree.shade.split(',')[1]) + 10}, ${parseInt(tree.shade.split(',')[2]) + 5})`;
          ctx.beginPath();
          ctx.ellipse(lx, ly, leafLen, s * 0.03, angle + 0.5 + lf * 0.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(lx, ly, leafLen, s * 0.03, angle - 0.5 - lf * 0.2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

    } else if (tree.type === 1) {
      // BIG JUNGLE TREE
      let trunkH = s * 0.95;
      let wind = Math.sin(frameNow / 2000 + tree.sway) * 1.5;

      // Ground shadow - larger, softer, offset by wind
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.beginPath();
      ctx.ellipse(tx + wind * 0.5, ty + 7, s * 0.55, s * 0.14, 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.beginPath();
      ctx.ellipse(tx + wind, ty + 7, s * 0.7, s * 0.18, 0.1, 0, Math.PI * 2);
      ctx.fill();

      // Buttress roots - spreading, 3D look
      for (let r = 0; r < 5; r++) {
        let ra = (r / 5) * Math.PI * 1.2 - 0.4 + tx * 0.01;
        let rootLen = s * (0.2 + Math.sin(r * 2.1 + tx) * 0.08);
        // Root shadow
        ctx.fillStyle = '#3a2508';
        ctx.beginPath();
        ctx.moveTo(tx + Math.cos(ra) * s * 0.07, ty + 3);
        ctx.quadraticCurveTo(tx + Math.cos(ra) * rootLen * 0.6, ty + 3, tx + Math.cos(ra) * rootLen, ty + 9);
        ctx.lineTo(tx + Math.cos(ra) * rootLen * 0.6, ty + 9);
        ctx.quadraticCurveTo(tx + Math.cos(ra) * rootLen * 0.3, ty + 5, tx + Math.cos(ra) * s * 0.03, ty + 3);
        ctx.closePath();
        ctx.fill();
        // Root main
        ctx.fillStyle = '#4a3010';
        ctx.beginPath();
        ctx.moveTo(tx + Math.cos(ra) * s * 0.06, ty + 2);
        ctx.quadraticCurveTo(tx + Math.cos(ra) * rootLen * 0.6, ty + 1, tx + Math.cos(ra) * rootLen, ty + 8);
        ctx.lineTo(tx + Math.cos(ra) * rootLen * 0.65, ty + 8);
        ctx.quadraticCurveTo(tx + Math.cos(ra) * rootLen * 0.3, ty + 3, tx + Math.cos(ra) * s * 0.03, ty + 2);
        ctx.closePath();
        ctx.fill();
      }

      // Trunk - thick, gnarled, with moss
      let trunkW = s * 0.12;
      // Shadow side
      ctx.fillStyle = '#3a2508';
      ctx.beginPath();
      ctx.moveTo(tx - trunkW + 2, ty + 5);
      ctx.bezierCurveTo(tx - trunkW + 1, ty - trunkH * 0.4, tx - trunkW * 0.7 + 2, ty - trunkH * 0.7, tx - trunkW * 0.6 + wind * 0.3, ty - trunkH);
      ctx.lineTo(tx + trunkW * 0.8 + wind * 0.3, ty - trunkH);
      ctx.bezierCurveTo(tx + trunkW + 1, ty - trunkH * 0.7, tx + trunkW + 2, ty - trunkH * 0.4, tx + trunkW + 2, ty + 5);
      ctx.closePath();
      ctx.fill();
      // Main trunk
      ctx.fillStyle = '#5a3a15';
      ctx.beginPath();
      ctx.moveTo(tx - trunkW, ty + 5);
      ctx.bezierCurveTo(tx - trunkW, ty - trunkH * 0.4, tx - trunkW * 0.7, ty - trunkH * 0.7, tx - trunkW * 0.6 + wind * 0.3, ty - trunkH);
      ctx.lineTo(tx + trunkW * 0.7 + wind * 0.3, ty - trunkH);
      ctx.bezierCurveTo(tx + trunkW, ty - trunkH * 0.7, tx + trunkW, ty - trunkH * 0.4, tx + trunkW, ty + 5);
      ctx.closePath();
      ctx.fill();

      // Bark texture - knots and lines
      ctx.strokeStyle = '#4a2a0a';
      ctx.lineWidth = 0.6;
      for (let b = 0; b < 5; b++) {
        let bx = tx - trunkW * 0.6 + b * trunkW * 0.35;
        let wobble = Math.sin(b * 2.3 + tx) * 1.5;
        ctx.beginPath();
        ctx.bezierCurveTo(bx + wobble, ty + 3, bx - wobble, ty - trunkH * 0.5, bx + wobble * 0.5 + wind * 0.15, ty - trunkH + 4);
        ctx.moveTo(bx, ty + 3);
        ctx.bezierCurveTo(bx + wobble, ty - trunkH * 0.3, bx - wobble, ty - trunkH * 0.6, bx + wind * 0.15, ty - trunkH + 4);
        ctx.stroke();
      }
      // Knots
      ctx.fillStyle = '#3a2208';
      ctx.beginPath(); ctx.ellipse(tx - 1, ty - trunkH * 0.35, 3, 2.5, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#2a1808';
      ctx.beginPath(); ctx.ellipse(tx - 1, ty - trunkH * 0.35, 1.5, 1.2, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#3a2208';
      ctx.beginPath(); ctx.ellipse(tx + 2, ty - trunkH * 0.6, 2, 1.8, -0.2, 0, Math.PI * 2); ctx.fill();

      // Moss patches on trunk
      ctx.fillStyle = 'rgba(50,100,30,0.3)';
      ctx.beginPath(); ctx.ellipse(tx - trunkW * 0.4, ty - trunkH * 0.2, 4, 6, 0.2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(40,90,25,0.25)';
      ctx.beginPath(); ctx.ellipse(tx + trunkW * 0.3, ty - trunkH * 0.5, 3, 5, -0.1, 0, Math.PI * 2); ctx.fill();

      // Bark highlight (light side)
      ctx.strokeStyle = 'rgba(140,110,70,0.15)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(tx - trunkW * 0.5, ty + 3);
      ctx.bezierCurveTo(tx - trunkW * 0.5, ty - trunkH * 0.4, tx - trunkW * 0.3, ty - trunkH * 0.7, tx - trunkW * 0.3 + wind * 0.15, ty - trunkH + 5);
      ctx.stroke();

      // Branches
      ctx.strokeStyle = '#5a3a15';
      ctx.lineWidth = 3.5;
      ctx.lineCap = 'round';
      let bTopX = tx + wind * 0.3;
      let bTopY = ty - trunkH;
      // Branch 1 - right
      ctx.beginPath();
      ctx.moveTo(bTopX + s * 0.04, bTopY + trunkH * 0.15);
      ctx.quadraticCurveTo(bTopX + s * 0.2 + wind, bTopY + trunkH * 0.05, bTopX + s * 0.3 + wind * 1.5, bTopY + trunkH * 0.1);
      ctx.stroke();
      // Branch 2 - left
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(bTopX - s * 0.03, bTopY + trunkH * 0.1);
      ctx.quadraticCurveTo(bTopX - s * 0.18 + wind, bTopY - trunkH * 0.05, bTopX - s * 0.28 + wind * 1.5, bTopY + trunkH * 0.02);
      ctx.stroke();
      // Branch 3 - up-right
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(bTopX, bTopY);
      ctx.quadraticCurveTo(bTopX + s * 0.1 + wind, bTopY - s * 0.15, bTopX + s * 0.15 + wind * 1.5, bTopY - s * 0.12);
      ctx.stroke();

      // Vines - hanging from branches, swaying
      ctx.strokeStyle = '#3a7a20';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(bTopX + s * 0.25 + wind, bTopY + trunkH * 0.08);
      ctx.quadraticCurveTo(bTopX + s * 0.3 + wind * 0.5, ty - trunkH * 0.3, bTopX + s * 0.2 + wind * 0.3, ty + 2);
      ctx.stroke();
      ctx.strokeStyle = '#2a6a15';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(bTopX - s * 0.2 + wind, bTopY + trunkH * 0.01);

    ctx.lineWidth = 2.5;

    ctx.strokeStyle = '#555';

    // Lantern hanging from beam
    ctx.fillStyle = '#8a6a20';
    ctx.fillRect(-3, -16, 6, 3);
    ctx.fillStyle = 'rgba(255,200,50,0.4)';
    ctx.beginPath(); ctx.arc(0, -12, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#dda020';
    ctx.fillRect(-2, -14, 4, 5);
    ctx.strokeStyle = '#8a6a20';
    ctx.lineWidth = 0.7;
    ctx.strokeRect(-2, -14, 4, 5);
    // Lantern glow
    let lanternGlow = Math.sin(frameNow / 500) * 0.15 + 0.35;
    ctx.fillStyle = `rgba(255,180,40,${lanternGlow})`;
    ctx.beginPath(); ctx.arc(0, -12, 10, 0, Math.PI * 2); ctx.fill();

    // Animated gold sparkles in the rock face
    let t = frameNow;
    let sparkles = [
      { x: -17, y: -30, phase: 0 },
      { x: 16, y: -36, phase: 1.5 },
      { x: 32, y: -16, phase: 3 },
      { x: -35, y: -14, phase: 4.5 },
      { x: -5, y: -20, phase: 2.2 },
      { x: 25, y: -30, phase: 5 }
    ];
    for (let sp of sparkles) {
      let brightness = Math.sin(t / 300 + sp.phase) * 0.5 + 0.5;
      if (brightness > 0.6) {
        let sz = (brightness - 0.6) * 5;
        ctx.fillStyle = `rgba(255,225,80,${brightness * 0.9})`;
        ctx.beginPath(); ctx.arc(sp.x, sp.y, sz, 0, Math.PI * 2); ctx.fill();

        ctx.strokeStyle = `rgba(255,235,100,${(brightness - 0.6) * 2})`;

  // Draw item icon helper

      ctx.stroke();

      ctx.moveTo(cx - r * 0.32, cy - r * 0.05);

      ctx.fill();

  // World items
  if (inMainMenu) { /* skip items */ } else
  for (const item of worldItems) {

    ctx.setLineDash([]);
    } // end !inMainMenu detection circle

    let s = wolf.pack === BOSS_PACK_ID ? 48 : wolf.isAlpha ? 28 : 22;
    ctx.save();
    ctx.translate(wolf.x, wolf.y);
    let flip = wolf.facing === 'left' ? -1 : 1;
    ctx.scale(flip, 1);

    let isChasing = wolf.state === 'chase';
    let isAttacking = wolf.attackTimer > 0;
    let t = inMainMenu ? 0 : frameNow;

    // Fur colors
    let furDark, furMain, furLight, furBelly;
    if (wolf.isAlpha) {
      furDark = '#2a2a2a'; furMain = '#3a3a3a'; furLight = '#5a5a5a'; furBelly = '#706860';
    } else {
      furDark = '#4a4a4a'; furMain = '#6a6a6a'; furLight = '#8a8a8a'; furBelly = '#a09890';
    }
    if (isAttacking) { furDark = '#5a2a2a'; furMain = '#7a3a3a'; }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.ellipse(0, s * 0.38, s * 0.5, s * 0.08, 0, 0, Math.PI * 2);
    ctx.fill();

    // Leg animation
    let legSpeed = isChasing ? 80 : 200;
    let legAmp = isChasing ? 6 : 3;
    let ls = Math.sin(t / legSpeed + wolf.x) * legAmp;

    // --- BACK LEGS (behind body) ---
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round';
    // Back-left leg: upper + lower
    ctx.strokeStyle = furDark;
    ctx.beginPath();
    ctx.moveTo(-s * 0.2, s * 0.08);
    ctx.lineTo(-s * 0.25 + ls * 0.5, s * 0.22);
    ctx.lineTo(-s * 0.22 + ls, s * 0.35);
    ctx.stroke();
    // Paw
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.ellipse(-s * 0.22 + ls, s * 0.36, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Back-right leg
    ctx.beginPath();
    ctx.moveTo(-s * 0.12, s * 0.08);
    ctx.lineTo(-s * 0.15 - ls * 0.5, s * 0.22);
    ctx.lineTo(-s * 0.13 - ls, s * 0.35);
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(-s * 0.13 - ls, s * 0.36, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // --- FRONT LEGS ---
    // Front-left leg
    ctx.strokeStyle = furMain;
    ctx.beginPath();
    ctx.moveTo(s * 0.18, s * 0.08);
    ctx.lineTo(s * 0.2 - ls * 0.5, s * 0.22);
    ctx.lineTo(s * 0.18 - ls, s * 0.35);
    ctx.stroke();
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.ellipse(s * 0.18 - ls, s * 0.36, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Front-right leg
    ctx.beginPath();
    ctx.moveTo(s * 0.25, s * 0.08);
    ctx.lineTo(s * 0.28 + ls * 0.5, s * 0.22);
    ctx.lineTo(s * 0.26 + ls, s * 0.35);
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(s * 0.26 + ls, s * 0.36, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // --- BODY ---
    // Main body shape
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.4, s * 0.16, 0, 0, Math.PI * 2);
    ctx.fill();
    // Back hump / shoulder
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.ellipse(s * 0.1, -s * 0.06, s * 0.18, s * 0.1, -0.2, 0, Math.PI * 2);
    ctx.fill();
    // Belly (lighter)
    ctx.fillStyle = furBelly;
    ctx.beginPath();
    ctx.ellipse(s * 0.02, s * 0.06, s * 0.25, s * 0.07, 0, 0, Math.PI);
    ctx.fill();
    // Fur texture lines on body
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = 0.5;
    for (let f = -3; f <= 3; f++) {
      ctx.beginPath();
      ctx.moveTo(f * s * 0.08, -s * 0.08);
      ctx.lineTo(f * s * 0.08 - 1, s * 0.05);
      ctx.stroke();
    }

    // --- TAIL --- bushy with fur detail
    ctx.lineWidth = 1;
    let tailWag = Math.sin(t / (isChasing ? 120 : 300) + wolf.y) * (isChasing ? 5 : 3);
    let tailTipX = -s * 0.55;
    let tailTipY = -s * 0.18 + tailWag;
    let tailMidX = -s * 0.42;
    let tailMidY = -s * 0.22 + tailWag * 0.6;
    // Bushy tail shape
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.moveTo(-s * 0.3, 0);
    ctx.quadraticCurveTo(tailMidX - 3, tailMidY + 5, tailTipX, tailTipY + 3);
    ctx.quadraticCurveTo(tailTipX - 3, tailTipY - 3, tailTipX + 2, tailTipY - 4);
    ctx.quadraticCurveTo(tailMidX + 2, tailMidY - 3, -s * 0.3, -s * 0.06);
    ctx.closePath();
    ctx.fill();
    // Tail tip lighter
    ctx.fillStyle = furLight;
    ctx.beginPath();
    ctx.ellipse(tailTipX, tailTipY, 4, 3, tailWag * 0.05, 0, Math.PI * 2);
    ctx.fill();

    // --- NECK ---
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.moveTo(s * 0.22, -s * 0.1);
    ctx.lineTo(s * 0.32, -s * 0.18);
    ctx.lineTo(s * 0.35, -s * 0.05);
    ctx.lineTo(s * 0.25, s * 0.02);
    ctx.closePath();
    ctx.fill();
    // Neck ruff / mane
    ctx.fillStyle = furLight;
    ctx.beginPath();
    ctx.ellipse(s * 0.24, -s * 0.04, s * 0.08, s * 0.1, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // --- HEAD ---
    let headDip = isChasing ? s * 0.03 : 0; // head lower when chasing
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.ellipse(s * 0.38, -s * 0.14 + headDip, s * 0.14, s * 0.12, -0.15, 0, Math.PI * 2);
    ctx.fill();
    // Forehead darker stripe
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.ellipse(s * 0.36, -s * 0.2 + headDip, s * 0.08, s * 0.05, -0.2, 0, Math.PI * 2);
    ctx.fill();

    // --- SNOUT ---
    ctx.fillStyle = furLight;
    ctx.beginPath();
    ctx.ellipse(s * 0.5, -s * 0.08 + headDip, s * 0.09, s * 0.06, -0.1, 0, Math.PI * 2);
    ctx.fill();
    // Nose
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.ellipse(s * 0.57, -s * 0.08 + headDip, 2.5, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Nostril detail
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(s * 0.565, -s * 0.075 + headDip, 0.8, 0, Math.PI * 2);
    ctx.fill();

    // --- MOUTH ---
    if (isChasing || isAttacking) {
      // Open jaw
      ctx.fillStyle = '#3a1010';
      ctx.beginPath();
      ctx.moveTo(s * 0.46, -s * 0.04 + headDip);
      ctx.lineTo(s * 0.56, -s * 0.02 + headDip);
      ctx.lineTo(s * 0.54, s * 0.05 + headDip);
      ctx.lineTo(s * 0.44, s * 0.03 + headDip);
      ctx.closePath();
      ctx.fill();
      // Tongue
      ctx.fillStyle = '#cc5555';
      ctx.beginPath();
      ctx.ellipse(s * 0.5, s * 0.02 + headDip, 3, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Teeth
      ctx.fillStyle = '#eee';
      ctx.beginPath();
      ctx.moveTo(s * 0.47, -s * 0.035 + headDip);
      ctx.lineTo(s * 0.48, -s * 0.01 + headDip);
      ctx.lineTo(s * 0.49, -s * 0.035 + headDip);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s * 0.52, -s * 0.03 + headDip);
      ctx.lineTo(s * 0.53, -s * 0.005 + headDip);
      ctx.lineTo(s * 0.54, -s * 0.03 + headDip);
      ctx.fill();
    } else {
      // Closed mouth line
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(s * 0.48, -s * 0.05 + headDip);
      ctx.lineTo(s * 0.55, -s * 0.06 + headDip);
      ctx.stroke();
    }

    // --- EYES ---
    // Eye socket
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.ellipse(s * 0.4, -s * 0.17 + headDip, s * 0.045, s * 0.04, -0.1, 0, Math.PI * 2);
    ctx.fill();
    // Eye white
    ctx.fillStyle = isChasing ? '#ffdddd' : '#ffe';
    ctx.beginPath();
    ctx.ellipse(s * 0.4, -s * 0.17 + headDip, s * 0.035, s * 0.03, -0.1, 0, Math.PI * 2);
    ctx.fill();
    // Iris
    ctx.fillStyle = isChasing ? '#cc2200' : '#bb8800';
    ctx.beginPath();
    ctx.arc(s * 0.41, -s * 0.17 + headDip, s * 0.02, 0, Math.PI * 2);
    ctx.fill();
    // Pupil
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(s * 0.415, -s * 0.17 + headDip, s * 0.01, s * 0.015, 0, 0, Math.PI * 2);
    ctx.fill();
    // Eye shine
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(s * 0.395, -s * 0.18 + headDip, 1, 0, Math.PI * 2);
    ctx.fill();

    // --- EARS --- pointed, with inner detail
    // Left ear (back)
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.moveTo(s * 0.28, -s * 0.2 + headDip);
    ctx.lineTo(s * 0.3, -s * 0.38 + headDip);
    ctx.lineTo(s * 0.36, -s * 0.22 + headDip);
    ctx.closePath();
    ctx.fill();
    // Inner ear
    ctx.fillStyle = '#9a7a6a';
    ctx.beginPath();
    ctx.moveTo(s * 0.3, -s * 0.22 + headDip);
    ctx.lineTo(s * 0.31, -s * 0.33 + headDip);
    ctx.lineTo(s * 0.35, -s * 0.23 + headDip);
    ctx.closePath();
    ctx.fill();
    // Right ear (front)
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.moveTo(s * 0.36, -s * 0.2 + headDip);
    ctx.lineTo(s * 0.4, -s * 0.36 + headDip);
    ctx.lineTo(s * 0.44, -s * 0.2 + headDip);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#a08070';
    ctx.beginPath();
    ctx.moveTo(s * 0.38, -s * 0.22 + headDip);
    ctx.lineTo(s * 0.4, -s * 0.32 + headDip);
    ctx.lineTo(s * 0.43, -s * 0.22 + headDip);
    ctx.closePath();
    ctx.fill();

    // Whisker dots on snout
    ctx.fillStyle = '#555';
    for (let w = 0; w < 3; w++) {
      ctx.beginPath();
      ctx.arc(s * 0.52, -s * 0.1 + headDip + w * 2, 0.6, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

    // Wolf health bar (only show if damaged)
    if (!inMainMenu && wolf.health < wolf.maxHealth) {
      let hbW = 24, hbH = 4;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(wolf.x - hbW/2 - 1, wolf.y - 22, hbW + 2, hbH + 2);
      ctx.fillStyle = '#333';
      ctx.fillRect(wolf.x - hbW/2, wolf.y - 21, hbW, hbH);
      let pct = wolf.health / wolf.maxHealth;
      ctx.fillStyle = pct > 0.5 ? '#cc3333' : '#aa1111';
      ctx.fillRect(wolf.x - hbW/2, wolf.y - 21, hbW * pct, hbH);
    }
  }

  if (!inMainMenu) {
  // Troubled person NPC
  if (troubledPerson.active) {
    let tpMoving = (troubledPerson.found && wolves.some(w => w.pack === TROUBLED_PACK_ID)) || troubledPerson.movingFollow;
    if (troubledPerson.hurtTimer > 0 && Math.floor(troubledPerson.hurtTimer / 4) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }
    drawBean(troubledPerson.x, troubledPerson.y, 24, '#8a6040', troubledPerson.facing, false, tpMoving, true);
    ctx.globalAlpha = 1;
    // Health bar when in combat (not when following)
    if (troubledPerson.found && !troubledPerson.following) {
      let hbw = 30, hbh = 4;
      let hbx = troubledPerson.x - hbw / 2, hby = troubledPerson.y - 26;
      ctx.fillStyle = '#222';
      ctx.fillRect(hbx, hby, hbw, hbh);
      ctx.fillStyle = '#44cc44';
      ctx.fillRect(hbx, hby, hbw * (troubledPerson.health / troubledPerson.maxHealth), hbh);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.strokeRect(hbx, hby, hbw, hbh);
    }
    // "!" indicator when not yet found
    if (!troubledPerson.found) {
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'center';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.strokeText('!', troubledPerson.x, troubledPerson.y - 30);
      ctx.fillText('!', troubledPerson.x, troubledPerson.y - 30);
    }
    // Speech bubble
    if (troubledPerson.speechTimer > 0 && troubledPerson.speechText) {
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'left';
      let sPad = 14;
      let txt = troubledPerson.speechText;
      let tw = ctx.measureText(txt).width;
      let hint = isMobile ? 'Tap to continue' : 'Press Space to continue';
      ctx.font = '11px Arial';
      let hw = ctx.measureText(hint).width;
      ctx.font = 'bold 18px Arial';
      let bw = Math.max(tw, hw) + sPad * 2;
      let bh = 50;
      let bx = troubledPerson.x - bw / 2;
      let by = troubledPerson.y - 78;
      ctx.fillStyle = '#ffffff';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(bx, by, bw, bh, 8);
      ctx.fill();
      ctx.stroke();
      // Tail
      ctx.beginPath();
      ctx.moveTo(troubledPerson.x - 5, by + bh);
      ctx.lineTo(troubledPerson.x, by + bh + 10);
      ctx.lineTo(troubledPerson.x + 5, by + bh);
      ctx.closePath();
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.stroke();
      // Cover seam
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(troubledPerson.x - 4, by + bh);
      ctx.lineTo(troubledPerson.x + 4, by + bh);
      ctx.stroke();
      // Main text
      ctx.fillStyle = '#000';
      ctx.font = 'bold 18px Arial';
      ctx.fillText(txt, bx + sPad, by + 24);
      // Hint text
      ctx.fillStyle = '#666';
      ctx.font = '11px Arial';
      ctx.fillText(hint, bx + sPad, by + 42);
    }
    // Pickaxe attack
    if (troubledPerson.whip.active) {
      let progress = 1 - (troubledPerson.whip.timer / 20);
      let handX = troubledPerson.x, handY = troubledPerson.y;
      if (troubledPerson.facing === 'right') { handX += 10; handY += 2; }
      else if (troubledPerson.facing === 'left') { handX -= 10; handY += 2; }
      else if (troubledPerson.facing === 'up') { handX += 6; handY -= 8; }
      else if (troubledPerson.facing === 'down') { handX -= 6; handY += 8; }
      let swingAngle = -Math.PI * 0.3 + progress * Math.PI * 0.6;
      let dx = troubledPerson.whip.endX - troubledPerson.whip.x;
      let dy = troubledPerson.whip.endY - troubledPerson.whip.y;
      let baseAngle = Math.atan2(dy, dx);
      let handleLen = 28;
      let endX = handX + Math.cos(baseAngle + swingAngle - Math.PI * 0.3) * handleLen * Math.min(progress * 2, 1);
      let endY = handY + Math.sin(baseAngle + swingAngle - Math.PI * 0.3) * handleLen * Math.min(progress * 2, 1);
      // Handle
      ctx.strokeStyle = '#7a5a20';
      ctx.lineWidth = 3.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(handX, handY);
      ctx.lineTo(endX, endY);
      ctx.stroke();
      // Pickaxe head
      let headAngle = baseAngle + swingAngle - Math.PI * 0.3;
      let perpX = Math.cos(headAngle + Math.PI / 2) * 8;
      let perpY = Math.sin(headAngle + Math.PI / 2) * 8;
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.moveTo(endX - perpX, endY - perpY);
      ctx.lineTo(endX + Math.cos(headAngle) * 6, endY + Math.sin(headAngle) * 6);
      ctx.lineTo(endX + perpX, endY + perpY);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // Player
  let playerMoving = keys['ArrowLeft'] || keys['a'] || keys['A'] || keys['ArrowRight'] || keys['d'] || keys['D'] || keys['ArrowUp'] || keys['w'] || keys['W'] || keys['ArrowDown'] || keys['s'] || keys['S'] || touchJoystick.active;
  // Flash when hurt
  if (player.hurtTimer > 0 && Math.floor(player.hurtTimer / 4) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }
  drawBean(player.x, player.y, 24, player.color, player.facing, true, playerMoving);
  ctx.globalAlpha = 1;

  // Draw whip attack (starts from player's hand)
  if (whip.active) {
    let progress = 1 - (whip.timer / 20);
    // Hand position based on facing direction
    let handX = player.x, handY = player.y;
    if (player.facing === 'right') { handX += 10; handY += 2; }
    else if (player.facing === 'left') { handX -= 10; handY += 2; }
    else if (player.facing === 'up') { handX += 6; handY -= 8; }
    else if (player.facing === 'down') { handX -= 6; handY += 8; }

    let curEndX = handX + (whip.endX - whip.x) * Math.min(progress * 2, 1);
    let curEndY = handY + (whip.endY - whip.y) * Math.min(progress * 2, 1);

    // Whip line with wave
    ctx.strokeStyle = '#3a2008';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    let wave = Math.sin(progress * Math.PI * 3) * (1 - progress) * 10;
    let dx = curEndX - handX;
    let dy = curEndY - handY;
    let len = Math.hypot(dx, dy) || 1;
    let perpX = -dy / len * wave;
    let perpY = dx / len * wave;

    // Draw multi-segment whip for a curvy look
    let mid1X = handX + dx * 0.33 + perpX * 0.7;
    let mid1Y = handY + dy * 0.33 + perpY * 0.7;
    let mid2X = handX + dx * 0.66 - perpX * 0.5;
    let mid2Y = handY + dy * 0.66 - perpY * 0.5;

    ctx.beginPath();
    ctx.moveTo(handX, handY);
    ctx.bezierCurveTo(mid1X, mid1Y, mid2X, mid2Y, curEndX, curEndY);
    ctx.stroke();

    // Thinner end
    ctx.strokeStyle = '#2a1808';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(mid2X, mid2Y);
    ctx.lineTo(curEndX, curEndY);
    ctx.stroke();

    // Whip crack at tip
    if (progress > 0.3 && progress < 0.7) {
      ctx.fillStyle = 'rgba(255,220,150,0.6)';
      ctx.beginPath();
      ctx.arc(curEndX, curEndY, 5 * (1 - Math.abs(progress - 0.5) * 4), 0, Math.PI * 2);
      ctx.fill();
    }
  }
  } // end !inMainMenu player block

  ctx.restore();

  // Skip all HUD when rendering as menu background
  if (inMainMenu) return;

  // Minimap (hidden during boss fight)
  let inBossFight = mineScene.active && (mineScene.phase === 'boss' || mineScene.phase === 'victory');
  if (!inBossFight) {
  let mmCtx, mmW, mmH, mmX, mmY;
  if (isMobile) {
    mmCtx = minimapCtx;
    mmW = minimapCanvas.width; mmH = minimapCanvas.height;
    mmX = 0; mmY = 0;
    mmCtx.clearRect(0, 0, mmW, mmH);
  } else {
    mmCtx = ctx;
    mmW = 140; mmH = 140;
    mmX = canvas.width - mmW - 10; mmY = canvas.height - mmH - 30;
  }
  mmCtx.fillStyle = 'rgba(0,30,0,0.7)';
  mmCtx.fillRect(mmX, mmY, mmW, mmH);
  mmCtx.strokeStyle = '#4a4';
  mmCtx.strokeRect(mmX, mmY, mmW, mmH);

  // Rivers on minimap
  mmCtx.strokeStyle = '#1a6aaa';
  mmCtx.lineWidth = 2;
  mmCtx.lineCap = 'round';
  mmCtx.lineJoin = 'round';
  for (const river of rivers) {
    mmCtx.beginPath();
    mmCtx.moveTo(mmX + (river[0].x / WORLD_W) * mmW, mmY + (river[0].y / WORLD_H) * mmH);
    for (let i = 1; i < river.length; i++) {
      mmCtx.lineTo(mmX + (river[i].x / WORLD_W) * mmW, mmY + (river[i].y / WORLD_H) * mmH);
    }
    mmCtx.stroke();
  }

  // Bridges on minimap
  mmCtx.fillStyle = '#9a7a4a';
  for (const br of bridges) {
    mmCtx.fillRect(mmX + (br.x / WORLD_W) * mmW - 2, mmY + (br.y / WORLD_H) * mmH - 2, 5, 5);
  }

  // Village on minimap
  mmCtx.fillStyle = 'rgba(80,180,60,0.5)';
  mmCtx.fillRect(
    mmX + (village.x / WORLD_W) * mmW,
    mmY + (village.y / WORLD_H) * mmH,
    (village.w / WORLD_W) * mmW,
    (village.h / WORLD_H) * mmH
  );

  // Crash sites on minimap (only unrescued visible if scout assigned)
  for (const site of crashSites) {
    if (site.rescued) continue;
    if (watchtowerJobs.scout.assigned > 0) {
      // Scout reveals with blinking SOS
      mmCtx.fillStyle = Math.sin(frameNow / 300) > 0 ? '#ff4' : '#f44';
      mmCtx.fillRect(mmX + (site.x / WORLD_W) * mmW - 3, mmY + (site.y / WORLD_H) * mmH - 3, 6, 6);
    }
  }

  // Wolves on minimap (if lookout assigned)
  if (watchtowerJobs.lookout.assigned > 0) {
    for (const wolf of wolves) {
      mmCtx.fillStyle = wolf.state === 'chase' ? '#ff4444' : '#ffdd44';
      mmCtx.beginPath();
      mmCtx.arc(mmX + (wolf.x / WORLD_W) * mmW, mmY + (wolf.y / WORLD_H) * mmH, 2, 0, Math.PI * 2);
      mmCtx.fill();
    }
  }

  // Mine on minimap (visible once quest is active)
  if (troubledPersonFound && !mineFound) {
    let mSparkle = Math.sin(frameNow / 400) > 0 ? '#ffdd00' : '#aa8800';
    mmCtx.fillStyle = mSparkle;

      // Title
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 15px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Quest', menuX + menuW / 2, menuY + 22);

      // Close X
      ctx.fillStyle = '#cc4444';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('X', menuX + menuW - 15, menuY + 18);

      // Quest description
      ctx.fillStyle = '#fff';
      ctx.font = '13px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(quest.desc, menuX + menuW / 2, menuY + 48);

      // Progress bar
      let pbX = menuX + 20, pbY = menuY + 60, pbW = menuW - 40, pbH = 14;
      ctx.fillStyle = '#333';
      ctx.fillRect(pbX, pbY, pbW, pbH);
      let pct = Math.min(quest.progress / quest.need, 1);
      ctx.fillStyle = quest.done ? '#44cc44' : '#cc8833';
      ctx.fillRect(pbX, pbY, pbW * pct, pbH);
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.strokeRect(pbX, pbY, pbW, pbH);
      ctx.fillStyle = '#fff';
      ctx.font = '10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(`${quest.progress} / ${quest.need}`, pbX + pbW / 2, pbY + 11);

      // Reward info
      ctx.fillStyle = '#aaa';
      ctx.font = '11px Arial';
      ctx.fillText(`Reward: ${ITEM_TYPES[quest.reward].name}`, menuX + menuW / 2, menuY + 98);

      // Action button
      let btnX = menuX + menuW / 2 - 50;
      let btnY = menuY + menuH - 40;
      let btnLabel = '';
      let btnColor = '#444';
      if (!quest.accepted) {
        btnLabel = 'Accept';
        btnColor = '#3388cc';
      } else if (quest.done && !quest.turned_in) {
        btnLabel = 'Turn In';
        btnColor = '#44aa44';
      } else if (quest.type === 'gather_food' || quest.type === 'gather_medkit') {
        let itemType = quest.type === 'gather_food' ? 'food' : 'medkit';
        let have = inventory.slots.filter(s => s === itemType).length;
        btnLabel = have > 0 ? `Hand In (have ${have})` : 'Need Items';
        btnColor = have > 0 ? '#aa8833' : '#444';
      } else {
        btnLabel = quest.done ? 'Turn In' : 'In Progress...';
        btnColor = quest.done ? '#44aa44' : '#555';
      }
      ctx.fillStyle = btnColor;
      ctx.beginPath();
      ctx.roundRect(btnX, btnY, 100, 28, 4);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(btnLabel, btnX + 50, btnY + 18);
    }
  }

  // Watchtower menu
  if (watchtowerMenuOpen) {
    let menuW = 220, menuH = 200;
    let menuX = canvas.width / 2 - menuW / 2;
    let menuY = canvas.height / 2 - menuH / 2;

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.beginPath();
    ctx.roundRect(menuX, menuY, menuW, menuH, 8);
    ctx.fill();
    ctx.strokeStyle = '#8a6a3a';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Title
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Watchtower Jobs', menuX + menuW / 2, menuY + 22);

    // Close X
    ctx.fillStyle = '#cc4444';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('X', menuX + menuW - 15, menuY + 18);

    // Available villagers
    let jobKeys = Object.keys(watchtowerJobs);
    let totalAssigned = jobKeys.reduce((s, k) => s + watchtowerJobs[k].assigned, 0);
    let available = village.population - totalAssigned;
    ctx.fillStyle = '#aaa';
    ctx.font = '11px Arial';
    ctx.fillText(`Available: ${available} / ${village.population} villagers`, menuX + menuW / 2, menuY + 38);

    // Job rows
    for (let i = 0; i < jobKeys.length; i++) {
      let job = watchtowerJobs[jobKeys[i]];
      let rowY = menuY + 50 + i * 45;

      // Job name and desc
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 13px Arial';
      ctx.textAlign = 'left';
      ctx.fillText(job.name, menuX + 10, rowY + 12);
      ctx.fillStyle = '#999';
      ctx.font = '10px Arial';
      ctx.fillText(job.desc, menuX + 10, rowY + 25);

      // Count
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 14px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(`${job.assigned}/${job.max}`, menuX + menuW - 65, rowY + 14);

      // Plus button
      ctx.fillStyle = job.assigned < job.max && available > 0 ? '#44aa44' : '#444';
      ctx.beginPath();
      ctx.roundRect(menuX + menuW - 55, rowY + 2, 20, 20, 3);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px Arial';
      ctx.fillText('+', menuX + menuW - 45, rowY + 17);

      // Minus button
      ctx.fillStyle = job.assigned > 0 ? '#aa4444' : '#444';
      ctx.beginPath();
      ctx.roundRect(menuX + menuW - 30, rowY + 2, 20, 20, 3);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillText('-', menuX + menuW - 20, rowY + 17);
    }
  }

  // Game Over screen
  if (gameOver) {
    // Hide mobile controls so player can tap anywhere to restart
    if (isMobile) {
      let mc = document.getElementById('mobile-controls');
      if (mc.style.display !== 'none') mc.style.display = 'none';
    }
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Red vignette
    let vg = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, canvas.width/2);
    vg.addColorStop(0, 'rgba(80,0,0,0.3)');
    vg.addColorStop(1, 'rgba(30,0,0,0.6)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // GAME OVER text
    ctx.fillStyle = '#cc2222';
    ctx.font = 'bold 52px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 30);

    // Stats
    ctx.fillStyle = '#ddd';
    ctx.font = '18px Arial';
    let rescued = crashSites.filter(s => s.rescued).reduce((sum, s) => sum + s.survivors, 0);
    ctx.fillText(`Survivors Rescued: ${rescued} / ${totalSurvivors}`, canvas.width/2, canvas.height/2 + 10);
    ctx.fillText(`Village Population: ${village.population}`, canvas.width/2, canvas.height/2 + 35);

    // Restart prompt
    ctx.fillStyle = '#ffcc44';
    ctx.font = 'bold 20px Arial';
    let blink = Math.sin(frameNow / 400) > 0;
    let _onMobile = isMobile || window.matchMedia('(max-width: 1024px) and (pointer: coarse)').matches || ('ontouchstart' in window);
    if (blink) ctx.fillText(_onMobile ? 'Press Anywhere to Restart' : 'Press R to Restart', canvas.width/2, canvas.height/2 + 80);
  }
}

// --- SAVE & LOAD ---
function saveGame() {
  let save = {
    player: { x: player.x, y: player.y, health: player.health, facing: player.facing },
    village: { population: village.population, buildings: village.buildings },
    crashSites: crashSites.map(s => ({ rescued: s.rescued })),
    wolves: wolves.map(w => ({ x: w.x, y: w.y, health: w.health, maxHealth: w.maxHealth, pack: w.pack, isAlpha: w.isAlpha, speed: w.speed })),
    inventory: { slots: inventory.slots, selected: inventory.selected },
    worldItems: worldItems.map(i => ({ collected: i.collected })),
    villagePeople: villagePeople.map(vp => ({ x: vp.x, y: vp.y, color: vp.color, wanderAngle: vp.wanderAngle, hasQuest: vp.hasQuest || false })),
    speedBoostTimer: speedBoostTimer,
    shieldActive: shieldActive,
    watchtowerJobs: { lookout: watchtowerJobs.lookout.assigned, scout: watchtowerJobs.scout.assigned, archer: watchtowerJobs.archer.assigned },
    activeQuests: activeQuests.map(q => ({ id: q.id, giver: q.giver, desc: q.desc, type: q.type, need: q.need, progress: q.progress, reward: q.reward, done: q.done, turned_in: q.turned_in, accepted: q.accepted })),
    wolfKillCount: wolfKillCount,
    questIdCounter: questIdCounter,
    helpYellTriggered: helpYellTriggered,
    troubledPersonFound: troubledPersonFound,
    troubledPerson: { active: troubledPerson.active, found: troubledPerson.found, following: troubledPerson.following, wolvesSpawned: troubledPerson.wolvesSpawned, x: troubledPerson.x, y: troubledPerson.y },
    mineFound: mineFound,
    mine: { x: mine.x, y: mine.y }
  };
  localStorage.setItem('jungleRescueSave', JSON.stringify(save));
  notify('Game saved!');
}

function loadGame() {
  let data = localStorage.getItem('jungleRescueSave');
  if (!data) return false;
  try {
    let save = JSON.parse(data);
    player.x = save.player.x;
    player.y = save.player.y;
    player.health = save.player.health;
    player.facing = save.player.facing;
    village.population = save.village.population;
    village.buildings = save.village.buildings;
    for (let i = 0; i < crashSites.length && i < save.crashSites.length; i++) {
      crashSites[i].rescued = save.crashSites[i].rescued;
    }
    // Restore wolves
    wolves.length = 0;
    for (const w of save.wolves) {
      wolves.push({
        x: w.x, y: w.y, angle: Math.random() * Math.PI * 2,
        speed: w.speed || 1.2, state: 'wander', attackTimer: 0,
        facing: 'right', health: w.health, maxHealth: w.maxHealth,
        pack: w.pack !== undefined ? w.pack : -1,
        isAlpha: w.isAlpha || false
      });
    }
    inventory.slots = save.inventory.slots;
    inventory.selected = save.inventory.selected;
    for (let i = 0; i < worldItems.length && i < save.worldItems.length; i++) {
      worldItems[i].collected = save.worldItems[i].collected;
    }
    villagePeople.length = 0;
    for (const vp of save.villagePeople) {
      villagePeople.push({ x: vp.x, y: vp.y, color: vp.color, wanderAngle: vp.wanderAngle, hasQuest: vp.hasQuest || false });
    }
    speedBoostTimer = save.speedBoostTimer || 0;
    shieldActive = save.shieldActive || false;
    if (save.watchtowerJobs) {
      watchtowerJobs.lookout.assigned = save.watchtowerJobs.lookout || 0;
      watchtowerJobs.scout.assigned = save.watchtowerJobs.scout || 0;
      watchtowerJobs.archer.assigned = save.watchtowerJobs.archer || 0;
    }
    // Restore quests
    if (save.activeQuests) {
      activeQuests.length = 0;
      for (const q of save.activeQuests) {
        activeQuests.push({ id: q.id, giver: q.giver, desc: q.desc, type: q.type, need: q.need, progress: q.progress, reward: q.reward, done: q.done, turned_in: q.turned_in, accepted: q.accepted || false });
      }
      wolfKillCount = save.wolfKillCount || 0;
      questIdCounter = save.questIdCounter || 0;
    }
    helpYellTriggered = save.helpYellTriggered || false;
    helpYellActive = false;
    troubledPersonFound = save.troubledPersonFound || false;
    mineFound = save.mineFound || false;
    if (save.mine) {
      mine.x = save.mine.x;
      mine.y = save.mine.y;
    }
    if (save.troubledPerson) {
      troubledPerson.active = save.troubledPerson.active || false;
      troubledPerson.found = save.troubledPerson.found || false;
      troubledPerson.following = save.troubledPerson.following || false;
      troubledPerson.wolvesSpawned = save.troubledPerson.wolvesSpawned || false;
      troubledPerson.x = save.troubledPerson.x || 320;
      troubledPerson.y = save.troubledPerson.y || 320;
    } else {
      troubledPerson.active = false;
      troubledPerson.found = false;
      troubledPerson.following = false;
      troubledPerson.wolvesSpawned = false;
    }
    troubledPerson.whip.active = false;
    troubledPerson.attackTimer = 0;
    troubledPerson.health = troubledPerson.maxHealth;
    troubledPerson.hurtTimer = 0;
    troubledPerson.invincible = 0;
    troubledPerson.speechText = '';
    troubledPerson.speechTimer = 0;
    troubledPerson.speechPhase = 0;
    troubledPerson.speechWaiting = false;
    followers.length = 0;
    player.carrying = 0;
    document.getElementById('rescued').textContent =
      crashSites.filter(s => s.rescued).reduce((sum, s) => sum + s.survivors, 0);
    document.getElementById('village').textContent = village.population;
    return true;
  } catch(e) { return false; }
}

document.getElementById('save-btn').addEventListener('click', () => {
  saveGame();
  paused = false;
  pauseOverlay.classList.remove('active');
  pauseBtn.innerHTML = '<span class="pause-icon"><span></span><span></span></span>';
  pauseBtn.title = 'Pause';
  inMainMenu = true;
  document.getElementById('pause-btn').style.display = 'none';
  document.getElementById('fs-btn').style.display = 'none';
  document.getElementById('save-btn').style.display = 'none';
  document.getElementById('mobile-controls').style.display = 'none';
});

// Save loading now handled by main menu Continue button

// --- MAIN MENU ---
let inMainMenu = true;
let menuAnimTimer = 0;

function drawMainMenu() {
  menuAnimTimer++;
  let cx = canvas.width / 2;
  let cy = canvas.height / 2;

  // Background - dark jungle gradient
  let bg = ctx.createRadialGradient(cx, cy, 50, cx, cy, 450);
  bg.addColorStop(0, '#1a2e0a');
  bg.addColorStop(1, '#0a1204');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle leaf/vine pattern
  ctx.strokeStyle = 'rgba(40,80,20,0.15)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 12; i++) {
    let vx = (i * 73 + 20) % canvas.width;
    ctx.beginPath();
    ctx.moveTo(vx, 0);
    for (let y = 0; y < canvas.height; y += 20) {
      ctx.lineTo(vx + Math.sin(y * 0.03 + i) * 15, y);
    }
    ctx.stroke();
  }

  // Ground line
  let groundY = cy + 100;
  ctx.fillStyle = '#1a2e0a';
  ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
  ctx.strokeStyle = '#2d5a1e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(canvas.width, groundY);
  ctx.stroke();


  // Game title - top left
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.7)';
  ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2; ctx.shadowBlur = 6;
  ctx.fillStyle = '#ffdd44';
  ctx.font = isMobile ? 'bold 36px Arial' : 'bold 52px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('Jungle Rescue', 30, isMobile ? 50 : 60);
  ctx.fillStyle = '#f0e8d0';
  ctx.font = isMobile ? 'bold 20px Arial' : 'bold 28px Arial';
  ctx.fillText('Village', 32, isMobile ? 76 : 92);
  ctx.restore();

  // Character - to the left of start button, standing on ground
  let charX = cx - (isMobile ? 120 : 150);
  let charY = groundY - 40;
  let charSize = 112;

  // Tips system
  const menuTips = [
    'Watch out for wolf packs!',
    'Rescue survivors and bring\nthem back to the village.',
    'Use the whip to fend\noff wolves.',
    'Village NPCs may have\nquests for you.',
    'Pick up items near\ncrash sites.',
    'Medkits heal 3 HP,\nfood heals 1 HP.',
    'Wolves are scared of\nthe village.',
    'Build up your village\nby rescuing more people.',
  ];
  // Actions(1560) total. Tips show every other cycle.
  // Cycle without tip = 1560, cycle with tip = 1560 + 600 = 2160
  let pairLength = 1560 + 2160;
  let pairPos = menuAnimTimer % pairLength;
  let showingTip = false;
  let loopTimer;
  let tipCycleNum;
  if (pairPos < 1560) {
    loopTimer = pairPos;
    tipCycleNum = Math.floor(menuAnimTimer / pairLength) * 2;
  } else {
    let secondPos = pairPos - 1560;
    if (secondPos < 1560) {
      loopTimer = secondPos;
    } else {
      loopTimer = 1560;
      showingTip = true;
    }
    tipCycleNum = Math.floor(menuAnimTimer / pairLength) * 2 + 1;
  }
  let tipIndex = Math.floor(tipCycleNum / 2) % menuTips.length;
  if (isMobile) showingTip = false;

  // Random action system
  if (!drawMainMenu._action) {
    drawMainMenu._action = 'idle';
    drawMainMenu._actionTimer = 0;
    drawMainMenu._actionDur = 240;
    drawMainMenu._actionPool = ['idle', 'look', 'stand', 'walk', 'whip'];
    drawMainMenu._lastAction = '';
  }
  let ma = drawMainMenu;
  ma._actionTimer++;
  if (ma._actionTimer >= ma._actionDur && !showingTip) {
    // Pick a new random action (avoid repeating the same one)
    let pool = ma._actionPool.filter(a => a !== ma._action);
    ma._lastAction = ma._action;
    ma._action = pool[Math.floor(Math.random() * pool.length)];
    ma._actionTimer = 0;
    let durations = { idle: 240, look: 240, stand: 300, walk: 320, whip: 160 };
    ma._actionDur = durations[ma._action];
  }

  let charFacing = 'right';
  let charMoving = false;
  let isWhipAction = false;

  if (showingTip) {
    charY += Math.sin(menuAnimTimer * 0.03) * 1.5;
  } else if (ma._action === 'idle') {
    charY += Math.sin(menuAnimTimer * 0.03) * 1.5;
  } else if (ma._action === 'look') {
    let lookPhase = ma._actionTimer;
    if (lookPhase < 80) charFacing = 'right';
    else if (lookPhase < 160) charFacing = 'left';
    else charFacing = 'right';
    charY += Math.sin(menuAnimTimer * 0.03) * 1.5;
  } else if (ma._action === 'stand') {
    charY += Math.sin(menuAnimTimer * 0.03) * 1.5;
  } else if (ma._action === 'walk') {
    charMoving = true;
    walkTimer = menuAnimTimer;
    charY += Math.sin(menuAnimTimer * 0.03) * 1;
  } else if (ma._action === 'whip') {
    isWhipAction = true;
    let whipPhase = ma._actionTimer / 2;
    charY += Math.sin(menuAnimTimer * 0.03) * 1;
    drawBean(charX, charY, charSize, '#6b3a1a', 'right', true, false);

    ctx.save();
    ctx.translate(charX, charY);
    let s = charSize;
    let handX = s * 0.28;
    let handY = s * 0.15;
    ctx.strokeStyle = '#3a2008';
    ctx.lineWidth = s * 0.035;
    ctx.lineCap = 'round';
    if (whipPhase < 20) {
      let t = whipPhase / 20;
      ctx.beginPath();
      ctx.moveTo(handX, handY);
      ctx.quadraticCurveTo(handX + s * 0.1, handY - s * 0.2 * t, handX + s * 0.05 + t * s * 0.1, handY - s * 0.35 * t);
      ctx.stroke();
    } else if (whipPhase < 50) {
      let t = (whipPhase - 20) / 30;
      let extend = t * s * 1.8;
      ctx.beginPath();
      ctx.moveTo(handX, handY);
      let wt = whipPhase * 0.5;
      ctx.quadraticCurveTo(handX + extend * 0.3, handY - s * 0.2 + Math.sin(wt) * 4, handX + extend * 0.7, handY - s * 0.1 + Math.sin(wt * 1.3) * 3);
      ctx.stroke();
      if (whipPhase > 25 && whipPhase < 35) {
        let sparkX = handX + extend * 0.7;
        let sparkY = handY - s * 0.1 + Math.sin(wt * 1.3) * 3;
        ctx.fillStyle = '#ffdd44';
        for (let sp = 0; sp < 4; sp++) {
          let sa = Math.random() * Math.PI * 2;
          let sr = 2 + Math.random() * 4;
          ctx.beginPath();
          ctx.arc(sparkX + Math.cos(sa) * sr, sparkY + Math.sin(sa) * sr, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    } else {
      let t = 1 - (whipPhase - 50) / 30;
      let extend = Math.max(0, t) * s * 1.2;
      ctx.beginPath();
      ctx.moveTo(handX, handY);
      ctx.quadraticCurveTo(handX + extend * 0.3, handY + s * 0.05, handX + extend * 0.5, handY + s * 0.1);
      ctx.stroke();
    }
    ctx.restore();
  }

  let inWhipPhase = isWhipAction;
  if (!inWhipPhase) {
    drawBean(charX, charY, charSize, '#6b3a1a', charFacing, true, charMoving);
  }

  // Speech bubble for tips
  if (showingTip) {
    let tip = menuTips[tipIndex];
    let tipLines = tip.split('\n');
    let bubbleW = 180;
    let lineH = 16;
    let bubbleH = 16 + tipLines.length * lineH;
    let bubbleX = charX - bubbleW - 30;
    let bubbleY = charY - charSize * 0.3 - bubbleH / 2;

    // Bubble background
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath();
    ctx.roundRect(bubbleX, bubbleY, bubbleW, bubbleH, 8);
    ctx.fill();
    ctx.strokeStyle = '#8a7a50';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Bubble tail (pointing right toward character)
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath();
    ctx.moveTo(bubbleX + bubbleW, bubbleY + bubbleH / 2 - 6);
    ctx.lineTo(bubbleX + bubbleW + 12, bubbleY + bubbleH / 2 + 2);
    ctx.lineTo(bubbleX + bubbleW, bubbleY + bubbleH / 2 + 8);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#8a7a50';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(bubbleX + bubbleW, bubbleY + bubbleH / 2 - 6);
    ctx.lineTo(bubbleX + bubbleW + 12, bubbleY + bubbleH / 2 + 2);
    ctx.lineTo(bubbleX + bubbleW, bubbleY + bubbleH / 2 + 8);
    ctx.stroke();
    // Cover the tail's left border
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fillRect(bubbleX + bubbleW - 1, bubbleY + bubbleH / 2 - 5, 2, 12);

    // Tip text
    ctx.fillStyle = '#2a2014';
    ctx.font = '12px Arial';
    ctx.textAlign = 'left';
    for (let i = 0; i < tipLines.length; i++) {
      ctx.fillText(tipLines[i], bubbleX + 10, bubbleY + 14 + i * lineH);
    }
  }

  // Start button
  let btnW = 160, btnH = 40;
  let btnX = cx - 10;
  let btnY = groundY - btnH / 2 - 18;

  // Button background - classic embossed style
  let btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  btnGrad.addColorStop(0, '#6a5a3a');
  btnGrad.addColorStop(0.5, '#4a3a20');
  btnGrad.addColorStop(0.51, '#3a2a14');
  btnGrad.addColorStop(1, '#4a3a20');
  ctx.fillStyle = btnGrad;
  ctx.beginPath();
  ctx.roundRect(btnX, btnY, btnW, btnH, 4);
  ctx.fill();
  // Border
  ctx.strokeStyle = '#8a7a50';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Inner highlight
  ctx.strokeStyle = 'rgba(255,255,200,0.15)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.roundRect(btnX + 1, btnY + 1, btnW - 2, btnH - 2, 3);
  ctx.stroke();
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.roundRect(btnX + 2, btnY + btnH + 1, btnW - 4, 4, 2);
  ctx.fill();

  ctx.shadowColor = 'rgba(0,0,0,0.5)';
