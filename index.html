    ctx.strokeStyle = '#7a8a50';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,200,0.1)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.roundRect(btnX + 1, cBtnY + 1, btnW - 2, btnH - 2, 3);
    ctx.stroke();
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.roundRect(btnX + 2, cBtnY + btnH + 1, btnW - 4, 4, 2);
    ctx.fill();

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 1; ctx.shadowBlur = 2;
    ctx.fillStyle = '#d0e8b0';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('CONTINUE', btnX + btnW / 2, cBtnY + btnH / 2 + 6);
    ctx.restore();
  }

  // Controls panel - under title (hide on mobile)
  {
  let cpW_temp = 210;
  let cpH_est = 32 + (isMobile ? 5 : 7) * 24;
  let cpX = btnX + btnW / 2 - cpW_temp / 2, cpY = btnY - cpH_est - 15;
  let cpW = 210, controls = isMobile ? [
    ['Joystick', 'Move'],
    ['WHIP', 'Whip Attack'],
    ['ITEM', 'Cycle Items'],
    ['USE', 'Use Item'],
    ['Tap', 'Interact'],
  ] : [
    ['WASD / Arrows', 'Move'],
    ['F', 'Whip Attack'],
    ['E', 'Use Item'],
    ['1 - 5', 'Select Item'],
    ['P', 'Pause'],
    ['Esc', 'Exit Fullscreen'],
    ['Click', 'Interact'],
  ];
  let cpH = 32 + controls.length * 24;

  // Panel background
  let cpGrad = ctx.createLinearGradient(cpX, cpY, cpX, cpY + cpH);
  cpGrad.addColorStop(0, 'rgba(50,40,24,0.85)');
  cpGrad.addColorStop(1, 'rgba(35,28,16,0.85)');
  ctx.fillStyle = cpGrad;
  ctx.beginPath();
  ctx.roundRect(cpX, cpY, cpW, cpH, 4);
  ctx.fill();
  ctx.strokeStyle = '#8a7a50';
  ctx.lineWidth = 1.5;

  ctx.strokeStyle = 'rgba(255,255,200,0.08)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.roundRect(cpX + 1, cpY + 1, cpW - 2, cpH - 2, 3);

  // Title
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('CONTROLS', cpX + cpW / 2, cpY + 20);

  // Divider
  ctx.strokeStyle = 'rgba(138,122,80,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cpX + 10, cpY + 28);
  ctx.lineTo(cpX + cpW - 10, cpY + 28);
  ctx.stroke();

  // Control rows
  for (let i = 0; i < controls.length; i++) {
    let rowY = cpY + 46 + i * 24;
    // Key
    ctx.fillStyle = '#f0e8d0';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(controls[i][0], cpX + 12, rowY);
    // Action
    ctx.fillStyle = '#aa9a70';
    ctx.font = '11px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(controls[i][1], cpX + cpW - 12, rowY);
  }
  } // end controls panel

  // Store button bounds for click detection
  drawMainMenu._btnX = btnX;
  drawMainMenu._btnY = btnY;
  drawMainMenu._btnW = btnW;
  drawMainMenu._btnH = btnH;
}

canvas.addEventListener('click', function mainMenuClick(e) {
  if (!inMainMenu) return;
  let rect = canvas.getBoundingClientRect();
  let scaleX = canvas.width / rect.width;
  let scaleY = canvas.height / rect.height;
  let mx = (e.clientX - rect.left) * scaleX;
  let my = (e.clientY - rect.top) * scaleY;

  let btnX = drawMainMenu._btnX;
  let btnY = drawMainMenu._btnY;
  let btnW = drawMainMenu._btnW;
  let btnH = drawMainMenu._btnH;
  if (!btnX) return;

  // Start button - begin a fresh new game
  if (mx >= btnX && mx <= btnX + btnW && my >= btnY && my <= btnY + btnH) {
    resetNewGame();
    inMainMenu = false;
    document.getElementById('pause-btn').style.display = '';
    document.getElementById('fs-btn').style.display = '';
    document.getElementById('save-btn').style.display = '';
    if (isMobile) document.getElementById('mobile-controls').style.display = 'flex';
    return;
  }

  // Continue button
  if (localStorage.getItem('jungleRescueSave')) {
    let cBtnY = btnY + btnH + 16;
    if (mx >= btnX && mx <= btnX + btnW && my >= cBtnY && my <= cBtnY + btnH) {
      loadGame();
      notify('Save loaded! Welcome back.');
      inMainMenu = false;
      document.getElementById('pause-btn').style.display = '';
      document.getElementById('fs-btn').style.display = '';
      document.getElementById('save-btn').style.display = '';
      if (isMobile) document.getElementById('mobile-controls').style.display = 'flex';
      return;
    }
  }
});

let paused = false;
let gameOver = false;
const pauseBtn = document.getElementById('pause-btn');

pauseBtn.addEventListener('click', togglePause);
window.addEventListener('keydown', e => {
  // Advance NPC speech bubble on space
  if (e.key === ' ' && troubledPerson.speechWaiting && troubledPerson.speechTimer > 0) {
    troubledPerson.speechWaiting = false;
    if (troubledPerson.speechPhase === 1) {
      troubledPerson.speechText = "I'll hold them off with my pickaxe!";
      troubledPerson.speechTimer = 9999;
      troubledPerson.speechWaiting = true;
      troubledPerson.speechPhase = 2;
    } else if (troubledPerson.speechPhase === 10) {
      // "Follow me!" dismissed — start walking into the mine
      troubledPerson.speechText = '';
      troubledPerson.speechTimer = 0;
      troubledPerson.speechPhase = 0;
      mineScene.phase = 'enter';
    } else if (troubledPerson.speechPhase === 11) {
      // Victory speech dismissed — fade out and complete
      troubledPerson.speechText = '';
      troubledPerson.speechTimer = 0;
      troubledPerson.speechPhase = 0;
      mineScene.phase = 'victory_fade';
      mineScene.fadeTimer = 60;
    } else {
      troubledPerson.speechText = '';
      troubledPerson.speechTimer = 0;
      troubledPerson.speechPhase = 0;
    }
    return;
  }
  if (e.key === 'Escape' && document.fullscreenElement) {
    document.exitFullscreen();
  } else if (e.key === 'p' || e.key === 'P') togglePause();
  // Hotbar selection (1-5)
  if (e.key >= '1' && e.key <= '5') inventory.selected = parseInt(e.key) - 1;
  // Use item (E key)
  if ((e.key === 'e' || e.key === 'E') && !gameOver && !paused) {
    let item = inventory.slots[inventory.selected];
    if (item) {
      let used = false;
      if (item === 'medkit') {
        if (player.health < player.maxHealth) {
          player.health = Math.min(player.maxHealth, player.health + 3);
          notify('Used Medkit! +3 HP');
          used = true;
        }
      } else if (item === 'food') {
        if (player.health < player.maxHealth) {
          player.health = Math.min(player.maxHealth, player.health + 1);
          notify('Ate Food! +1 HP');
          used = true;
        }
      } else if (item === 'speed') {
        speedBoostTimer = 600; // 10 seconds
        notify('Speed Boost activated!');
        used = true;
      } else if (item === 'shield') {
        shieldActive = true;
        notify('Shield activated! Blocks 1 hit');
        used = true;
      }
      if (used) inventory.slots[inventory.selected] = null;
    }
  }
  if ((e.key === 'r' || e.key === 'R') && gameOver) {
    resetNewGame();
  }
});

// --- MOBILE TOUCH CONTROLS ---
const isMobile = ('ontouchstart' in window) && window.matchMedia('(pointer: coarse)').matches;
let touchJoystick = { active: false, dx: 0, dy: 0 };
const minimapCanvas = document.getElementById('minimap-canvas');
const minimapCtx = minimapCanvas.getContext('2d');

if (isMobile) {
  // Stack save button label on two lines to fit in left bar
  document.getElementById('save-btn').innerHTML = 'Save<br>&amp; Quit';
  // Lock orientation if supported
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }

  // Resize canvas for mobile landscape
  function mobileResize() {
    if (window.innerWidth > window.innerHeight) {
      let sideBar = 120;
      let gameW = window.innerWidth - sideBar * 2;
      let gameH = window.innerHeight;
      // Maintain aspect ratio
      let ratio = 800 / 600;
      if (gameW / gameH > ratio) {
        canvas.height = gameH;
        canvas.width = gameH * ratio;
      } else {
        canvas.width = gameW;
        canvas.height = gameW / ratio;
      }
    }
  }
  mobileResize();
  window.addEventListener('resize', mobileResize);
  window.addEventListener('orientationchange', () => setTimeout(mobileResize, 100));

  // Prevent default touch behaviors on game area
  document.body.style.touchAction = 'none';
  document.body.style.userSelect = 'none';
  document.body.style.webkitUserSelect = 'none';
  canvas.style.touchAction = 'none';

  // Joystick controls
  const joystickArea = document.getElementById('joystick-area');
  const joystickThumb = document.getElementById('joystick-thumb');
  const joystickBase = document.getElementById('joystick-base');
  let joystickTouchId = null;
  let joystickCenterX = 0, joystickCenterY = 0;

  joystickArea.addEventListener('touchstart', e => {
    e.preventDefault();
    let touch = e.changedTouches[0];
    joystickTouchId = touch.identifier;
    let rect = joystickBase.getBoundingClientRect();
    joystickCenterX = rect.left + rect.width / 2;
    joystickCenterY = rect.top + rect.height / 2;
    handleJoystickMove(touch);
  });

  window.addEventListener('touchmove', e => {
    for (let touch of e.changedTouches) {
      if (touch.identifier === joystickTouchId) {
        e.preventDefault();
        handleJoystickMove(touch);
        break;
      }
    }
  }, { passive: false });

  window.addEventListener('touchend', e => {
    for (let touch of e.changedTouches) {
      if (touch.identifier === joystickTouchId) {
        joystickTouchId = null;
        touchJoystick.active = false;
        touchJoystick.dx = 0;
        touchJoystick.dy = 0;
        joystickThumb.style.left = '30px';
        joystickThumb.style.top = '30px';
        break;
      }
    }
  });

  // Mouse support for joystick (desktop testing)
  let joystickMouseDown = false;
  joystickArea.addEventListener('mousedown', e => {
    e.preventDefault();
    joystickMouseDown = true;
    let rect = joystickBase.getBoundingClientRect();
    joystickCenterX = rect.left + rect.width / 2;
    joystickCenterY = rect.top + rect.height / 2;
    handleJoystickMove(e);
  });
  window.addEventListener('mousemove', e => {
    if (joystickMouseDown) {
      handleJoystickMove(e);
    }
  });
  window.addEventListener('mouseup', e => {
    if (joystickMouseDown) {
      joystickMouseDown = false;
      touchJoystick.active = false;
      touchJoystick.dx = 0;
      touchJoystick.dy = 0;
      joystickThumb.style.left = '30px';
      joystickThumb.style.top = '30px';
    }
  });

  function handleJoystickMove(touch) {
    let dx = touch.clientX - joystickCenterX;
    let dy = touch.clientY - joystickCenterY;
    let dist = Math.hypot(dx, dy);
    let maxDist = 35;
    if (dist > maxDist) {
      dx = dx / dist * maxDist;
      dy = dy / dist * maxDist;
      dist = maxDist;
    }
    // Move thumb visual
    joystickThumb.style.left = (30 + dx) + 'px';
    joystickThumb.style.top = (30 + dy) + 'px';
    // Set joystick state (normalize to -1..1)
    let deadzone = 8;
    if (dist > deadzone) {
      touchJoystick.active = true;
      touchJoystick.dx = dx / maxDist;
      touchJoystick.dy = dy / maxDist;
    } else {
      touchJoystick.active = false;
      touchJoystick.dx = 0;
      touchJoystick.dy = 0;
    }
  }

  // Whip button
  const whipBtn = document.getElementById('whip-btn');
  function triggerWhip() {
    let inVillage = player.x > village.x && player.x < village.x + village.w && player.y > village.y && player.y < village.y + village.h;
    if (!whip.active && !gameOver && !paused && !inVillage) {
      whip.active = true;
      whip.timer = 20;
      let wdx = 0, wdy = 0;
      if (player.facing === 'up') wdy = -1;
      else if (player.facing === 'down') wdy = 1;
      else if (player.facing === 'left') wdx = -1;
      else if (player.facing === 'right') wdx = 1;
      whip.x = player.x;
      whip.y = player.y;
      whip.endX = player.x + wdx * whip.length;
      whip.endY = player.y + wdy * whip.length;
      for (const wolf of wolves) {
        let wddx = whip.endX - whip.x;
        let wddy = whip.endY - whip.y;
        let len2 = wddx * wddx + wddy * wddy;
        let t = Math.max(0, Math.min(1, ((wolf.x - whip.x) * wddx + (wolf.y - whip.y) * wddy) / len2));
        let projX = whip.x + t * wddx;
        let projY = whip.y + t * wddy;
        let dist = Math.hypot(wolf.x - projX, wolf.y - projY);
        if (dist < 25) {
          wolf.health--;
          let kbAngle = Math.atan2(wolf.y - player.y, wolf.x - player.x);
          wolf.x += Math.cos(kbAngle) * 40;
          wolf.y += Math.sin(kbAngle) * 40;
          wolf.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, wolf.x));
          wolf.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, wolf.y));
          wolf.state = 'wander';
          wolf.angle = kbAngle;
        }
      }
    }
  }
  whipBtn.addEventListener('touchstart', e => { e.preventDefault(); triggerWhip(); });
  whipBtn.addEventListener('mousedown', e => { e.preventDefault(); triggerWhip(); });

  // Cycle item button
  const cycleBtn = document.getElementById('cycle-btn');
  function triggerCycleItem() {
    // Find next slot that has an item, or wrap around
    let start = inventory.selected;
    for (let i = 1; i <= 5; i++) {
      let idx = (start + i) % 5;
      if (inventory.slots[idx] !== null) {
        inventory.selected = idx;
        notify(`Selected: ${ITEM_TYPES[inventory.slots[idx]].name}`);
        return;
      }
    }
    // No items, just cycle to next slot
    inventory.selected = (inventory.selected + 1) % 5;
  }
  cycleBtn.addEventListener('touchstart', e => { e.preventDefault(); triggerCycleItem(); });
  cycleBtn.addEventListener('mousedown', e => { e.preventDefault(); triggerCycleItem(); });

  // Use item button
  const useBtn = document.getElementById('use-btn');
  function triggerUseItem() {
    if (gameOver || paused) return;
    let item = inventory.slots[inventory.selected];
    if (!item) { notify('No item selected'); return; }
    let used = false;
    if (item === 'medkit') {
      if (player.health < player.maxHealth) {
        player.health = Math.min(player.maxHealth, player.health + 3);
        notify('Used Medkit! +3 HP');
        used = true;
      }
    } else if (item === 'food') {
      if (player.health < player.maxHealth) {
        player.health = Math.min(player.maxHealth, player.health + 1);
        notify('Ate Food! +1 HP');
        used = true;
      }
    } else if (item === 'speed') {
      speedBoostTimer = 600;
      notify('Speed Boost activated!');
      used = true;
    } else if (item === 'shield') {
      shieldActive = true;
      notify('Shield activated!');
      used = true;
    }
    if (used) inventory.slots[inventory.selected] = null;
  }
  useBtn.addEventListener('touchstart', e => { e.preventDefault(); triggerUseItem(); });
  useBtn.addEventListener('mousedown', e => { e.preventDefault(); triggerUseItem(); });

  // Touch on canvas — simulate click for UI elements and prevent scroll
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    // Fire a synthetic click so menu buttons and in-game UI work
    let touch = e.changedTouches[0];
    canvas.dispatchEvent(new MouseEvent('click', {
      clientX: touch.clientX,
      clientY: touch.clientY,
      bubbles: true
    }));
  }, { passive: false });
}

// --- GAME LOOP ---
const TARGET_FPS = isMobile ? 30 : 60;
const FRAME_TIME = 1000 / TARGET_FPS;
let lastFrameTime = 0;
let frameNow = 0; // cached timestamp for the current frame

function gameLoop(timestamp) {
  let elapsed = timestamp - lastFrameTime;
  if (elapsed < FRAME_TIME) {
    requestAnimationFrame(gameLoop);
    return;
  }
  lastFrameTime = timestamp - (elapsed % FRAME_TIME);
  frameNow = timestamp;

  if (inMainMenu) {
    // Make sure mobile touch zones don't block main menu buttons
    let mc = document.getElementById('mobile-controls');
    if (mc.style.display !== 'none') mc.style.display = 'none';
    drawMainMenu();
  } else {
    if (!paused && !gameOver) {
      update();
    }
    draw();
  }
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

        troubledPerson.movingFollow = false;
        troubledPerson.health = troubledPerson.maxHealth;
        troubledPerson.wolvesSpawned = true;
        troubledPerson.x = player.x + 40;
        troubledPerson.y = player.y;
        // Remove any quest wolves
        for (let i = wolves.length - 1; i >= 0; i--) {
          if (wolves[i].pack === TROUBLED_PACK_ID) wolves.splice(i, 1);
        }
      }
    },
    {
      name: '4. Find the Mine (Boss Fight)',
      done: mineFound,
      status: mineFound ? 'Done' : troubledPersonFound ? 'Active' : 'Locked',
      action: () => {
        quests[2].action(); // complete prerequisites
        // Teleport player and miner near the mine
        player.x = mine.x + 60;
        player.y = mine.y + 60;
        troubledPerson.x = mine.x - 60;
        troubledPerson.y = mine.y + 60;
        troubledPerson.active = true;
        troubledPerson.following = true;
      }
    }
  ];

  debugQuests.innerHTML = quests.map((q, i) => {
    let color = q.done ? '#44ff44' : '#f0e0b0';
    let icon = q.done ? '✓' : '▶';
    let btnStyle = q.done
      ? 'background:#333;color:#666;cursor:default;'
      : 'background:#4a3a10;color:#ffcc44;cursor:pointer;border:1px solid #886a20;';
    return `<div style="margin-bottom:6px;">
      <span style="color:${color};font-size:12px;">${q.done ? '✓' : '•'} ${q.name}</span>
      <span style="color:#aaa;font-size:11px;float:right;">${q.status}</span>
      <br><button onclick="window._debugSkip(${i})" style="${btnStyle}padding:3px 10px;border-radius:4px;font:11px monospace;margin-top:2px;width:100%;">${q.done ? 'Completed' : icon + ' Skip to this quest'}</button>
    </div>`;
  }).join('');

  window._debugSkip = function(idx) {
    if (quests[idx].done) return;
    quests[idx].action();
    updateDebugPanel();
    notify('DEBUG: Skipped to ' + quests[idx].name);
  };
}

setInterval(updateDebugPanel, 500);
</script>
</body>
</html>
