
<!DOCTYPE html>
<html>
<head>
<title>Jungle Rescue Village</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  #game-container { position: relative; display: flex; justify-content: center; align-items: center; }
  canvas { border: 2px solid #2d5a1e; display: block; }
  #ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: #fff; font-family: Arial; font-size: 18px; text-shadow: 1px 1px 2px #000; pointer-events: none; white-space: nowrap; }
  #instructions { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: #fff; font-family: Arial; font-size: 14px; text-shadow: 1px 1px 2px #000; pointer-events: none; white-space: nowrap; }
  .game-btn {
    position: absolute; top: 10px; z-index: 10; cursor: pointer;
    font-family: 'Arial', sans-serif; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;
    color: #f0e8d0; text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    padding: 7px 14px;
    background: linear-gradient(to bottom, #6a5a3a 0%, #4a3a20 50%, #3a2a14 51%, #4a3a20 100%);
    border: 2px solid #8a7a50;
    border-radius: 3px;
    box-shadow: inset 0 1px 0 rgba(255,255,200,0.2), inset 0 -1px 0 rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.5), 0 0 8px rgba(0,0,0,0.3);
  }
  .game-btn:hover {
    background: linear-gradient(to bottom, #7a6a4a 0%, #5a4a30 50%, #4a3a24 51%, #5a4a30 100%);
    border-color: #aa9a60;
    color: #fff;
    box-shadow: inset 0 1px 0 rgba(255,255,200,0.3), inset 0 -1px 0 rgba(0,0,0,0.3), 0 2px 6px rgba(0,0,0,0.6), 0 0 12px rgba(140,120,60,0.2);
  }
  .game-btn:active {
    background: linear-gradient(to bottom, #3a2a14 0%, #4a3a20 50%, #5a4a30 51%, #4a3a20 100%);
    border-color: #6a5a3a;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.4);
    padding: 8px 14px 6px 14px;
  }
  #pause-btn { right: 10px; z-index: 100; }
  #fs-btn { right: 52px; }
  #save-btn { right: 96px; z-index: 100; }
  #pause-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 5; }
  #pause-overlay.active { display: flex; }
  #pause-text { color: #fff; font-family: Arial; font-size: 48px; text-shadow: 2px 2px 4px #000; }
  :fullscreen { background: #000; }
  :fullscreen #game-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; margin: 0; padding: 0; }
  :fullscreen canvas { margin: 0; }

  /* Icon buttons */
  .icon-btn { padding: 8px 10px; line-height: 0; }
  .icon-btn:active { padding: 9px 10px 7px 10px; }

  /* Pause icon - two vertical bars */
  .pause-icon { display: inline-flex; gap: 3px; align-items: center; height: 14px; }
  .pause-icon span { display: block; width: 4px; height: 14px; background: #f0e8d0; border-radius: 1px; }
  .game-btn:hover .pause-icon span { background: #fff; }

  /* Play icon (for resume state) */
  .play-icon { display: inline-block; width: 0; height: 0; border-style: solid; border-width: 7px 0 7px 11px; border-color: transparent transparent transparent #f0e8d0; }
  .game-btn:hover .play-icon { border-left-color: #fff; }

  /* Fullscreen icon - four disconnected corners */
  .fs-icon { display: inline-grid; grid-template-columns: 1fr 1fr; gap: 4px; width: 16px; height: 14px; }
  .corner { display: block; width: 6px; height: 5px; }
  .corner.tl { border-top: 2.5px solid #f0e8d0; border-left: 2.5px solid #f0e8d0; }
  .corner.tr { border-top: 2.5px solid #f0e8d0; border-right: 2.5px solid #f0e8d0; }
  .corner.bl { border-bottom: 2.5px solid #f0e8d0; border-left: 2.5px solid #f0e8d0; }
  .corner.br { border-bottom: 2.5px solid #f0e8d0; border-right: 2.5px solid #f0e8d0; }
  .game-btn:hover .corner { border-color: #fff; }

  /* Mobile layout */
  #mobile-controls { display: none; }
  @media (min-width: 1025px) {
    #mobile-controls { display: none !important; }
  }
  #rotate-prompt { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; justify-content: center; align-items: center; flex-direction: column; color: #f0e8d0; font-family: Arial; text-align: center; }
  #rotate-prompt .rotate-icon { font-size: 60px; margin-bottom: 20px; }
  #rotate-prompt .rotate-text { font-size: 20px; }

  @media (max-width: 1024px) and (pointer: coarse) {
    body { background: #000; }
    #game-container { flex-direction: row; width: 100vw; height: 100vh; }
    canvas { border: none; }
    #mobile-controls { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
    .touch-zone { pointer-events: auto; position: absolute; top: 50px; height: calc(100% - 50px); display: flex; justify-content: center; align-items: center; }
    .touch-zone-left { left: 0; width: 120px; background: rgba(0,0,0,0.85); flex-direction: column; gap: 10px; }
    .touch-zone-right { right: 0; width: 120px; background: rgba(0,0,0,0.85); flex-direction: column; gap: 16px; }
    #minimap-canvas { width: 100px; height: 100px; background: rgba(0,30,0,0.7); border: 1px solid #4a4; display: block; }
    .mobile-action-btn { width: 70px; height: 50px; border-radius: 8px; background: linear-gradient(to bottom, #6a5a3a, #3a2a14); border: 2px solid #8a7a50; color: #f0e8d0; font-family: Arial; font-weight: bold; font-size: 11px; text-transform: uppercase; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 1px 0 rgba(255,255,200,0.2), 0 2px 6px rgba(0,0,0,0.5); touch-action: none; user-select: none; -webkit-user-select: none; }
    .mobile-action-btn:active { background: linear-gradient(to bottom, #3a2a14, #4a3a20); }
    .mobile-circle-btn { width: 70px; height: 70px; border-radius: 50%; }
    #joystick-area { width: 100px; height: 100px; position: relative; touch-action: none; user-select: none; -webkit-user-select: none; }
    #joystick-base { width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 2px solid rgba(138,122,80,0.5); position: absolute; top: 0; left: 0; }
    #joystick-thumb { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(to bottom, #6a5a3a, #3a2a14); border: 2px solid #8a7a50; position: absolute; top: 30px; left: 30px; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
    #fs-btn { display: none !important; }
    #save-btn { right: auto; left: 10px; transform: none; top: 10px; padding: 0; font-size: 11px; line-height: 1.2; text-align: center; width: 62px; height: 40px; box-sizing: border-box; display: flex; justify-content: center; align-items: center; }
    #pause-btn { right: auto; left: 78px; top: 10px; padding: 0; width: 40px; height: 40px; box-sizing: border-box; display: flex; justify-content: center; align-items: center; }
  }
  @media (max-width: 1024px) and (pointer: coarse) and (orientation: portrait) {
    #rotate-prompt { display: flex; }
    #game-container { display: none; }
    #mobile-controls { display: none; }
  }
</style>
</head>
<body>
<div id="game-container">
<div id="ui" style="display:none"><span id="rescued">0</span><span id="total">0</span><span id="village">0</span></div>
<button id="pause-btn" class="game-btn icon-btn" title="Pause" style="display:none"><span class="pause-icon"><span></span><span></span></span></button>
<button id="fs-btn" class="game-btn icon-btn" title="Fullscreen" style="display:none"><span class="fs-icon"><span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span></span></button>
<button id="save-btn" class="game-btn" style="display:none">Save & Quit</button>
<div id="debug-panel" style="display:none;position:absolute;top:10px;left:10px;z-index:999;background:rgba(0,0,0,0.85);border:2px solid #ffaa00;border-radius:8px;padding:12px;color:#fff;font:13px monospace;min-width:220px;pointer-events:auto;">
  <div style="color:#ffaa00;font-weight:bold;font-size:14px;margin-bottom:8px;border-bottom:1px solid #555;padding-bottom:4px;">DEBUG - Quest Skip <span id="debug-close" style="float:right;cursor:pointer;color:#888;">[`]</span></div>
  <div id="debug-quests"></div>
</div>
<div id="pause-overlay"><span id="pause-text">PAUSED</span></div>
<canvas id="game"></canvas>
</div>
<div id="mobile-controls">
  <div class="touch-zone touch-zone-left">
    <button id="cycle-btn" class="mobile-action-btn">ITEM</button>
    <button id="use-btn" class="mobile-action-btn">USE</button>
    <button id="whip-btn" class="mobile-action-btn mobile-circle-btn">WHIP</button>
  </div>
  <div class="touch-zone touch-zone-right">
    <div id="joystick-area">
      <div id="joystick-base"></div>
      <div id="joystick-thumb"></div>
    </div>
    <canvas id="minimap-canvas" width="100" height="100"></canvas>
  </div>
</div>
<div id="rotate-prompt">
  <div class="rotate-icon">📱↩️</div>
  <div class="rotate-text">Rotate your device to landscape</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Make canvas fill the screen
canvas.width = 800;
canvas.height = 600;

// Fullscreen
const fsBtn = document.getElementById('fs-btn');
const gameContainer = document.getElementById('game-container');
fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    gameContainer.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
});
function resizeCanvas() {
  if (document.fullscreenElement) {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    fsBtn.innerHTML = '<span class="fs-icon"><span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span></span>';
    fsBtn.title = 'Exit Fullscreen';
  } else {
    canvas.width = 800;
    canvas.height = 600;
    fsBtn.innerHTML = '<span class="fs-icon"><span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span></span>';
    fsBtn.title = 'Fullscreen';
  }
}
document.addEventListener('fullscreenchange', resizeCanvas);
window.addEventListener('resize', () => { if (document.fullscreenElement) resizeCanvas(); });

// Fullscreen button

// --- GAME WORLD ---
const WORLD_W = 2400;
const WORLD_H = 2400;

// Camera
let camX = 0;
let camY = 0;

// Player
const player = {
  x: WORLD_W / 2,
  y: WORLD_H / 2,
  w: 28,
  h: 36,
  speed: 3,
  color: '#6b3a1a',
  carrying: 0, // how many survivors following
  facing: 'down'
};

// Village area (center of map)
const village = {
  x: WORLD_W / 2 - 120,
  y: WORLD_H / 2 - 120,
  w: 240,
  h: 240,
  population: 0,
  buildings: []
};

// Generate jungle trees
const trees = [];
for (let i = 0; i < 600; i++) {
  let tx = Math.random() * WORLD_W;
  let ty = Math.random() * WORLD_H;
  // Don't place trees in the village
  if (tx > village.x - 20 && tx < village.x + village.w + 20 &&
      ty > village.y - 20 && ty < village.y + village.h + 20) continue;
  trees.push({
    x: tx, y: ty,
    size: 15 + Math.random() * 25,
    shade: `rgb(${20 + Math.random()*40}, ${80 + Math.random()*60}, ${15 + Math.random()*30})`,
    type: Math.floor(Math.random() * 2), // 0=palm, 1=big leafy
    sway: Math.random() * 100 // offset for wind animation
  });
}

// Dense border forest trees (extends beyond map edges)
const BORDER = 150;
const borderTrees = [];
const borderExt = 500; // how far beyond map edges to place trees
for (let i = 0; i < 3000; i++) {
  let bx, by;
  let side = Math.floor(Math.random() * 4);
  if (side === 0) { bx = -borderExt + Math.random() * (WORLD_W + borderExt * 2); by = -borderExt + Math.random() * (BORDER + borderExt); }
  else if (side === 1) { bx = -borderExt + Math.random() * (WORLD_W + borderExt * 2); by = WORLD_H - BORDER + Math.random() * (BORDER + borderExt); }
  else if (side === 2) { bx = -borderExt + Math.random() * (BORDER + borderExt); by = -borderExt + Math.random() * (WORLD_H + borderExt * 2); }
  else { bx = WORLD_W - BORDER + Math.random() * (BORDER + borderExt); by = -borderExt + Math.random() * (WORLD_H + borderExt * 2); }
  borderTrees.push({
    x: bx, y: by,
    size: 20 + Math.random() * 20,
    shade: `rgb(${10 + Math.random()*25}, ${50 + Math.random()*40}, ${10 + Math.random()*20})`
  });
}

// Ground clutter - fallen logs and bushes
const clutter = [];
for (let i = 0; i < 200; i++) {
  let cx = Math.random() * WORLD_W;
  let cy = Math.random() * WORLD_H;
  // Don't place in village
  if (cx > village.x - 20 && cx < village.x + village.w + 20 &&
      cy > village.y - 20 && cy < village.y + village.h + 20) continue;
  clutter.push({
    x: cx, y: cy,
    type: 'log',
    angle: Math.random() * Math.PI,
    size: 8 + Math.random() * 12,
    shade: `rgb(${30 + Math.random()*30}, ${90 + Math.random()*50}, ${20 + Math.random()*25})`
  });
}

// Rivers - generate winding paths that start from random edges and split
const rivers = [];
const RIVER_WIDTH = 28;

// Village zone to avoid (with generous padding)
const villagePad = 60;
const vzLeft = village.x - villagePad;
const vzRight = village.x + village.w + villagePad;
const vzTop = village.y - villagePad;
const vzBot = village.y + village.h + villagePad;

function inVillageZone(px, py) {
  return px > vzLeft && px < vzRight && py > vzTop && py < vzBot;
}

// Check if point is near any already-placed river
function nearExistingRiver(px, py, dist) {
  for (const river of rivers) {
    for (let i = 0; i < river.length - 1; i++) {
      let ax = river[i].x, ay = river[i].y;
      let bx = river[i+1].x, by = river[i+1].y;
      let dx2 = bx - ax, dy2 = by - ay;
      let len2 = dx2 * dx2 + dy2 * dy2;
      if (len2 === 0) continue;
      let t = Math.max(0, Math.min(1, ((px - ax) * dx2 + (py - ay) * dy2) / len2));
      let projX = ax + t * dx2, projY = ay + t * dy2;
      if (Math.hypot(px - projX, py - projY) < dist) return true;
    }
  }
  return false;
}

function generateRiver(startX, startY, dirX, dirY, length) {
  let river = [];
  let rx = startX, ry = startY;
  let dx = dirX, dy = dirY;
  for (let step = 0; step < length; step++) {
    // Skip village zone — steer around it
    if (inVillageZone(rx, ry)) {
      // Push away from village center
      let vcx = village.x + village.w / 2;
      let vcy = village.y + village.h / 2;
      let awayX = rx - vcx;
      let awayY = ry - vcy;
      let awayMag = Math.hypot(awayX, awayY) || 1;
      dx = awayX / awayMag;
      dy = awayY / awayMag;
      rx += dx * 50;
      ry += dy * 50;
      continue;
    }

    // Stop if overlapping another river
    if (nearExistingRiver(rx, ry, RIVER_WIDTH * 2.5)) break;

    river.push({ x: rx, y: ry });

    // Wander the direction slightly
    dx += (Math.random() - 0.5) * 0.4;
    dy += (Math.random() - 0.5) * 0.4;
    let mag = Math.hypot(dx, dy);
    dx = (dx / mag);
    dy = (dy / mag);
    rx += dx * (35 + Math.random() * 15);
    ry += dy * (35 + Math.random() * 15);

    // Stop if off the map
    if (rx < -50 || rx > WORLD_W + 50 || ry < -50 || ry > WORLD_H + 50) break;
  }
  return river;
}

// Pick random start edges and directions
for (let r = 0; r < 3; r++) {
  let startX, startY, dirX, dirY;
  let edge = Math.floor(Math.random() * 4);
  if (edge === 0) { // top
    startX = 200 + Math.random() * (WORLD_W - 400);
    startY = 0;
    dirX = (Math.random() - 0.5) * 0.6;
    dirY = 1;
  } else if (edge === 1) { // bottom
    startX = 200 + Math.random() * (WORLD_W - 400);
    startY = WORLD_H;
    dirX = (Math.random() - 0.5) * 0.6;
    dirY = -1;
  } else if (edge === 2) { // left
    startX = 0;
    startY = 200 + Math.random() * (WORLD_H - 400);
    dirX = 1;
    dirY = (Math.random() - 0.5) * 0.6;
  } else { // right
    startX = WORLD_W;
    startY = 200 + Math.random() * (WORLD_H - 400);
    dirX = -1;
    dirY = (Math.random() - 0.5) * 0.6;
  }

  // Don't start near the village
  if (inVillageZone(startX, startY)) continue;

  let main = generateRiver(startX, startY, dirX, dirY, 80);
  if (main.length < 5) continue; // too short, skip
  rivers.push(main);
}

// Remove rivers that don't reach from one edge of the map to another
const edgeMargin = 80;
function atEdge(p) {
  return p.x <= edgeMargin || p.x >= WORLD_W - edgeMargin ||
         p.y <= edgeMargin || p.y >= WORLD_H - edgeMargin;
}
for (let i = rivers.length - 1; i >= 0; i--) {
  let r = rivers[i];
  if (r.length < 3 || !atEdge(r[0]) || !atEdge(r[r.length - 1])) {
    rivers.splice(i, 1);
  }
}

// Helper: check if a point is near any river
function nearRiver(px, py, dist) {
  for (const river of rivers) {
    for (let i = 0; i < river.length - 1; i++) {
      let ax = river[i].x, ay = river[i].y;
      let bx = river[i+1].x, by = river[i+1].y;
      let dx2 = bx - ax, dy2 = by - ay;
      let len2 = dx2 * dx2 + dy2 * dy2;
      let t = Math.max(0, Math.min(1, ((px - ax) * dx2 + (py - ay) * dy2) / len2));
      let projX = ax + t * dx2, projY = ay + t * dy2;
      if (Math.hypot(px - projX, py - projY) < dist) return true;
    }
  }
  return false;
}

// Bridges - place 2-3 per river, only at straight sections
const bridges = [];
for (const river of rivers) {
  if (river.length < 6) continue;
  let spacing = Math.floor(river.length / 4);
  for (let b = 1; b <= 3; b++) {
    let target = Math.min(b * spacing, river.length - 3);
    // Search nearby for a straight section
    let bestIdx = -1;
    let bestAngleDiff = Infinity;
    let searchRange = Math.min(6, Math.floor(spacing / 2));
    for (let s = -searchRange; s <= searchRange; s++) {
      let idx = target + s;
      if (idx < 1 || idx >= river.length - 2) continue;
      // Angle between previous segment and next segment
      let a1 = Math.atan2(river[idx].y - river[idx-1].y, river[idx].x - river[idx-1].x);
      let a2 = Math.atan2(river[idx+1].y - river[idx].y, river[idx+1].x - river[idx].x);
      let diff = Math.abs(a2 - a1);
      if (diff > Math.PI) diff = Math.PI * 2 - diff;
      if (diff < bestAngleDiff) {
        bestAngleDiff = diff;
        bestIdx = idx;
      }
    }
    // Only place bridge if the turn is gentle enough (less than ~30 degrees)
    if (bestIdx >= 0 && bestAngleDiff < 0.5) {
      let p = river[bestIdx];
      let pNext = river[bestIdx + 1];
      let angle = Math.atan2(pNext.y - p.y, pNext.x - p.x);
      bridges.push({
        x: p.x,
        y: p.y,
        angle: angle,
        w: RIVER_WIDTH + 16,
        h: 20
      });
    }
  }
}

// Helper: check if a point is on a bridge
function onBridge(px, py) {
  for (const br of bridges) {
    // Rotate point into bridge's local space
    let cos = Math.cos(-br.angle + Math.PI / 2);
    let sin = Math.sin(-br.angle + Math.PI / 2);
    let lx = (px - br.x) * cos - (py - br.y) * sin;
    let ly = (px - br.x) * sin + (py - br.y) * cos;
    if (Math.abs(lx) < br.h / 2 + 4 && Math.abs(ly) < br.w / 2 + 4) return true;
  }
  return false;
}

// Remove trees that overlap rivers or bridges
for (let i = trees.length - 1; i >= 0; i--) {
  if (nearRiver(trees[i].x, trees[i].y, RIVER_WIDTH + 10)) trees.splice(i, 1);
  else {
    for (const br of bridges) {
      if (Math.hypot(trees[i].x - br.x, trees[i].y - br.y) < 30) {
        trees.splice(i, 1);
        break;
      }
    }
  }
}

// Remove clutter that overlaps rivers or border
for (let i = clutter.length - 1; i >= 0; i--) {
  let c = clutter[i];
  if (nearRiver(c.x, c.y, RIVER_WIDTH + 5) ||
      c.x < BORDER || c.x > WORLD_W - BORDER ||
      c.y < BORDER || c.y > WORLD_H - BORDER) {
    clutter.splice(i, 1);
  }
}

// Remove bridges that are in the border zone
for (let i = bridges.length - 1; i >= 0; i--) {
  let br = bridges[i];
  if (br.x < BORDER || br.x > WORLD_W - BORDER ||
      br.y < BORDER || br.y > WORLD_H - BORDER) {
    bridges.splice(i, 1);
  }
}

// Crash sites
const crashSites = [];
const crashTypes = ['plane', 'helicopter'];
for (let i = 0; i < 8; i++) {
  let cx, cy;
  do {
    cx = 150 + Math.random() * (WORLD_W - 300);
    cy = 150 + Math.random() * (WORLD_H - 300);
  } while ((Math.abs(cx - WORLD_W/2) < 200 && Math.abs(cy - WORLD_H/2) < 200) ||
    nearRiver(cx, cy, RIVER_WIDTH + 15));

  crashSites.push({
    x: cx, y: cy,
    type: crashTypes[Math.floor(Math.random() * 2)],
    survivors: 1 + Math.floor(Math.random() * 3),
    rescued: false,
    smoke: []
  });
}

// Mine location (placed far from village)
let mineX, mineY;
do {
  mineX = BORDER + 100 + Math.random() * (WORLD_W - BORDER * 2 - 200);
  mineY = BORDER + 100 + Math.random() * (WORLD_H - BORDER * 2 - 200);

// Global walk timer for animation
let walkTimer = 0;

// Draw a person with head, torso, arms, legs that animate
function drawBean(x, y, size, bodyColor, facingDir, isPlayer, isMoving, isMiner) {
  const s = size;
  ctx.save();
  ctx.translate(x, y);

  // Walk animation - swing arms and legs
  let swing = isMoving ? Math.sin(walkTimer * 0.15) * 0.6 : 0;
  let armSwing = isMoving ? Math.sin(walkTimer * 0.15) * 0.5 : 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0, s * 0.7, s * 0.3, s * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();

  const skinColor = '#f5c28a';
  const shoeColor = '#333';
  const pantsColor = isPlayer ? '#8a7a55' : isMiner ? '#5a4a3a' : '#3355aa';
  const limbWidth = s * 0.1;

  // --- LEGS ---
  ctx.lineCap = 'round';
  ctx.lineWidth = limbWidth;

  // Left leg
  ctx.strokeStyle = pantsColor;
  let lLegAngle = swing;
  let lFootX = Math.sin(lLegAngle) * s * 0.2;
  let lFootY = s * 0.65;
  ctx.beginPath();
  ctx.moveTo(-s * 0.1, s * 0.2);
  ctx.lineTo(-s * 0.1 + lFootX, lFootY);
  ctx.stroke();
  // Shoe
  ctx.fillStyle = shoeColor;
  ctx.beginPath();
  ctx.arc(-s * 0.1 + lFootX, lFootY, s * 0.06, 0, Math.PI * 2);
  ctx.fill();

  // Right leg
  let rLegAngle = -swing;
  let rFootX = Math.sin(rLegAngle) * s * 0.2;
  let rFootY = s * 0.65;
  ctx.strokeStyle = pantsColor;
  ctx.beginPath();
  ctx.moveTo(s * 0.1, s * 0.2);
  ctx.lineTo(s * 0.1 + rFootX, rFootY);
  ctx.stroke();
  // Shoe
  ctx.fillStyle = shoeColor;
  ctx.beginPath();
  ctx.arc(s * 0.1 + rFootX, rFootY, s * 0.06, 0, Math.PI * 2);
  ctx.fill();

  // --- TORSO ---
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.roundRect(-s * 0.2, -s * 0.15, s * 0.4, s * 0.4, s * 0.08);
  ctx.fill();
  ctx.strokeStyle = shadeColor(bodyColor, -30);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(-s * 0.2, -s * 0.15, s * 0.4, s * 0.4, s * 0.08);
  ctx.stroke();

  // --- ARMS ---
  ctx.lineWidth = limbWidth;
  ctx.lineCap = 'round';

  // Left arm
  ctx.strokeStyle = skinColor;
  let lArmSwing = -armSwing;
  let lHandX = -s * 0.28 + Math.sin(lArmSwing) * s * 0.12;
  let lHandY = s * 0.15 + Math.cos(lArmSwing) * s * 0.05;
  ctx.beginPath();
  ctx.moveTo(-s * 0.2, -s * 0.05);
  ctx.lineTo(lHandX, lHandY);
  ctx.stroke();
  // Hand
  ctx.fillStyle = skinColor;
  ctx.beginPath();
  ctx.arc(lHandX, lHandY, s * 0.05, 0, Math.PI * 2);
  ctx.fill();

  // Right arm
  let rArmSwing = armSwing;
  let rHandX = s * 0.28 + Math.sin(rArmSwing) * s * 0.12;
  let rHandY = s * 0.15 + Math.cos(rArmSwing) * s * 0.05;
  ctx.strokeStyle = skinColor;
  ctx.beginPath();
  ctx.moveTo(s * 0.2, -s * 0.05);
  ctx.lineTo(rHandX, rHandY);
  ctx.stroke();
  // Hand
  ctx.fillStyle = skinColor;
  ctx.beginPath();
  ctx.arc(rHandX, rHandY, s * 0.05, 0, Math.PI * 2);
  ctx.fill();

  // --- HEAD ---
  // Neck
  ctx.fillStyle = skinColor;
  ctx.fillRect(-s * 0.06, -s * 0.25, s * 0.12, s * 0.12);

  // Head circle
  ctx.fillStyle = skinColor;
  ctx.beginPath();
  ctx.arc(0, -s * 0.38, s * 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#d4a06a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, -s * 0.38, s * 0.2, 0, Math.PI * 2);
  ctx.stroke();

  // Hair
  ctx.fillStyle = '#5a3510';
  ctx.beginPath();
  ctx.arc(0, -s * 0.42, s * 0.2, Math.PI, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, -s * 0.52, s * 0.12, s * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();

  // Face
  if (facingDir !== 'up') {
    let eyeOff = facingDir === 'left' ? -s * 0.03 : facingDir === 'right' ? s * 0.03 : 0;
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(eyeOff - s * 0.07, -s * 0.4, s * 0.045, s * 0.05, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(eyeOff + s * 0.07, -s * 0.4, s * 0.045, s * 0.05, 0, 0, Math.PI * 2);
    ctx.fill();
    // Pupils
    let pupilOff = facingDir === 'left' ? -s * 0.02 : facingDir === 'right' ? s * 0.02 : 0;
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(eyeOff - s * 0.07 + pupilOff, -s * 0.39, s * 0.025, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(eyeOff + s * 0.07 + pupilOff, -s * 0.39, s * 0.025, 0, Math.PI * 2);
    ctx.fill();
    // Smile - confident smirk: flat left side, curved up on the right
    ctx.strokeStyle = '#884422';
    ctx.lineWidth = s * 0.03;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(eyeOff + s * 0.08, -s * 0.27);
    ctx.lineTo(eyeOff - s * 0.02, -s * 0.27);
    ctx.quadraticCurveTo(eyeOff - s * 0.1, -s * 0.27, eyeOff - s * 0.1, -s * 0.32);
    ctx.stroke();
  }

  // Player gets Indiana Jones style
  if (isPlayer) {
    // Satchel bag strap
    ctx.strokeStyle = '#5a3010';
    ctx.lineWidth = s * 0.04;
    ctx.beginPath();
    ctx.moveTo(-s * 0.15, -s * 0.15);
    ctx.lineTo(s * 0.15, s * 0.15);
    ctx.stroke();
    // Satchel bag
    ctx.fillStyle = '#7a4a20';
    ctx.beginPath();
    ctx.roundRect(s * 0.1, s * 0.05, s * 0.15, s * 0.12, 2);
    ctx.fill();
    ctx.strokeStyle = '#5a3010';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    // Bag flap
    ctx.fillStyle = '#6a3a15';
    ctx.fillRect(s * 0.1, s * 0.05, s * 0.15, s * 0.04);
    // Bag buckle
    ctx.fillStyle = '#bb9944';
    ctx.fillRect(s * 0.15, s * 0.06, s * 0.04, s * 0.03);

    // Fedora hat
    // Brim
    ctx.fillStyle = '#5a3a18';
    ctx.beginPath();
    ctx.ellipse(0, -s * 0.42, s * 0.3, s * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();
    // Crown
    ctx.fillStyle = '#6a4420';
    ctx.beginPath();
    ctx.moveTo(-s * 0.18, -s * 0.42);
    ctx.quadraticCurveTo(-s * 0.18, -s * 0.58, -s * 0.06, -s * 0.58);
    ctx.lineTo(s * 0.06, -s * 0.58);
    ctx.quadraticCurveTo(s * 0.18, -s * 0.58, s * 0.18, -s * 0.42);
    ctx.closePath();
    ctx.fill();
    // Crown dent
    ctx.fillStyle = '#5a3a18';
    ctx.beginPath();
    ctx.moveTo(-s * 0.08, -s * 0.58);
    ctx.quadraticCurveTo(0, -s * 0.53, s * 0.08, -s * 0.58);
    ctx.closePath();
    ctx.fill();
    // Hat band
    ctx.fillStyle = '#3a2008';
    ctx.fillRect(-s * 0.18, -s * 0.44, s * 0.36, s * 0.03);

    // Whip (coiled at hip when still, trailing when moving)
    ctx.strokeStyle = '#3a2008';
    ctx.lineWidth = s * 0.03;
    ctx.lineCap = 'round';
    // Coiled at hip
    ctx.beginPath();
    ctx.arc(-s * 0.22, s * 0.12, s * 0.06, 0, Math.PI * 1.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(-s * 0.22, s * 0.12, s * 0.03, 0, Math.PI * 1.2);
    ctx.stroke();

    // Belt
    ctx.fillStyle = '#3a2008';
    ctx.fillRect(-s * 0.2, s * 0.08, s * 0.4, s * 0.03);
    // Belt buckle
    ctx.fillStyle = '#bb9944';
    ctx.fillRect(-s * 0.03, s * 0.075, s * 0.06, s * 0.04);
  }

  // Miner style
  if (isMiner) {
    // Hard hat
    ctx.fillStyle = '#ddaa00';
    ctx.beginPath();
    ctx.ellipse(0, -s * 0.42, s * 0.25, s * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();
    // Hat dome
    ctx.fillStyle = '#eebb10';
    ctx.beginPath();
    ctx.arc(0, -s * 0.48, s * 0.18, Math.PI, 0);
    ctx.closePath();
    ctx.fill();
    // Hat ridge
    ctx.fillStyle = '#cc9900';
    ctx.fillRect(-s * 0.18, -s * 0.44, s * 0.36, s * 0.03);
    // Headlamp
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, -s * 0.45, s * 0.04, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffff88';
    ctx.beginPath();
    ctx.arc(0, -s * 0.45, s * 0.025, 0, Math.PI * 2);
    ctx.fill();

    // Pickaxe on back (idle)
    ctx.strokeStyle = '#7a5a20';
    ctx.lineWidth = s * 0.04;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-s * 0.15, -s * 0.25);
    ctx.lineTo(-s * 0.3, s * 0.15);
    ctx.stroke();
    // Pickaxe head
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.moveTo(-s * 0.22, -s * 0.28);
    ctx.lineTo(-s * 0.08, -s * 0.22);
    ctx.lineTo(-s * 0.1, -s * 0.18);
    ctx.lineTo(-s * 0.24, -s * 0.24);
    ctx.closePath();
    ctx.fill();

    // Belt with tool loops
    ctx.fillStyle = '#5a3a10';
    ctx.fillRect(-s * 0.2, s * 0.08, s * 0.4, s * 0.035);
    ctx.fillStyle = '#bb9944';
    ctx.fillRect(-s * 0.03, s * 0.075, s * 0.06, s * 0.04);
  }

  ctx.restore();
}

// Helper to darken/lighten a hex color
function shadeColor(color, percent) {
  if (color.startsWith('hsl')) return color;
  let num = parseInt(color.replace('#',''), 16);
  let r = Math.min(255, Math.max(0, (num >> 16) + percent));
  let g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
  let b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
  return `rgb(${r},${g},${b})`;
}

// Watchtower jobs system

// Click on watchtower or menu
canvas.addEventListener('click', e => {
  // Tap to advance NPC speech bubble (mobile)
  if (troubledPerson.speechWaiting && troubledPerson.speechTimer > 0) {
    window.dispatchEvent(new KeyboardEvent('keydown', { key: ' ' }));
    return;
  }

  if (gameOver) {
    window.dispatchEvent(new KeyboardEvent('keydown', { key: 'R' }));
    return;
  }
  let rect = canvas.getBoundingClientRect();
  let scaleX = canvas.width / rect.width;
  let scaleY = canvas.height / rect.height;
  let mx = (e.clientX - rect.left) * scaleX;
  let my = (e.clientY - rect.top) * scaleY;

  // Quest tracker toggle
  {
    let qx = 6, qy = 34, btnW = 90, btnH = 22;
    if (mx >= qx && mx <= qx + btnW && my >= qy && my <= qy + btnH) {
      questTrackerOpen = !questTrackerOpen;
      return;
    }
  }

  if (watchtowerMenuOpen) {
    // Check menu button clicks
    let menuW = 220, menuH = 200;
    let menuX = canvas.width / 2 - menuW / 2;
    let menuY = canvas.height / 2 - menuH / 2;
    let jobKeys = Object.keys(watchtowerJobs);
    let totalAssigned = jobKeys.reduce((s, k) => s + watchtowerJobs[k].assigned, 0);
    let available = village.population - totalAssigned;

    for (let i = 0; i < jobKeys.length; i++) {
      let job = watchtowerJobs[jobKeys[i]];
      let btnY = menuY + 45 + i * 45;
      // Plus button
      if (mx > menuX + menuW - 55 && mx < menuX + menuW - 35 && my > btnY && my < btnY + 20) {
        if (job.assigned < job.max && available > 0) {
          job.assigned++;
          notify(`Assigned ${job.name}!`);
        }
      }
      // Minus button
      if (mx > menuX + menuW - 30 && mx < menuX + menuW - 10 && my > btnY && my < btnY + 20) {
        if (job.assigned > 0) {
          job.assigned--;
          notify(`Removed ${job.name}`);
        }
      }
    }
    // Close button
    if (mx > menuX + menuW - 25 && mx < menuX + menuW - 5 && my > menuY + 5 && my < menuY + 25) {
      watchtowerMenuOpen = false;
    }
    return;
  }

  // Check if clicked on quest NPC
  if (questMenuOpen) {
    let menuW = 260, menuH = 160;
    let menuX = canvas.width / 2 - menuW / 2;
    let menuY = canvas.height / 2 - menuH / 2;
    // Close button
    if (mx > menuX + menuW - 25 && mx < menuX + menuW - 5 && my > menuY + 5 && my < menuY + 25) {
      questMenuOpen = false;
      questMenuTarget = -1;
    }
    // Accept/Turn-in button
    let btnX = menuX + menuW / 2 - 50;
    let btnY = menuY + menuH - 40;
    if (mx > btnX && mx < btnX + 100 && my > btnY && my < btnY + 28) {
      let quest = activeQuests.find(q => q.giver === questMenuTarget);
      if (quest && !quest.accepted) {
        quest.accepted = true;
        notify(`Quest accepted: ${quest.desc}`);
        questMenuOpen = false;
        questMenuTarget = -1;
      } else if (quest && quest.done && !quest.turned_in) {
        // Turn in - give reward
        let emptySlot = inventory.slots.indexOf(null);
        if (emptySlot !== -1) {
          inventory.slots[emptySlot] = quest.reward;
          notify(`Quest complete! Received ${ITEM_TYPES[quest.reward].name}!`);
        } else {
          notify(`Quest complete! But inventory full - ${ITEM_TYPES[quest.reward].name} dropped!`);
          worldItems.push({ x: player.x + 20, y: player.y, type: quest.reward, collected: false });
        }
        quest.turned_in = true;
        villagePeople[quest.giver].hasQuest = false;
        questMenuOpen = false;
        questMenuTarget = -1;
      } else if (quest && quest.type === 'gather_food') {
        // Try to hand in food from inventory
        let needed = quest.need - quest.progress;
        for (let i = 0; i < inventory.slots.length && needed > 0; i++) {
          if (inventory.slots[i] === 'food') {
            inventory.slots[i] = null;
            quest.progress++;
            needed--;
          }
        }
        if (quest.progress >= quest.need) quest.done = true;
      } else if (quest && quest.type === 'gather_medkit') {
        // Try to hand in medkits from inventory
        let needed = quest.need - quest.progress;
        for (let i = 0; i < inventory.slots.length && needed > 0; i++) {
          if (inventory.slots[i] === 'medkit') {
            inventory.slots[i] = null;
            quest.progress++;
            needed--;
          }
        }
        if (quest.progress >= quest.need) quest.done = true;
      }
    }
    return;
  }

  // Check if clicked on a quest NPC in village
  {
    let worldX = mx + camX;
    let worldY = my + camY;
    let pInVillage = player.x > village.x && player.x < village.x + village.w && player.y > village.y && player.y < village.y + village.h;
    if (pInVillage) {
      for (let i = 0; i < villagePeople.length; i++) {
        let vp = villagePeople[i];
        if (!vp.hasQuest) continue;
        if (Math.abs(worldX - vp.x) < 18 && Math.abs(worldY - vp.y) < 24) {
          questMenuOpen = true;
          questMenuTarget = i;
          return;
        }
      }
    }
  }

  // Check if clicked on watchtower building
  let tower = village.buildings.find(b => b.name === 'Watchtower');
  if (tower) {
    let worldX = mx + camX;
    let worldY = my + camY;
    let pInVillage = player.x > village.x && player.x < village.x + village.w && player.y > village.y && player.y < village.y + village.h;
    if (worldX > tower.x - 10 && worldX < tower.x + tower.w + 10 &&
        worldY > tower.y - 20 && worldY < tower.y + tower.h + 10) {
      if (pInVillage) {
        watchtowerMenuOpen = true;
      } else {
        notify('Go to the village to use the Watchtower!');
      }
    }
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Notification system
let notification = '';
let notifyTimer = 0;
let helpYellTriggered = false;
let helpYellActive = false;
let helpYellX = 0;
let troubledPersonFound = false;
let mineFound = false;
const mineScene = { active: false, phase: '', fadeTimer: 0, fadeIn: 0 };
const BOSS_PACK_ID = 98;
let bossWolf = null;
const troubledPerson = {
  x: 320, y: 320,
  facing: 'down',
  active: false,
  found: false,
  following: false,
  movingFollow: false,
  wolvesSpawned: false,
  attackTimer: 0,
  walkTimer: 0,
  health: 8,
  maxHealth: 8,
  hurtTimer: 0,
  invincible: 0,
  whip: { active: false, timer: 0, x: 0, y: 0, endX: 0, endY: 0 },
  speechText: '',
  speechTimer: 0,
  speechPhase: 0,
  speechWaiting: false
};
const TROUBLED_PACK_ID = 99;
function notify(msg) {
  notification = msg;

}

// Wolf collision check
function wolfBlocked(wx, wy) {
  if (wx < BORDER || wx > WORLD_W - BORDER || wy < BORDER || wy > WORLD_H - BORDER) return true;
  if (inVillageZone(wx, wy)) return true;
  if (nearRiver(wx, wy, RIVER_WIDTH * 0.5) && !onBridge(wx, wy)) return true;
  for (const tree of trees) {
    if (tree.size < 20) continue;
    if (Math.hypot(wx - tree.x, wy - tree.y) < tree.size * 0.4) return true;
  }
  for (const c of clutter) {
    if (Math.hypot(wx - c.x, wy - c.y) < c.size * 0.5) return true;
  }
  return false;
}

// Whip attack
const whip = { active: false, timer: 0, x: 0, y: 0, endX: 0, endY: 0, length: 90 };
window.addEventListener('keydown', e => {
  let inVillage = player.x > village.x && player.x < village.x + village.w && player.y > village.y && player.y < village.y + village.h;
  if ((e.key === 'f' || e.key === 'F') && !whip.active && !gameOver && !paused && !inVillage) {
    whip.active = true;
    whip.timer = 20;
    // Direction based on player facing
    let dx = 0, dy = 0;
    if (player.facing === 'up') dy = -1;
    else if (player.facing === 'down') dy = 1;
    else if (player.facing === 'left') dx = -1;
    else if (player.facing === 'right') dx = 1;
    whip.x = player.x;
    whip.y = player.y;
    let range = whip.length;
    whip.endX = player.x + dx * range;
    whip.endY = player.y + dy * range;
    // Check if whip hits any wolf
    for (const wolf of wolves) {
      // Check distance from wolf to whip line
      let wdx = whip.endX - whip.x;
      let wdy = whip.endY - whip.y;
      let len2 = wdx * wdx + wdy * wdy;
      let t = Math.max(0, Math.min(1, ((wolf.x - whip.x) * wdx + (wolf.y - whip.y) * wdy) / len2));
      let projX = whip.x + t * wdx;
      let projY = whip.y + t * wdy;
      let dist = Math.hypot(wolf.x - projX, wolf.y - projY);
      if (dist < 25) {
        // Damage and knock wolf back
        wolf.health--;
        let kbAngle = Math.atan2(wolf.y - player.y, wolf.x - player.x);
        wolf.x += Math.cos(kbAngle) * 40;
        wolf.y += Math.sin(kbAngle) * 40;
        wolf.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, wolf.x));
        wolf.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, wolf.y));
        wolf.state = 'wander';
        wolf.angle = kbAngle;
      }
    }
  }
});

// --- UPDATE ---
function update() {
  // Player movement (disabled during mine cutscene)
  let dx = 0, dy = 0;
  if (!mineScene.active || mineScene.phase === 'speech' || mineScene.phase === 'boss') {
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) { dx = -1; player.facing = 'left'; }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) { dx = 1; player.facing = 'right'; }
  if (keys['ArrowUp'] || keys['w'] || keys['W']) { dy = -1; player.facing = 'up'; }
  if (keys['ArrowDown'] || keys['s'] || keys['S']) { dy = 1; player.facing = 'down'; }
  // Mobile joystick input
  if (touchJoystick.active) {
    dx = touchJoystick.dx;
    dy = touchJoystick.dy;
    // Set facing based on dominant direction
    if (Math.abs(dx) > Math.abs(dy)) {
      player.facing = dx > 0 ? 'right' : 'left';
    } else {
      player.facing = dy > 0 ? 'down' : 'up';
    }
  }
  } // end mine scene input guard

  // Close quest menu on movement
  if ((dx !== 0 || dy !== 0) && questMenuOpen) {
    questMenuOpen = false;
    questMenuTarget = -1;
  }

  // Normalize diagonal movement
  if (dx !== 0 && dy !== 0) {
    dx *= 0.707;
    dy *= 0.707;
  }

  let newX = player.x + dx * player.speed;
  let newY = player.y + dy * player.speed;

  // Simple tree collision
  let blocked = false;
  for (const tree of trees) {
    if (tree.size < 20) continue; // only collide with big trees
    let dist = Math.hypot(newX - tree.x, newY - tree.y);
    if (dist < tree.size * 0.4) { blocked = true; break; }
  }

  // Log collision
  if (!blocked) {
    for (const c of clutter) {
      let dist = Math.hypot(newX - c.x, newY - c.y);
      if (dist < c.size * 0.5) { blocked = true; break; }
    }
  }

  // River collision (bridges let you cross)
  if (!blocked && nearRiver(newX, newY, RIVER_WIDTH * 0.4) && !onBridge(newX, newY)) {
    blocked = true;
  }

  // Border forest collision
  const BORDER = 150;
  if (!blocked && (newX < BORDER || newX > WORLD_W - BORDER ||
      newY < BORDER || newY > WORLD_H - BORDER)) {
    blocked = true;
  }

  if (!blocked) {
    player.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, newX));
    player.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, newY));
  }

  // Camera follows player
  camX = player.x - canvas.width / 2;
  camY = player.y - canvas.height / 2;
  camX = Math.max(0, Math.min(WORLD_W - canvas.width, camX));
  camY = Math.max(0, Math.min(WORLD_H - canvas.height, camY));

  // Check crash sites
  for (const site of crashSites) {
    if (site.rescued) continue;
    let dist = Math.hypot(player.x - site.x, player.y - site.y);
    if (dist < 60) {
      site.rescued = true;
      notify(`Rescued ${site.survivors} survivor${site.survivors > 1 ? 's' : ''} from ${site.type} crash!`);
      for (let i = 0; i < site.survivors; i++) {
        followers.push({
          x: site.x + Math.random() * 20 - 10,
          y: site.y + Math.random() * 20 - 10,
          color: ['#c51111','#132ed1','#117f2d','#ed54ba','#ef7d0e','#f5f557','#3f474e','#d6e0f0','#6b2fbb','#71491e','#38fedb','#50ef39'][Math.floor(Math.random()*12)]
        });
      }
      player.carrying += site.survivors;
      document.getElementById('rescued').textContent =
        crashSites.filter(s => s.rescued).reduce((sum, s) => sum + s.survivors, 0);
    }
  }

  // Check mine discovery (player and miner must both be near)
  if (!mineFound && !mineScene.active && troubledPersonFound && troubledPerson.following) {
    let playerDist = Math.hypot(player.x - mine.x, player.y - mine.y);
    let minerDist = Math.hypot(troubledPerson.x - mine.x, troubledPerson.y - mine.y);
    if (playerDist < 50 && minerDist < 70) {
      // Start mine entrance cutscene
      mineScene.active = true;
      mineScene.phase = 'speech';
      troubledPerson.following = false;
      troubledPerson.movingFollow = false;
      // Miner faces the player
      let dx = player.x - troubledPerson.x;
      let dy = player.y - troubledPerson.y;
      if (Math.abs(dx) > Math.abs(dy)) troubledPerson.facing = dx > 0 ? 'right' : 'left';
      else troubledPerson.facing = dy > 0 ? 'down' : 'up';
      // Speech
      troubledPerson.speechText = 'Follow me!';
      troubledPerson.speechTimer = 9999;
      troubledPerson.speechWaiting = true;
      troubledPerson.speechPhase = 10; // special phase for mine scene
    }
  }
  // Mine entrance cutscene - walk into the mine
  if (mineScene.active && mineScene.phase === 'enter') {
    let spd = 1.5;
    // Miner walks toward mine entrance
    let mdx = mine.x - troubledPerson.x;
    let mdy = mine.y - troubledPerson.y;
    let mdist = Math.hypot(mdx, mdy);
    if (mdist > 3) {
      troubledPerson.x += (mdx / mdist) * spd;
      troubledPerson.y += (mdy / mdist) * spd;
      troubledPerson.movingFollow = true;
      if (Math.abs(mdx) > Math.abs(mdy)) troubledPerson.facing = mdx > 0 ? 'right' : 'left';
      else troubledPerson.facing = mdy > 0 ? 'down' : 'up';
    }
    // Player walks toward mine entrance
    let pdx = mine.x - player.x;
    let pdy = mine.y - player.y;
    let pdist = Math.hypot(pdx, pdy);
    if (pdist > 3) {
      player.x += (pdx / pdist) * spd;
      player.y += (pdy / pdist) * spd;
      if (Math.abs(pdx) > Math.abs(pdy)) player.facing = pdx > 0 ? 'right' : 'left';
      else player.facing = pdy > 0 ? 'down' : 'up';
    }
    // Both arrived
    if (mdist <= 3 && pdist <= 3) {
      mineScene.fadeTimer = 60;
      mineScene.phase = 'fade';
    }
  }
  // Fade to black then start boss fight
  if (mineScene.active && mineScene.phase === 'fade') {
    mineScene.fadeTimer--;
    if (mineScene.fadeTimer <= 0) {
      mineScene.phase = 'boss';
      mineScene.fadeIn = 40;
      // Position player and miner inside the mine arena
      player.x = mine.x - 70;
      player.y = mine.y + 140;
      player.facing = 'up';
      troubledPerson.x = mine.x + 70;
      troubledPerson.y = mine.y + 140;
      troubledPerson.facing = 'up';
      troubledPerson.following = false;
      troubledPerson.movingFollow = false;
      troubledPerson.health = troubledPerson.maxHealth;
      // Spawn boss wolf
      bossWolf = {
        x: mine.x, y: mine.y - 140,
        angle: Math.PI, speed: 1.0,
        state: 'chase', attackTimer: 0,
        facing: 'down',
        health: 12, maxHealth: 12,
        pack: BOSS_PACK_ID, isAlpha: true,
        dashTimer: 0, dashCooldown: 120,
        dashing: false, dashWindup: 0,
        dashDx: 0, dashDy: 0, dashSpeed: 8,
        dashTrail: [],
        scratchCooldown: 70, scratching: false,
        scratchTimer: 0, scratchDir: 0,
        scratchMarks: []
      };
      wolves.push(bossWolf);
    }
  }
  // Boss fight - confine player and miner to mine area, miner AI fights boss
  if (mineScene.active && mineScene.phase === 'boss') {
    if (mineScene.fadeIn > 0) mineScene.fadeIn--;
    let arenaR = 250;
    // Confine player
    let pdx = player.x - mine.x, pdy = player.y - mine.y;
    let pdist = Math.hypot(pdx, pdy);
    if (pdist > arenaR) {
      player.x = mine.x + (pdx / pdist) * arenaR;
      player.y = mine.y + (pdy / pdist) * arenaR;
    }
    // Confine miner
    let mdx = troubledPerson.x - mine.x, mdy = troubledPerson.y - mine.y;
    let mdist = Math.hypot(mdx, mdy);
    if (mdist > arenaR) {
      troubledPerson.x = mine.x + (mdx / mdist) * arenaR;
      troubledPerson.y = mine.y + (mdy / mdist) * arenaR;
    }
    // Confine boss wolf + wall stun on dash
    if (bossWolf) {
      let bx = bossWolf.x - mine.x, by = bossWolf.y - mine.y;
      let bd = Math.hypot(bx, by);
      if (bd > arenaR) {
        bossWolf.x = mine.x + (bx / bd) * arenaR;
        bossWolf.y = mine.y + (by / bd) * arenaR;
        if (bossWolf.dashing) {
          // Hit the wall mid-dash - get stunned
          bossWolf.dashing = false;
          bossWolf.dashTimer = 0;
          bossWolf.stunned = true;
          bossWolf.stunTimer = 90; // stunned for 1.5 seconds
          bossWolf.state = 'idle';
          bossWolf.dashCooldown = 60;
        }
      }
      // Stun countdown
      if (bossWolf.stunned) {
        bossWolf.stunTimer--;
        bossWolf.state = 'idle';
        if (bossWolf.stunTimer <= 0) {
          bossWolf.stunned = false;
          bossWolf.state = 'chase';
        }
      }
    }
    // Miner AI - fights the boss wolf
    if (bossWolf && bossWolf.health > 0) {
      let tdx = bossWolf.x - troubledPerson.x;
      let tdy = bossWolf.y - troubledPerson.y;
      let tlen = Math.hypot(tdx, tdy) || 1;
      if (Math.abs(tdx) > Math.abs(tdy)) troubledPerson.facing = tdx > 0 ? 'right' : 'left';
      else troubledPerson.facing = tdy > 0 ? 'down' : 'up';
      troubledPerson.movingFollow = false;
      if (tlen > 40) {
        troubledPerson.x += (tdx / tlen) * player.speed;
        troubledPerson.y += (tdy / tlen) * player.speed;
        troubledPerson.movingFollow = true;
        troubledPerson.walkTimer++;
      }
      if (troubledPerson.attackTimer > 0) troubledPerson.attackTimer--;
      if (tlen < 80 && troubledPerson.attackTimer === 0 && !troubledPerson.whip.active) {
        troubledPerson.attackTimer = 35;
        troubledPerson.whip.active = true;
        troubledPerson.whip.timer = 20;
        troubledPerson.whip.x = troubledPerson.x;
        troubledPerson.whip.y = troubledPerson.y;
        let wdir = 1 / tlen;
        troubledPerson.whip.endX = troubledPerson.x + tdx * wdir * 70;
        troubledPerson.whip.endY = troubledPerson.y + tdy * wdir * 70;
        // Hit check
        let wpx = troubledPerson.whip.endX - troubledPerson.whip.x;
        let wpy = troubledPerson.whip.endY - troubledPerson.whip.y;
        let len2 = wpx * wpx + wpy * wpy;
        let t = Math.max(0, Math.min(1, ((bossWolf.x - troubledPerson.whip.x) * wpx + (bossWolf.y - troubledPerson.whip.y) * wpy) / len2));
        let projX = troubledPerson.whip.x + t * wpx;
        let projY = troubledPerson.whip.y + t * wpy;
        if (Math.hypot(bossWolf.x - projX, bossWolf.y - projY) < 30) {
          bossWolf.health--;
          let kbAngle = Math.atan2(bossWolf.y - troubledPerson.y, bossWolf.x - troubledPerson.x);
          bossWolf.x += Math.cos(kbAngle) * 20;
          bossWolf.y += Math.sin(kbAngle) * 20;
        }
      }
    }
    if (troubledPerson.whip.active) {
      troubledPerson.whip.timer--;
      if (troubledPerson.whip.timer <= 0) troubledPerson.whip.active = false;
    }
    if (troubledPerson.hurtTimer > 0) troubledPerson.hurtTimer--;
    if (troubledPerson.invincible > 0) troubledPerson.invincible--;
    // Boss dash attack
    if (bossWolf && bossWolf.health > 0) {
      if (bossWolf.dashCooldown > 0) bossWolf.dashCooldown--;
      // Start dash windup - pick closer target
      if (!bossWolf.dashing && bossWolf.dashWindup <= 0 && bossWolf.dashCooldown <= 0 && !bossWolf.stunned) {
        let dpDist = Math.hypot(player.x - bossWolf.x, player.y - bossWolf.y);
        let dmDist = Math.hypot(troubledPerson.x - bossWolf.x, troubledPerson.y - bossWolf.y);
        let tx, ty;
        if (dpDist < dmDist) { tx = player.x; ty = player.y; }
        else { tx = troubledPerson.x; ty = troubledPerson.y; }
        let ddx = tx - bossWolf.x, ddy = ty - bossWolf.y;
        let dlen = Math.hypot(ddx, ddy) || 1;
        bossWolf.dashDx = ddx / dlen;
        bossWolf.dashDy = ddy / dlen;
        bossWolf.dashWindup = 40; // frames to charge
      }
      // Windup - wolf shakes/telegraphs
      if (bossWolf.dashWindup > 0 && !bossWolf.dashing) {
        bossWolf.dashWindup--;
        // Lock facing toward dash direction
        if (Math.abs(bossWolf.dashDx) > Math.abs(bossWolf.dashDy)) {
          bossWolf.facing = bossWolf.dashDx > 0 ? 'right' : 'left';
        } else {
          bossWolf.facing = bossWolf.dashDy > 0 ? 'down' : 'up';
        }
        // Stop normal movement during windup
        bossWolf.state = 'idle';
        if (bossWolf.dashWindup <= 0) {
          bossWolf.dashing = true;
          bossWolf.dashTimer = 15; // dash duration in frames
          bossWolf.dashTrail = [];
        }
      }
      // Active dash
      if (bossWolf.dashing) {
        bossWolf.state = 'idle'; // override normal AI
        bossWolf.dashTrail.push({ x: bossWolf.x, y: bossWolf.y, life: 10 });
        bossWolf.x += bossWolf.dashDx * bossWolf.dashSpeed;
        bossWolf.y += bossWolf.dashDy * bossWolf.dashSpeed;
        bossWolf.dashTimer--;
        // Hit player
        if (Math.hypot(player.x - bossWolf.x, player.y - bossWolf.y) < 25 && player.invincible <= 0) {
          if (shieldActive) {
            shieldActive = false;
            notify('Shield blocked the dash!');
          } else {
            player.health -= 2;
          }
          player.hurtTimer = 30;
          player.invincible = 60;
          let kbAngle = Math.atan2(player.y - bossWolf.y, player.x - bossWolf.x);
          player.x += Math.cos(kbAngle) * 25;
          player.y += Math.sin(kbAngle) * 25;
        }
        // Hit miner
        if (Math.hypot(troubledPerson.x - bossWolf.x, troubledPerson.y - bossWolf.y) < 25 && troubledPerson.invincible <= 0) {
          troubledPerson.health--;
          troubledPerson.hurtTimer = 30;
          troubledPerson.invincible = 60;
          let kbAngle = Math.atan2(troubledPerson.y - bossWolf.y, troubledPerson.x - bossWolf.x);
          troubledPerson.x += Math.cos(kbAngle) * 25;
          troubledPerson.y += Math.sin(kbAngle) * 25;
        }
        if (bossWolf.dashTimer <= 0) {
          bossWolf.dashing = false;
          bossWolf.dashCooldown = 90 + Math.floor(Math.random() * 60);
          bossWolf.state = 'chase';
        }
      }
      // Decay dash trail
      for (let i = bossWolf.dashTrail.length - 1; i >= 0; i--) {
        bossWolf.dashTrail[i].life--;
        if (bossWolf.dashTrail[i].life <= 0) bossWolf.dashTrail.splice(i, 1);
      }
      // Scratch attack
      if (bossWolf.scratchCooldown > 0) bossWolf.scratchCooldown--;
      // Decay scratch marks
      for (let i = bossWolf.scratchMarks.length - 1; i >= 0; i--) {
        bossWolf.scratchMarks[i].life--;
        if (bossWolf.scratchMarks[i].life <= 0) bossWolf.scratchMarks.splice(i, 1);
      }
      // Start scratch when close to target and not doing other attacks
      if (!bossWolf.scratching && !bossWolf.dashing && bossWolf.dashWindup <= 0 && !bossWolf.stunned && bossWolf.scratchCooldown <= 0) {
        let dpDist = Math.hypot(player.x - bossWolf.x, player.y - bossWolf.y);
        let dmDist = Math.hypot(troubledPerson.x - bossWolf.x, troubledPerson.y - bossWolf.y);
        let closeDist = Math.min(dpDist, dmDist);
        if (closeDist < 50) {
          bossWolf.scratching = true;
          bossWolf.scratchTimer = 20;
          // Direction toward closest target
          let tx = dpDist < dmDist ? player.x : troubledPerson.x;
          let ty = dpDist < dmDist ? player.y : troubledPerson.y;
          bossWolf.scratchDir = Math.atan2(ty - bossWolf.y, tx - bossWolf.x);
          // Spawn 3 scratch claw marks in front of the wolf
          let baseX = bossWolf.x + Math.cos(bossWolf.scratchDir) * 25;
          let baseY = bossWolf.y + Math.sin(bossWolf.scratchDir) * 25;
          let perpX = Math.cos(bossWolf.scratchDir + Math.PI / 2);
          let perpY = Math.sin(bossWolf.scratchDir + Math.PI / 2);
          for (let s = -1; s <= 1; s++) {
            bossWolf.scratchMarks.push({
              x: baseX + perpX * s * 8,
              y: baseY + perpY * s * 8,
              angle: bossWolf.scratchDir,
              life: 30, hitDealt: false
            });
          }
          bossWolf.state = 'idle';
        }
      }
      // Active scratch
      if (bossWolf.scratching) {
        bossWolf.state = 'idle';
        bossWolf.scratchTimer--;
        // Check hits during first frames
        if (bossWolf.scratchTimer > 10) {
          for (let sm of bossWolf.scratchMarks) {
            if (sm.hitDealt) continue;
            // Hit player
            if (Math.hypot(player.x - sm.x, player.y - sm.y) < 18 && player.invincible <= 0) {
              sm.hitDealt = true;
              if (shieldActive) {
                shieldActive = false;
                notify('Shield blocked the scratch!');
              } else {
                player.health--;
              }
              player.hurtTimer = 30;
              player.invincible = 40;
              let kbAngle = Math.atan2(player.y - bossWolf.y, player.x - bossWolf.x);
              player.x += Math.cos(kbAngle) * 15;
              player.y += Math.sin(kbAngle) * 15;
            }
            // Hit miner
            if (Math.hypot(troubledPerson.x - sm.x, troubledPerson.y - sm.y) < 18 && troubledPerson.invincible <= 0) {
              sm.hitDealt = true;
              troubledPerson.health--;
              troubledPerson.hurtTimer = 30;
              troubledPerson.invincible = 40;
              let kbAngle = Math.atan2(troubledPerson.y - bossWolf.y, troubledPerson.x - bossWolf.x);
              troubledPerson.x += Math.cos(kbAngle) * 15;
              troubledPerson.y += Math.sin(kbAngle) * 15;
            }
          }
        }
        if (bossWolf.scratchTimer <= 0) {
          bossWolf.scratching = false;
          bossWolf.scratchCooldown = 50 + Math.floor(Math.random() * 40);
          bossWolf.state = 'chase';
        }
      }
    }
    // Check if boss defeated
    if (bossWolf && bossWolf.health <= 0) {
      bossWolf = null;
      mineScene.phase = 'victory';
      mineScene.fadeTimer = 120;
      troubledPerson.speechText = 'We did it! This mine will save the village!';
      troubledPerson.speechTimer = 9999;
      troubledPerson.speechWaiting = true;
      troubledPerson.speechPhase = 11; // victory speech
    }
  }
  // Victory - wait for speech dismiss then fade out and complete
  if (mineScene.active && mineScene.phase === 'victory_fade') {
    mineScene.fadeTimer--;
    if (mineScene.fadeTimer <= 0) {
      mineScene.active = false;
      mineScene.phase = 'done';
      mineFound = true;
      troubledPerson.active = false;
      troubledPerson.following = false;
      notify('You found the mine! The village has a future!');
    }
  }

  // Followers follow the player in a chain
  for (let i = 0; i < followers.length; i++) {
    let target = i === 0 ? player : followers[i - 1];
    let fdx = target.x - followers[i].x;
    let fdy = target.y - followers[i].y;
    let fdist = Math.hypot(fdx, fdy);
    let followDist = 35;
    followers[i].moving = false;
    if (fdist > followDist) {
      followers[i].x += (fdx / fdist) * player.speed * 0.9;
      followers[i].y += (fdy / fdist) * player.speed * 0.9;
      followers[i].moving = true;
    }
  }

  // Deliver followers to village
  if (followers.length > 0 &&
      player.x > village.x && player.x < village.x + village.w &&
      player.y > village.y && player.y < village.y + village.h) {
    let delivered = followers.length;
    village.population += delivered;
    notify(`Delivered ${delivered} survivor${delivered > 1 ? 's' : ''} to the village! Population: ${village.population}`);

    // Update rescue quests
    for (const q of activeQuests) {
      if (!q.done && q.type === 'rescue_survivors') {
        q.progress = Math.min(q.progress + delivered, q.need);
        if (q.progress >= q.need) q.done = true;
      }
    }

    // Place villagers
    for (const f of followers) {
      let vpIdx = villagePeople.length;
      villagePeople.push({
        x: village.x + 20 + Math.random() * (village.w - 40),
        y: village.y + 20 + Math.random() * (village.h - 40),
        color: f.color,
        wanderAngle: Math.random() * Math.PI * 2,
        hasQuest: false
      });
      // 60% chance this villager has a quest
      if (Math.random() < 0.6) {
        let tmpl = QUEST_TEMPLATES[Math.floor(Math.random() * QUEST_TEMPLATES.length)];
        let need = tmpl.min + Math.floor(Math.random() * (tmpl.max - tmpl.min + 1));
        let desc = tmpl.desc.replace('{n}', need);
        activeQuests.push({
          id: questIdCounter++,
          giver: vpIdx,
          desc: desc,
          type: tmpl.type,
          need: need,
          progress: 0,
          reward: tmpl.reward,
          done: false,
          turned_in: false,
          accepted: false
        });
        villagePeople[vpIdx].hasQuest = true;
      }
    }
    followers.length = 0;
    player.carrying = 0;
    document.getElementById('village').textContent = village.population;

    // Check for new buildings
    for (const bt of buildingTypes) {
      if (village.population >= bt.need && !village.buildings.find(b => b.name === bt.name)) {
        // Find a position that doesn't overlap existing buildings
        let placed = false;
        let pad = 15; // spacing between buildings
        for (let attempt = 0; attempt < 50; attempt++) {
          let nx = village.x + 20 + Math.random() * (village.w - bt.w - 40);
          let ny = village.y + 20 + Math.random() * (village.h - bt.h - 40);
          let overlaps = false;
          for (const eb of village.buildings) {
            if (nx < eb.x + eb.w + pad && nx + bt.w + pad > eb.x &&
                ny < eb.y + eb.h + pad && ny + bt.h + pad > eb.y) {
              overlaps = true;
              break;
            }
          }
          if (!overlaps) {
            village.buildings.push({
              name: bt.name,
              color: bt.color,
              roofColor: bt.roofColor,
              w: bt.w, h: bt.h,
              x: nx, y: ny
            });
            placed = true;
            break;
          }
        }
        if (!placed) {
          // Fallback: place in a grid-like position based on building count
          let idx = village.buildings.length;
          let col = idx % 2;
          let row = Math.floor(idx / 2);
          village.buildings.push({
            name: bt.name,
            color: bt.color,
            roofColor: bt.roofColor,
            w: bt.w, h: bt.h,
            x: village.x + 20 + col * (village.w / 2 - 20),
            y: village.y + 20 + row * 60
          });
        }
        notify(`New building: ${bt.name}!`);
      }
    }
  }

  // Village people wander (avoid buildings)
  for (const vp of villagePeople) {
    if (!vp.stuckCount) vp.stuckCount = 0;
    vp.wanderAngle += (Math.random() - 0.5) * 0.3;
    let wx = vp.x + Math.cos(vp.wanderAngle) * 0.3;
    let wy = vp.y + Math.sin(vp.wanderAngle) * 0.3;
    // Stay inside village
    let blocked = false;
    if (wx <= village.x + 10 || wx >= village.x + village.w - 10) { vp.wanderAngle += Math.PI; blocked = true; }
    if (wy <= village.y + 10 || wy >= village.y + village.h - 10) { vp.wanderAngle += Math.PI; blocked = true; }
    // Don't walk through buildings
    if (!blocked) {
      for (const bl of village.buildings) {
        let pad = 8;
        if (wx > bl.x - pad && wx < bl.x + bl.w + pad &&
            wy > bl.y - pad && wy < bl.y + bl.h + pad) {
          blocked = true;
          break;
        }
      }
    }
    if (blocked) {
      vp.wanderAngle += Math.PI * 0.5 + Math.random() * Math.PI;
      vp.stuckCount++;
      // If stuck too many times, teleport to an open spot
      if (vp.stuckCount > 30) {
        for (let attempt = 0; attempt < 50; attempt++) {
          let nx = village.x + 15 + Math.random() * (village.w - 30);
          let ny = village.y + 15 + Math.random() * (village.h - 30);
          let clear = true;
          for (const bl of village.buildings) {
            let pad = 12;
            if (nx > bl.x - pad && nx < bl.x + bl.w + pad &&
                ny > bl.y - pad && ny < bl.y + bl.h + pad) {
              clear = false;
              break;
            }
          }
          if (clear) {
            vp.x = nx;
            vp.y = ny;
            vp.stuckCount = 0;
            vp.wanderAngle = Math.random() * Math.PI * 2;
            break;
          }
        }
      }
    } else {
      vp.x = wx;
      vp.y = wy;
      vp.stuckCount = 0;
    }
  }

  // Smoke particles for crash sites
  for (const site of crashSites) {
    if (site.rescued) continue;
    if (Math.random() < 0.1) {
      site.smoke.push({ x: site.x, y: site.y - 10, life: 60, size: 3 + Math.random() * 5 });
    }
    for (let i = site.smoke.length - 1; i >= 0; i--) {
      site.smoke[i].y -= 0.5;
      site.smoke[i].x += (Math.random() - 0.5) * 0.5;
      site.smoke[i].life--;
      if (site.smoke[i].life <= 0) site.smoke.splice(i, 1);
    }
  }

  if (notifyTimer > 0) notifyTimer--;

  // Item pickup
  for (const item of worldItems) {
    if (item.collected) continue;
    if (Math.hypot(player.x - item.x, player.y - item.y) < 25) {
      // Find empty slot
      let emptySlot = inventory.slots.indexOf(null);
      if (emptySlot !== -1) {
        inventory.slots[emptySlot] = item.type;
        item.collected = true;
        notify(`Picked up ${ITEM_TYPES[item.type].name}!`);
      } else {
        notify('Inventory full!');
      }
    }
  }

  // Speed boost timer
  if (speedBoostTimer > 0) {
    speedBoostTimer--;
    player.speed = 5;
  } else {
    player.speed = 3;
  }

  // Whip timer
  if (whip.active) {
    whip.timer--;
    if (whip.timer <= 0) whip.active = false;
  }

  // Wolf AI
  if (player.hurtTimer > 0) player.hurtTimer--;
  if (player.invincible > 0) player.invincible--;
  const WOLF_ATTACK = 25;
  let playerInVillage = player.x > village.x && player.x < village.x + village.w && player.y > village.y && player.y < village.y + village.h;

  // Check if any pack member spotted the player — alert the whole pack
  let alertedPacks = new Set();
  for (const wolf of wolves) {
    if (wolf.pack >= 0) {
      let dist = Math.hypot(player.x - wolf.x, player.y - wolf.y);
      if (dist < WOLF_DETECT && !playerInVillage) {
        alertedPacks.add(wolf.pack);
      }
    }
  }

  for (const wolf of wolves) {
    // Retreating quest wolves flee and disappear
    if (wolf.retreating) {
      let fleeFromX = troubledPerson.active ? troubledPerson.x : player.x;
      let fleeFromY = troubledPerson.active ? troubledPerson.y : player.y;
      let fdx = wolf.x - fleeFromX, fdy = wolf.y - fleeFromY;
      let flen = Math.hypot(fdx, fdy) || 1;
      let fspd = wolf.speed * 1.8;
      wolf.x += (fdx / flen) * fspd;
      wolf.y += (fdy / flen) * fspd;
      wolf.facing = fdx > 0 ? 'right' : 'left';
      wolf.state = 'wander';
      wolf.retreatTimer--;
      if (wolf.retreatTimer <= 0) wolf._remove = true;
      continue;
    }

    let distToPlayer = Math.hypot(player.x - wolf.x, player.y - wolf.y);

    // Quest-pack wolves also target the NPC — pick closer one
    let tgtX = player.x, tgtY = player.y, tgtIsNpc = false;
    let distToTarget = distToPlayer;
    if (wolf.pack === TROUBLED_PACK_ID && troubledPerson.active && troubledPerson.found && troubledPerson.speechTimer <= 0) {
      let distToNpc = Math.hypot(troubledPerson.x - wolf.x, troubledPerson.y - wolf.y);
      if (distToNpc < distToPlayer) {
        tgtX = troubledPerson.x; tgtY = troubledPerson.y; tgtIsNpc = true;
        distToTarget = distToNpc;
      }
    }
    if (wolf.pack === BOSS_PACK_ID && troubledPerson.active) {
      let distToNpc = Math.hypot(troubledPerson.x - wolf.x, troubledPerson.y - wolf.y);
      if (distToNpc < distToPlayer) {
        tgtX = troubledPerson.x; tgtY = troubledPerson.y; tgtIsNpc = true;
        distToTarget = distToNpc;
      }
    }

    // Pack wolves get alerted if ANY packmate spotted the player
    let isAlerted = (wolf.pack >= 0 && alertedPacks.has(wolf.pack));
    // Quest wolves wait until NPC finishes talking
    let questWolfWaiting = wolf.pack === TROUBLED_PACK_ID && troubledPerson.speechTimer > 0;
    let shouldChase = (distToTarget < WOLF_DETECT || isAlerted) && !playerInVillage && !questWolfWaiting;

    if (shouldChase) {
      wolf.state = 'chase';
      let chaseAngle = Math.atan2(tgtY - wolf.y, tgtX - wolf.x);

      // Pack wolves try to flank — offset angle based on their index in pack
      if (wolf.pack >= 0 && !wolf.isAlpha) {
        let packmates = wolves.filter(w => w.pack === wolf.pack);
        let myIdx = packmates.indexOf(wolf);
        let flankOffset = (myIdx - 1) * 0.4; // spread out to surround
        chaseAngle += flankOffset;
      }

      let chaseSpeed = wolf.speed * (wolf.isAlpha ? 1.5 : 1.3);
      let nwx = wolf.x + Math.cos(chaseAngle) * chaseSpeed;
      let nwy = wolf.y + Math.sin(chaseAngle) * chaseSpeed;
      wolf.facing = Math.cos(chaseAngle) > 0 ? 'right' : 'left';
      if (!wolfBlocked(nwx, nwy)) {
        wolf.x = nwx;
        wolf.y = nwy;
      }

      // Attack when close
      if (tgtIsNpc) {
        if (distToTarget < WOLF_ATTACK && troubledPerson.invincible <= 0) {
          wolf.state = 'attack';
          wolf.attackTimer = 20;
          troubledPerson.health--;
          troubledPerson.hurtTimer = 30;
          troubledPerson.invincible = 60;
          let kb = 15;
          let kbAngle = Math.atan2(troubledPerson.y - wolf.y, troubledPerson.x - wolf.x);
          troubledPerson.x += Math.cos(kbAngle) * kb;
          troubledPerson.y += Math.sin(kbAngle) * kb;
          troubledPerson.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, troubledPerson.x));
          troubledPerson.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, troubledPerson.y));
          if (troubledPerson.health <= 0) troubledPerson.health = 0;
        }
      } else if (distToPlayer < WOLF_ATTACK && player.invincible <= 0) {
        wolf.state = 'attack';
        wolf.attackTimer = 20;
        if (shieldActive) {
          shieldActive = false;
          notify('Shield blocked the attack!');
        } else {
          player.health--;
        }
        player.hurtTimer = 30;
        player.invincible = 60;
        let kb = 15;
        let kbAngle = Math.atan2(player.y - wolf.y, player.x - wolf.x);
        player.x += Math.cos(kbAngle) * kb;
        player.y += Math.sin(kbAngle) * kb;
        player.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, player.x));
        player.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, player.y));
        if (player.health <= 0) {
          player.health = 0;
          gameOver = true;
          followers.length = 0;
          player.carrying = 0;
        } else {
          let packMsg = wolf.pack >= 0 ? 'The wolf pack attacked you!' : 'A wolf attacked you!';
          notify(packMsg);
        }
      }
    } else {
      // Wander - pack wolves stay near each other
      wolf.state = 'wander';
      if (wolf.pack >= 0) {
        // Find alpha of this pack
        let alpha = wolves.find(w => w.pack === wolf.pack && w.isAlpha);
        if (alpha && wolf !== alpha) {
          // Follow alpha loosely
          let distToAlpha = Math.hypot(alpha.x - wolf.x, alpha.y - wolf.y);
          if (distToAlpha > 80) {
            // Move toward alpha
            let toAlpha = Math.atan2(alpha.y - wolf.y, alpha.x - wolf.x);
            wolf.angle = toAlpha + (Math.random() - 0.5) * 0.5;
          } else {
            wolf.angle += (Math.random() - 0.5) * 0.3;
          }
        } else {
          // Alpha wanders freely
          wolf.angle += (Math.random() - 0.5) * 0.15;
        }
      } else {
        wolf.angle += (Math.random() - 0.5) * 0.2;
      }
      let newWx = wolf.x + Math.cos(wolf.angle) * wolf.speed * 0.4;
      let newWy = wolf.y + Math.sin(wolf.angle) * wolf.speed * 0.4;
      wolf.facing = Math.cos(wolf.angle) > 0 ? 'right' : 'left';
      if (!wolfBlocked(newWx, newWy)) {
        wolf.x = newWx;
        wolf.y = newWy;
      } else {
        wolf.angle += Math.PI;
      }
    }
    if (wolf.attackTimer > 0) wolf.attackTimer--;

    // Unstick wolves that can't move
    if (wolfBlocked(wolf.x, wolf.y)) {
      if (!wolf.stuckCount) wolf.stuckCount = 0;
      wolf.stuckCount++;
      if (wolf.stuckCount > 5) {
        // Find nearest open spot
        for (let r = 20; r < 200; r += 10) {
          let found = false;
          for (let a = 0; a < 8; a++) {
            let nx = wolf.x + Math.cos(a * Math.PI / 4) * r;
            let ny = wolf.y + Math.sin(a * Math.PI / 4) * r;
            if (!wolfBlocked(nx, ny)) {
              wolf.x = nx;
              wolf.y = ny;
              found = true;
              break;
            }
          }
          if (found) break;
        }
        wolf.stuckCount = 0;
      }
    } else {
      wolf.stuckCount = 0;
    }
  }
  // Archer shooting - shoot at wolves near village
  if (watchtowerJobs.archer.assigned > 0) {
    let tower = village.buildings.find(b => b.name === 'Watchtower');
    if (tower) {
      let towerX = tower.x + tower.w / 2;
      let towerY = tower.y + tower.h / 2;
      let archerRange = 250;
      // Shoot every 90 frames per archer
      if (walkTimer % Math.max(30, 90 - watchtowerJobs.archer.assigned * 25) === 0) {
        // Find closest wolf in range
        let closestWolf = null, closestDist = archerRange;
        for (const wolf of wolves) {
          let d = Math.hypot(wolf.x - towerX, wolf.y - towerY);
          if (d < closestDist) {
            closestDist = d;
            closestWolf = wolf;
          }
        }
        if (closestWolf) {
          arrows.push({
            x: towerX, y: towerY - 40,
            targetX: closestWolf.x, targetY: closestWolf.y,
            speed: 5,
            life: 60
          });
        }
      }
    }
  }

  // Update arrows
  for (let i = arrows.length - 1; i >= 0; i--) {
    let a = arrows[i];
    let angle = Math.atan2(a.targetY - a.y, a.targetX - a.x);
    a.x += Math.cos(angle) * a.speed;
    a.y += Math.sin(angle) * a.speed;
    a.life--;
    // Hit wolf check
    for (const wolf of wolves) {
      if (Math.hypot(a.x - wolf.x, a.y - wolf.y) < 15) {
        wolf.health--;
        arrows.splice(i, 1);
        break;
      }
    }
    if (a.life <= 0) arrows.splice(i, 1);
  }

  // Remove retreated wolves (no kill credit)
  for (let i = wolves.length - 1; i >= 0; i--) {
    if (wolves[i]._remove) wolves.splice(i, 1);
  }
  // Remove dead wolves
  for (let i = wolves.length - 1; i >= 0; i--) {
    if (wolves[i].health <= 0) {
      wolves.splice(i, 1);
      wolfKillCount++;
      // Update kill quests
      for (const q of activeQuests) {
        if (!q.done && q.type === 'kill_wolves') {
          q.progress = Math.min(q.progress + 1, q.need);
          if (q.progress >= q.need) q.done = true;
        }
      }
    }
  }

  // Advance walk animation
  if (dx !== 0 || dy !== 0) walkTimer++;

  // --- TROUBLED PERSON QUEST ---
  {
    let _rescuedAllTP = village.population >= totalSurvivors && totalSurvivors > 0;
    let _sideQuestsDoneTP = activeQuests.filter(q => q.turned_in).length >= 3;
    if (_rescuedAllTP && _sideQuestsDoneTP && !troubledPersonFound) {
      troubledPerson.active = true;
    }
  }
  if (troubledPerson.active && !troubledPersonFound) {
    if (troubledPerson.hurtTimer > 0) troubledPerson.hurtTimer--;
    if (troubledPerson.invincible > 0) troubledPerson.invincible--;
    // Low-health retreat trigger
    if (troubledPerson.found && !troubledPerson.retreatTriggered && troubledPerson.health <= 1) {
      troubledPerson.retreatTriggered = true;
      for (const w of wolves) {
        if (w.pack === TROUBLED_PACK_ID) { w.retreating = true; w.retreatTimer = 120; }
      }
      troubledPerson.speechText = "Thanks! I know where a mine is. Let's go!";
      troubledPerson.speechTimer = 9999;
      troubledPerson.speechWaiting = true;
      troubledPerson.speechPhase = 3;
    }
    // Player finds the NPC
    if (!troubledPerson.found) {
      let ddx = player.x - troubledPerson.x, ddy = player.y - troubledPerson.y;
      if (Math.hypot(ddx, ddy) < 40) {
        troubledPerson.found = true;
        // Speech plays first, wolves spawn after speech ends
        troubledPerson.speechText = "Help! Wolves attacked me at the mine!";
        troubledPerson.speechTimer = 9999;
        troubledPerson.speechWaiting = true;
        troubledPerson.speechPhase = 1;
      }
    }
    // Spawn wolves after NPC finishes talking
    if (troubledPerson.found && !troubledPerson.wolvesSpawned && troubledPerson.speechTimer <= 0 && troubledPerson.speechPhase === 0) {
      troubledPerson.wolvesSpawned = true;
      for (let i = 0; i < 4; i++) {
        let isAlpha = i === 0;
        let wx, wy, tries = 0;
        do {
          let ang = Math.random() * Math.PI * 2;
          let dist = 90 + Math.random() * 20;
          wx = troubledPerson.x + Math.cos(ang) * dist;
          wy = troubledPerson.y + Math.sin(ang) * dist;
          tries++;
        } while (Math.hypot(wx - player.x, wy - player.y) < 90 && tries < 20);
        wolves.push({
          x: wx, y: wy,
          angle: Math.random() * Math.PI * 2,
          speed: isAlpha ? 1.4 : 1.2,
          state: 'chase',
          attackTimer: 0,
          facing: 'right',
          health: isAlpha ? 5 : 3,
          maxHealth: isAlpha ? 5 : 3,
          pack: TROUBLED_PACK_ID,
          isAlpha: isAlpha
            });
          }
    }
    // Advance speech bubble (wait for space)
    if (troubledPerson.speechTimer > 0 && !troubledPerson.speechWaiting) {
      troubledPerson.speechTimer--;
    }

    if (troubledPerson.wolvesSpawned) {
      // AI: move toward nearest quest wolf, whip attack like player
      let target = null, tbest = Infinity;
      for (const w of wolves) {
        if (w.pack !== TROUBLED_PACK_ID) continue;
        let d = Math.hypot(w.x - troubledPerson.x, w.y - troubledPerson.y);
        if (d < tbest) { tbest = d; target = w; }
      }
      if (target) {
        let tdx = target.x - troubledPerson.x;
        let tdy = target.y - troubledPerson.y;
        let tlen = Math.hypot(tdx, tdy) || 1;
        if (Math.abs(tdx) > Math.abs(tdy)) troubledPerson.facing = tdx > 0 ? 'right' : 'left';
        else troubledPerson.facing = tdy > 0 ? 'down' : 'up';
        if (tlen > 60) {
          let spd = player.speed;
          troubledPerson.x += (tdx / tlen) * spd;
          troubledPerson.y += (tdy / tlen) * spd;
          troubledPerson.walkTimer++;
        }
        // Whip attack — same as player
        if (troubledPerson.attackTimer > 0) troubledPerson.attackTimer--;
        if (tlen < 110 && troubledPerson.attackTimer === 0 && !troubledPerson.whip.active) {
          troubledPerson.attackTimer = 30;
          troubledPerson.whip.active = true;
          troubledPerson.whip.timer = 20;
          troubledPerson.whip.x = troubledPerson.x;
          troubledPerson.whip.y = troubledPerson.y;
          let wdir = 1 / tlen;
          troubledPerson.whip.endX = troubledPerson.x + tdx * wdir * 90;
          troubledPerson.whip.endY = troubledPerson.y + tdy * wdir * 90;
          // Line-segment hit check against all quest wolves, same as player
          for (const wolf of wolves) {
            if (wolf.pack !== TROUBLED_PACK_ID) continue;
            let wpx = troubledPerson.whip.endX - troubledPerson.whip.x;
            let wpy = troubledPerson.whip.endY - troubledPerson.whip.y;
            let len2 = wpx * wpx + wpy * wpy;
            let t = Math.max(0, Math.min(1, ((wolf.x - troubledPerson.whip.x) * wpx + (wolf.y - troubledPerson.whip.y) * wpy) / len2));
            let projX = troubledPerson.whip.x + t * wpx;
            let projY = troubledPerson.whip.y + t * wpy;
            let hd = Math.hypot(wolf.x - projX, wolf.y - projY);
            if (hd < 25) {
              wolf.health--;
              let kbAngle = Math.atan2(wolf.y - troubledPerson.y, wolf.x - troubledPerson.x);
              wolf.x += Math.cos(kbAngle) * 40;
              wolf.y += Math.sin(kbAngle) * 40;
              wolf.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, wolf.x));
              wolf.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, wolf.y));
              wolf.state = 'wander';
              wolf.angle = kbAngle;
            }
          }
        }
      }
      if (troubledPerson.whip.active) {
        troubledPerson.whip.timer--;
        if (troubledPerson.whip.timer <= 0) troubledPerson.whip.active = false;
      }
      // Check if all quest wolves defeated
      let anyLeft = wolves.some(w => w.pack === TROUBLED_PACK_ID);
      if (!anyLeft) {
        troubledPersonFound = true;
        troubledPerson.following = true;
        troubledPerson.health = troubledPerson.maxHealth;
        notify('The miner is safe! Lead them to the mine.');
      }
    }
  }

  // Miner follows player to the mine
  if (troubledPerson.active && troubledPerson.following && !mineFound) {
    let fdx = player.x - troubledPerson.x;
    let fdy = player.y - troubledPerson.y;
    let fdist = Math.hypot(fdx, fdy);
    troubledPerson.movingFollow = false;
    if (fdist > 300) {
      // Teleport close if too far behind
      troubledPerson.x = player.x - (fdx / fdist) * 35;
      troubledPerson.y = player.y - (fdy / fdist) * 35;
    } else if (fdist > 40) {
      let spd = player.speed * 0.9;
      troubledPerson.x += (fdx / fdist) * spd;
      troubledPerson.y += (fdy / fdist) * spd;
      troubledPerson.movingFollow = true;
      // Update facing
      if (Math.abs(fdx) > Math.abs(fdy)) {
        troubledPerson.facing = fdx > 0 ? 'right' : 'left';
      } else {
        troubledPerson.facing = fdy > 0 ? 'down' : 'up';
      }
    }
    // Keep in bounds
    troubledPerson.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, troubledPerson.x));
    troubledPerson.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, troubledPerson.y));
  }
}

// --- DRAW ---
// Pre-cache border fade gradients (static, never change)
let _borderGrds = null;
function getBorderGradients() {
  if (_borderGrds) return _borderGrds;
  let top = ctx.createLinearGradient(0, BORDER - 30, 0, BORDER + 10);
  top.addColorStop(0, 'rgba(14,53,6,0.6)'); top.addColorStop(1, 'rgba(14,53,6,0)');
  let bot = ctx.createLinearGradient(0, WORLD_H - BORDER + 10, 0, WORLD_H - BORDER - 30);
  bot.addColorStop(0, 'rgba(14,53,6,0.6)'); bot.addColorStop(1, 'rgba(14,53,6,0)');
