// Wolf collision check
function wolfBlocked(wx, wy, wolf) {
  // Boss minion wolves ignore terrain (they live inside the sealed mine arena)
  if (wolf && wolf.bossMinion) return false;
  // Non-boss wolves cannot enter the mine arena
  if (!wolf || wolf.pack !== BOSS_PACK_ID) {
    if (Math.hypot(wx - mine.x, wy - mine.y) < 280) return true;
  }
  if (wx < BORDER || wx > WORLD_W - BORDER || wy < BORDER || wy > WORLD_H - BORDER) return true;
  if (inVillageZone(wx, wy)) return true;
  if (nearRiver(wx, wy, RIVER_WIDTH * 0.5) && !onBridge(wx, wy)) return true;
  for (const tree of trees) {
    if (tree.size < 20) continue;
    if (Math.hypot(wx - tree.x, wy - tree.y) < tree.size * 0.4) return true;
  }
  for (const c of clutter) {
    if (Math.hypot(wx - c.x, wy - c.y) < c.size * 0.5) return true;
  }
  return false;
}

// Whip attack
const whip = { active: false, timer: 0, x: 0, y: 0, endX: 0, endY: 0, length: 90 };
window.addEventListener('keydown', e => {
  let inVillage = player.x > village.x && player.x < village.x + village.w && player.y > village.y && player.y < village.y + village.h;
  if ((e.key === 'f' || e.key === 'F') && !whip.active && !gameOver && !paused && !inVillage) {
    whip.active = true;
    whip.timer = 20;
    // Direction based on player facing
    let dx = 0, dy = 0;
    if (player.facing === 'up') dy = -1;
    else if (player.facing === 'down') dy = 1;
    else if (player.facing === 'left') dx = -1;
    else if (player.facing === 'right') dx = 1;
    whip.x = player.x;
    whip.y = player.y;
    let range = whip.length;
    whip.endX = player.x + dx * range;
    whip.endY = player.y + dy * range;
    // Check if whip hits any wolf
    for (const wolf of wolves) {
      // Check distance from wolf to whip line
      let wdx = whip.endX - whip.x;
      let wdy = whip.endY - whip.y;
      let len2 = wdx * wdx + wdy * wdy;
      let t = Math.max(0, Math.min(1, ((wolf.x - whip.x) * wdx + (wolf.y - whip.y) * wdy) / len2));
      let projX = whip.x + t * wdx;
      let projY = whip.y + t * wdy;
      let dist = Math.hypot(wolf.x - projX, wolf.y - projY);
      if (dist < 25) {
        // Damage and knock wolf back
        wolf.health--;
        spawnFloater(wolf.x, wolf.y - 20, '-1', '#ffdd55');
        let kbAngle = Math.atan2(wolf.y - player.y, wolf.x - player.x);
        wolf.x += Math.cos(kbAngle) * 40;
        wolf.y += Math.sin(kbAngle) * 40;
        wolf.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, wolf.x));
        wolf.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, wolf.y));
        wolf.state = 'wander';
        wolf.angle = kbAngle;
      }
    }
    // Whip hits amber golems — no knockback (too heavy), small resin-chip effect
    for (const g of golems) {
      const wdx = whip.endX - whip.x;
      const wdy = whip.endY - whip.y;
      const len2 = wdx * wdx + wdy * wdy;
      const t = Math.max(0, Math.min(1, ((g.x - whip.x) * wdx + (g.y - whip.y) * wdy) / len2));
      const projX = whip.x + t * wdx;
      const projY = whip.y + t * wdy;
      if (Math.hypot(g.x - projX, g.y - projY) < 30 && g.hurtTimer <= 0) {
        g.health--;
        g.hurtTimer = 14;
        spawnFloater(g.x, g.y - 28, '-1', '#ffb055');
        // Chip shards
        for (let k = 0; k < 6; k++) {
          const a = Math.random() * Math.PI * 2;
          const sp = 1 + Math.random() * 2;
          g.shards.push({ x: g.x + (Math.random() - 0.5) * 12, y: g.y + (Math.random() - 0.5) * 20, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1, life: 18 + Math.floor(Math.random() * 8) });
        }
      }
    }
  }
});

// --- UPDATE ---
function update() {
  // Player movement (disabled during mine cutscene)
  let dx = 0, dy = 0;
  if (!mineScene.active || mineScene.phase === 'speech' || (mineScene.phase === 'boss' && mineScene.introTimer <= 0)) {
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) { dx = -1; player.facing = 'left'; }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) { dx = 1; player.facing = 'right'; }
  if (keys['ArrowUp'] || keys['w'] || keys['W']) { dy = -1; player.facing = 'up'; }
  if (keys['ArrowDown'] || keys['s'] || keys['S']) { dy = 1; player.facing = 'down'; }
  // Mobile joystick input
  if (touchJoystick.active) {
    dx = touchJoystick.dx;
    dy = touchJoystick.dy;
    // Set facing based on dominant direction
    if (Math.abs(dx) > Math.abs(dy)) {
      player.facing = dx > 0 ? 'right' : 'left';
    } else {
      player.facing = dy > 0 ? 'down' : 'up';
    }
  }
  } // end mine scene input guard

  // Close quest menu on movement
  if ((dx !== 0 || dy !== 0) && questMenuOpen) {
    questMenuOpen = false;
    questMenuTarget = -1;
  }

  // Normalize diagonal movement
  if (dx !== 0 && dy !== 0) {
    dx *= 0.707;
    dy *= 0.707;
  }

  let newX = player.x + dx * player.speed;
  let newY = player.y + dy * player.speed;

  // Inside the boss arena, outdoor collisions are hidden/invalid — skip them
  let inBossArena = mineScene.active && (mineScene.phase === 'boss' || mineScene.phase === 'victory' || mineScene.phase === 'victory_fade');
  let blocked = false;
  const BORDER = 150;
  if (!inBossArena) {
    // Simple tree collision
    for (const tree of trees) {
      if (tree.size < 20) continue; // only collide with big trees
      let dist = Math.hypot(newX - tree.x, newY - tree.y);
      if (dist < tree.size * 0.4) { blocked = true; break; }
    }
    // Log collision
    if (!blocked) {
      for (const c of clutter) {
        let dist = Math.hypot(newX - c.x, newY - c.y);
        if (dist < c.size * 0.5) { blocked = true; break; }
      }
    }
    // River collision (bridges let you cross)
    if (!blocked && nearRiver(newX, newY, RIVER_WIDTH * 0.4) && !onBridge(newX, newY)) {
      blocked = true;
    }
    // Border forest collision
    if (!blocked && (newX < BORDER || newX > WORLD_W - BORDER ||
        newY < BORDER || newY > WORLD_H - BORDER)) {
      blocked = true;
    }
    // Mine rock-face collision — solid mountain with an arched entrance at the base
    if (!blocked) {
      const mdx = newX - mine.x;
      const mdy = newY - mine.y;
      const insideMtn = (mdx * mdx) / (50 * 50) + ((mdy + 18) * (mdy + 18)) / (40 * 40) < 1;
      const inEntrance = Math.abs(mdx) < 16 && mdy > -10;
      if (insideMtn && !inEntrance) blocked = true;
    }
  }

  if (!blocked) {
    if (inBossArena) {
      player.x = newX;
      player.y = newY;
    } else {
      player.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, newX));
      player.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, newY));
    }
  }

  // Camera follows player
  camX = player.x - canvas.width / 2;
  camY = player.y - canvas.height / 2;
  camX = Math.max(0, Math.min(WORLD_W - canvas.width, camX));
  camY = Math.max(0, Math.min(WORLD_H - canvas.height, camY));
  // Boss fight camera: intro pan then permanent lock on mine center
  if (mineScene.active && (mineScene.phase === 'boss' || mineScene.phase === 'victory' || mineScene.phase === 'victory_fade')) {
    let focus = { x: mine.x, y: mine.y };
    if (mineScene.introTimer > 0 && bossWolf) {
      let elapsed = mineScene.introMax - mineScene.introTimer;
      // 0-20: pan from player to boss; 20-320: hold on boss; 320-360: pan to mine center
      if (elapsed < 20) {
        let k = elapsed / 20;
        k = k * k * (3 - 2 * k); // smoothstep
        focus = { x: player.x + (bossWolf.x - player.x) * k, y: player.y + (bossWolf.y - player.y) * k };
      } else if (elapsed < 320) {
        focus = { x: bossWolf.x, y: bossWolf.y };
      } else {
        let k = (elapsed - 320) / 40;
        k = k * k * (3 - 2 * k);
        focus = { x: bossWolf.x + (mine.x - bossWolf.x) * k, y: bossWolf.y + (mine.y - bossWolf.y) * k };
      }
      mineScene.introTimer--;
    }
    camX = focus.x - canvas.width / 2;
    camY = focus.y - canvas.height / 2;
    camX = Math.max(0, Math.min(WORLD_W - canvas.width, camX));
    camY = Math.max(0, Math.min(WORLD_H - canvas.height, camY));
  }
  if (shakeTimer > 0) {
    let mag = shakeMag * (shakeTimer / shakeMax);
    camX += (Math.random() - 0.5) * mag * 2;
    camY += (Math.random() - 0.5) * mag * 2;
    shakeTimer--;
  }
  if (bossBarFlash > 0) bossBarFlash--;

  // Swap music between exploration and boss fight
  if (musicCtx) {
    let inBossFight = mineScene.active && mineScene.phase === 'boss' && mineScene.introTriggered && !gameWon && !gameOver;
    if (inBossFight && currentMusicTrack !== 'boss') startMusicTrack('boss');
    else if (!inBossFight && currentMusicTrack !== 'explore') startMusicTrack('explore');
  }

  // Check crash sites
  for (const site of crashSites) {
    if (site.rescued) continue;
    let dist = Math.hypot(player.x - site.x, player.y - site.y);
    if (dist < 60) {
      site.rescued = true;
      notify(`Found ${site.survivors} lost explorer${site.survivors > 1 ? 's' : ''}!`);
      for (let i = 0; i < site.survivors; i++) {
        followers.push({
          x: site.x + Math.random() * 20 - 10,
          y: site.y + Math.random() * 20 - 10,
          color: ['#c51111','#132ed1','#117f2d','#ed54ba','#ef7d0e','#f5f557','#3f474e','#d6e0f0','#6b2fbb','#71491e','#38fedb','#50ef39'][Math.floor(Math.random()*12)],
          explorer: makeExplorerStyle()
        });
      }
      player.carrying += site.survivors;
      document.getElementById('rescued').textContent =
        crashSites.filter(s => s.rescued).reduce((sum, s) => sum + s.survivors, 0);
    }
  }

  // Check mine discovery (player and miner must both be near)
  if (!mineFound && !mineScene.active && troubledPersonFound && troubledPerson.following) {
    let playerDist = Math.hypot(player.x - mine.x, player.y - mine.y);
    let minerDist = Math.hypot(troubledPerson.x - mine.x, troubledPerson.y - mine.y);
    if (playerDist < 50 && minerDist < 70) {
      // Start mine entrance cutscene
      mineScene.active = true;
      mineScene.phase = 'speech';
      troubledPerson.following = false;
      troubledPerson.movingFollow = false;
      // Miner faces the player
      let dx = player.x - troubledPerson.x;
      let dy = player.y - troubledPerson.y;
      if (Math.abs(dx) > Math.abs(dy)) troubledPerson.facing = dx > 0 ? 'right' : 'left';
      else troubledPerson.facing = dy > 0 ? 'down' : 'up';
      // Speech
      troubledPerson.speechText = 'Follow me!';
      troubledPerson.speechTimer = 9999;
      troubledPerson.speechWaiting = true;
      troubledPerson.speechPhase = 10; // special phase for mine scene
    }
  }
  // Mine entrance cutscene - walk into the mine
  if (mineScene.active && mineScene.phase === 'enter') {
    let spd = 1.5;
    // Miner walks toward mine entrance
    let mdx = mine.x - troubledPerson.x;
    let mdy = mine.y - troubledPerson.y;
    let mdist = Math.hypot(mdx, mdy);
    if (mdist > 3) {
      troubledPerson.x += (mdx / mdist) * spd;
      troubledPerson.y += (mdy / mdist) * spd;
      troubledPerson.movingFollow = true;
      if (Math.abs(mdx) > Math.abs(mdy)) troubledPerson.facing = mdx > 0 ? 'right' : 'left';
      else troubledPerson.facing = mdy > 0 ? 'down' : 'up';
    }
    // Player walks toward mine entrance
    let pdx = mine.x - player.x;
    let pdy = mine.y - player.y;
    let pdist = Math.hypot(pdx, pdy);
    if (pdist > 3) {
      player.x += (pdx / pdist) * spd;
      player.y += (pdy / pdist) * spd;
      if (Math.abs(pdx) > Math.abs(pdy)) player.facing = pdx > 0 ? 'right' : 'left';
      else player.facing = pdy > 0 ? 'down' : 'up';
    }
    // Both arrived
    if (mdist <= 3 && pdist <= 3) {
      mineScene.fadeTimer = 60;
      mineScene.phase = 'fade';
    }
  }
  // Fade to black then start boss fight
  if (mineScene.active && mineScene.phase === 'fade') {
    mineScene.fadeTimer--;
    if (mineScene.fadeTimer <= 0) {
      mineScene.phase = 'boss';
      mineScene.fadeIn = 40;
      mineScene.introTimer = 0;
      mineScene.introMax = 1;
      mineScene.introTriggered = false;
      mineScene.sealed = false;
      mineScene.boulderFallTimer = 0;
      // Position player at the tunnel entrance (south of the arena), miner waits inside
      player.x = mine.x;
      player.y = mine.y + 250 + 70; // arenaR=250, ~70 into the tunnel
      player.facing = 'up';
      troubledPerson.x = mine.x + 70;
      troubledPerson.y = mine.y + 140;
      troubledPerson.facing = 'up';
      troubledPerson.following = false;
      troubledPerson.movingFollow = false;
      troubledPerson.health = troubledPerson.maxHealth;
      // Spawn boss wolf
      bossWolf = {
        x: mine.x, y: mine.y - 140,
        angle: Math.PI, speed: 1.0,
        state: 'chase', attackTimer: 0,
        facing: 'down',
        health: 15, maxHealth: 15,
        pack: BOSS_PACK_ID, isAlpha: true,
        dashTimer: 0, dashCooldown: 120,
        dashing: false, dashWindup: 0,
        dashDx: 0, dashDy: 0, dashSpeed: 8,
        dashTrail: [],
        scratchCooldown: 70, scratching: false,
        scratchTimer: 0, scratchDir: 0,
        scratchMarks: [],
        amberCooldown: 300,
        amberTelegraphs: [],
        amberClumps: [],
        amberCasting: false,
        amberCastTimer: 0,
        enraged: false
      };
      wolves.push(bossWolf);
    }
  }
  // Boss fight - confine player and miner to mine area, miner AI fights boss
  if (mineScene.active && mineScene.phase === 'boss') {
    if (mineScene.fadeIn > 0) mineScene.fadeIn--;
    let arenaR = 250;
    // Evict any non-boss wolves that wandered into the arena
    const evictBuffer = arenaR + 80;
    for (const w of wolves) {
      if (w.pack === BOSS_PACK_ID || w.bossMinion) continue;
      const wdx = w.x - mine.x, wdy = w.y - mine.y;
      const wdist = Math.hypot(wdx, wdy);
      if (wdist < evictBuffer) {
        const ang = wdist > 0.01 ? Math.atan2(wdy, wdx) : Math.random() * Math.PI * 2;
        w.x = mine.x + Math.cos(ang) * (evictBuffer + 20);
        w.y = mine.y + Math.sin(ang) * (evictBuffer + 20);
        w.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, w.x));
        w.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, w.y));
        w.state = 'wander';
        w.attackTimer = 0;
      }
    }
    // Confine player — allow the tunnel to the south while unsealed
    let pdx = player.x - mine.x, pdy = player.y - mine.y;
    let pdist = Math.hypot(pdx, pdy);
    let inTunnelBand = !mineScene.sealed && Math.abs(pdx) <= TUNNEL_HALF_W && pdy >= arenaR - 8 && pdy <= arenaR + TUNNEL_LEN;
    if (pdist > arenaR && !inTunnelBand) {
      player.x = mine.x + (pdx / pdist) * arenaR;
      player.y = mine.y + (pdy / pdist) * arenaR;
    } else if (inTunnelBand) {
      if (player.x < mine.x - TUNNEL_HALF_W) player.x = mine.x - TUNNEL_HALF_W;
      if (player.x > mine.x + TUNNEL_HALF_W) player.x = mine.x + TUNNEL_HALF_W;
      if (player.y > mine.y + arenaR + TUNNEL_LEN) player.y = mine.y + arenaR + TUNNEL_LEN;
    }
    // Seal trigger: once player crosses into the arena, drop a boulder and start the intro
    if (!mineScene.sealed && !mineScene.introTriggered && mineScene.boulderFallTimer === 0 && pdist < arenaR - 6) {
      mineScene.boulderFallTimer = mineScene.boulderFallMax;
      mineScene.introTimer = 360;
      mineScene.introMax = 360;
      mineScene.introTriggered = true;
      playBossStinger();
      triggerFlash('255,255,255', 0.6);
    }
    if (mineScene.boulderFallTimer > 0) {
      mineScene.boulderFallTimer--;
      if (mineScene.boulderFallTimer === 0) {
        mineScene.sealed = true;
        triggerShake(30, 12);
        // Dust burst at boulder impact
        let bxp = mine.x;
        let byp = mine.y + arenaR + 10;
        for (let p = 0; p < 28; p++) {
          let ang = Math.random() * Math.PI * 2;
          let spd = 1 + Math.random() * 3;
          mineScene.particles.push({
            x: bxp + (Math.random() - 0.5) * 40,
            y: byp,
            vx: Math.cos(ang) * spd,
            vy: Math.sin(ang) * spd - 1.5,
            life: 40 + Math.floor(Math.random() * 15),
            maxLife: 55,
            size: 2 + Math.random() * 3,
            shade: 90 + Math.floor(Math.random() * 40)
          });
        }
        notify('The tunnel is sealed! There is no going back.');
      }
    }
    // Confine miner
    let mdx = troubledPerson.x - mine.x, mdy = troubledPerson.y - mine.y;
    let mdist = Math.hypot(mdx, mdy);
    if (mdist > arenaR) {
      troubledPerson.x = mine.x + (mdx / mdist) * arenaR;
      troubledPerson.y = mine.y + (mdy / mdist) * arenaR;
    }
    // Confine minion wolves to the arena
    for (const w of wolves) {
      if (!w.bossMinion) continue;
      let wx = w.x - mine.x, wy = w.y - mine.y;
      let wd = Math.hypot(wx, wy);
      if (wd > arenaR) {
        w.x = mine.x + (wx / wd) * arenaR;
        w.y = mine.y + (wy / wd) * arenaR;
      }
    }
    // Confine boss wolf + wall stun on dash
    if (bossWolf) {
      let bx = bossWolf.x - mine.x, by = bossWolf.y - mine.y;
      let bd = Math.hypot(bx, by);
      if (bd > arenaR) {
        bossWolf.x = mine.x + (bx / bd) * arenaR;
        bossWolf.y = mine.y + (by / bd) * arenaR;
        if (bossWolf.dashing) {
          // Hit the wall mid-dash - get stunned
          bossWolf.dashing = false;
          bossWolf.dashTimer = 0;
          bossWolf.stunned = true;
          bossWolf.stunTimer = 90; // stunned for 1.5 seconds
          bossWolf.state = 'idle';
          bossWolf.dashCooldown = 60;
        }
      }
      // Stun countdown
      if (bossWolf.stunned) {
        bossWolf.stunTimer--;
        bossWolf.state = 'idle';
        if (bossWolf.stunTimer <= 0) {
          bossWolf.stunned = false;
          bossWolf.state = 'chase';
        }
      }
    }
    // Miner KO → start retreat sequence (dig a tunnel and vanish)
    if (bossWolf && !troubledPerson.retreating && !troubledPerson.gone && troubledPerson.health <= 0 && mineScene.introTimer <= 0) {
      troubledPerson.retreating = true;
      troubledPerson.retreatPhase = 'moveToDig';
      troubledPerson.retreatTimer = 0;
      troubledPerson.health = 0;
      troubledPerson.invincible = 99999;
      troubledPerson.whip.active = false;
      // Dig point on the arena wall opposite the boss
      let angFromMine = Math.atan2(bossWolf.y - mine.y, bossWolf.x - mine.x) + Math.PI;
      troubledPerson.digX = mine.x + Math.cos(angFromMine) * (arenaR - 18);
      troubledPerson.digY = mine.y + Math.sin(angFromMine) * (arenaR - 18);
      if (Math.abs(Math.cos(angFromMine)) > Math.abs(Math.sin(angFromMine))) {
        troubledPerson.digFacing = Math.cos(angFromMine) > 0 ? 'right' : 'left';
      } else {
        troubledPerson.digFacing = Math.sin(angFromMine) > 0 ? 'down' : 'up';
      }
      troubledPerson.holeSize = 0;
      notify('The miner is hurt — he dug an escape tunnel!');
    }
    // Retreat state machine
    if (troubledPerson.retreating && !troubledPerson.gone) {
      if (troubledPerson.retreatPhase === 'moveToDig') {
        let dx = troubledPerson.digX - troubledPerson.x;
        let dy = troubledPerson.digY - troubledPerson.y;
        let d = Math.hypot(dx, dy);
        if (d > 3) {
          troubledPerson.x += (dx / d) * 2;
          troubledPerson.y += (dy / d) * 2;
          if (Math.abs(dx) > Math.abs(dy)) troubledPerson.facing = dx > 0 ? 'right' : 'left';
          else troubledPerson.facing = dy > 0 ? 'down' : 'up';
          troubledPerson.movingFollow = true;
          troubledPerson.walkTimer++;
        } else {
          troubledPerson.x = troubledPerson.digX;
          troubledPerson.y = troubledPerson.digY;
          troubledPerson.facing = troubledPerson.digFacing;
          troubledPerson.movingFollow = false;
          troubledPerson.retreatPhase = 'digging';
          troubledPerson.retreatTimer = 120;
        }
      } else if (troubledPerson.retreatPhase === 'digging') {
        troubledPerson.retreatTimer--;
        // Hole grows over the dig duration
        let dp = 1 - (troubledPerson.retreatTimer / 120);
        troubledPerson.holeSize = 18 * dp;
        // Dirt puff every few frames on pickaxe strike
        if (troubledPerson.retreatTimer % 10 === 0) {
          for (let p = 0; p < 4; p++) {
            let ang = Math.random() * Math.PI * 2;
            let spd = 0.8 + Math.random() * 2;
            mineScene.particles.push({
              x: troubledPerson.digX + (Math.random() - 0.5) * 12,
              y: troubledPerson.digY - 6 + (Math.random() - 0.5) * 6,
              vx: Math.cos(ang) * spd,
              vy: Math.sin(ang) * spd - 1,
              life: 28 + Math.floor(Math.random() * 10),
              maxLife: 38,
              size: 1.5 + Math.random() * 2,
              shade: 80 + Math.floor(Math.random() * 40)
            });
          }
        }
        if (troubledPerson.retreatTimer <= 0) {
          troubledPerson.retreatPhase = 'entering';
          troubledPerson.retreatTimer = 24;
        }
      } else if (troubledPerson.retreatPhase === 'entering') {
        troubledPerson.retreatTimer--;
        if (troubledPerson.retreatTimer <= 0) {
          troubledPerson.retreatPhase = 'closing';
          troubledPerson.retreatTimer = 40;
        }
      } else if (troubledPerson.retreatPhase === 'closing') {
        troubledPerson.retreatTimer--;
        // Hole shrinks back to nothing + a puff of dust when it seals
        let cp = troubledPerson.retreatTimer / 40;
        troubledPerson.holeSize = 18 * cp;
        if (troubledPerson.retreatTimer === 20) {
          for (let p = 0; p < 20; p++) {
            let ang = Math.random() * Math.PI * 2;
            let spd = 0.8 + Math.random() * 2;
            mineScene.particles.push({
              x: troubledPerson.digX,
              y: troubledPerson.digY - 4,
              vx: Math.cos(ang) * spd,
              vy: Math.sin(ang) * spd - 0.8,
              life: 30, maxLife: 30,
              size: 1.5 + Math.random() * 2,
              shade: 80 + Math.floor(Math.random() * 40)
            });
          }
        }
        if (troubledPerson.retreatTimer <= 0) {
          troubledPerson.retreating = false;
          troubledPerson.gone = true;
          troubledPerson.holeSize = 0;
        }
      }
    }
    // Miner AI - fights the boss wolf (waits until the player enters the arena and the intro finishes)
    if (bossWolf && bossWolf.health > 0 && mineScene.introTriggered && mineScene.introTimer <= 0 && !troubledPerson.retreating && !troubledPerson.gone) {
      let tdx = bossWolf.x - troubledPerson.x;
      let tdy = bossWolf.y - troubledPerson.y;
      let tlen = Math.hypot(tdx, tdy) || 1;
      if (Math.abs(tdx) > Math.abs(tdy)) troubledPerson.facing = tdx > 0 ? 'right' : 'left';
      else troubledPerson.facing = tdy > 0 ? 'down' : 'up';
      troubledPerson.movingFollow = false;
      if (tlen > 40) {
        troubledPerson.x += (tdx / tlen) * player.speed;
        troubledPerson.y += (tdy / tlen) * player.speed;
        troubledPerson.movingFollow = true;
        troubledPerson.walkTimer++;
      }
      if (troubledPerson.attackTimer > 0) troubledPerson.attackTimer--;
      if (tlen < 65 && troubledPerson.attackTimer === 0 && !troubledPerson.whip.active) {
        troubledPerson.attackTimer = 95;
        troubledPerson.whip.active = true;
        troubledPerson.whip.timer = 20;
        troubledPerson.whip.x = troubledPerson.x;
        troubledPerson.whip.y = troubledPerson.y;
        let wdir = 1 / tlen;
        troubledPerson.whip.endX = troubledPerson.x + tdx * wdir * 60;
        troubledPerson.whip.endY = troubledPerson.y + tdy * wdir * 60;
        // Hit check
        let wpx = troubledPerson.whip.endX - troubledPerson.whip.x;
        let wpy = troubledPerson.whip.endY - troubledPerson.whip.y;
        let len2 = wpx * wpx + wpy * wpy;
        let t = Math.max(0, Math.min(1, ((bossWolf.x - troubledPerson.whip.x) * wpx + (bossWolf.y - troubledPerson.whip.y) * wpy) / len2));
        let projX = troubledPerson.whip.x + t * wpx;
        let projY = troubledPerson.whip.y + t * wpy;
        if (Math.hypot(bossWolf.x - projX, bossWolf.y - projY) < 22) {
          bossWolf.health--;
          spawnFloater(bossWolf.x, bossWolf.y - 30, '-1', '#ffdd55');
          let kbAngle = Math.atan2(bossWolf.y - troubledPerson.y, bossWolf.x - troubledPerson.x);
          bossWolf.x += Math.cos(kbAngle) * 20;
          bossWolf.y += Math.sin(kbAngle) * 20;
        }
      }
    }
    if (troubledPerson.whip.active) {
      troubledPerson.whip.timer--;
      if (troubledPerson.whip.timer <= 0) troubledPerson.whip.active = false;
    }
    if (troubledPerson.hurtTimer > 0) troubledPerson.hurtTimer--;
    if (troubledPerson.invincible > 0) troubledPerson.invincible--;
    // Boss dash attack
    if (bossWolf && bossWolf.health > 0 && mineScene.introTriggered && mineScene.introTimer <= 0) {
      if (bossWolf.dashCooldown > 0) bossWolf.dashCooldown--;
      // Start dash windup - pick closer target
      if (!bossWolf.dashing && bossWolf.dashWindup <= 0 && bossWolf.dashCooldown <= 0 && !bossWolf.stunned) {
        let dpDist = Math.hypot(player.x - bossWolf.x, player.y - bossWolf.y);
        let minerAlive = !troubledPerson.gone && !troubledPerson.retreating;
        let dmDist = minerAlive ? Math.hypot(troubledPerson.x - bossWolf.x, troubledPerson.y - bossWolf.y) : Infinity;
        let tx, ty;
        if (dpDist < dmDist) { tx = player.x; ty = player.y; }
        else { tx = troubledPerson.x; ty = troubledPerson.y; }
        let ddx = tx - bossWolf.x, ddy = ty - bossWolf.y;
        let dlen = Math.hypot(ddx, ddy) || 1;
        bossWolf.dashDx = ddx / dlen;
        bossWolf.dashDy = ddy / dlen;
        bossWolf.dashWindup = 40; // frames to charge
      }
      // Windup - wolf shakes/telegraphs
      if (bossWolf.dashWindup > 0 && !bossWolf.dashing) {
        bossWolf.dashWindup--;
        // Lock facing toward dash direction
        if (Math.abs(bossWolf.dashDx) > Math.abs(bossWolf.dashDy)) {
          bossWolf.facing = bossWolf.dashDx > 0 ? 'right' : 'left';
        } else {
          bossWolf.facing = bossWolf.dashDy > 0 ? 'down' : 'up';
        }
        // Stop normal movement during windup
        bossWolf.state = 'idle';
        if (bossWolf.dashWindup <= 0) {
          bossWolf.dashing = true;
          bossWolf.dashTimer = 15; // dash duration in frames
          bossWolf.dashTrail = [];
        }
      }
      // Active dash
      if (bossWolf.dashing) {
        bossWolf.state = 'idle'; // override normal AI
        bossWolf.dashTrail.push({ x: bossWolf.x, y: bossWolf.y, life: 10 });
        bossWolf.x += bossWolf.dashDx * bossWolf.dashSpeed;
        bossWolf.y += bossWolf.dashDy * bossWolf.dashSpeed;
        bossWolf.dashTimer--;
        // Hit player
        if (Math.hypot(player.x - bossWolf.x, player.y - bossWolf.y) < 25 && player.invincible <= 0) {
          if (shieldActive) {
            shieldActive = false;
            notify('Shield blocked the dash!');
          } else {
            player.health -= 2;
            spawnFloater(player.x, player.y - 20, '-2', '#ff5555');
            triggerFlash('255,80,80', 0.55);
            triggerShake(16, 5);
          }
          player.hurtTimer = 30;
          player.invincible = 60;
          let kbAngle = Math.atan2(player.y - bossWolf.y, player.x - bossWolf.x);
          player.x += Math.cos(kbAngle) * 25;
          player.y += Math.sin(kbAngle) * 25;
          if (player.health <= 0) killPlayer("The Amber Wolf's charge caught you.");
        }
        // Hit miner
        if (Math.hypot(troubledPerson.x - bossWolf.x, troubledPerson.y - bossWolf.y) < 25 && troubledPerson.invincible <= 0) {
          troubledPerson.health--;
          troubledPerson.hurtTimer = 30;
          troubledPerson.invincible = 60;
          let kbAngle = Math.atan2(troubledPerson.y - bossWolf.y, troubledPerson.x - bossWolf.x);
          troubledPerson.x += Math.cos(kbAngle) * 25;
          troubledPerson.y += Math.sin(kbAngle) * 25;
        }
        if (bossWolf.dashTimer <= 0) {
          bossWolf.dashing = false;
          bossWolf.dashCooldown = 90 + Math.floor(Math.random() * 60);
          bossWolf.state = 'chase';
        }
      }
      // Decay dash trail
      for (let i = bossWolf.dashTrail.length - 1; i >= 0; i--) {
        bossWolf.dashTrail[i].life--;
        if (bossWolf.dashTrail[i].life <= 0) bossWolf.dashTrail.splice(i, 1);
      }
      // Scratch attack
      if (bossWolf.scratchCooldown > 0) bossWolf.scratchCooldown--;
      // Decay scratch marks
      for (let i = bossWolf.scratchMarks.length - 1; i >= 0; i--) {
        bossWolf.scratchMarks[i].life--;
        if (bossWolf.scratchMarks[i].life <= 0) bossWolf.scratchMarks.splice(i, 1);
      }
      // Start scratch when close to target and not doing other attacks
      if (!bossWolf.scratching && !bossWolf.dashing && bossWolf.dashWindup <= 0 && !bossWolf.stunned && bossWolf.scratchCooldown <= 0) {
        let dpDist = Math.hypot(player.x - bossWolf.x, player.y - bossWolf.y);
        let minerAlive = !troubledPerson.gone && !troubledPerson.retreating;
        let dmDist = minerAlive ? Math.hypot(troubledPerson.x - bossWolf.x, troubledPerson.y - bossWolf.y) : Infinity;
        let closeDist = Math.min(dpDist, dmDist);
        if (closeDist < 50) {
          bossWolf.scratching = true;
          bossWolf.scratchTimer = 20;
          // Direction toward closest target
          let tx = dpDist < dmDist ? player.x : troubledPerson.x;
          let ty = dpDist < dmDist ? player.y : troubledPerson.y;
          bossWolf.scratchDir = Math.atan2(ty - bossWolf.y, tx - bossWolf.x);
          // Spawn 3 scratch claw marks in front of the wolf
          let baseX = bossWolf.x + Math.cos(bossWolf.scratchDir) * 25;
          let baseY = bossWolf.y + Math.sin(bossWolf.scratchDir) * 25;
          let perpX = Math.cos(bossWolf.scratchDir + Math.PI / 2);
          let perpY = Math.sin(bossWolf.scratchDir + Math.PI / 2);
          for (let s = -1; s <= 1; s++) {
            bossWolf.scratchMarks.push({
              x: baseX + perpX * s * 8,
              y: baseY + perpY * s * 8,
              angle: bossWolf.scratchDir,
              life: 30, hitDealt: false
            });
          }
          bossWolf.state = 'idle';
        }
      }
      // Active scratch
      if (bossWolf.scratching) {
        bossWolf.state = 'idle';
        bossWolf.scratchTimer--;
        // Check hits during first frames
        if (bossWolf.scratchTimer > 10) {
          for (let sm of bossWolf.scratchMarks) {
            if (sm.hitDealt) continue;
            // Hit player
            if (Math.hypot(player.x - sm.x, player.y - sm.y) < 18 && player.invincible <= 0) {
              sm.hitDealt = true;
              if (shieldActive) {
                shieldActive = false;
                notify('Shield blocked the scratch!');
              } else {
                player.health--;
                spawnFloater(player.x, player.y - 20, '-1', '#ff5555');
                triggerFlash('255,80,80', 0.4);
                triggerShake(10, 3);
              }
              player.hurtTimer = 30;
              player.invincible = 40;
              if (player.health <= 0) killPlayer("The Amber Wolf's claws found you.");
              let kbAngle = Math.atan2(player.y - bossWolf.y, player.x - bossWolf.x);
              player.x += Math.cos(kbAngle) * 15;
              player.y += Math.sin(kbAngle) * 15;
            }
            // Hit miner
            if (Math.hypot(troubledPerson.x - sm.x, troubledPerson.y - sm.y) < 18 && troubledPerson.invincible <= 0) {
              sm.hitDealt = true;
              troubledPerson.health--;
              troubledPerson.hurtTimer = 30;
              troubledPerson.invincible = 40;
              let kbAngle = Math.atan2(troubledPerson.y - bossWolf.y, troubledPerson.x - bossWolf.x);
              troubledPerson.x += Math.cos(kbAngle) * 15;
              troubledPerson.y += Math.sin(kbAngle) * 15;
            }
          }
        }
        if (bossWolf.scratchTimer <= 0) {
          bossWolf.scratching = false;
          bossWolf.scratchCooldown = 50 + Math.floor(Math.random() * 40);
          bossWolf.state = 'chase';
        }
      }
      // Amber eruption (phase 2 only)
      if (bossWolf.enraged) {
        if (bossWolf.amberCooldown > 0) bossWolf.amberCooldown--;
        if (bossWolf.amberCooldown <= 0 && !bossWolf.dashing && !bossWolf.scratching && !bossWolf.stunned && bossWolf.dashWindup <= 0) {
          // Pick 3 spots near the player, then clamp inside the arena
          for (let i = 0; i < 3; i++) {
            let ang = Math.random() * Math.PI * 2;
            let dist = Math.random() * 55;
            let tx = player.x + Math.cos(ang) * dist;
            let ty = player.y + Math.sin(ang) * dist;
            let dx = tx - mine.x, dy = ty - mine.y;
            let d = Math.hypot(dx, dy);
            if (d > arenaR - 45) {
              tx = mine.x + (dx / d) * (arenaR - 45);
              ty = mine.y + (dy / d) * (arenaR - 45);
            }
            bossWolf.amberTelegraphs.push({ x: tx, y: ty, radius: 42, timer: 120, maxTimer: 120 });
          }
          bossWolf.amberCooldown = 300 + Math.floor(Math.random() * 120);
          // Cost: boss is stunned for 4 seconds after casting
          bossWolf.stunned = true;
          bossWolf.stunTimer = 240;
          bossWolf.state = 'idle';
          // Paws-up casting animation runs for the 2-second telegraph window
          bossWolf.amberCasting = true;
          bossWolf.amberCastTimer = 120;
        }
        // Tick the casting animation
        if (bossWolf.amberCastTimer > 0) {
          bossWolf.amberCastTimer--;
          if (bossWolf.amberCastTimer === 0) bossWolf.amberCasting = false;
        }
        // Tick telegraphs → erupt into clumps
        for (let i = bossWolf.amberTelegraphs.length - 1; i >= 0; i--) {
          let tg = bossWolf.amberTelegraphs[i];
          tg.timer--;
          if (tg.timer <= 0) {
            bossWolf.amberClumps.push({ x: tg.x, y: tg.y, radius: tg.radius, life: 80, maxLife: 80, hitDealt: false });
            bossWolf.amberTelegraphs.splice(i, 1);
            triggerShake(14, 4);
            // Debris puff
            for (let p = 0; p < 14; p++) {
              let pa = Math.random() * Math.PI * 2;
              let ps = 1 + Math.random() * 2.5;
              mineScene.particles.push({
                x: tg.x + (Math.random() - 0.5) * 30,
                y: tg.y + (Math.random() - 0.5) * 10,
                vx: Math.cos(pa) * ps,
                vy: Math.sin(pa) * ps - 1.5,
                life: 30 + Math.floor(Math.random() * 10),
                maxLife: 40,
                size: 2 + Math.random() * 2,
                shade: 150 + Math.floor(Math.random() * 50)
              });
            }
          }
        }
        // Tick clumps → damage player if inside radius
        for (let i = bossWolf.amberClumps.length - 1; i >= 0; i--) {
          let c = bossWolf.amberClumps[i];
          if (!c.hitDealt && Math.hypot(player.x - c.x, player.y - c.y) < c.radius && player.invincible <= 0) {
            c.hitDealt = true;
            if (shieldActive) {
              shieldActive = false;
              notify('Shield blocked the amber!');
            } else {
              player.health--;
              spawnFloater(player.x, player.y - 20, '-1', '#ff5555');
              triggerFlash('255,120,60', 0.45);
            }
            player.hurtTimer = 30;
            player.invincible = 60;
            let kbAngle = Math.atan2(player.y - c.y, player.x - c.x);
            player.x += Math.cos(kbAngle) * 20;
            player.y += Math.sin(kbAngle) * 20;
            if (player.health <= 0) killPlayer('The amber erupted beneath you.');
          }
          c.life--;
          if (c.life <= 0) bossWolf.amberClumps.splice(i, 1);
        }
      }
    }
    // Phase 2: at half HP, the Amber Wolf heals back to full
    if (bossWolf && !bossWolf.enraged && bossWolf.health > 0 && bossWolf.health <= bossWolf.maxHealth / 2) {
      bossWolf.enraged = true;
      bossWolf.health = bossWolf.maxHealth;
      bossWolf.dashCooldown = 60;
      bossWolf.scratchCooldown = 50;
      triggerShake(45, 10);
      bossBarFlash = 45;
      notify('The Amber Wolf howls with renewed strength!');
    }
    // Check if boss defeated → begin crumble animation
    if (bossWolf && bossWolf.health <= 0) {
      mineScene.crumbleX = bossWolf.x;
      mineScene.crumbleY = bossWolf.y;
      mineScene.crumbleS = 48;
      mineScene.crumbleTimer = 70;
      bossWolf = null;
      // Remove any remaining minion wolves
      for (let i = wolves.length - 1; i >= 0; i--) {
        if (wolves[i].bossMinion) wolves.splice(i, 1);
      }
      triggerShake(40, 7);
      // Seed initial rubble burst
      for (let p = 0; p < 40; p++) {
        let ang = Math.random() * Math.PI * 2;
        let spd = 1 + Math.random() * 3.5;
        mineScene.particles.push({
          x: mineScene.crumbleX + (Math.random() - 0.5) * 40,
          y: mineScene.crumbleY + (Math.random() - 0.5) * 20,
          vx: Math.cos(ang) * spd,
          vy: Math.sin(ang) * spd - 1.5,
          life: 50 + Math.floor(Math.random() * 20),
          maxLife: 70,
          size: 2 + Math.random() * 4,
          shade: 80 + Math.floor(Math.random() * 50)
        });
      }
    }
    // Crumble animation tick
    if (mineScene.crumbleTimer > 0) {
      mineScene.crumbleTimer--;
      // Drop more pebbles during crumble
      if (mineScene.crumbleTimer > 30 && mineScene.crumbleTimer % 3 === 0) {
        let ang = Math.random() * Math.PI * 2;
        let r = Math.random() * 22;
        mineScene.particles.push({
          x: mineScene.crumbleX + Math.cos(ang) * r,
          y: mineScene.crumbleY + Math.sin(ang) * r,
          vx: (Math.random() - 0.5) * 1.5,
          vy: -Math.random() * 2,
          life: 35,
          maxLife: 45,
          size: 2 + Math.random() * 2,
          shade: 80 + Math.floor(Math.random() * 50)
        });
      }
      if (mineScene.crumbleTimer <= 0) {
        mineScene.phase = 'victory';
        mineScene.fadeTimer = 120;
        if (troubledPerson.gone) {
          // Miner already escaped — skip the speech beat and auto-advance
          troubledPerson.speechText = '';
          troubledPerson.speechTimer = 0;
          troubledPerson.speechWaiting = false;
          troubledPerson.speechPhase = 0;
          mineScene.phase = 'victory_fade';
          mineScene.fadeTimer = 60;
          notify('The Amber Wolf is defeated — the mine is safe!');
        } else {
          troubledPerson.speechText = 'We did it! This mine will save the village!';
          troubledPerson.speechTimer = 9999;
          troubledPerson.speechWaiting = true;
          troubledPerson.speechPhase = 11;
        }
      }
    }
  }
  // Update stone-dust particles whenever the mine scene is active
  if (mineScene.active && mineScene.particles.length > 0) {
    for (let i = mineScene.particles.length - 1; i >= 0; i--) {
      let pp = mineScene.particles[i];
      pp.x += pp.vx;
      pp.y += pp.vy;
      pp.vy += 0.15;
      pp.vx *= 0.97;
      pp.life--;
      if (pp.life <= 0) mineScene.particles.splice(i, 1);
    }
  }
  // Victory - wait for speech dismiss then fade out and complete
  if (mineScene.active && mineScene.phase === 'victory_fade') {
    mineScene.fadeTimer--;
    if (mineScene.fadeTimer <= 0) {
      mineScene.active = false;
      mineScene.phase = 'done';
      mineScene.particles.length = 0;
      mineScene.crumbleTimer = 0;
      mineFound = true;
      troubledPerson.active = false;
      troubledPerson.following = false;
      notify('You found the mine! The village has a future!');
    }
  }

  // Followers follow the player in a chain
  for (let i = 0; i < followers.length; i++) {
    let target = i === 0 ? player : followers[i - 1];
    let fdx = target.x - followers[i].x;
    let fdy = target.y - followers[i].y;
    let fdist = Math.hypot(fdx, fdy);
    let followDist = 35;
    followers[i].moving = false;
    if (fdist > followDist) {
      followers[i].x += (fdx / fdist) * player.speed * 0.9;
      followers[i].y += (fdy / fdist) * player.speed * 0.9;
      followers[i].moving = true;
    }
  }

  // Deliver followers to village
  if (followers.length > 0 &&
      player.x > village.x && player.x < village.x + village.w &&
      player.y > village.y && player.y < village.y + village.h) {
    let delivered = followers.length;
    village.population += delivered;
    notify(`Delivered ${delivered} survivor${delivered > 1 ? 's' : ''} to the village! Population: ${village.population}`);

    // Update rescue quests
    for (const q of activeQuests) {
      if (!q.done && q.type === 'rescue_survivors') {
        q.progress = Math.min(q.progress + delivered, q.need);
        if (q.progress >= q.need) q.done = true;
      }
    }

    // Place villagers
    for (const f of followers) {
      let vpIdx = villagePeople.length;
      villagePeople.push({
        x: village.x + 20 + Math.random() * (village.w - 40),
        y: village.y + 20 + Math.random() * (village.h - 40),
        color: f.color,
        explorer: f.explorer || makeExplorerStyle(),
        wanderAngle: Math.random() * Math.PI * 2,
        hasQuest: false
      });
      // 60% chance this villager has a quest
      if (Math.random() < 0.6) {
        let tmpl = QUEST_TEMPLATES[Math.floor(Math.random() * QUEST_TEMPLATES.length)];
        let need = tmpl.min + Math.floor(Math.random() * (tmpl.max - tmpl.min + 1));
        let desc = tmpl.desc.replace('{n}', need);
        // If a "rescue more survivors" quest lands and every existing site is
        // already rescued, seed fresh crash sites with exactly `need` survivors
        if (tmpl.type === 'rescue_survivors' && crashSites.every(s => s.rescued)) {
          spawnCrashSitesForQuest(need);
          notify('New distress signals detected in the jungle!');
        }
        activeQuests.push({
          id: questIdCounter++,
          giver: vpIdx,
          desc: desc,
          type: tmpl.type,
          need: need,
          progress: 0,
          reward: tmpl.reward,
          done: false,
          turned_in: false,
          accepted: false
        });
        villagePeople[vpIdx].hasQuest = true;
      }
    }
    followers.length = 0;
    player.carrying = 0;
    document.getElementById('village').textContent = village.population;

    // Check for new buildings
    for (const bt of buildingTypes) {
      if (village.population >= bt.need && !village.buildings.find(b => b.name === bt.name)) {
        // Find a position that doesn't overlap existing buildings
        let placed = false;
        let pad = 15; // spacing between buildings
        for (let attempt = 0; attempt < 50; attempt++) {
          let nx = village.x + 20 + Math.random() * (village.w - bt.w - 40);
          let ny = village.y + 20 + Math.random() * (village.h - bt.h - 40);
          let overlaps = false;
          for (const eb of village.buildings) {
            if (nx < eb.x + eb.w + pad && nx + bt.w + pad > eb.x &&
                ny < eb.y + eb.h + pad && ny + bt.h + pad > eb.y) {
              overlaps = true;
              break;
            }
          }
          if (!overlaps) {
            village.buildings.push({
              name: bt.name,
              color: bt.color,
              roofColor: bt.roofColor,
              w: bt.w, h: bt.h,
              x: nx, y: ny
            });
            placed = true;
            break;
          }
        }
        if (!placed) {
          // Fallback: place in a grid-like position based on building count
          let idx = village.buildings.length;
          let col = idx % 2;
          let row = Math.floor(idx / 2);
          village.buildings.push({
            name: bt.name,
            color: bt.color,
            roofColor: bt.roofColor,
            w: bt.w, h: bt.h,
            x: village.x + 20 + col * (village.w / 2 - 20),
            y: village.y + 20 + row * 60
          });
        }
        notify(`New building: ${bt.name}!`);
      }
    }
  }

  // Village people wander (avoid buildings)
  for (const vp of villagePeople) {
    if (!vp.stuckCount) vp.stuckCount = 0;
    vp.wanderAngle += (Math.random() - 0.5) * 0.3;
    let wx = vp.x + Math.cos(vp.wanderAngle) * 0.3;
    let wy = vp.y + Math.sin(vp.wanderAngle) * 0.3;
    // Stay inside village
    let blocked = false;
    if (wx <= village.x + 10 || wx >= village.x + village.w - 10) { vp.wanderAngle += Math.PI; blocked = true; }
    if (wy <= village.y + 10 || wy >= village.y + village.h - 10) { vp.wanderAngle += Math.PI; blocked = true; }
    // Don't walk through buildings
    if (!blocked) {
      for (const bl of village.buildings) {
        let pad = 8;
        if (wx > bl.x - pad && wx < bl.x + bl.w + pad &&
            wy > bl.y - pad && wy < bl.y + bl.h + pad) {
          blocked = true;
          break;
        }
      }
    }
    if (blocked) {
      vp.wanderAngle += Math.PI * 0.5 + Math.random() * Math.PI;
      vp.stuckCount++;
      // If stuck too many times, teleport to an open spot
      if (vp.stuckCount > 30) {
        for (let attempt = 0; attempt < 50; attempt++) {
          let nx = village.x + 15 + Math.random() * (village.w - 30);
          let ny = village.y + 15 + Math.random() * (village.h - 30);
          let clear = true;
          for (const bl of village.buildings) {
            let pad = 12;
            if (nx > bl.x - pad && nx < bl.x + bl.w + pad &&
                ny > bl.y - pad && ny < bl.y + bl.h + pad) {
              clear = false;
              break;
            }
          }
          if (clear) {
            vp.x = nx;
            vp.y = ny;
            vp.stuckCount = 0;
            vp.wanderAngle = Math.random() * Math.PI * 2;

          }
        }
      }
    } else {
      vp.x = wx;
      vp.y = wy;
      vp.stuckCount = 0;
    }
  }

  // Smoke particles for crash sites (campsites don't produce smoke)
  for (const site of crashSites) {
    if (site.rescued || site.type === 'campsite') continue;
    if (Math.random() < 0.1) {
      site.smoke.push({ x: site.x, y: site.y - 10, life: 60, size: 3 + Math.random() * 5 });
    }
    for (let i = site.smoke.length - 1; i >= 0; i--) {

  }

  if (notifyTimer > 0) notifyTimer--;

  // Tick damage floaters
  for (let i = dmgFloaters.length - 1; i >= 0; i--) {

  if (screenFlash > 0) screenFlash = Math.max(0, screenFlash - 0.03);

  // Item pickup
  for (const item of worldItems) {

  if (player.hurtTimer > 0) player.hurtTimer--;
  if (player.invincible > 0) player.invincible--;
  const WOLF_ATTACK = 25;
  let playerInVillage = player.x > village.x && player.x < village.x + village.w && player.y > village.y && player.y < village.y + village.h;

  let _bossFrozen = mineScene.active && mineScene.phase === 'boss' && (!mineScene.introTriggered || mineScene.introTimer > 0);
  for (const wolf of wolves) {

    if (wolf.pack === TROUBLED_PACK_ID && troubledPerson.active && troubledPerson.found && troubledPerson.speechTimer <= 0) {

      if (distToNpc < distToPlayer) {

        for (let r = 20; r < 200; r += 10) {

        }

      }
    } else {
      wolf.stuckCount = 0;
    }
  }
  // Archer shooting - shoot at wolves near village
  if (watchtowerJobs.archer.assigned > 0) {

    if (tower) {

      let towerY = tower.y + tower.h / 2;

        for (const wolf of wolves) {

            closestWolf = wolf;
          }
        }

            life: 60
          });
        }
      }
    }
  }

  // Update arrows
  for (let i = arrows.length - 1; i >= 0; i--) {
    let a = arrows[i];
    let angle = Math.atan2(a.targetY - a.y, a.targetX - a.x);
    a.x += Math.cos(angle) * a.speed;
    a.y += Math.sin(angle) * a.speed;
    a.life--;
    // Hit wolf check
    for (const wolf of wolves) {
      if (Math.hypot(a.x - wolf.x, a.y - wolf.y) < 15) {
        wolf.health--;
        spawnFloater(wolf.x, wolf.y - 20, '-1', '#ffdd55');

        break;
      }
    }
    if (a.life <= 0) arrows.splice(i, 1);
  }

  // Remove retreated wolves (no kill credit)
  for (let i = wolves.length - 1; i >= 0; i--) {
    if (wolves[i]._remove) wolves.splice(i, 1);
  }
  // Remove dead wolves
  for (let i = wolves.length - 1; i >= 0; i--) {
    if (wolves[i].health <= 0) {
      wolves.splice(i, 1);
      wolfKillCount++;
      // Update kill quests
      for (const q of activeQuests) {
        if (!q.done && q.type === 'kill_wolves') {
          q.progress = Math.min(q.progress + 1, q.need);
          if (q.progress >= q.need) q.done = true;
        }
      }
    }
  }

  // --- AMBER GOLEMS ---
  const _inBossArena = mineScene.active && (mineScene.phase === 'boss' || mineScene.phase === 'victory' || mineScene.phase === 'victory_fade');
  for (const g of golems) {
    if (g.hurtTimer > 0) g.hurtTimer--;
    // Shard particles
    for (let i = g.shards.length - 1; i >= 0; i--) {

      sh.x += sh.vx; sh.y += sh.vy;
      sh.vy += 0.18;
      sh.life--;
      if (sh.life <= 0) g.shards.splice(i, 1);
    }
    // Evict from boss arena if fight is active
    if (_inBossArena) {
      const mdx = g.x - mine.x, mdy = g.y - mine.y;
      const mdist = Math.hypot(mdx, mdy);
      if (mdist < 330) {
        const ang = mdist > 0.01 ? Math.atan2(mdy, mdx) : Math.random() * Math.PI * 2;
        g.x = mine.x + Math.cos(ang) * 360;
        g.y = mine.y + Math.sin(ang) * 360;
        g.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, g.x));
        g.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, g.y));

        g.attackTimer = 0;
        g.windupTimer = 0;

    }
    if (g.attackTimer > 0) g.attackTimer--;

    const pdyg = player.y - g.y;
    const pdist = Math.hypot(pdxg, pdyg);

      if (g.windupTimer === 0) {

          } else {

            triggerShake(18, 5);

          player.hurtTimer = 30;
          player.invincible = 60;
          const kbAng = Math.atan2(player.y - g.y, player.x - g.x);
          player.x += Math.cos(kbAng) * 22;
          player.y += Math.sin(kbAng) * 22;
          player.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, player.x));
          player.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, player.y));

        for (let k = 0; k < 10; k++) {
          const a = Math.random() * Math.PI * 2;
          const sp = 1.2 + Math.random() * 2.2;
          g.shards.push({ x: g.x, y: g.y + 6, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1.5, life: 24 + Math.floor(Math.random() * 10) });
        }
        g.attackTimer = 80; // cooldown
      }
    } else if (pdist < GOLEM_ATTACK && g.attackTimer === 0 && player.invincible <= 0) {
      g.state = 'attack';
      g.windupTimer = 38;
      g.angle = Math.atan2(pdyg, pdxg);
    } else if (pdist < GOLEM_DETECT) {

      // Lumber toward player

      g.angle = ang;
      g.walkBob += 0.14;
      const step = g.speed;
      const nx = g.x + Math.cos(ang) * step;
      const ny = g.y + Math.sin(ang) * step;

      if (!blockedByMine) {

  }

  for (let i = golems.length - 1; i >= 0; i--) {

      for (let k = 0; k < 22; k++) {

        const sp = 1.5 + Math.random() * 3;
        golems[i].shards.push({ x: golems[i].x, y: golems[i].y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 2, life: 40 + Math.floor(Math.random() * 15) });

  // Advance walk animation + footstep SFX every ~21 frames of movement

  }

  // --- TROUBLED PERSON QUEST ---
  {
    let _rescuedAllTP = village.population >= totalSurvivors && totalSurvivors > 0;
    let _sideQuestsDoneTP = activeQuests.filter(q => q.turned_in).length >= 3;
    if (_rescuedAllTP && _sideQuestsDoneTP && !troubledPersonFound) {

  }
  if (troubledPerson.active && !troubledPersonFound) {
    if (troubledPerson.hurtTimer > 0) troubledPerson.hurtTimer--;
    if (troubledPerson.invincible > 0) troubledPerson.invincible--;
    // Low-health retreat trigger

      }

    }
    // Player finds the NPC
    if (!troubledPerson.found) {

      if (Math.hypot(ddx, ddy) < 40) {

        // Speech plays first, wolves spawn after speech ends

        troubledPerson.speechWaiting = true;
        troubledPerson.speechPhase = 1;

          let dist = 90 + Math.random() * 20;
          wx = troubledPerson.x + Math.cos(ang) * dist;
          wy = troubledPerson.y + Math.sin(ang) * dist;
          tries++;
        } while (Math.hypot(wx - player.x, wy - player.y) < 90 && tries < 20);
        wolves.push({
          x: wx, y: wy,
          angle: Math.random() * Math.PI * 2,
          speed: isAlpha ? 1.4 : 1.2,
          state: 'chase',
          attackTimer: 0,
          facing: 'right',
          health: isAlpha ? 5 : 3,
          maxHealth: isAlpha ? 5 : 3,
          pack: TROUBLED_PACK_ID,
          isAlpha: isAlpha
            });
          }
    }
    // Advance speech bubble (wait for space)
    if (troubledPerson.speechTimer > 0 && !troubledPerson.speechWaiting) {
      troubledPerson.speechTimer--;
    }

    if (troubledPerson.wolvesSpawned) {
      // AI: move toward nearest quest wolf, whip attack like player
      let target = null, tbest = Infinity;
      for (const w of wolves) {
        if (w.pack !== TROUBLED_PACK_ID) continue;
        let d = Math.hypot(w.x - troubledPerson.x, w.y - troubledPerson.y);
        if (d < tbest) { tbest = d; target = w; }

          troubledPerson.whip.y = troubledPerson.y;
          let wdir = 1 / tlen;
          troubledPerson.whip.endX = troubledPerson.x + tdx * wdir * 90;
          troubledPerson.whip.endY = troubledPerson.y + tdy * wdir * 90;
          // Line-segment hit check against all quest wolves, same as player
          for (const wolf of wolves) {
            if (wolf.pack !== TROUBLED_PACK_ID) continue;
            let wpx = troubledPerson.whip.endX - troubledPerson.whip.x;
            let wpy = troubledPerson.whip.endY - troubledPerson.whip.y;
            let len2 = wpx * wpx + wpy * wpy;
            let t = Math.max(0, Math.min(1, ((wolf.x - troubledPerson.whip.x) * wpx + (wolf.y - troubledPerson.whip.y) * wpy) / len2));
            let projX = troubledPerson.whip.x + t * wpx;
            let projY = troubledPerson.whip.y + t * wpy;
