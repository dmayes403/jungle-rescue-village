
<!DOCTYPE html>

<html>
<head>
<title>Jungle Rescue Village</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  #game-container { position: relative; display: flex; justify-content: center; align-items: center; }
  canvas { border: 2px solid #2d5a1e; display: block; }
  #ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: #fff; font-family: Arial; font-size: 18px; text-shadow: 1px 1px 2px #000; pointer-events: none; white-space: nowrap; }
  #instructions { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: #fff; font-family: Arial; font-size: 14px; text-shadow: 1px 1px 2px #000; pointer-events: none; white-space: nowrap; }
  .game-btn {
    position: absolute; top: 10px; z-index: 10; cursor: pointer;
    font-family: 'Arial', sans-serif; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;
    color: #f0e8d0; text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    padding: 7px 14px;
    background: linear-gradient(to bottom, #6a5a3a 0%, #4a3a20 50%, #3a2a14 51%, #4a3a20 100%);
    border: 2px solid #8a7a50;
    border-radius: 3px;
    box-shadow: inset 0 1px 0 rgba(255,255,200,0.2), inset 0 -1px 0 rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.5), 0 0 8px rgba(0,0,0,0.3);
  }
  .game-btn:hover {
    background: linear-gradient(to bottom, #7a6a4a 0%, #5a4a30 50%, #4a3a24 51%, #5a4a30 100%);
    border-color: #aa9a60;
    color: #fff;
    box-shadow: inset 0 1px 0 rgba(255,255,200,0.3), inset 0 -1px 0 rgba(0,0,0,0.3), 0 2px 6px rgba(0,0,0,0.6), 0 0 12px rgba(140,120,60,0.2);
  }
  .game-btn:active {
    background: linear-gradient(to bottom, #3a2a14 0%, #4a3a20 50%, #5a4a30 51%, #4a3a20 100%);
    border-color: #6a5a3a;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.4);
    padding: 8px 14px 6px 14px;
  }
  #pause-btn, #mute-btn { width: 34px; height: 32px; padding: 0; box-sizing: border-box; display: inline-flex; align-items: center; justify-content: center; }
  #pause-btn:active, #mute-btn:active { padding: 0; }
  #pause-btn { right: 10px; z-index: 100; }
  #mute-btn { right: 52px; z-index: 100; }
  #fs-btn { right: 94px; }
  #save-btn { right: 138px; z-index: 100; }
  #pause-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 5; }
  #pause-overlay.active { display: flex; flex-direction: column; gap: 20px; }
  #pause-text { color: #fff; font-family: Arial; font-size: 48px; text-shadow: 2px 2px 4px #000; }
  #pause-menu { display: flex; flex-direction: column; align-items: center; gap: 10px; background: rgba(0,0,0,0.45); padding: 18px 28px; border-radius: 10px; border: 1px solid rgba(255,220,120,0.4); }
  #pause-menu label { color: #ffe08a; font-family: Arial; font-size: 14px; }
  #pause-menu input[type=range] { width: 220px; accent-color: #ffd84a; }
  #pause-menu .hint { color: #ccc; font-family: Arial; font-size: 11px; }
  :fullscreen { background: #000; }
  :fullscreen #game-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; margin: 0; padding: 0; }
  :fullscreen canvas { margin: 0; }

  /* Icon buttons */
  .icon-btn { padding: 8px 10px; line-height: 0; }
  .icon-btn:active { padding: 9px 10px 7px 10px; }

  /* Pause icon - two vertical bars */
  .pause-icon { display: inline-flex; gap: 3px; align-items: center; height: 14px; }
  .pause-icon span { display: block; width: 4px; height: 14px; background: #f0e8d0; border-radius: 1px; }
  .game-btn:hover .pause-icon span { background: #fff; }

  /* Play icon (for resume state) */
  .play-icon { display: inline-block; width: 0; height: 0; border-style: solid; border-width: 7px 0 7px 11px; border-color: transparent transparent transparent #f0e8d0; }
  .game-btn:hover .play-icon { border-left-color: #fff; }

  /* Classic speaker icon (inline SVG) with sound waves or a red slash when muted */
  .speaker-svg { display: block; width: 18px; height: 14px; }
  .speaker-svg .speaker-body { fill: #f0e8d0; }
  .speaker-svg .wave { stroke: #f0e8d0; stroke-width: 1.6; stroke-linecap: round; fill: none; }
  .speaker-svg .slash { stroke: #ff5a3a; stroke-width: 2.2; stroke-linecap: round; display: none; }
  .game-btn:hover .speaker-svg .speaker-body { fill: #fff; }
  .game-btn:hover .speaker-svg .wave { stroke: #fff; }
  .speaker-svg.muted .wave { display: none; }
  .speaker-svg.muted .slash { display: inline; }

  /* Fullscreen icon - four disconnected corners */
  .fs-icon { display: inline-grid; grid-template-columns: 1fr 1fr; gap: 4px; width: 16px; height: 14px; }
  .corner { display: block; width: 6px; height: 5px; }
  .corner.tl { border-top: 2.5px solid #f0e8d0; border-left: 2.5px solid #f0e8d0; }
  .corner.tr { border-top: 2.5px solid #f0e8d0; border-right: 2.5px solid #f0e8d0; }
  .corner.bl { border-bottom: 2.5px solid #f0e8d0; border-left: 2.5px solid #f0e8d0; }
  .corner.br { border-bottom: 2.5px solid #f0e8d0; border-right: 2.5px solid #f0e8d0; }
  .game-btn:hover .corner { border-color: #fff; }

  /* Mobile layout */
  #mobile-controls { display: none; }
  @media (min-width: 1025px) {
    #mobile-controls { display: none !important; }
  }
  #rotate-prompt { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; justify-content: center; align-items: center; flex-direction: column; color: #f0e8d0; font-family: Arial; text-align: center; }
  #rotate-prompt .rotate-icon { font-size: 60px; margin-bottom: 20px; }
  #rotate-prompt .rotate-text { font-size: 20px; }

  @media (max-width: 1024px) and (pointer: coarse) {
    body { background: #000; }
    #game-container { flex-direction: row; width: 100vw; height: 100vh; }
    canvas { border: none; }
    #mobile-controls { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
    .touch-zone { pointer-events: auto; position: absolute; top: 50px; height: calc(100% - 50px); display: flex; justify-content: center; align-items: center; }
    .touch-zone-left { left: 0; width: 120px; background: rgba(0,0,0,0.85); flex-direction: column; gap: 10px; }
    .touch-zone-right { right: 0; width: 120px; background: rgba(0,0,0,0.85); flex-direction: column; gap: 16px; }
    #minimap-canvas { width: 100px; height: 100px; background: rgba(0,30,0,0.7); border: 1px solid #4a4; display: block; }
    .mobile-action-btn { width: 70px; height: 50px; border-radius: 8px; background: linear-gradient(to bottom, #6a5a3a, #3a2a14); border: 2px solid #8a7a50; color: #f0e8d0; font-family: Arial; font-weight: bold; font-size: 11px; text-transform: uppercase; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: inset 0 1px 0 rgba(255,255,200,0.2), 0 2px 6px rgba(0,0,0,0.5); touch-action: none; user-select: none; -webkit-user-select: none; }
    .mobile-action-btn:active { background: linear-gradient(to bottom, #3a2a14, #4a3a20); }
    .mobile-circle-btn { width: 70px; height: 70px; border-radius: 50%; }
    #joystick-area { width: 100px; height: 100px; position: relative; touch-action: none; user-select: none; -webkit-user-select: none; }
    #joystick-base { width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 2px solid rgba(138,122,80,0.5); position: absolute; top: 0; left: 0; }
    #joystick-thumb { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(to bottom, #6a5a3a, #3a2a14); border: 2px solid #8a7a50; position: absolute; top: 30px; left: 30px; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
    #fs-btn { display: none !important; }
    #save-btn { right: auto; left: 10px; transform: none; top: 10px; padding: 0; font-size: 11px; line-height: 1.2; text-align: center; width: 62px; height: 40px; box-sizing: border-box; display: flex; justify-content: center; align-items: center; }
    #pause-btn { right: auto; left: 78px; top: 10px; padding: 0; width: 40px; height: 40px; box-sizing: border-box; display: flex; justify-content: center; align-items: center; }
    #mute-btn { right: auto; left: 44px; top: 58px; padding: 0; width: 40px; height: 40px; box-sizing: border-box; display: flex; justify-content: center; align-items: center; }
  }
  @media (max-width: 1024px) and (pointer: coarse) and (orientation: portrait) {
    #rotate-prompt { display: flex; }
    #game-container { display: none; }
    #mobile-controls { display: none; }
  }
</style>
</head>
<body>
<div id="game-container">
<div id="ui" style="display:none"><span id="rescued">0</span><span id="total">0</span><span id="village">0</span></div>
<button id="pause-btn" class="game-btn icon-btn" title="Pause" style="display:none"><span class="pause-icon"><span></span><span></span></span></button>
<button id="mute-btn" class="game-btn icon-btn" title="Mute music" style="display:none"><svg class="speaker-svg" viewBox="0 0 22 18"><path class="speaker-body" d="M1 6 L5 6 L11 1 L11 17 L5 12 L1 12 Z"/><path class="wave" d="M13.5 6.2 Q15.8 9 13.5 11.8"/><path class="wave" d="M15.8 4 Q19.5 9 15.8 14"/><line class="slash" x1="12" y1="3" x2="21" y2="15"/></svg></button>
<button id="fs-btn" class="game-btn icon-btn" title="Fullscreen" style="display:none"><span class="fs-icon"><span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span></span></button>
<button id="save-btn" class="game-btn" style="display:none">Save & Quit</button>
<div id="debug-panel" style="display:none;position:absolute;top:10px;left:10px;z-index:999;background:rgba(0,0,0,0.85);border:2px solid #ffaa00;border-radius:8px;padding:12px;color:#fff;font:13px monospace;min-width:220px;pointer-events:auto;">
  <div style="color:#ffaa00;font-weight:bold;font-size:14px;margin-bottom:8px;border-bottom:1px solid #555;padding-bottom:4px;">DEBUG - Quest Skip <span id="debug-close" style="float:right;cursor:pointer;color:#888;">[`]</span></div>
  <div id="debug-lock">
    <div style="color:#f0e0b0;font-size:12px;margin-bottom:6px;">Enter passcode:</div>
    <div id="debug-pass-boxes" style="display:flex;gap:4px;margin-bottom:6px;"></div>
    <div id="debug-pass-error" style="color:#ff4444;font-size:11px;min-height:14px;"></div>
  </div>
  <div id="debug-quests" style="display:none;"></div>
</div>
<div id="pause-overlay">
  <span id="pause-text">PAUSED</span>
  <div id="pause-menu">
    <label for="vol-slider">Music Volume</label>
    <input id="vol-slider" type="range" min="0" max="100" step="1" value="100">
    <span class="hint">Press P to resume · M to mute</span>
  </div>
</div>
<canvas id="game"></canvas>
</div>
<div id="mobile-controls">
  <div class="touch-zone touch-zone-left">
    <button id="cycle-btn" class="mobile-action-btn">ITEM</button>
    <button id="use-btn" class="mobile-action-btn">USE</button>
    <button id="whip-btn" class="mobile-action-btn mobile-circle-btn">WHIP</button>
  </div>
  <div class="touch-zone touch-zone-right">
    <div id="joystick-area">
      <div id="joystick-base"></div>
      <div id="joystick-thumb"></div>
    </div>
    <canvas id="minimap-canvas" width="100" height="100"></canvas>
  </div>
</div>
<div id="rotate-prompt">
  <div class="rotate-icon">📱↩️</div>
  <div class="rotate-text">Rotate your device to landscape</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Make canvas fill the screen
canvas.width = 800;
canvas.height = 600;

// Fullscreen
const fsBtn = document.getElementById('fs-btn');
const gameContainer = document.getElementById('game-container');
fsBtn.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    gameContainer.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
});
function resizeCanvas() {
  if (document.fullscreenElement) {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    fsBtn.innerHTML = '<span class="fs-icon"><span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span></span>';
    fsBtn.title = 'Exit Fullscreen';
  } else {
    canvas.width = 800;
    canvas.height = 600;
    fsBtn.innerHTML = '<span class="fs-icon"><span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span></span>';
    fsBtn.title = 'Fullscreen';
  }
}
document.addEventListener('fullscreenchange', resizeCanvas);
window.addEventListener('resize', () => { if (document.fullscreenElement) resizeCanvas(); });

// Fullscreen button

// --- GAME WORLD ---
const WORLD_W = 2400;
const WORLD_H = 2400;

// Camera
let camX = 0;
let camY = 0;

// Player
const player = {
  x: WORLD_W / 2,
  y: WORLD_H / 2,
  w: 28,
  h: 36,
  speed: 3,
  color: '#6b3a1a',
  carrying: 0, // how many survivors following
  facing: 'down'
};

// Village area (center of map)
const village = {
  x: WORLD_W / 2 - 120,
  y: WORLD_H / 2 - 120,
  w: 240,
  h: 240,
  population: 0,
  buildings: []
};

// Generate jungle trees
const trees = [];
for (let i = 0; i < 600; i++) {
  let tx = Math.random() * WORLD_W;
  let ty = Math.random() * WORLD_H;
  // Don't place trees in the village
  if (tx > village.x - 20 && tx < village.x + village.w + 20 &&
      ty > village.y - 20 && ty < village.y + village.h + 20) continue;
  trees.push({
    x: tx, y: ty,
    size: 15 + Math.random() * 25,
    shade: `rgb(${20 + Math.random()*40}, ${80 + Math.random()*60}, ${15 + Math.random()*30})`,
    type: Math.floor(Math.random() * 2), // 0=palm, 1=big leafy
    sway: Math.random() * 100 // offset for wind animation
  });
}

// Dense border forest trees (extends beyond map edges)
const BORDER = 150;
const borderTrees = [];
const borderExt = 500; // how far beyond map edges to place trees
for (let i = 0; i < 3000; i++) {
  let bx, by;
  let side = Math.floor(Math.random() * 4);
  if (side === 0) { bx = -borderExt + Math.random() * (WORLD_W + borderExt * 2); by = -borderExt + Math.random() * (BORDER + borderExt); }
  else if (side === 1) { bx = -borderExt + Math.random() * (WORLD_W + borderExt * 2); by = WORLD_H - BORDER + Math.random() * (BORDER + borderExt); }
  else if (side === 2) { bx = -borderExt + Math.random() * (BORDER + borderExt); by = -borderExt + Math.random() * (WORLD_H + borderExt * 2); }
  else { bx = WORLD_W - BORDER + Math.random() * (BORDER + borderExt); by = -borderExt + Math.random() * (WORLD_H + borderExt * 2); }
  borderTrees.push({
    x: bx, y: by,
    size: 20 + Math.random() * 20,
    shade: `rgb(${10 + Math.random()*25}, ${50 + Math.random()*40}, ${10 + Math.random()*20})`
  });
}

// Ground clutter - fallen logs and bushes
const clutter = [];
for (let i = 0; i < 200; i++) {
  let cx = Math.random() * WORLD_W;
  let cy = Math.random() * WORLD_H;
  // Don't place in village
  if (cx > village.x - 20 && cx < village.x + village.w + 20 &&
      cy > village.y - 20 && cy < village.y + village.h + 20) continue;
  clutter.push({
    x: cx, y: cy,
    type: 'log',
    angle: Math.random() * Math.PI,
    size: 8 + Math.random() * 12,
    shade: `rgb(${30 + Math.random()*30}, ${90 + Math.random()*50}, ${20 + Math.random()*25})`
  });
}

// Rivers - generate winding paths that start from random edges and split
const rivers = [];
const RIVER_WIDTH = 28;

// Village zone to avoid (with generous padding)
const villagePad = 60;
const vzLeft = village.x - villagePad;
const vzRight = village.x + village.w + villagePad;
const vzTop = village.y - villagePad;
const vzBot = village.y + village.h + villagePad;

function inVillageZone(px, py) {
  return px > vzLeft && px < vzRight && py > vzTop && py < vzBot;
}

// Check if point is near any already-placed river
function nearExistingRiver(px, py, dist) {
  for (const river of rivers) {
    for (let i = 0; i < river.length - 1; i++) {
      let ax = river[i].x, ay = river[i].y;
      let bx = river[i+1].x, by = river[i+1].y;
      let dx2 = bx - ax, dy2 = by - ay;
      let len2 = dx2 * dx2 + dy2 * dy2;
      if (len2 === 0) continue;
      let t = Math.max(0, Math.min(1, ((px - ax) * dx2 + (py - ay) * dy2) / len2));
      let projX = ax + t * dx2, projY = ay + t * dy2;
      if (Math.hypot(px - projX, py - projY) < dist) return true;
    }
  }
  return false;
}

function generateRiver(startX, startY, dirX, dirY, length) {
  let river = [];
  let rx = startX, ry = startY;
  let dx = dirX, dy = dirY;
  for (let step = 0; step < length; step++) {
    // Skip village zone — steer around it
    if (inVillageZone(rx, ry)) {
      // Push away from village center
      let vcx = village.x + village.w / 2;
      let vcy = village.y + village.h / 2;
      let awayX = rx - vcx;
      let awayY = ry - vcy;
      let awayMag = Math.hypot(awayX, awayY) || 1;
      dx = awayX / awayMag;
      dy = awayY / awayMag;
      rx += dx * 50;
      ry += dy * 50;
      continue;
    }

    // Stop if overlapping another river
    if (nearExistingRiver(rx, ry, RIVER_WIDTH * 2.5)) break;

    river.push({ x: rx, y: ry });

    // Wander the direction slightly
    dx += (Math.random() - 0.5) * 0.4;
    dy += (Math.random() - 0.5) * 0.4;
    let mag = Math.hypot(dx, dy);
    dx = (dx / mag);
    dy = (dy / mag);
    rx += dx * (35 + Math.random() * 15);
    ry += dy * (35 + Math.random() * 15);

    // Stop if off the map
    if (rx < -50 || rx > WORLD_W + 50 || ry < -50 || ry > WORLD_H + 50) break;
  }
  return river;
}

// Pick random start edges and directions
for (let r = 0; r < 3; r++) {
  let startX, startY, dirX, dirY;
  let edge = Math.floor(Math.random() * 4);
  if (edge === 0) { // top
    startX = 200 + Math.random() * (WORLD_W - 400);
    startY = 0;
    dirX = (Math.random() - 0.5) * 0.6;
    dirY = 1;
  } else if (edge === 1) { // bottom
    startX = 200 + Math.random() * (WORLD_W - 400);
    startY = WORLD_H;
    dirX = (Math.random() - 0.5) * 0.6;
    dirY = -1;
  } else if (edge === 2) { // left
    startX = 0;
    startY = 200 + Math.random() * (WORLD_H - 400);
    dirX = 1;
    dirY = (Math.random() - 0.5) * 0.6;
  } else { // right
    startX = WORLD_W;
    startY = 200 + Math.random() * (WORLD_H - 400);
    dirX = -1;
    dirY = (Math.random() - 0.5) * 0.6;
  }

  // Don't start near the village
  if (inVillageZone(startX, startY)) continue;

  let main = generateRiver(startX, startY, dirX, dirY, 80);
  if (main.length < 5) continue; // too short, skip
  rivers.push(main);
}

// Remove rivers that don't reach from one edge of the map to another
const edgeMargin = 80;
function atEdge(p) {
  return p.x <= edgeMargin || p.x >= WORLD_W - edgeMargin ||
         p.y <= edgeMargin || p.y >= WORLD_H - edgeMargin;
}
for (let i = rivers.length - 1; i >= 0; i--) {
  let r = rivers[i];
  if (r.length < 3 || !atEdge(r[0]) || !atEdge(r[r.length - 1])) {
    rivers.splice(i, 1);
  }
}

// Helper: check if a point is near any river
function nearRiver(px, py, dist) {
  for (const river of rivers) {
    for (let i = 0; i < river.length - 1; i++) {
      let ax = river[i].x, ay = river[i].y;
      let bx = river[i+1].x, by = river[i+1].y;
      let dx2 = bx - ax, dy2 = by - ay;
      let len2 = dx2 * dx2 + dy2 * dy2;
      let t = Math.max(0, Math.min(1, ((px - ax) * dx2 + (py - ay) * dy2) / len2));
      let projX = ax + t * dx2, projY = ay + t * dy2;
      if (Math.hypot(px - projX, py - projY) < dist) return true;
    }
  }
  return false;
}

// Bridges - place 2-3 per river, only at straight sections
const bridges = [];
for (const river of rivers) {
  if (river.length < 6) continue;
  let spacing = Math.floor(river.length / 4);
  for (let b = 1; b <= 3; b++) {
    let target = Math.min(b * spacing, river.length - 3);
    // Search nearby for a straight section
    let bestIdx = -1;
    let bestAngleDiff = Infinity;
    let searchRange = Math.min(6, Math.floor(spacing / 2));
    for (let s = -searchRange; s <= searchRange; s++) {
      let idx = target + s;
      if (idx < 1 || idx >= river.length - 2) continue;
      // Angle between previous segment and next segment
      let a1 = Math.atan2(river[idx].y - river[idx-1].y, river[idx].x - river[idx-1].x);
      let a2 = Math.atan2(river[idx+1].y - river[idx].y, river[idx+1].x - river[idx].x);
      let diff = Math.abs(a2 - a1);
      if (diff > Math.PI) diff = Math.PI * 2 - diff;
      if (diff < bestAngleDiff) {
        bestAngleDiff = diff;
        bestIdx = idx;
      }
    }
    // Only place bridge if the turn is gentle enough (less than ~30 degrees)
    if (bestIdx >= 0 && bestAngleDiff < 0.5) {
      let p = river[bestIdx];
      let pNext = river[bestIdx + 1];
      let angle = Math.atan2(pNext.y - p.y, pNext.x - p.x);
      bridges.push({
        x: p.x,
        y: p.y,
        angle: angle,
        w: RIVER_WIDTH + 16,
        h: 20
      });
    }
  }
}

// Helper: check if a point is on a bridge
function onBridge(px, py) {
  for (const br of bridges) {
    // Rotate point into bridge's local space
    let cos = Math.cos(-br.angle + Math.PI / 2);
    let sin = Math.sin(-br.angle + Math.PI / 2);
    let lx = (px - br.x) * cos - (py - br.y) * sin;
    let ly = (px - br.x) * sin + (py - br.y) * cos;
    if (Math.abs(lx) < br.h / 2 + 4 && Math.abs(ly) < br.w / 2 + 4) return true;
  }
  return false;
}

}

// Spawn fresh crash sites totalling `needed` survivors (for late-game rescue quests)
function spawnCrashSitesForQuest(needed) {
  const types = ['campsite', 'plane', 'helicopter'];
  let remaining = Math.max(1, needed);
  let added = 0;
  while (remaining > 0) {
    const survCount = Math.min(remaining, 1 + Math.floor(Math.random() * 3));
    let cx, cy, tries = 0;
    do {
      cx = 150 + Math.random() * (WORLD_W - 300);
      cy = 150 + Math.random() * (WORLD_H - 300);
      tries++;
    } while (tries < 60 && (
      (Math.abs(cx - WORLD_W/2) < 200 && Math.abs(cy - WORLD_H/2) < 200) ||
      nearRiver(cx, cy, RIVER_WIDTH + 15) ||
      Math.hypot(cx - mine.x, cy - mine.y) < 200 ||
      Math.hypot(cx - village.x - village.w/2, cy - village.y - village.h/2) < 220 ||
      crashSites.some(s => Math.hypot(s.x - cx, s.y - cy) < 140)
    ));
    const type = types[Math.floor(Math.random() * types.length)];
    crashSites.push({
      x: cx, y: cy,
      type: type,
      survivors: survCount,
      rescued: false,
      smoke: [],
      campStyle: type === 'campsite' ? {
        tentTilt: (Math.random() - 0.5) * 0.08,
        backTilt: -0.25 - Math.random() * 0.25,
        flagWave: Math.random() * 6,
        explorer: {
          hat: EXPLORER_HAT_TYPES[Math.floor(Math.random() * EXPLORER_HAT_TYPES.length)],
          hatColor: EXPLORER_HAT_COLORS[Math.floor(Math.random() * EXPLORER_HAT_COLORS.length)],
          hair: EXPLORER_HAIR_COLORS[Math.floor(Math.random() * EXPLORER_HAIR_COLORS.length)],
          color: ['#c51111','#132ed1','#117f2d','#ed54ba','#ef7d0e','#f5f557','#3f474e','#6b2fbb','#71491e','#38fedb'][Math.floor(Math.random() * 10)]
        }
      } : null
    });
    remaining -= survCount;
    added++;
  }
  totalSurvivors = crashSites.reduce((sum, s) => sum + s.survivors, 0);
  document.getElementById('total').textContent = totalSurvivors;
  return added;
}

// Global walk timer for animation
let walkTimer = 0;

// Draw a person with head, torso, arms, legs that animate
function drawBean(x, y, size, bodyColor, facingDir, isPlayer, isMoving, isMiner, explorer) {
  const s = size;
  ctx.save();
  ctx.translate(x, y);

  // Walk animation - swing arms and legs
  let swing = isMoving ? Math.sin(walkTimer * 0.15) * 0.6 : 0;
  let armSwing = isMoving ? Math.sin(walkTimer * 0.15) * 0.5 : 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0, s * 0.7, s * 0.3, s * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();

  const skinColor = '#f5c28a';
  const shoeColor = '#333';
  const pantsColor = isPlayer ? '#8a7a55' : isMiner ? '#5a4a3a' : '#3355aa';
  const limbWidth = s * 0.1;

  // --- LEGS ---
  ctx.lineCap = 'round';
  ctx.lineWidth = limbWidth;

  // Left leg
  ctx.strokeStyle = pantsColor;
  let lLegAngle = swing;
  let lFootX = Math.sin(lLegAngle) * s * 0.2;
  let lFootY = s * 0.65;
  ctx.beginPath();
  ctx.moveTo(-s * 0.1, s * 0.2);
  ctx.lineTo(-s * 0.1 + lFootX, lFootY);
  ctx.stroke();
  // Shoe
  ctx.fillStyle = shoeColor;
  ctx.beginPath();
  ctx.arc(-s * 0.1 + lFootX, lFootY, s * 0.06, 0, Math.PI * 2);
  ctx.fill();

  // Right leg
  let rLegAngle = -swing;
  let rFootX = Math.sin(rLegAngle) * s * 0.2;
  let rFootY = s * 0.65;
  ctx.strokeStyle = pantsColor;
  ctx.beginPath();
  ctx.moveTo(s * 0.1, s * 0.2);
  ctx.lineTo(s * 0.1 + rFootX, rFootY);
  ctx.stroke();
  // Shoe
  ctx.fillStyle = shoeColor;
  ctx.beginPath();
  ctx.arc(s * 0.1 + rFootX, rFootY, s * 0.06, 0, Math.PI * 2);
  ctx.fill();

  // --- TORSO ---
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.roundRect(-s * 0.2, -s * 0.15, s * 0.4, s * 0.4, s * 0.08);
  ctx.fill();
  ctx.strokeStyle = shadeColor(bodyColor, -30);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(-s * 0.2, -s * 0.15, s * 0.4, s * 0.4, s * 0.08);
  ctx.stroke();

  // --- ARMS ---
  ctx.lineWidth = limbWidth;
  ctx.lineCap = 'round';

  // Left arm
  ctx.strokeStyle = skinColor;
  let lArmSwing = -armSwing;
  let lHandX = -s * 0.28 + Math.sin(lArmSwing) * s * 0.12;
  let lHandY = s * 0.15 + Math.cos(lArmSwing) * s * 0.05;
  ctx.beginPath();
  ctx.moveTo(-s * 0.2, -s * 0.05);
  ctx.lineTo(lHandX, lHandY);
  ctx.stroke();
  // Hand
  ctx.fillStyle = skinColor;
  ctx.beginPath();
  ctx.arc(lHandX, lHandY, s * 0.05, 0, Math.PI * 2);
  ctx.fill();

  // Right arm
  let rArmSwing = armSwing;
  let rHandX = s * 0.28 + Math.sin(rArmSwing) * s * 0.12;
  let rHandY = s * 0.15 + Math.cos(rArmSwing) * s * 0.05;
  ctx.strokeStyle = skinColor;
  ctx.beginPath();
  ctx.moveTo(s * 0.2, -s * 0.05);
  ctx.lineTo(rHandX, rHandY);
  ctx.stroke();
  // Hand
  ctx.fillStyle = skinColor;
  ctx.beginPath();
  ctx.arc(rHandX, rHandY, s * 0.05, 0, Math.PI * 2);
  ctx.fill();

  // --- HEAD ---
  // Neck
  ctx.fillStyle = skinColor;
  ctx.fillRect(-s * 0.06, -s * 0.25, s * 0.12, s * 0.12);

  // Head circle
  ctx.fillStyle = skinColor;
  ctx.beginPath();
  ctx.arc(0, -s * 0.38, s * 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#d4a06a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, -s * 0.38, s * 0.2, 0, Math.PI * 2);
  ctx.stroke();

  // Hair
  ctx.fillStyle = (explorer && explorer.hair) || '#5a3510';
  ctx.beginPath();
  ctx.arc(0, -s * 0.42, s * 0.2, Math.PI, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, -s * 0.52, s * 0.12, s * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();

  // Face
  if (facingDir !== 'up') {
    let eyeOff = facingDir === 'left' ? -s * 0.03 : facingDir === 'right' ? s * 0.03 : 0;
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(eyeOff - s * 0.07, -s * 0.4, s * 0.045, s * 0.05, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(eyeOff + s * 0.07, -s * 0.4, s * 0.045, s * 0.05, 0, 0, Math.PI * 2);
    ctx.fill();
    // Pupils
    let pupilOff = facingDir === 'left' ? -s * 0.02 : facingDir === 'right' ? s * 0.02 : 0;
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(eyeOff - s * 0.07 + pupilOff, -s * 0.39, s * 0.025, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(eyeOff + s * 0.07 + pupilOff, -s * 0.39, s * 0.025, 0, Math.PI * 2);
    ctx.fill();
    // Smile - confident smirk: flat left side, curved up on the right
    ctx.strokeStyle = '#884422';
    ctx.lineWidth = s * 0.03;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(eyeOff + s * 0.08, -s * 0.27);
    ctx.lineTo(eyeOff - s * 0.02, -s * 0.27);
    ctx.quadraticCurveTo(eyeOff - s * 0.1, -s * 0.27, eyeOff - s * 0.1, -s * 0.32);
    ctx.stroke();
  }

  // Player gets Indiana Jones style
  if (isPlayer) {
    // Satchel bag strap
    ctx.strokeStyle = '#5a3010';
    ctx.lineWidth = s * 0.04;
    ctx.beginPath();
    ctx.moveTo(-s * 0.15, -s * 0.15);
    ctx.lineTo(s * 0.15, s * 0.15);
    ctx.stroke();
    // Satchel bag
    ctx.fillStyle = '#7a4a20';
    ctx.beginPath();
    ctx.roundRect(s * 0.1, s * 0.05, s * 0.15, s * 0.12, 2);
    ctx.fill();
    ctx.strokeStyle = '#5a3010';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    // Bag flap
    ctx.fillStyle = '#6a3a15';
    ctx.fillRect(s * 0.1, s * 0.05, s * 0.15, s * 0.04);
    // Bag buckle
    ctx.fillStyle = '#bb9944';
    ctx.fillRect(s * 0.15, s * 0.06, s * 0.04, s * 0.03);

    // Fedora hat
    // Brim
    ctx.fillStyle = '#5a3a18';
    ctx.beginPath();
    ctx.ellipse(0, -s * 0.42, s * 0.3, s * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();
    // Crown
    ctx.fillStyle = '#6a4420';
    ctx.beginPath();
    ctx.moveTo(-s * 0.18, -s * 0.42);
    ctx.quadraticCurveTo(-s * 0.18, -s * 0.58, -s * 0.06, -s * 0.58);
    ctx.lineTo(s * 0.06, -s * 0.58);
    ctx.quadraticCurveTo(s * 0.18, -s * 0.58, s * 0.18, -s * 0.42);
    ctx.closePath();
    ctx.fill();
    // Crown dent
    ctx.fillStyle = '#5a3a18';
    ctx.beginPath();
    ctx.moveTo(-s * 0.08, -s * 0.58);
    ctx.quadraticCurveTo(0, -s * 0.53, s * 0.08, -s * 0.58);
    ctx.closePath();
    ctx.fill();
    // Hat band
    ctx.fillStyle = '#3a2008';
    ctx.fillRect(-s * 0.18, -s * 0.44, s * 0.36, s * 0.03);

    // Whip (coiled at hip when still, trailing when moving)
    ctx.strokeStyle = '#3a2008';
    ctx.lineWidth = s * 0.03;
    ctx.lineCap = 'round';
    // Coiled at hip
    ctx.beginPath();
    ctx.arc(-s * 0.22, s * 0.12, s * 0.06, 0, Math.PI * 1.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(-s * 0.22, s * 0.12, s * 0.03, 0, Math.PI * 1.2);
    ctx.stroke();

    // Belt
    ctx.fillStyle = '#3a2008';
    ctx.fillRect(-s * 0.2, s * 0.08, s * 0.4, s * 0.03);
    // Belt buckle
    ctx.fillStyle = '#bb9944';
    ctx.fillRect(-s * 0.03, s * 0.075, s * 0.06, s * 0.04);
  }

  // Miner style
  if (isMiner) {
    // Hard hat
    ctx.fillStyle = '#ddaa00';
    ctx.beginPath();
    ctx.ellipse(0, -s * 0.42, s * 0.25, s * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();
    // Hat dome
    ctx.fillStyle = '#eebb10';
    ctx.beginPath();
    ctx.arc(0, -s * 0.48, s * 0.18, Math.PI, 0);
    ctx.closePath();
    ctx.fill();
    // Hat ridge
    ctx.fillStyle = '#cc9900';
    ctx.fillRect(-s * 0.18, -s * 0.44, s * 0.36, s * 0.03);
    // Headlamp
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, -s * 0.45, s * 0.04, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffff88';
    ctx.beginPath();
    ctx.arc(0, -s * 0.45, s * 0.025, 0, Math.PI * 2);
    ctx.fill();

    // Pickaxe on back (idle)
    ctx.strokeStyle = '#7a5a20';
    ctx.lineWidth = s * 0.04;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-s * 0.15, -s * 0.25);
    ctx.lineTo(-s * 0.3, s * 0.15);
    ctx.stroke();
    // Pickaxe head
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.moveTo(-s * 0.22, -s * 0.28);
    ctx.lineTo(-s * 0.08, -s * 0.22);
    ctx.lineTo(-s * 0.1, -s * 0.18);
    ctx.lineTo(-s * 0.24, -s * 0.24);
    ctx.closePath();
    ctx.fill();

    // Belt with tool loops
    ctx.fillStyle = '#5a3a10';
    ctx.fillRect(-s * 0.2, s * 0.08, s * 0.4, s * 0.035);
    ctx.fillStyle = '#bb9944';
    ctx.fillRect(-s * 0.03, s * 0.075, s * 0.06, s * 0.04);
  }

  // Explorer hat styles (for rescued survivors)
  if (explorer && !isPlayer && !isMiner) {
    const hc = explorer.hatColor || '#5a3a18';
    const hcLight = shadeColor(hc, 20);
    const hcDark = shadeColor(hc, -25);
    if (explorer.hat === 'safari') {
      // Wide brim
      ctx.fillStyle = hc;
      ctx.beginPath();
      ctx.ellipse(0, -s * 0.42, s * 0.3, s * 0.055, 0, 0, Math.PI * 2);
      ctx.fill();
      // Crown
      ctx.fillStyle = hcLight;
      ctx.beginPath();
      ctx.moveTo(-s * 0.16, -s * 0.42);
      ctx.quadraticCurveTo(-s * 0.16, -s * 0.57, 0, -s * 0.57);
      ctx.quadraticCurveTo(s * 0.16, -s * 0.57, s * 0.16, -s * 0.42);
      ctx.closePath();
      ctx.fill();
      // Band
      ctx.fillStyle = hcDark;
      ctx.fillRect(-s * 0.16, -s * 0.44, s * 0.32, s * 0.025);
    } else if (explorer.hat === 'cap') {
      // Rounded cap
      ctx.fillStyle = hc;
      ctx.beginPath();
      ctx.arc(0, -s * 0.46, s * 0.2, Math.PI, 0);
      ctx.closePath();
      ctx.fill();
      // Visor
      ctx.fillStyle = hcDark;
      ctx.beginPath();
      ctx.ellipse(s * 0.06, -s * 0.42, s * 0.22, s * 0.035, 0, 0, Math.PI * 2);
      ctx.fill();
      // Button on top
      ctx.fillStyle = hcLight;
      ctx.beginPath();
      ctx.arc(0, -s * 0.62, s * 0.025, 0, Math.PI * 2);
      ctx.fill();
    } else if (explorer.hat === 'bucket') {
      // Rounded dome
      ctx.fillStyle = hcLight;
      ctx.beginPath();
      ctx.arc(0, -s * 0.44, s * 0.2, Math.PI, 0);
      ctx.closePath();
      ctx.fill();
      // Wide flat brim
      ctx.fillStyle = hc;
      ctx.beginPath();
      ctx.ellipse(0, -s * 0.42, s * 0.27, s * 0.045, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = hcDark;
      ctx.lineWidth = 0.8;
      ctx.stroke();
    } else {
      // Fedora
      ctx.fillStyle = hc;
      ctx.beginPath();
      ctx.ellipse(0, -s * 0.42, s * 0.28, s * 0.055, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = hcLight;
      ctx.beginPath();
      ctx.moveTo(-s * 0.17, -s * 0.42);
      ctx.quadraticCurveTo(-s * 0.17, -s * 0.56, -s * 0.05, -s * 0.56);
      ctx.lineTo(s * 0.05, -s * 0.56);
      ctx.quadraticCurveTo(s * 0.17, -s * 0.56, s * 0.17, -s * 0.42);
      ctx.closePath();
      ctx.fill();
      // Crown dent
      ctx.fillStyle = hc;
      ctx.beginPath();
      ctx.moveTo(-s * 0.07, -s * 0.56);
      ctx.quadraticCurveTo(0, -s * 0.52, s * 0.07, -s * 0.56);
      ctx.closePath();
      ctx.fill();
      // Hat band
      ctx.fillStyle = hcDark;
      ctx.fillRect(-s * 0.17, -s * 0.44, s * 0.34, s * 0.025);
    }
    // Small satchel strap across the torso
    ctx.strokeStyle = hcDark;
    ctx.lineWidth = s * 0.04;
    ctx.beginPath();
    ctx.moveTo(-s * 0.18, -s * 0.12);
    ctx.lineTo(s * 0.18, s * 0.1);
    ctx.stroke();
  }

  ctx.restore();
}

// Helper to darken/lighten a hex color
function shadeColor(color, percent) {
  if (color.startsWith('hsl')) return color;
  let num = parseInt(color.replace('#',''), 16);
  let r = Math.min(255, Math.max(0, (num >> 16) + percent));
  let g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
  let b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
  return `rgb(${r},${g},${b})`;
}

// Draw a friendly campsite at a rescue location
function drawCampsite(site) {
  const cs = site.campStyle || {};
  const t = frameNow;
  // Tent (to the left of center)
  ctx.save();
  ctx.translate(site.x - 22, site.y - 4);
  ctx.rotate(cs.tentTilt || 0);
  // Ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 16, 30, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Tent body
  let tg = ctx.createLinearGradient(-26, 0, 26, 0);
  tg.addColorStop(0, '#d49050');
  tg.addColorStop(0.5, '#b07032');
  tg.addColorStop(1, '#7a4820');
  ctx.fillStyle = tg;
  ctx.beginPath();
  ctx.moveTo(-26, 14);
  ctx.lineTo(-4, -24);
  ctx.lineTo(4, -24);
  ctx.lineTo(26, 14);
  ctx.closePath();
  ctx.fill();
  // Seams
  ctx.strokeStyle = 'rgba(60,36,12,0.55)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-4, -24); ctx.lineTo(-14, 14);
  ctx.moveTo(4, -24); ctx.lineTo(14, 14);
  ctx.stroke();
  // Outline
  ctx.strokeStyle = '#4a2a10';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-26, 14);
  ctx.lineTo(-4, -24);
  ctx.lineTo(4, -24);
  ctx.lineTo(26, 14);
  ctx.stroke();
  // Door opening
  ctx.fillStyle = '#1a0f04';
  ctx.beginPath();
  ctx.moveTo(-7, 14);
  ctx.lineTo(0, -10);
  ctx.lineTo(7, 14);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Backpack leaning on the right side of the tent
  ctx.save();
  ctx.translate(site.x - 4, site.y + 10);
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(3, 12, 12, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.rotate(cs.backTilt || -0.35);
  // Body
  ctx.fillStyle = '#4a7a32';
  ctx.beginPath();
  ctx.roundRect(-9, -10, 18, 20, 4);
  ctx.fill();
  // Flap
  ctx.fillStyle = '#5a8a40';
  ctx.beginPath();
  ctx.roundRect(-10, -12, 20, 7, 2);
  ctx.fill();
  // Buckle
  ctx.fillStyle = '#d8c068';
  ctx.fillRect(-2, -8, 4, 2);
  // Straps
  ctx.strokeStyle = '#1a3a0a';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-7, -8); ctx.lineTo(-7, 8);
  ctx.moveTo(7, -8);  ctx.lineTo(7, 8);
  ctx.stroke();
  ctx.restore();

  // Campfire (right of tent)
  ctx.save();
  ctx.translate(site.x + 22, site.y + 10);
  // Stone ring
  const stoneAngles = [0.1, 0.9, 1.8, 2.7, 3.5, 4.2, 5.0, 5.7];
  for (let i = 0; i < stoneAngles.length; i++) {
    let a = stoneAngles[i];
    let sx = Math.cos(a) * 13;
    let sy = Math.sin(a) * 6;
    let sg = ctx.createRadialGradient(sx - 1, sy - 1, 0.5, sx, sy, 5);
    sg.addColorStop(0, '#a89c88');
    sg.addColorStop(1, '#5a5248');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.ellipse(sx, sy, 4, 3, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // Ash
  ctx.fillStyle = '#4a3828';
  ctx.beginPath();
  ctx.ellipse(0, 1, 9, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Logs
  ctx.strokeStyle = '#2a180a';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-6, 0); ctx.lineTo(7, 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-5, 3); ctx.lineTo(7, -2);
  ctx.stroke();
  // Flames (additive)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  let glowR = 20 + Math.sin(t / 180) * 2;
  let fg = ctx.createRadialGradient(0, -4, 1, 0, -4, glowR);
  fg.addColorStop(0, 'rgba(255,200,80,0.5)');
  fg.addColorStop(0.5, 'rgba(255,120,40,0.22)');
  fg.addColorStop(1, 'rgba(255,80,20,0)');
  ctx.fillStyle = fg;
  ctx.beginPath();
  ctx.arc(0, -4, glowR, 0, Math.PI * 2);
  ctx.fill();
  const layers = [
    { c: '#ff5a1a', h: 16, w: 7, o: 0.0 },
    { c: '#ff9030', h: 13, w: 5, o: 1.3 },
    { c: '#ffcc40', h: 10, w: 4, o: 2.1 },
    { c: '#fff5a0', h: 6,  w: 2, o: 3.0 }
  ];
  for (const L of layers) {
    let flick = Math.sin(t / 110 + L.o) * 1.5;
    let flick2 = Math.cos(t / 140 + L.o * 1.7) * 1;
    ctx.fillStyle = L.c;
    ctx.beginPath();
    ctx.moveTo(-L.w + flick, -1);
    ctx.quadraticCurveTo(-L.w - 1 + flick2, -L.h * 0.55, -0.5 + flick, -L.h + flick2);
    ctx.quadraticCurveTo(L.w * 0.4 + flick, -L.h - 1 + flick2, L.w + flick2, -L.h * 0.55);
    ctx.quadraticCurveTo(L.w + 1 + flick, -L.h * 0.2, L.w * 0.5 + flick2, -1);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
  ctx.restore();

  // Signal flag (above the tent)
  ctx.save();
  ctx.translate(site.x - 2, site.y - 28);
  ctx.strokeStyle = '#4a3214';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, -14); ctx.lineTo(0, 16);
  ctx.stroke();
  let wave = Math.sin((t + (cs.flagWave || 0) * 60) / 260);
  let wave2 = Math.sin((t + (cs.flagWave || 0) * 60) / 200 + 1.1);
  ctx.fillStyle = '#e8a838';
  ctx.beginPath();
  ctx.moveTo(1, -14);
  ctx.quadraticCurveTo(9 + wave * 2, -11 + wave2, 16, -5);
  ctx.quadraticCurveTo(9 + wave2, -2 + wave, 1, -1);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#7a4810';
  ctx.lineWidth = 0.6;
  ctx.stroke();
  ctx.restore();

  // Bean-style explorer standing next to the fire
  if (cs.explorer) {
    drawBean(site.x + 42, site.y + 4, 18, cs.explorer.color, 'left', false, false, false, cs.explorer);
  }
}

// Watchtower jobs system
const watchtowerJobs = {
  lookout: { name: 'Lookout', desc: 'Shows wolves on minimap', assigned: 0, max: 1 },
  scout: { name: 'Scout', desc: 'Reveals crash sites on minimap', assigned: 0, max: 1 },
  archer: { name: 'Archer', desc: 'Shoots wolves near village', assigned: 0, max: 2 }
};
let watchtowerMenuOpen = false;
const arrows = [];

// Input
const keys = {};
window.addEventListener('keydown', e => {
  // Don't swallow keystrokes that target form inputs (e.g. the debug passcode)
  let tag = e.target && e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  keys[e.key] = true;

});

// Click on watchtower or menu
canvas.addEventListener('click', e => {
  // Tap to advance NPC speech bubble (mobile)
  if (troubledPerson.speechWaiting && troubledPerson.speechTimer > 0) {
    window.dispatchEvent(new KeyboardEvent('keydown', { key: ' ' }));
    return;
  }
  // Click anywhere to restart on game over
  if (gameOver) {
    resetNewGame();
    return;
  }
  // Click the Play Again button when you win
  if (gameWon) {
    resetNewGame();
    return;
  }
  let rect = canvas.getBoundingClientRect();
  let scaleX = canvas.width / rect.width;
  let scaleY = canvas.height / rect.height;
  let mx = (e.clientX - rect.left) * scaleX;
  let my = (e.clientY - rect.top) * scaleY;

  // Quest tracker toggle
  {
    let qx = 6, qy = 34, btnW = 90, btnH = 22;
    if (mx >= qx && mx <= qx + btnW && my >= qy && my <= qy + btnH) {
      questTrackerOpen = !questTrackerOpen;
      return;
    }
  }

  if (watchtowerMenuOpen) {
    // Check menu button clicks
    let menuW = 220, menuH = 200;
    let menuX = canvas.width / 2 - menuW / 2;
    let menuY = canvas.height / 2 - menuH / 2;
    let jobKeys = Object.keys(watchtowerJobs);
    let totalAssigned = jobKeys.reduce((s, k) => s + watchtowerJobs[k].assigned, 0);
    let available = village.population - totalAssigned;

    for (let i = 0; i < jobKeys.length; i++) {
      let job = watchtowerJobs[jobKeys[i]];
      let btnY = menuY + 45 + i * 45;
      // Plus button
      if (mx > menuX + menuW - 55 && mx < menuX + menuW - 35 && my > btnY && my < btnY + 20) {
        if (job.assigned < job.max && available > 0) {
          job.assigned++;
          notify(`Assigned ${job.name}!`);
        }
      }
      // Minus button
      if (mx > menuX + menuW - 30 && mx < menuX + menuW - 10 && my > btnY && my < btnY + 20) {
        if (job.assigned > 0) {
          job.assigned--;
          notify(`Removed ${job.name}`);
        }
      }
    }
    // Close button
    if (mx > menuX + menuW - 25 && mx < menuX + menuW - 5 && my > menuY + 5 && my < menuY + 25) {
      watchtowerMenuOpen = false;
    }
    return;
  }

  // Check if clicked on quest NPC
  if (questMenuOpen) {
    let menuW = 260, menuH = 160;
    let menuX = canvas.width / 2 - menuW / 2;
    let menuY = canvas.height / 2 - menuH / 2;
    // Close button
    if (mx > menuX + menuW - 25 && mx < menuX + menuW - 5 && my > menuY + 5 && my < menuY + 25) {
      questMenuOpen = false;
      questMenuTarget = -1;
    }
    // Accept/Turn-in button
    let btnX = menuX + menuW / 2 - 50;
    let btnY = menuY + menuH - 40;
    if (mx > btnX && mx < btnX + 100 && my > btnY && my < btnY + 28) {
      let quest = activeQuests.find(q => q.giver === questMenuTarget);
      if (quest && !quest.accepted) {
        quest.accepted = true;
        notify(`Quest accepted: ${quest.desc}`);
        questMenuOpen = false;
        questMenuTarget = -1;
      } else if (quest && quest.done && !quest.turned_in) {
        // Turn in - give reward
        let emptySlot = inventory.slots.indexOf(null);
        if (emptySlot !== -1) {
          inventory.slots[emptySlot] = quest.reward;
          notify(`Quest complete! Received ${ITEM_TYPES[quest.reward].name}!`);
        } else {
          notify(`Quest complete! But inventory full - ${ITEM_TYPES[quest.reward].name} dropped!`);
          worldItems.push({ x: player.x + 20, y: player.y, type: quest.reward, collected: false });
        }
        quest.turned_in = true;
        villagePeople[quest.giver].hasQuest = false;
        questMenuOpen = false;
        questMenuTarget = -1;
      } else if (quest && quest.type === 'gather_food') {
        // Try to hand in food from inventory
        let needed = quest.need - quest.progress;
        for (let i = 0; i < inventory.slots.length && needed > 0; i++) {
          if (inventory.slots[i] === 'food') {
            inventory.slots[i] = null;
            quest.progress++;
            needed--;
          }
        }
        if (quest.progress >= quest.need) quest.done = true;
      } else if (quest && quest.type === 'gather_medkit') {
        // Try to hand in medkits from inventory
        let needed = quest.need - quest.progress;
        for (let i = 0; i < inventory.slots.length && needed > 0; i++) {
          if (inventory.slots[i] === 'medkit') {
            inventory.slots[i] = null;
            quest.progress++;
            needed--;
          }
        }
        if (quest.progress >= quest.need) quest.done = true;
      }
    }
    return;
  }

  // Check if clicked on a quest NPC in village
  {
    let worldX = mx + camX;
    let worldY = my + camY;
    let pInVillage = player.x > village.x && player.x < village.x + village.w && player.y > village.y && player.y < village.y + village.h;
    if (pInVillage) {
      for (let i = 0; i < villagePeople.length; i++) {
        let vp = villagePeople[i];
        if (!vp.hasQuest) continue;
        if (Math.abs(worldX - vp.x) < 18 && Math.abs(worldY - vp.y) < 24) {
          questMenuOpen = true;
          questMenuTarget = i;
          return;
        }
      }
    }
  }

  // Check if clicked on watchtower building
  let tower = village.buildings.find(b => b.name === 'Watchtower');
  if (tower) {
    let worldX = mx + camX;
    let worldY = my + camY;
    let pInVillage = player.x > village.x && player.x < village.x + village.w && player.y > village.y && player.y < village.y + village.h;
    if (worldX > tower.x - 10 && worldX < tower.x + tower.w + 10 &&
        worldY > tower.y - 20 && worldY < tower.y + tower.h + 10) {
      if (pInVillage) {
        watchtowerMenuOpen = true;
      } else {
        notify('Go to the village to use the Watchtower!');
      }
    }
  }
});
