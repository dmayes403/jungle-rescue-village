function scheduleMusic() {
  if (!musicCtx || !currentMusicTrack) return;
  const track = MUSIC_TRACKS[currentMusicTrack];
  const stepDur = 30 / track.bpm; // half-beat in seconds
  const lookahead = 0.25;
  while (musicScheduleAt < musicCtx.currentTime + lookahead) {
    const i = musicNoteIndex % track.steps;
    if (track.melody[i]) {
      const f = NOTE_FREQ[track.melody[i]];
      playMarimba(f, musicScheduleAt, stepDur * 1.4, 0.22);
      // Delay tap (DKC-style echo) 1.5 steps later at half volume
      playMarimba(f, musicScheduleAt + stepDur * 1.5, stepDur * 0.8, 0.09);
    }
    if (track.bass[i])   playBass(NOTE_FREQ[track.bass[i]],   musicScheduleAt, stepDur * 1.8);
    if (track.kick[i])   playKick(musicScheduleAt);
    if (track.shaker[i]) playShaker(musicScheduleAt);
    if (track.conga && track.conga[i]) playConga(musicScheduleAt, track.conga[i] === 2);
    if (track.wood && track.wood[i]) playWoodblock(musicScheduleAt);
    if (track.chord && track.chord[i]) {
      let name = track.chord[i];
      let minor = false;
      if (name.endsWith('m')) { minor = true; name = name.slice(0, -1); }
      playPad(NOTE_FREQ[name], musicScheduleAt, stepDur * 8, minor);
    }
    if (track.bird && track.bird[i]) playBird(musicScheduleAt);
    if (track.monkey && track.monkey[i]) playMonkey(musicScheduleAt);
    if (track.tom && track.tom[i]) playTom(musicScheduleAt, track.tom[i] === 2);
    musicScheduleAt += stepDur;
    musicNoteIndex++;
  }
}

function musicTargetVolume() {
  if (musicMuted) return 0;
  const base = currentMusicTrack === 'boss' ? 0.55 : 0.35;
  return base * musicVolume;
}

function setMusicVolume(v) {
  musicVolume = Math.min(1, Math.max(0, v));
  try { localStorage.setItem('jrv_vol', String(musicVolume)); } catch (e) {}
  if (musicMasterGain) musicMasterGain.gain.value = musicTargetVolume();
}

function startMusicTrack(name) {
  if (!musicCtx || currentMusicTrack === name) return;
  currentMusicTrack = name;
  musicNoteIndex = 0;
  musicScheduleAt = musicCtx.currentTime + 0.1;
  if (musicMasterGain) {
    const now = musicCtx.currentTime;
    const target = musicTargetVolume();
    musicMasterGain.gain.cancelScheduledValues(now);
    musicMasterGain.gain.setValueAtTime(musicMasterGain.gain.value, now);
    musicMasterGain.gain.linearRampToValueAtTime(target, now + 0.4);
  }
}

function initMusic() {
  if (musicCtx) return;
  try {
    musicCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) { return; }
  musicMasterGain = musicCtx.createGain();
  musicMasterGain.gain.value = musicTargetVolume();
  musicMasterGain.connect(musicCtx.destination);
  startMusicTrack('explore');
  musicSchedulerId = setInterval(scheduleMusic, 25);
  // Sync mute button UI with persisted state
  const muteBtn = document.getElementById('mute-btn');
  if (muteBtn) {
    const icon = muteBtn.querySelector('.speaker-svg');
    if (icon) icon.classList.toggle('muted', musicMuted);
    muteBtn.title = musicMuted ? 'Unmute music' : 'Mute music';
  }
}

function setMusicMuted(muted) {
  musicMuted = muted;
  try { localStorage.setItem('jrv_muted', muted ? '1' : '0'); } catch (e) {}
  if (musicMasterGain) musicMasterGain.gain.value = musicTargetVolume();
  const muteBtn = document.getElementById('mute-btn');
  if (muteBtn) {
    const icon = muteBtn.querySelector('.speaker-svg');
    if (icon) icon.classList.toggle('muted', muted);
    muteBtn.title = muted ? 'Unmute music' : 'Mute music';
  }
}

// Start on first user interaction (browser autoplay policy)
window.addEventListener('keydown', initMusic, { once: true });
window.addEventListener('pointerdown', initMusic, { once: true });

// M key toggles mute
window.addEventListener('keydown', e => {
  if (e.key === 'm' || e.key === 'M') {
    setMusicMuted(!musicMuted);
    notify(musicMuted ? 'Music muted (M to unmute)' : 'Music on (M to mute)');
  }
});

// Mute button click (desktop + mobile)
document.getElementById('mute-btn').addEventListener('click', () => {
  initMusic();
  setMusicMuted(!musicMuted);
});

// Volume slider in pause menu
(function() {
  const slider = document.getElementById('vol-slider');
  if (!slider) return;
  slider.value = String(Math.round(musicVolume * 100));
  slider.addEventListener('input', () => {
    initMusic();
    setMusicVolume(parseInt(slider.value, 10) / 100);
  });
})();

// --- MOBILE TOUCH CONTROLS ---
const isMobile = ('ontouchstart' in window) && window.matchMedia('(pointer: coarse)').matches;
let touchJoystick = { active: false, dx: 0, dy: 0 };
const minimapCanvas = document.getElementById('minimap-canvas');
const minimapCtx = minimapCanvas.getContext('2d');

if (isMobile) {
  // Stack save button label on two lines to fit in left bar
  document.getElementById('save-btn').innerHTML = 'Save<br>&amp; Quit';
  // Lock orientation if supported
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }

  // Resize canvas for mobile landscape
  function mobileResize() {
    if (window.innerWidth > window.innerHeight) {
      let sideBar = 120;
      let gameW = window.innerWidth - sideBar * 2;
      let gameH = window.innerHeight;
      // Maintain aspect ratio
      let ratio = 800 / 600;
      if (gameW / gameH > ratio) {
        canvas.height = gameH;
        canvas.width = gameH * ratio;
      } else {
        canvas.width = gameW;
        canvas.height = gameW / ratio;
      }
    }
  }
  mobileResize();
  window.addEventListener('resize', mobileResize);
  window.addEventListener('orientationchange', () => setTimeout(mobileResize, 100));

  // Prevent default touch behaviors on game area
  document.body.style.touchAction = 'none';
  document.body.style.userSelect = 'none';
  document.body.style.webkitUserSelect = 'none';
  canvas.style.touchAction = 'none';

  // Joystick controls
  const joystickArea = document.getElementById('joystick-area');
  const joystickThumb = document.getElementById('joystick-thumb');
  const joystickBase = document.getElementById('joystick-base');
  let joystickTouchId = null;
  let joystickCenterX = 0, joystickCenterY = 0;

  joystickArea.addEventListener('touchstart', e => {
    e.preventDefault();
    let touch = e.changedTouches[0];
    joystickTouchId = touch.identifier;
    let rect = joystickBase.getBoundingClientRect();
    joystickCenterX = rect.left + rect.width / 2;
    joystickCenterY = rect.top + rect.height / 2;
    handleJoystickMove(touch);
  });

  window.addEventListener('touchmove', e => {
    for (let touch of e.changedTouches) {
      if (touch.identifier === joystickTouchId) {
        e.preventDefault();
        handleJoystickMove(touch);
        break;
      }
    }
  }, { passive: false });

  window.addEventListener('touchend', e => {
    for (let touch of e.changedTouches) {
      if (touch.identifier === joystickTouchId) {
        joystickTouchId = null;
        touchJoystick.active = false;
        touchJoystick.dx = 0;
        touchJoystick.dy = 0;
        joystickThumb.style.left = '30px';
        joystickThumb.style.top = '30px';
        break;
      }
    }
  });

  // Mouse support for joystick (desktop testing)
  let joystickMouseDown = false;
  joystickArea.addEventListener('mousedown', e => {
    e.preventDefault();
    joystickMouseDown = true;
    let rect = joystickBase.getBoundingClientRect();
    joystickCenterX = rect.left + rect.width / 2;
    joystickCenterY = rect.top + rect.height / 2;
    handleJoystickMove(e);
  });
  window.addEventListener('mousemove', e => {
    if (joystickMouseDown) {
      handleJoystickMove(e);
    }
  });
  window.addEventListener('mouseup', e => {
    if (joystickMouseDown) {
      joystickMouseDown = false;
      touchJoystick.active = false;
      touchJoystick.dx = 0;
      touchJoystick.dy = 0;
      joystickThumb.style.left = '30px';
      joystickThumb.style.top = '30px';
    }
  });

  function handleJoystickMove(touch) {
    let dx = touch.clientX - joystickCenterX;
    let dy = touch.clientY - joystickCenterY;
    let dist = Math.hypot(dx, dy);
    let maxDist = 35;
    if (dist > maxDist) {
      dx = dx / dist * maxDist;
      dy = dy / dist * maxDist;
      dist = maxDist;
    }
    // Move thumb visual
    joystickThumb.style.left = (30 + dx) + 'px';
    joystickThumb.style.top = (30 + dy) + 'px';
    // Set joystick state (normalize to -1..1)
    let deadzone = 8;
    if (dist > deadzone) {
      touchJoystick.active = true;
      touchJoystick.dx = dx / maxDist;
      touchJoystick.dy = dy / maxDist;
    } else {
      touchJoystick.active = false;
      touchJoystick.dx = 0;
      touchJoystick.dy = 0;
    }
  }

  // Whip button
  const whipBtn = document.getElementById('whip-btn');
  function triggerWhip() {
    let inVillage = player.x > village.x && player.x < village.x + village.w && player.y > village.y && player.y < village.y + village.h;
    if (!whip.active && !gameOver && !paused && !inVillage) {
      whip.active = true;
      whip.timer = 20;
      let wdx = 0, wdy = 0;
      if (player.facing === 'up') wdy = -1;
      else if (player.facing === 'down') wdy = 1;
      else if (player.facing === 'left') wdx = -1;
      else if (player.facing === 'right') wdx = 1;
      whip.x = player.x;
      whip.y = player.y;
      whip.endX = player.x + wdx * whip.length;
      whip.endY = player.y + wdy * whip.length;
      for (const wolf of wolves) {
        let wddx = whip.endX - whip.x;
        let wddy = whip.endY - whip.y;
        let len2 = wddx * wddx + wddy * wddy;
        let t = Math.max(0, Math.min(1, ((wolf.x - whip.x) * wddx + (wolf.y - whip.y) * wddy) / len2));
        let projX = whip.x + t * wddx;
        let projY = whip.y + t * wddy;
        let dist = Math.hypot(wolf.x - projX, wolf.y - projY);
        if (dist < 25) {
          wolf.health--;
          spawnFloater(wolf.x, wolf.y - 20, '-1', '#ffdd55');
          let kbAngle = Math.atan2(wolf.y - player.y, wolf.x - player.x);
          wolf.x += Math.cos(kbAngle) * 40;
          wolf.y += Math.sin(kbAngle) * 40;
          wolf.x = Math.max(BORDER, Math.min(WORLD_W - BORDER, wolf.x));
          wolf.y = Math.max(BORDER, Math.min(WORLD_H - BORDER, wolf.y));
          wolf.state = 'wander';
          wolf.angle = kbAngle;
        }
      }
      // Mobile whip hits golems
      for (const g of golems) {
        const wddx = whip.endX - whip.x;
        const wddy = whip.endY - whip.y;
        const len2 = wddx * wddx + wddy * wddy;
        const t = Math.max(0, Math.min(1, ((g.x - whip.x) * wddx + (g.y - whip.y) * wddy) / len2));
        const projX = whip.x + t * wddx;
        const projY = whip.y + t * wddy;
        if (Math.hypot(g.x - projX, g.y - projY) < 30 && g.hurtTimer <= 0) {
          g.health--;
          g.hurtTimer = 14;
          spawnFloater(g.x, g.y - 28, '-1', '#ffb055');
          for (let k = 0; k < 6; k++) {
            const a = Math.random() * Math.PI * 2;
            const sp = 1 + Math.random() * 2;
            g.shards.push({ x: g.x + (Math.random() - 0.5) * 12, y: g.y + (Math.random() - 0.5) * 20, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1, life: 18 + Math.floor(Math.random() * 8) });
          }
        }
      }
    }
  }
  whipBtn.addEventListener('touchstart', e => { e.preventDefault(); triggerWhip(); });
  whipBtn.addEventListener('mousedown', e => { e.preventDefault(); triggerWhip(); });

  // Cycle item button
  const cycleBtn = document.getElementById('cycle-btn');
  function triggerCycleItem() {
    // Find next slot that has an item, or wrap around
    let start = inventory.selected;
    for (let i = 1; i <= 5; i++) {
      let idx = (start + i) % 5;
      if (inventory.slots[idx] !== null) {
        inventory.selected = idx;
        notify(`Selected: ${ITEM_TYPES[inventory.slots[idx]].name}`);
        return;
      }
    }
    // No items, just cycle to next slot
    inventory.selected = (inventory.selected + 1) % 5;
  }
  cycleBtn.addEventListener('touchstart', e => { e.preventDefault(); triggerCycleItem(); });
  cycleBtn.addEventListener('mousedown', e => { e.preventDefault(); triggerCycleItem(); });

  // Use item button
  const useBtn = document.getElementById('use-btn');
  function triggerUseItem() {
    if (gameOver || paused) return;
    let item = inventory.slots[inventory.selected];
    if (!item) { notify('No item selected'); return; }
    let used = false;
    if (item === 'medkit') {
      if (player.health < player.maxHealth) {
        player.health = Math.min(player.maxHealth, player.health + 3);
        notify('Used Medkit! +3 HP');
        used = true;
      }
    } else if (item === 'food') {
      if (player.health < player.maxHealth) {
        player.health = Math.min(player.maxHealth, player.health + 1);
        notify('Ate Food! +1 HP');
        used = true;
      }
    } else if (item === 'speed') {
      speedBoostTimer = 600;
      notify('Speed Boost activated!');
      used = true;
    } else if (item === 'shield') {
      shieldActive = true;
      notify('Shield activated!');
      used = true;
    }
    if (used) inventory.slots[inventory.selected] = null;
  }
  useBtn.addEventListener('touchstart', e => { e.preventDefault(); triggerUseItem(); });
  useBtn.addEventListener('mousedown', e => { e.preventDefault(); triggerUseItem(); });

  // Touch on canvas — simulate click for UI elements and prevent scroll
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    // Fire a synthetic click so menu buttons and in-game UI work
    let touch = e.changedTouches[0];
    canvas.dispatchEvent(new MouseEvent('click', {
      clientX: touch.clientX,
      clientY: touch.clientY,
      bubbles: true
    }));
  }, { passive: false });
}

// --- GAME LOOP ---
const TARGET_FPS = isMobile ? 30 : 60;
const FRAME_TIME = 1000 / TARGET_FPS;
let lastFrameTime = 0;
let frameNow = 0; // cached timestamp for the current frame

function gameLoop(timestamp) {
  let elapsed = timestamp - lastFrameTime;
  if (elapsed < FRAME_TIME) {
    requestAnimationFrame(gameLoop);
    return;
  }
  lastFrameTime = timestamp - (elapsed % FRAME_TIME);
  frameNow = timestamp;

  if (inMainMenu) {
    // Make sure mobile touch zones don't block main menu buttons
    let mc = document.getElementById('mobile-controls');
    if (mc.style.display !== 'none') mc.style.display = 'none';
    drawMainMenu();
  } else {
    if (!paused && !gameOver) {
      update();
    }
    draw();
  }
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

// --- DEBUG PANEL ---
const debugPanel = document.getElementById('debug-panel');
const debugQuests = document.getElementById('debug-quests');
const debugLock = document.getElementById('debug-lock');
const debugPassBoxes = document.getElementById('debug-pass-boxes');
const debugPassError = document.getElementById('debug-pass-error');
const DEBUG_PASSCODE = 'Bluebird89';
const DEBUG_MAX_TRIES = 4;
const DEBUG_LOCKOUT_MS = 30 * 60 * 1000; // 30 minutes
const DEBUG_LOCKOUT_KEY = 'debugLockoutUntil';
let debugOpen = false;
let debugUnlocked = false;
let debugTriesLeft = DEBUG_MAX_TRIES;
let debugLockoutUntil = 0;
let debugLockoutInterval = null;
try {
  let saved = parseInt(localStorage.getItem(DEBUG_LOCKOUT_KEY) || '0', 10);
  if (saved && saved > Date.now()) debugLockoutUntil = saved;
  else if (saved) localStorage.removeItem(DEBUG_LOCKOUT_KEY);
} catch (e) {}
function isDebugLocked() { return debugLockoutUntil > Date.now(); }
function formatDebugRemaining() {
  let remaining = Math.max(0, debugLockoutUntil - Date.now());
  let mm = Math.floor(remaining / 60000);
  let ss = Math.floor((remaining % 60000) / 1000);
  return `${mm}:${ss.toString().padStart(2, '0')}`;
}
function applyDebugLockoutUI() {
  debugPassError.textContent = `Locked out — try again in ${formatDebugRemaining()}`;
  debugPassInputs.forEach(b => {
    b.value = '';
    b.disabled = true;
    b.style.borderColor = '#ff4444';
    b.style.background = '#1a0808';
  });
}
function clearDebugLockout() {
  debugLockoutUntil = 0;
  debugTriesLeft = DEBUG_MAX_TRIES;
  try { localStorage.removeItem(DEBUG_LOCKOUT_KEY); } catch (e) {}
  debugPassInputs.forEach(b => {
    b.disabled = false;
    b.style.borderColor = '#886a20';
    b.style.background = '#222';
  });
  debugPassError.textContent = '';
  if (debugLockoutInterval) { clearInterval(debugLockoutInterval); debugLockoutInterval = null; }
}
function startDebugLockoutTick() {
  if (debugLockoutInterval) clearInterval(debugLockoutInterval);
  debugLockoutInterval = setInterval(() => {
    if (!isDebugLocked()) {
      clearDebugLockout();
      if (debugOpen) {
        debugPassInputs[0].focus();
      }
      return;
    }
    if (debugOpen && !debugUnlocked) {
      debugPassError.textContent = `Locked out — try again in ${formatDebugRemaining()}`;
    }
  }, 1000);
}
if (isDebugLocked()) startDebugLockoutTick();

// Build the 10 single-character passcode inputs
const debugPassInputs = [];
for (let i = 0; i < DEBUG_PASSCODE.length; i++) {
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.maxLength = 1;
  inp.autocomplete = 'off';
  inp.style.cssText = 'width:22px;height:26px;text-align:center;font:bold 14px monospace;background:#222;color:#ffcc44;border:1px solid #886a20;border-radius:3px;padding:0;';
  inp.addEventListener('input', () => {
    if (inp.value.length > 0 && i < debugPassInputs.length - 1) {
      debugPassInputs[i + 1].focus();
    }
    // If all filled, check
    if (debugPassInputs.every(b => b.value.length > 0)) {
      let entered = debugPassInputs.map(b => b.value).join('');
      if (entered === DEBUG_PASSCODE) {
        debugUnlocked = true;
        debugLock.style.display = 'none';
        debugQuests.style.display = 'block';
        debugPassError.textContent = '';
        updateDebugPanel();
      } else {
        debugTriesLeft--;
        if (debugTriesLeft <= 0) {
          debugLockoutUntil = Date.now() + DEBUG_LOCKOUT_MS;
          try { localStorage.setItem(DEBUG_LOCKOUT_KEY, String(debugLockoutUntil)); } catch (e) {}
          applyDebugLockoutUI();
          startDebugLockoutTick();
        } else {
          debugPassError.textContent = `Incorrect passcode — ${debugTriesLeft} tr${debugTriesLeft === 1 ? 'y' : 'ies'} left`;
          debugPassInputs.forEach(b => { b.value = ''; b.style.borderColor = '#ff4444'; });
          setTimeout(() => debugPassInputs.forEach(b => b.style.borderColor = '#886a20'), 600);
          debugPassInputs[0].focus();
        }
      }
    }
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && inp.value.length === 0 && i > 0) {
      debugPassInputs[i - 1].focus();
      debugPassInputs[i - 1].value = '';
      e.preventDefault();
    } else if (e.key === 'ArrowLeft' && i > 0) {
      debugPassInputs[i - 1].focus();
    } else if (e.key === 'ArrowRight' && i < debugPassInputs.length - 1) {
      debugPassInputs[i + 1].focus();
    } else if (e.key === '`') {
      e.preventDefault();
      toggleDebug();
    }
  });
  inp.addEventListener('paste', e => {
    e.preventDefault();
    let pasted = (e.clipboardData || window.clipboardData).getData('text').slice(0, DEBUG_PASSCODE.length);
    for (let j = 0; j < pasted.length && i + j < debugPassInputs.length; j++) {
      debugPassInputs[i + j].value = pasted[j];
    }
    debugPassInputs[Math.min(i + pasted.length, debugPassInputs.length - 1)].focus();
    debugPassInputs[debugPassInputs.length - 1].dispatchEvent(new Event('input'));
  });
  debugPassBoxes.appendChild(inp);
  debugPassInputs.push(inp);
}

function toggleDebug() {
  debugOpen = !debugOpen;
  debugPanel.style.display = debugOpen ? 'block' : 'none';
  if (debugOpen) {
    if (debugUnlocked) {
      debugLock.style.display = 'none';
      debugQuests.style.display = 'block';
      updateDebugPanel();
    } else {
      debugLock.style.display = 'block';
      debugQuests.style.display = 'none';
      if (isDebugLocked()) {
        applyDebugLockoutUI();
        startDebugLockoutTick();
      } else {
        // Expired lockout — make sure the UI is reset
        if (debugLockoutUntil && !isDebugLocked()) clearDebugLockout();
        debugPassError.textContent = '';
        debugPassInputs.forEach(b => b.value = '');
        setTimeout(() => debugPassInputs[0] && debugPassInputs[0].focus(), 0);
      }
    }
  }
}

document.getElementById('debug-close').addEventListener('click', toggleDebug);
window.addEventListener('keydown', e => {
  if (e.key === '`') toggleDebug();
});

function updateDebugPanel() {
  if (!debugOpen || !debugUnlocked) return;
  let rescued = village.population;
  let sideComplete = activeQuests.filter(q => q.turned_in).length;
  let quests = [
    {
      name: '1. Find All Lost Explorers',
      done: rescued >= totalSurvivors && totalSurvivors > 0,
      status: `${rescued}/${totalSurvivors}`,
      action: () => {
        for (const site of crashSites) {
          if (!site.rescued) {
            site.rescued = true;
            village.population += site.survivors;
          }
        }
        followers.length = 0;
        player.carrying = 0;
        document.getElementById('rescued').textContent = totalSurvivors;
        document.getElementById('village').textContent = village.population;
        // Spawn village people for quest givers
        while (villagePeople.length < village.population) {
          villagePeople.push({
            x: village.x + 20 + Math.random() * (village.w - 40),
            y: village.y + 20 + Math.random() * (village.h - 40),
            color: ['#c51111','#132ed1','#117f2d','#ed54ba','#ef7d0e','#f5f557'][Math.floor(Math.random()*6)],
            explorer: makeExplorerStyle(),
            wanderAngle: Math.random() * Math.PI * 2,
            hasQuest: false
          });
        }
      }
    },
    {
      name: '2. Complete 3 Side Quests',
      done: sideComplete >= 3,
      status: `${Math.min(sideComplete, 3)}/3`,
      action: () => {
        // First ensure survivors are rescued
        quests[0].action();
        // Create and auto-complete 3 side quests if needed
        let needed = 3 - activeQuests.filter(q => q.turned_in).length;
        for (let i = 0; i < needed; i++) {
          activeQuests.push({
            id: questIdCounter++, giver: 0,
            desc: 'Debug quest ' + (i+1), type: 'kill_wolves',
            need: 1, progress: 1, reward: 'food',
            done: true, turned_in: true, accepted: true
          });
        }
      }
    },
    {
      name: '3. Find the Miner (Wolf Fight)',
      done: troubledPersonFound,
      status: troubledPersonFound ? 'Done' : troubledPerson.active ? 'Active' : 'Locked',
      action: () => {
        quests[1].action(); // complete prerequisites
        troubledPersonFound = true;
        troubledPerson.active = true;
        troubledPerson.found = true;
        troubledPerson.following = true;
        troubledPerson.movingFollow = false;
        troubledPerson.health = troubledPerson.maxHealth;
        troubledPerson.wolvesSpawned = true;
        troubledPerson.x = player.x + 40;
        troubledPerson.y = player.y;
        // Remove any quest wolves
        for (let i = wolves.length - 1; i >= 0; i--) {
          if (wolves[i].pack === TROUBLED_PACK_ID) wolves.splice(i, 1);
        }
      }
    },
    {
      name: '4. Find the Mine (Boss Fight)',
      done: mineFound,
      status: mineFound ? 'Done' : troubledPersonFound ? 'Active' : 'Locked',
      action: () => {
        quests[2].action(); // complete prerequisites
        // Teleport player and miner near the mine
        player.x = mine.x + 60;
        player.y = mine.y + 60;
        troubledPerson.x = mine.x - 60;
        troubledPerson.y = mine.y + 60;
        troubledPerson.active = true;
        troubledPerson.following = true;
      }
    }
  ];

  debugQuests.innerHTML = quests.map((q, i) => {
    let color = q.done ? '#44ff44' : '#f0e0b0';
    let icon = q.done ? '✓' : '▶';
    let btnStyle = q.done
      ? 'background:#333;color:#666;cursor:default;'
      : 'background:#4a3a10;color:#ffcc44;cursor:pointer;border:1px solid #886a20;';
    return `<div style="margin-bottom:6px;">
      <span style="color:${color};font-size:12px;">${q.done ? '✓' : '•'} ${q.name}</span>
      <span style="color:#aaa;font-size:11px;float:right;">${q.status}</span>
      <br><button onclick="window._debugSkip(${i})" style="${btnStyle}padding:3px 10px;border-radius:4px;font:11px monospace;margin-top:2px;width:100%;">${q.done ? 'Completed' : icon + ' Skip to this quest'}</button>
    </div>`;
  }).join('');

  window._debugSkip = function(idx) {
    if (quests[idx].done) return;
    quests[idx].action();
    updateDebugPanel();
    notify('DEBUG: Skipped to ' + quests[idx].name);
  };
}

setInterval(updateDebugPanel, 500);
</script>
